body:
  text: 卷二素問經文素問生氣通天論陽氣者若天與曰失其所則折壽而不彰日不明則萬物不彰人無陽則夭折不壽故天運當以曰光明日即陽也陽即明也是故陽因而上衛外者也人以陽為衛欲如運樞晝夜五十度運行於身起居如驚神氣乃浮若於起居之時煩擾如驚則神氣浮散而不固舊本欲如運樞上有因於寒三字今從吳注移在下因於寒體若燔炭汗出而散傷於寒則為病熱在表者汗以散之舊本體若燔炭二句在靜則多言下今從吳注移此因於暑汗煩則喘喝靜則多言暑先入心而熱熏肺故多汗煩則喘大聲呼喝靜者多言而無次因於濕首如裹昏重也濕熱不攘除也大筋緛音軟短小筋弛弛同長緛短為拘弛長為痿濕鬱而熱大筋連於骨肉受熱則縮而短故病拘攣小筋絡於骨外得濕則引而長故病痿弱因於氣為腫氣道壅滯故為浮腫四維相代陽氣乃竭四維四肢也相代更迭而病也竭盡也二句總結上文陽氣者煩勞則張精絶闢積於夏使人煎厥煩擾乎陽則氣張大而火炎故令精絶春令邪辟之氣積至夏月火旺而精益虧孤陽厥逆故日煎厥上文言陽氣不固外邪傷之此下言起居不節致傷陽氣也目肓不可以視耳閉不可以聽腎之精為瞳子耳為腎竅精絶於內故見證若此潰潰乎若壞都汩汩音骨乎不可止都防水堤也陽氣者大怒則形氣絶而血菀音郁於上使人薄厥陽氣貴充和若大怒則傷形氣氣達於旰故血妄行而菀積於上焦也相迫曰薄氣逆曰厥氣血俱亂故為薄厥有傷於筋縱其若不容縱緩不收若難為容止汗出偏沮濕也使人偏枯身常汗出半邊者氣血有所偏沮久則營氣不固營氣失守故為偏枯即半身不遂也汗出見濕乃生痤痱音鋤沸汗出則玄府闢若濕留膚腠甚者為痤微者為痱痤小癤也痱癮疹也高梁膏粱同之變足主大丁疔同受如持虛足能也膏梁美食內多滯熱其變能生大疔感發最易如持空器以受物也勞汗當風寒薄為皶音渣郁乃痤形勞汗出悽風寒氣薄之液凝於膚腠為皶即粉刺也若鬱而稍重乃或痤陽氣者精則養神柔則養筋內化精微養於神外為津液柔於筋開闔不得寒氣從之乃生大僂音呂開謂皮膚發泄闔謂玄府封閉若為寒所襲陽氣受傷不能柔筋形為僂俯矣陷脈為瘻音陋留連肉腠寒氣自筋絡而陷入脈中發為瘍瘻留結腠理俞氣化薄傳為善畏及為驚駭寒氣流於經俞氣化薄於臟腑則為恐畏驚駭此陽氣被傷不能養神也營氣不從逆於肉理乃生癰腫營行脈中邪氣陷脈則不順而逆於肉理血鬱熱聚故為癰腫魄汗未盡形弱而氣榮穴俞已閉發為風瘧魄陰也汗由陰液故曰魄汗汗出未止形弱氣消風寒薄之穴俞隨閉邪留為瘧以所病在風故名風瘧故風者百病之始也清靜則肉腠閉拒雖有大風苛毒弗之能害此因時之序也清靜之道在因四時之氣序而為調攝是以春傷於風邪氣留連乃為洞泄風搖木勝即病者為外感若邪氣留連日久剋制脾土故為洞泄夏傷於暑秋為痎瘧暑邪伏而不發延至秋涼外束則寒熱交爭而為痎瘧秋傷於濕上逆而咳發為痿厥濕土用事於長夏之未故秋傷於濕也然秋氣通於肺濕鬱成熱則氣逆而為咳嗽濕傷筋筋弛長則為痿陽不能勝濕則為厥冬傷於寒春必溫病冬傷寒邪不即病者寒毒藏於陰分至春時陽氣上升則變為溫病四時之氣更傷五臟風暑寒濕迭相勝負故四時之氣更傷五臟之和也然五臟內隱陰氣也惟內不守而後骨邪得以犯之素問金匱真言論平旦至日中天之陽陽中之陽也日中至黃昏天之陽陽中之陰也合夜至雞鳴天之陰陰中之陰也雞鳴至平旦天之陰陰中之陽也一日之氣自卯時日出地上為晝天之陽也自酉時日入地中為夜天之陰也然於陰陽之中復有陰陽如此故人亦應之夫言人之陰陽則外為陽內為陰言人身之陰陽則背為陽腹為陰言人身之臟腑中陰陽則臟者為陰腑者為陽肝心脾肺腎五臟皆為陰膽胃大腸小腸膀胱三焦六腑皆為陽故背為陽陽中之陽心也背為陽陽中之陰肺也腹為陰陰中之陰腎也腹為陰陰中之陽肝也腹為陰陰中之至陰脾也此皆陰陽表裡內外雌雄相輸應也故以應天之陰陽也素問陰陽應象大論陰陽者天地之道也天生於動地生於靜萬物之綱紀總之為綱周之為紀變化之父母物生謂之化物極謂之變皆陰陽之所生故為父母生殺之本始本根本始終始也神明之府也神變化不測也明三光著象也府所以藏物也神明出於陰陽故陰陽為神明之府治病必求於本天地萬物變化生殺而神明者皆本於陰陽病所從生皆不外陰陽二氣或本於陰或本於陽必求其故而施治也故積陽為天積陰為地陰靜陽躁陽生陰長陽殺陰藏陽不獨立必得陰而後成如陽和發生雨露長養是陽生陰長也陰不自專必因陽而後行如寒列閉藏風霜肅殺是陽殺陰藏也陽化氣陽動而散陰成形陰靜而疑寒極生熱熱極生寒陰極則陽生陽極則陰生寒氣生濁熱氣生清寒氣疑滯故生濁陰熱氣升散故生清陽清氣在下則生飧泄濁氣在上則生䐜脹清陽陷於下而不能升故為飧泄濁陰逆於上而不能降故為䐜脹由膻中不化氣胸膈滿也此陰陽反作病之逆從也陰陽相反清濁易位則為逆順則為從也故清陽為天濁陰為地地氣上為云天氣下為雨雨出地氣云出天氣天地者陰陽之形體也雲雨者天地之精氣也陰在下為精即水也精升則化為氣陽在上者為氣即云也氣降則化為精故又曰雨出地氣云出天氣出通也故清陽出上竅濁陰出下竅本乎天者親上本乎地者親下清陽發腠理濁陰走五臟清陽實四肢濁陰歸六腑陽主外陰主內水為陰火為陽人身之水火陽為氣陰為味藥食氣味味歸形形歸氣氣歸精精歸化形食味故味歸形氣生形故形歸氣精食氣故氣歸精化生精故精歸化精食氣形食味氣和精生味和形長化生精氣生形精生於運化之神形生於無形之氣前言精歸化者未化之前由精為化也此言化生精者既化之後由化生精也味傷形氣傷精味太過則偏勝故傷形氣有餘便是火故傷精精化為氣元氣由精而化氣傷於味食傷則氣怠陰味出下竅味有質故下流陽氣出上竅氣無形故上達味厚者為陰薄為陰之陽氣厚者為陽薄為陽之陰味為陰氣為陽味厚則泄薄則通味厚者能泄於下味薄者能通利氣薄則發泄厚則發熱氣薄者能發散氣厚者能發熱壯火之氣衰少火之氣壯壯已必衰少已必壯壯火食氣氣食少火壯火散氣少火生氣火即氣也火壯則耗散元氣故壯火食氣少火則生長元氣故氣食少火氣味辛甘發散為陽酸苦湧泄為陰此言正味之陰陽陰勝則陽病陽勝則陰病陽勝則熱陰勝則寒陰陽偏勝之為病重寒則熱重熱則寒物極則變寒傷形熱傷氣氣傷痛形傷腫故先痛而後腫者氣傷形也氣先病而傷及於形先腫而後痛者形傷氣也形先病而傷及於氣風勝則動振掉搖動之病熱勝則腫丹毒癰腫之病燥勝則乾津液枯涸內外乾澀之病寒勝則浮寒勝則陽氣不運故脹滿虛浮濕勝則濡瀉士不能制水故為注泄濡音如濕滯也喜怒傷氣言喜怒則悲憂恐同矣寒暑傷形言寒暑則燥濕風同矣陰陽別論二陽之病發心脾有不得隱曲女子不月二陽陽明也胃與心母子也人之情欲本以傷心母傷則害及其子胃與脾表裡也人之勞倦本以傷脾臟傷則病連於腑故凡內傷精外傷形皆能病及於胃此二陽之病所以發心脾也不得隱曲陽道衰也不月月事不下也隱曲隱蔽委曲之事又俯首謂之隱鞠躬謂之曲其傳為風消其傳為息賁者死不治傳日久傳變也風木氣也消枯瘦也肝木乘脾而肌肉日見消謂名曰風消肺受火邪息氣不利而奔迫名曰息奔由精虧於下敗及五臟皆不治之證三陽為病發寒熱下為癰腫及為痿厥腨悁三陽太陽也膀胱水化小腸火化故為病發寒熱火病則糜爛為癰水病則凝結為腫故或在下部為癰腫也熱勝則痿寒勝則厥寒熱爭則腨悁悁音淵痠疼也其傳為索澤其傳為頽疝膀胱小腸主津液津枯而色澤消索索澤吳氏改索睪注曰索引也睪腎丸也頽疝腎丸大而不疼言三陽為病或傳為痛引腎丸或傳為頽疝又曰痛者為火為小腸不痛者為水為膀胱一陽發病少氣善咳善泄一陽少陽也三焦膽二經皆有相火壯火食氣傷肺故少氣善咳大腸燥金受克故善泄也其傳為心掣其傳為膈心為君火而相火上炎則同氣相求邪歸於心心動而若有所引名曰心掣火結於內上焦不行下脘不通隔塞於中名曰隔也二陽一陰發病主驚駭背痛善噫善欠名曰風厥二陽胃大腸也一陰肝心主也心主為火肝為風風火相搏故驚駭背痛者手足陽明之筋皆爽脊也噫噯氣也欠呵欠也是皆風火逆而為病故名風厥吳注作一陰發病二陰一陽發病善脹心滿善氣二陰心腎也一陽三焦膽也心腎俱病則水火不交三焦病則上下不行故脹滿善氣善氣氣逆也三陽三陰發病為偏枯痿易四肢不舉三陽小腸膀胱三陰脾肺也小腸經行手主液膀胱經行足主筋脾主四肢肺主諸氣四經俱病如此痿易者痿弱變常也素問靈蘭祕典論心者君主之官也神明出焉心為一身之主肺者相傅之官治節出焉肺與心皆居隔上故曰相傅肺主氣氣調則榮衛臟腑無所不治故曰治節出焉肝者將軍之官謀膚出焉肝性急而志怒故為將軍之官木主發生故為謀膚所出膽者中正之官決斷出焉膽性剛直為中正之官主決斷膻中者臣使之官喜樂出焉膻中亦名氣海主化氣而承治節宣神明者也是行君相之令故曰臣使然膻中氣舒則喜樂氣不舒則悲愁故為喜樂所出膻中即包絡也脾胃者倉廩之官五味出焉脾主運化胃司受納故為倉廩之官脾胃和則知五味不和則諸物無味故曰五味出焉大腸者傳道之官變化出焉主出糟粕小腸者受盛之官化物出焉小腸居胃之下受盛水穀分清濁而下降故曰化物出焉腎者作強之官伎技同巧出焉腎臟精精盛形成則作用強力水能化生萬物故出伎巧三焦者決瀆之官水道出焉決通也瀆水道也上焦不治水溢高原中焦不治水停中脘下焦不治水蓄膀胱三焦氣治則水道刺膀胱者州都之官津液藏焉氣化則能出矣三焦水液俱出膀胱是為都會之地津液所藏膀胱有下口而無上口津液之入者為水水之化者由氣有化而入而後有出是謂氣化則能出矣入氣不化則水歸大腸而為泄瀉出氣不化則閉塞下竅而為癃腫凡此十二官者不得相失也素問六節藏象論天食人以五氣吳注風氣入肝暑氣入心濕氣入脾燥氣入肺寒氣入腎當其不亢不害則能養人矣地食人以五味酸苦甘辛鹹五氣入鼻藏於心肺上使五色修明音聲能彰心肺得受天氣入通五臟生五色而發音聲五味入口藏於腸胃味有所藏以養五氣酸入肝苦入心甘入脾辛入肺鹹入腎五味各有所藏五臟則以之養而氣從矣氣和而生津液相成神乃自生氣得乎味味以養氣為陰陽和而化生津液相以成精精充而神自生矣心者生之本心屬陽陽主生萬物系之以存亡神之變也心藏神變化由之其華在面其充在血脈心主血脈血足則面容光彩脈絡滿盈為陽中之太陽通於夏氣心王於夏氣合太陽肺者氣之本魄之處也肺主氣而藏魄其華在毛其充在皮肺主身之皮毛為陽中之太陰通於秋氣肺王於秋以太陰之氣而居陽分故為陽中之太陰腎者主蟄封藏之本腎藏志主閉藏精之處也藏精其華在發腎主腦髓其充在骨腎合骨也為陰中之少陰通於冬氣腎王於冬又為陰藏肝者罷炎同極之本肝主筋運動過勞筋必罷極魂之居也肝藏魂其華在爪其充在筋爪者筋之餘以生血氣肝屬木主於春為發生之始其味酸其色蒼此為陽中之少陽通於春氣肝位居東故為陽脾胃大腸小腸三焦膀胱者倉廩之本盛受水穀營之居也營出中焦名曰器能化糟粕轉味而入出者也其華在唇四白唇者脾之榮其充在肌肉肌肉脾之合其味甘其色黃此至陰之類通於土氣此總結六腑凡十一臟取決於膽也膽能通達陰陽素問五臟生成論面黃目青面黃目赤面黃目白面黃目黑者皆不死也面黃為有胃氣面青目赤面赤目白面青目黑面黑目白面赤目青皆死也無黃色則胃氣已絶素問五臟別論腦髓骨脈膽女子胞子宮也此六者地氣之所生也皆藏於陰而象於地故藏而不瀉名曰奇恆之府主藏蓄陰精與他府之傳化者為異胃大腸小腸三焦膀胱此五者天氣之所生也其氣象天故瀉而不藏此受五臟濁氣名曰傳化之府此不能久留輸寫者也轉輸運動魄門亦為五臟使水穀不得久藏肺藏魄而主氣大腸通肺故肛門日魄門使為之傳送也所謂五臟者藏精氣而不瀉也故滿而不能實精氣質清故有充滿而無積實六腑者傳化物而不藏故實而不能滿也水穀質濁故實則傳化不能滿也素問異法方宜論一病而治各不同皆愈者地勢使然也故東方之域天地之所始生也魚鹽之地海濱傍水其民食魚而嗜咸皆安其處美其食魚者使人熱中鹽者勝血故其民皆黑色疏理其病皆為癰瘍其治宜砭石山海經曰高氏之山有石如玉可以為針即砭石也故砭石者亦從東方來來起見也西方者金玉之域沙石之處天地之所收引也其民陵居而多風水土剛強其民不衣而褐薦華食而脂肥故邪不能傷其形體其病生於內其治宜毒藥故毒藥者亦從西方來北方者天地所閉藏之域也其地高陵居風寒冰冽其民樂野處而乳食藏寒生滿病其治宜灸焫音泄艾火燒灼故灸焫者亦從北方來南方者天地所長養陽之所盛處也其地下水土弱霧露之所聚也其民嗜酸而食胻腐同故其民皆致理而赤色其病攣痹其治宜微針故九針者亦從南方來中央者其地平以濕天地所以生萬物也衆其民食雜而不勞故其病多痿厥寒熱其治宜導引按蹺導引謂搖筋骨動支節按謂捏按皮肉蹺謂捷舉手足故導引按蹺者亦從中央出也故聖人雜合以治各得其所宜故治所以異而病皆愈者得病之情知治之大體也素問診要經終論正月二月天氣始方地氣始發人氣在肝方正也言天地氣正發生其萬物也三月四月天氣正方陽氣明盛地氣定發萬物華而欲實人氣在脾季終土寄而王五月六月天氣盛天陽赫盛地氣高地焰高升人氣在頭火性炎上故人氣在頭七月八月陰氣始殺人氣在肺陰氣肅殺類合於金故人氣在肺九月十月陰氣始冰地氣始閉人氣在心隨陽而入故人氣在心十一十二月冰復地氣合人氣在腎陽氣深復故人氣在腎夫氣之變也發土於木長茂於土盛高而上肅殺於金避寒於火伏藏於水斯皆隨順陰陽氣之升沉也下文四李言氣之淺深故春刺散俞及與分理血出而止散俞即諸經之散穴也甚者傳氣間者環也傳布散也病甚者宜久留待其傳氣環周也病稍間者但候其氣行一周於身約二刻可止針也夏刺絡俞見血而止盡氣閉環痛病必下夏宜宣泄故必見血而止盡氣謂去其邪血邪氣也閉環謂去針閉穴須氣行一周之頃也凡有痛病必退下矣秋刺皮膚循理上下同法神變而止上言手經下言足經刺皆同法邪猶未深故但察其脈氣變易異於未刺之前可止針也脈者神之變故曰神變冬刺俞竅於分理孔穴之深者曰竅甚者直下察邪所在而直取其深處間者散下或左右上下散布其針而稍宜緩也春夏秋冬各有所刺法其所在素問平人氣象論胃之大絡名曰虛里貫鬲絡肺出於左乳下其動應衣脈宗氣也此言胃之大絡其脈微動於左乳之下似乎應衣可驗虛里之胃氣盛喘數絶者則病在中若虛里動甚而如喘或數急而兼斷絶者由中氣不守也結而橫有積矣虛里之脈時一止或橫格於指下因胃氣之積滯也絶不至曰死虛里脈絶者必死乳之下其動應衣宗氣泄也此言虛里之脈大動真有若與衣俱振者是宗氣不固奇大泄於外中盡之候也凡患陰虛勞怯則心下多有跳動及為驚悸慌張者是即虛里之動也但動之微者病尚微動之甚者病則甚亦可因此以察病之輕重夫殺入於胃以傳於肺五臟六腑皆以傳氣是由胃氣而上為宗氣也氣為水母氣聚則水生是由肺氣而下生腎水也今胃氣傳之肺而腎虛不能納故宗氣泄於上則腎水竭於下腎愈虛則氣愈無所歸氣不歸則陰愈虛矣故欲納氣歸原者宜純甘之劑填補真陰為法素問藏氣法時論肝病者兩脅下痛引少腹令人善怒此肝之實邪也虛則目䀮䀮無所見耳無所聞善恐如人將捕之取其經厥陰與少陽虛者當補可刺曲泉俠溪實者當瀉可刺行間陽輔下仿此氣逆則頭痛耳聾不聰頰腫取血者取其經血盛之處下仿此心病者胸中痛脅支滿脅下痛膺背肩胛間痛兩臂內痛此心經之實邪也虛則胸腹大脅下與腰相引而痛取其經少陰太陽舌下血者舌本下刺出血其變病刺郤中血者變病謂病屬少陰而症異者刺陰郤穴血去則邪隨而瀉矣脾病者身重善飢肉痿足不收行善瘛腳下痛比脾經之實邪也虛則腹滿腸鳴飧泄食不化取其經太陰陽明少陰血者脾虛則失其健運之用而中氣不治脾與胃為表裡腎主水水能助濕傷脾也故當取足太陰陽明之經又取足少陰之血以為其寒實如脾心痛刺然谷太溪之類肺病者喘咳逆氣肩背痛汗出此肺經之實邪也尻陰股膝髀腨胻足皆痛此病皆足少陰經以氣陷下部而母病及子也故下文兼取足少陰以治之虛則少氣不能報息耳聾嗌乾取其經太陰足太陽之外厥陰內血者外言前內言後乃足少陰脈也視左右足脈凡少陰部分有血滿異於常處者取而去之以瀉其實腎病者腹大脛腫喘咳身重寢汗出憎風此腎經之實邪也虛則胸中痛腎脈注胸中也大腹小腹痛腎脈上自幽門下至橫骨挾腹中行兩旁各半寸循腹裡也清厥意不樂四末之陽受氣於胸腹胸腹病則陽氣不宣於四末故清冷而四末厥逆胸中即膻中喜樂出焉故痛則意不樂也取其經少陰太陽血者凡刺之道自當虛補實瀉然經絡有血猶當先去血脈而後平其有餘不足焉故五臟虛實之病治法如上素問血氣形志篇夫人之常數太陽常多血少氣少陽常少血多氣陽明常多氣多血後天之數從太而少少陰常少血多氣厥陰常多血少氣太陰常多氣少血先天之數白少而太足太陽與少陰為表裡少陽與厥陰為表裡陽明與太陰為表裡手太陽與少陰為表裡少陽與心主為表裡陽明與太陰為表裡今知手足陰陽所苦凡治病必先去其血乃去其所苦伺之所欲窺伺其欲散欲耎欲緩欲收欲堅之意然後瀉有餘補不足形樂志苦病生於脈治之以灸刺形樂身無勞也志苦心多慮也心主脈深思過慮則脈病矣當治經絡故宜灸刺之形樂志樂病生於肉治之以針石飽食終日無所運用多傷於脾脾主肌肉病則或為衛氣留或為膿血聚故當用針石以取之形苦志樂病生於筋治之以尉引勞則傷筋宜用藥尉導引之法形苦志苦病生於咽嗌治之以甘藥形苦志苦必多憂思憂傷肺思傷脾脾肺之脈上循咽嗌如人之悲憂過度則喉嚨哽咽食飲難進思慮過度則上焦痞隔咽中核塞是也因損於藏當以甘藥調之形數驚恐經絡不通病生於不仁治之以按摩醪藥不仁頑痹耎弱也按摩者導氣行血也醪藥藥酒也靈樞九針論同素問寶命全形論凡刺之真必先治神正氣也五臟已定九候已備後乃存針衆脈不見衆凶弗聞外內相得無以形先可玩往來乃施於人人有虛實五虛勿近五實勿遠虛病不利於針實邪最所當肘至其當發間不容瞚發出針也瞚瞬同言針發有期或遲或速在氣機之頃不可以瞬息誤也手動若務動用針也務專其務而心無二也針耀而勻耀精潔也勻舉措從容也靜意視義觀適之變適至也變虛實之變也觀之以靜察變之道也是謂冥冥幽隱也莫知其形言血氣之變不形於外惟明者能察有與無刺虛者須其實補虛須納其氣而實之刺實者須其虛瀉實須泄其氣而虛之經氣已至慎守勿失深淺在志遠近若一如臨深淵手如握虎神無營於衆物詳在針解篇素問八正神明論凡刺之法必候日月星辰四時八正之氣氣定乃刺之氣針者必察日之溫月之空滿二十水漏刻及四時正氣八節之風義如下氣定所宜也是故天溫日明陽盛陰衰則人血淖液而衛氣汙故血易瀉氣易行血液則易寫氣易行天寒日陰陽衰陰勝則人血凝泣而虛氣沉虛則難寫沉則難行月始生則血氣始精衛氣始行止月郭滿則血氣實肌肉堅月郭空則肌肉減經虛衛氣去形獨居是以因天時而調血氣也是以天寒無刺營衛疑澀也天溫無凝血氣易行也月生無瀉恐伐其生氣月滿無補恐助其邪氣月郭空無治此以陰氣虛邪不能去也故曰月生而瀉是為藏虛虛其虛也月滿而補血氣揚溢絡有留血命曰重實實其實也月郭空而治是為亂經陰陽相錯真邪不別沉以留止邪氣沉留外虛內亂淫邪乃起星辰者所以制日月之行也八正者所以候八風之虛邪以時至者也四正四隅謂之八正即八宮也八方之氣以時而正謂之八風從所居之鄉來者為實風從所術之方來者為虛風實風主生長虛風主殺害察八正之位則邪之傷人虛實可知矣四時者所以分春秋冬夏之氣所在以時調之也八正之虛邪避之勿犯人身之氣分四時而調之天地之氣候虛風而避之以身之虛而逢天之虛兩虛相感其氣至骨入則傷五臟人之虛血氣虛也天之虛如歲露論所云乘年之衰逢月之空失時之和因為賊風所傷是謂三虛是也以虛感虛故邪氣深入至骨而傷五臟工候救之弗能傷也故曰天忌不可不知也工能知而勿犯犯而能救故可弗傷凡太乙所居之鄉氣有邪正虛實出乎天道所當避忌故曰天忌詳見九針論有圖在卷三寫必用方正也方者以氣方盛也以月方滿也以日方溫也以身方定也以息方吸而內針氣之來也乃復候其方吸而轉針此即先補真氣也乃復候其方呼而徐引針引猶出也故曰瀉必用方其氣易行焉補必用員員活也員者行也行者移也行者行其氣移者導其滯凡正氣不足則營衛不行血氣留滯故用員以行之補之刺必中其營深人血脈復以吸排之也排除去也即下篇候吸引針之謂故員與方非針也非針之形言針之用也按官能篇曰瀉必用員補必用方詳求其意靈樞言員者流利也用針員活而迎奪之故可以瀉方即端正安靜之謂微留疾出防護真氣故可以補與本篇似乎相反然方員義各有發明不可執一也故養神者必知形之肥瘦榮衛血氣之盛衰血氣者人之神不可不謹養形者神之體神者形之用故欲養神者不可不謹養其形素問離合真邪論夫聖人之起度數必應於天地故天有宿度二十八宿三百六十五度地有經水人有經脈清渭海湖汝澠淮漯江河濟漳以合人之十二經脈天地溫和則經水安靜天寒地凍則經水凝泣不行也天暑地熱則經水沸溢譏濫也卒風暴起則經水波湧而隴起陰陽不和也夫邪之八於脈也寒則血凝泣暑則氣淖澤皆由於寒熱之變虛邪因而入客亦如經水之得風也經之動脈其至也亦時隴起其行於脈中循循然其因虛而入客於經亦如經水之得風即血脈之得氣也故致經脈亦時隴起蓋邪在脈中隨正氣往來以為之動靜耳循循隨順貌至其寸口中手也時大時小大則邪至小則平其行無常處邪氣隨脈必至寸口有邪則隴起而大無邪則平和而小隨其所在而為形見故行無常處在陰與陽不可為度從而察之三部九候卒然逢之早遏其路遏者制也吸則內針無令氣忤吸則氣至刺實者去其逆氣故令無忤靜以久留無令邪布前氣未除後氣將至故當靜留其針俟而瀉之無令邪氣復布也吸則轉針以得氣為度邪氣未泄候病者再吸乃搓轉其針以針下得氣之故為度候呼引針呼盡乃去大氣皆出故命曰瀉引引退也入氣曰吸出氣曰呼呼盡則次其吸吸至則不兼呼此言瀉法吸則內針下言補法呼盡內針可知瀉法中原有先補之義不足者補之必先捫而循之先以左手捫摸循按者欲得其穴也切而散之以指切捺其穴欲其氣之行散也推而按之再以指揉按其肌膚欲針道之流利也彈而怒之以指彈其穴欲其意有所注則氣必隨之故脈絡䐜滿如怒起也抓音爪而下之用法如前然後以左手爪甲掐其正穴方下針也通而取之下針之後必候氣通以取病邪外引其門以閉其神門穴門也此得氣出針之法呼盡內針靜以久留以氣至為故如待所貴不知日暮即靜以久留候氣至也其氣以已同至適而自護調適愛護候吸引針氣不得出各在其處候吸引針則氣充於內推闔其門令神氣存大氣留止故命曰補推闔其門則氣固於外神氣存留故謂之補呼盡內針以下詳言補法素問通評虛實論腹暴滿按之不下取太陽經絡者胃之募也手太陽經之絡即任脈之中脘中脘為手太陽少陽足陽明脈所生故云太陽經絡者胃之募也少陰俞去脊椎三寸旁五又取腎俞穴脊椎兩旁共為三寸各五痏也用員利針霍亂刺俞旁五即腎俞旁志室穴各刺五痏足陽明及上傍三又刺胃俞及脾俞之外意舍各三痏刺癇驚脈五五脈如下支針手太陰各五左右各五痏刺經經渠大陽五陽谷穴各五痏刺手少陰經絡旁者一手少陰之經靈道穴在絡穴通里之旁一各一痏也足陽明一亦言經穴解溪也上踝五寸刺三針足少陽之絡光明穴各刺三痏素問刺熱論肝熱病者小便先黃腹痛多臥身熱熱爭則狂言及驚脅滿痛手足躁不得安臥庚辛甚甲乙大汗氣逆則庚辛死庚辛屬金克肝木也甲乙屬木肝當王也逆為邪勝藏也刺足厥陰少陽少陽為厥陰之表故皆當刺之其逆則頭痛員員靡定貌脈引沖頭也心熱病者先不樂數日乃熱熱爭則卒心痛煩悶善嘔頭痛面赤無汗壬癸甚丙丁大汗氣逆則壬癸死壬癸屬水克心火也丙丁屬火心當王也刺手少陰太陽太陽為少陰之表故皆當刺之脾熱病者先頭重頰痛煩心顏青欲嘔身熱熱爭則腰痛不可用俯仰腹滿泄兩頷痛甲乙甚戊己大汗氣逆則甲乙死甲乙屬木克脾土也戊己屬土脾當王也刺足太陰陽明陽明為太陰之表故皆當刺之肺熱病者先淅然厥起毫毛惡風寒舌上黃身熱熱爭則喘咳痛走胸膺背不得太息頭痛不堪汗出而寒丙丁甚庚辛大汗氣逆則丙丁死丙丁屬火克肺金也庚辛屬金肺當王也刺手太陰陽明肺大腸二經出血如豆大立已取其絡脈之盛者腎熱病者先腰痛胕酸苦渴數飲身熱熱爭則項痛而強胕寒且酸足下熱不欲言其逆則項痛員員淡淡然精神短少貌戊己甚壬癸大汗氣逆則戊己死戊己屬土克腎水也壬癸屬水腎當下也刺足少陰太陽腎膀胱二經肝熱病者左頰先赤心熱病者顏先赤脾熱病者鼻先赤肺熱病者右頰先赤腎熱病者頤先赤病雖未發見赤色者刺之名曰治未病赤色見於五部則為病之先兆當求其藏而預治之熱病從部所起者至期而已至其王日如肝病則甲乙是也其刺之反者三周而已反謂瀉虛補實也三周三日也重逆則死一誤者尚待三周再誤者邪益深而正益敝故死諸治熱病以飲之寒水乃刺之必寒衣之居止寒處身寒而止也欲其陰氣自內達表熱泄於外也熱病先胸脅痛手足躁刺足少陽補足太陰胸脅痛丘虛主之補足太陰者當於井滎取也病甚者為五十九刺見靈樞熱病篇熱病始手臂痛者刺手陽明太陰而汗出止商陽列缺等穴熱病始於頭首者刺項太陽天柱而汗出止熱病始於足脛者刺足陽明而汗出止足陽明可汗出當刺內庭陷谷熱病先身重骨痛耳聾好瞑刺足少陰病甚為五十九刺刺足少陰者據經無正主穴當取井滎耳若其病甚則當用五十九刺熱病先眩冒而熱胸脅滿刺足少陰少陽頭腦運轉曰眩眼目矇昧曰冒骨之充為腦骨之精為瞳子皆主於腎又足少陽之脈起目鋭眥循脅裡皆為此症故當在二經酌取之亦井滎耳熱病氣穴三椎下間魄戶主胸中熱四椎下間膏肓俞主鬲中熱五椎下間神堂主肝熱六椎下間噫嘻主脾熱七椎下間膈關主腎熱榮在骶也此總言治熱之藏俞也獨刺上之七節主療陽邪椎脊骨節也榮陰氣也骶尾骶也陽邪治在上若刺下之七椎則虛其陰故戒之曰榮在骶也項上三椎陷者中也取脊骨之法項骨三節之下陷者中穴名大椎由此而下數之則循序可得矣素問刺瘧論瘧有六經五臟之不同刺法因之以異足太陽之瘧令人腰痛頭重寒從背起先寒後熱熇熇暍暍然熱止汗出難已刺委中足少陽之瘧令人身體解㑊寒不甚熱不甚惡見人見人心惕惕然熱多汗出甚刺俠溪足陽明之瘧令人先寒灑淅灑淅寒甚久乃熱熱去汗出喜見日月光火氣乃決然刺衝陽足太陰之瘧令人不樂好太息不嗜食多寒熱汗出病至則善嘔嘔已乃衰刺隱白太白公孫足少陰之瘧令人嘔吐甚多寒熱熱多寒少欲開戶牖而處其病雖已宜刺太溪大鐘經不言刺缺文足厥陰之瘧令人腰痛少腹滿小便不利如癃狀非癃也數便意恐懼氣不足腹中悒悒刺太衝肺瘧者令人心寒寒甚熱熱間善驚如有所見者刺列缺合谷心瘧者令人煩心甚欲得清水反寒多不甚熱刺神門肝瘧者令人色蒼蒼然太息其狀若死者刺中封脾瘧者令人寒腹中痛熱則腸中鳴鳴已汗出刺商丘腎瘧者令人灑灑寒腰脊痛宛轉大便難目眴眴然手足寒刺金門太溪胃瘧者令人且病善飢而不能食食而肢滿腹大刺厲兌解溪三里太陰之商丘瘧發身方熱刺跗上動脈足陽明經衝陽開其孔出其血立寒瘧方欲寒刺手足陽明大陰瘧之將發未發當隨此四經之井俞而刺之瘧脈滿大急刺背俞用中針旁五胠俞各一適肥瘦出其血也滿六急陽邪之實也背為諸陽之府故當刺魄戶神堂噫嘻鬲關魂門等穴水熱穴論五臟俞旁五以瀉五臟之熱與此大同胠脅也其穴旁間近脅故曰旁五胠俞適肥瘦出血者謂瘦者淺刺少出血肥者深刺多出血也瘧脈小實急灸脛少陰刺諸井脈小實急陰邪勝也陰盛者生內寒故當灸足少陰復溜以散寒又刺足太陽至陰以補陽也瘧脈緩大虛便宜用藥不宜用針諸瘧而脈不見刺十指間出血血去必已先視身之赤如小豆者盡取之陽亢而脈反伏故如是刺之以瀉陽十二瘧者其發各不同時察其病形以知其何脈之病也先其發時如食頃而刺之一刺則衰二刺則知三刺則已不已刺舌下兩脈出血左金津右玉液不已刺郤中盛經出血委中又刺項以下俠脊者必已大抒風門舌下兩脈者廉泉也其穴在舌根下左右泉脈故曰廉泉刺瘧者必先問其病之所先發者先刺之先頭痛及重者刺頭上百會上星及兩額員盧兩眉間攢竹出血先項背痛者刺風池風府大杼神道先腰脊痛者刺郤中出血先手臂痛者先刺手少陰少衝陽明商陽十指間各隨其所病之經先足脛痠痛者刺足陽明厲兌十指間出血各因其邪居之所瀉其井穴風瘧者瘧發則汗出惡風刺三陽經背俞之血者足太陽經膀胱俞胃俞膽俞刺浮絡出血䯒痠痛甚按之不可痛益甚也名曰附髓病其邪深伏故名以鑱針針絶骨出血立已身體小痛刺至陰諸陰之井無出血間日一刺邪氣微故刺太陽至陰穴與諸陰經井穴同法無令出血但間日一刺之則邪氣目泄矣瘧不渴間日而作刺足太陽邪在表也雜病篇曰取足陽明渴而間日作刺足少陽邪在表裡之間雜病篇曰渴而日作取手陽明溫瘧汗不出為五十九刺先熱後寒汗不出表實也故為五十九刺以瀉表實詳見熱病篇水熱穴論素問刺咳論五臟六腑皆令人咳非獨肺也皮毛者肺之合也皮毛先受邪氣邪氣以從其合也其寒飲食入胃從肺脈上至於肺則肺寒肺寒則外內合邪因而客之則為肺咳五臟各以其時受病非其時各傳以與之乘秋則肺先受邪乘春則肝先受之乘夏則心先受之乘至陰則脾先受之乘冬則腎先受之肺咳之狀咳而喘息有音甚則唾血肺絡逆也心咳之狀咳則心痛喉中介介如梗狀甚則咽腫喉痹肝咳之狀咳則兩脅下痛甚則不可以轉轉則兩胠下滿脾咳之狀咳則右胠下痛陰陰引肩背甚則不可以動動則咳劇腎咳之狀咳則腰背相引而痛甚則咳涎腎為水藏主涎飲也五臟之久咳乃移於六腑脾咳不已則胃受之胃咳之狀咳而嘔嘔甚則長蟲出蛔蟲居腸胃之中嘔甚則隨氣而上出肝咳不已則膽受之膽咳之狀咳嘔膽汁嘔苦汁也肺咳不已則大腸受之大腸咳狀咳而遺失甲乙經作遺矢心咳不已則小腸受之小腸咳狀咳而失氣氣與咳俱失小腸之下則大腸也大腸之氣於小腸之化故咳則下奔失氣腎咳不已則膀胱受之膀胱咳狀咳而遺溺久咳不已則三焦受之三焦咳狀咳而腹滿不欲食飲此皆聚於胃關於肺使人多涕唾而面浮腫氣逆也陽明之脈起於鼻會於面出於口故令多涕唾而面浮腫肺為臟腑之蓋而主氣故令氣逆治藏者治其俞肺太淵心神門肝太衝脾太白腎太溪一作背上各藏之俞誤治府者治其合胃三里膽陽陵泉大腸曲池小腸小海膀胱委中三焦天井浮腫者治其經脈之所行者為經如經渠陽溪解溪商丘等穴是也諸咳之浮腫氣逆者當各隨其所病之經刺之素問卒痛論舊作舉痛論今從王氏吳氏經脈流行不止環周不休寒氣八經而稽遲泣音澀而不行客於脈外則血少客於脈中則氣不通故卒音猝然而痛寒氣客於脈外則脈寒脈寒則縮蜷縮蜷則脈絀急絀急則外引小絡故卒然而痛得炅則痛立止蜷不伸也絀屈曲也炅熱也此其痛或卒然而止者胃氣不得流通所致故但得炅暖之氣其痛則立止也因重中於寒則痛久矣此或痛甚不休者寒氣重盛不易解散故痛久寒氣客於經脈之中與炅氣相搏則脈滿滿則痛而不可按也薄摩蕩也陽氣行於脈中而寒襲之則寒熱相搏留而不行則邪實於經故脈滿此或痛甚不可按者也寒氣稽留炅氣從上則脈充大而血氣亂故痛甚不可按也炅氣從上陽主升也寒邪遏之則脈充於內而二氣亂故其痛必甚此重明上文之意寒氣客於腸胃之間膜原之下血不得散小絡急引故痛按之則血氣散故按之痛止膜筋膜也原肓之原也膜原之下皆有空虛之處血不散而小絡滿則急引而痛按之則寒氣可散小絡可緩此按之而痛止者也寒氣客於俠脊之脈則深按之不能及故按之無益也俠脊者足太陽經也其最深者則伏沖伏膂之脈按之不能及其處此按之無益者也寒氣客於衝脈衝脈起於關元隨腹直上寒氣客則脈不通脈不通則氣因之故喘動應手矣衝脈並足少陰腎經夾臍上行會於咽喉而腎脈上連於肺若寒氣客之則脈不通氣亦逆也此喘動應手氣為陽而主動也寒氣客於背俞之脈則脈泣脈泣則血虛血虛則痛其俞注於心故相引而痛按之則熱氣至熱氣至則痛止矣背俞五臟俞也皆足太陽之脈循膂當心入散故寒氣客之則脈澀血虛為心與背相引而痛按之則熱至而痛止者正以血虛故耳寒氣客於厥陰之脈厥陰脈者絡陰器繫於肝寒氣客於脈中則血泣脈急故脅肋與少腹相引痛矣肝之脈循陰股入髦中抵少腹布脅肋故寒氣客之脅肋與少腹相引而痛厥氣客於陰股寒氣上及少腹血泣上下相引舊本在下相引此從吳注故腹痛引陰股厥氣厥逆之氣也或腹痛引陰股者以足三陰衝脈皆行於少腹陰股之間也寒氣客於小腸膜原之間絡血之中血泣不得注於大經血氣稽留不得行故宿昔而成積矣宿昔成積者寒氣凝結也寒氣客於五臟厥逆上泄陰氣竭陽氣未入故卒然痛死不知人氣復反則生矣寒傷臟氣則氣不得降而厥逆上泄吐湧也真陰暴竭陽氣未能遽入卒然痛死必待臟氣復則生矣寒氣客於腸胃厥逆上出故痛而嘔也腸胃言六腑也水穀之在六腑必自上而下乃其順也若寒氣客之則逆而上出此痛而嘔也寒氣客於小腸小腸不得成聚故後泄腹痛矣小腸為丙火之腑而寒邪勝之則陽氣不化水穀不得停留故腹痛而後泄也熱氣留於小腸腸中痛疸熱焦渴則堅幹不得出故痛而閉不通矣熱留小腸是陽藏陽病也故腹痛而閉不通視其五色黃赤為熱白為寒青黑為痛視面間分部鼻謂之明堂肺心肝脾之候也其兩旁六腑腎藏之候也黃赤色者火動於經故為熱白色者陽氣衰微血不上榮故為寒青黑色者血凝氣滯故為痛視其主病之脈視面間五色之所主堅而血及陷下者皆可捫而得也堅而血謂邪之聚絡盛而起陷下如沉伏之類捫摸也百病生於氣也怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收炅則氣泄驚則氣亂勞則氣耗思則氣結九氣不同何病之生氣之在人和則為正氣不和則為邪氣岐伯曰怒則氣逆甚則嘔血及飧泄故氣上矣怒動於肝則氣逆而上氣逼血升故嘔血肝木乘脾故飧泄及飧泄甲乙作食而氣逆喜則氣和志達榮衛通利故氣緩矣悲則心系急肺布葉舉而上焦不通榮衛不散熱氣在中故氣消矣悲生於心並於肺故心系急肺葉舉上焦不通榮衛不散致熱傷氣也恐則精卻卻則上焦閉閉則氣還還則下焦脹故氣不行矣卻者退也精卻則升降不交故上焦閉上焦閉則氣歸於下病為脹滿而氣不行故曰恐則氣下本神篇曰喜樂者神憚散而不藏愁憂者氣閉塞而不行恐懼者神蕩憚而不收寒則腠理閉氣不行故氣收矣寒束於外則表氣不能宣達也炅則腠理開榮衛通汗大泄故氣泄矣陽從汗散故氣亦泄驚則心無所倚神無所歸慮無所定故氣亂矣血氣分離勞則喘息汗出外內皆越故氣耗矣陽動則散思則心有所存神有所歸正氣留而不行故氣結矣思之無已則繫戀不釋神留不散故氣結也素問刺腰痛論足太陽脈令人腰痛引項脊尻背如重狀刺其郤中太陽正經出血刺委中及崑崙春無見血腎水衰也少陽令人腰痛如以針刺其皮中循循然遲滯貌不可以俯仰不可以顧刺少陽成骨之端陽關出血夏無見血肝木衰也陽明令人腰痛不可以顧顧如有見者見鬼怪也善悲神不足也陽明氣衰而陰邪侮之故症見若此刺䯒前三痏上下和之出血三里穴並上廉下廉秋無見血脾土衰也足少陰令人腰痛痛引脊內廉刺少陰於內踝上二痏復溜春無見血腎水衰也出血太多不可復也厥陰之脈令人腰痛腰中如張弓弩弦刺厥陰之絡舊本脈在腨踵魚腹之外蠡溝穴其病令人善言默默然不慧自多言語又不能發聲也刺之三痏當三刺其處下同解脈令人腰痛痛引肩目䀮䀮然時遺溲刺解脈在膝筋肉分間郤外廉之橫絡舊本脈出血血變而止解脈足太陽經之散行脈也當刺膕中襟紋兩筋間弩肉高起之處若卻之外廉有血絡橫見盛滿而紫黑者刺出黑血必候其血色變赤乃止其針解脈令人腰痛如引帶常如折音舌腰狀善恐刺解脈在郤中委中穴結絡如黍米刺之血射以黑見赤血而已復言解脈者謂太陽支脈從腰中下挾脊貫臀入膕中者也故其痛若此太陽之脈絡腎故善恐同陰之脈令人腰痛痛如小錘居其中痛而重也怫然腫腫突如怒起也刺同陰之脈在外踝上絶骨之端為三痏陽輔穴足少陽之別絡於厥陰並經下絡足跗故曰同陰之脈陽維之脈令人腰痛痛上怫然腫刺陽維之脈脈與太陽合腨下間去地一尺所承山穴衡絡之脈令人腰痛不可以俯仰仰則恐僕得之舉重傷腰衡絡絶惡血歸之刺之在郤陽筋之間上郤數寸衡居委陽殷門二穴並居為二痏出血衡橫也足太陽之別絡自腰中橫出髀外後廉下合於膕中故曰衡絡會陰之脈令人腰痛痛上漯漯音沓然汗出邪在陰分汗乾令人欲飲液亡也飲已欲走飲多則陰氣下溢故欲走也刺直陽之脈上三痏在蹺上郤下五寸橫居視其盛者出血會陰任脈穴也督由此行背故令人腰痛直陽謂足太陽之脈俠脊而直行者其穴在陽蹺之上郤之下相去約五寸而橫居須視其血絡之盛者為的飛陽之脈令人腰痛痛上怫怫然甚則悲以恐刺飛陽之脈與陰維之會飛陽足太陽絡穴別走少陰者也陰維之會即少陰之前在內踝上五寸築賓穴也昌陽之脈令人腰痛痛引膺目䀮䀮然甚則反折舌卷不能言刺復溜陰蹺脈合於足太陽故曰昌陽散脈令人腰痛而熱熱甚生煩腰下如有橫木居其中甚則遺溲刺散脈在膝前骨肉分間絡外廉束脈為三痏王甚散脈足太陰之別其脈散股入腹與少陰少陽結於腰髁下骨之下後有大筋束膝胻之骨令其連屬取此筋骨系束之脈以去其病是即地機穴三痏三刺也吳注散脈陽明別絡之散行者類經注膝前骨肉分間絡外廉束脈似指陽明經為散脈但本篇獨缺太陰刺法而下文有云上熱刺足太陰者若與此相照應按地機穴治腰痛王氏注合肉裡之脈令人腰痛不可以咳咳則筋縮急肉裡謂分肉之裡足少陽脈所行主筋膜者也刺肉裡之脈為二痏在太陽之外少陽絶骨之後陽輔穴腰痛俠脊而痛至頭𠘧𠘧然憑伏貌目䀮䀮欲僵仆刺足太陽郤中出血腰痛上寒刺足太陽京骨穴陽明衝陽穴腰痛上熱刺足厥陰大沖穴上寒上熱皆以上體言也寒刺陽經去陽分之陰邪熱刺厥陰去陰中之風熱也不可以俯仰刺足少陽丘虛穴中熱而喘刺足少陰太溪穴刺郤中出血委中穴按少陰之脈貫肝鬲入肺中腎水不足以制火故中熱而喘宜刺足少陰俞太溪又刺郤中者即足太陽委中也吳注作少陰之郤水泉穴誤腰痛上寒不可顧刺足陽明上熱刺足太陰王注上寒陰市主之不可顧三里主之上熱地機主之陽明太陰之脈皆不可左右顧大便難刺足少陰湧泉穴少腹滿刺足厥陰太衝穴如折不可以俯仰不可舉刺足太陽王注如折束骨主之不可以俯仰京骨崑崙主之不可舉申脈僕參主之引脊內廉刺足少陰王注復溜穴吳注有上件如折不可以俯仰不可舉而其痛又引及脊之內廉足太陽絡腎之脈痛也腰痛引少腹控䏚不可以仰刺腰尻交者兩髁胂上髮針立已王注此即下髎穴足太陰厥陰少陽三脈左右交結於中也兩髁脾謂腰髁骨下堅肉也蓋腰髁下尻骨兩旁有四骨空左右其八穴皆主腰痛素問刺要論病有浮沉刺有淺深各至其理無過其道過之則內傷不及則生外壅壅則邪從之淺深不得反為大賊內動五臟後生大病故曰病有在毫毛腠理者有在皮膚者有在肌肉者有在脈者有在筋者有在骨者有在髓者是故刺毫毛腠理無傷皮皮傷則內動肺肺動則秋病溫瘧淅淅然寒栗刺皮無傷肉肉傷則內動脾脾動則七十二日四季之月病腹脹煩不嗜食刺肉無傷脈脈傷則內動心心動則夏病心痛刺脈無傷筋筋傷則內動肝肝動則春病熱而筋弛刺筋無傷骨骨傷則內動腎腎動則冬病脹腰痛刺骨無傷髓髓傷則消鑠胻酸體解㑊然不去矣病解㑊者懈怠困弱陰之虛也陰虛則氣虛氣虛則不能舉動是謂不去也解音懈㑊音迹吳注音亦素問刺齊論齊者刺各有所宜也刺骨無傷筋者針至筋而去不及骨也如病骨髓痠痛之類直當刺骨若針至筋分不及於骨攻非其過是傷筋也刺筋無傷肉者至肉而去不及筋也如病筋攣節痛之類直當刺筋若針至肉分不及於筋是傷肉也刺肉無傷脈者至脈而去不及肉也如病肌膚盡痛之類直宜刺肉若針至脈分不及於肉是傷脈也刺脈無傷皮者至皮而去不及脈也如病血脈不通諸症直當刺脈若針至皮分不及於脈是傷皮也此四節言當深不深之為害也所謂刺皮無傷肉者病在皮中無傷肉也無過深中肉刺肉無傷筋者過肉中筋也病在肉無過肉而傷筋刺筋無傷骨者過筋中骨也病在筋無過筋而傷骨此三節言不當深而深者之害也此謂之反也素問刺禁論藏有要害不可不察肝生於左肺藏於右心部於表腎治於裡脾為之使胃為之市鬲肓之上中有父母鬲膈膜肓膈上無肉空處也陽氣謂之父陰血謂之母肺主氣心主血父母之象也七節之旁中有小心此言下部之第七節命門相火也相火代心君行事故曰小心從之有福逆之有咎刺中心一日死其動為噫刺中肝五日死其動為語刺中腎六日死其動為嚏四時刺逆從論嚏字下有欠字刺中肺三日死其動為咳刺中脾十日死其動為吞脾傷而引涎自救也刺中膽一日半死其動為嘔刺跗上中大脈血出不止死刺面中溜脈不幸為盲刺頭中腦戶入腦立死刺舌下中脈太過血出不止為喑刺足下布絡中脈血不出為腫刺郤中大脈令人僕脫色刺氣街中脈血不出為腫鼠僕刺脊間中髓為傴傴僂曲而不伸也刺乳上中乳房為腫根蝕謂生膿根而內蝕也刺缺盆中內陷氣泄令人喘咳逆中內陷則過深而泄肺氣刺手魚腹內陷為腫無刺大醉令人氣亂無刺大怒令人氣逆無刺大勞人無刺新飽人無刺大飢人無刺大渴人無刺大驚人刺陰股中大脈血出不止死刺客主人內陷中脈為內漏為聾刺膝臏出液為跛刺臂太陰脈出血多立死刺足少陰脈重虛出血為舌難以言刺膺中陷中肺為喘逆仰息刺肘中內陷澤氣歸之為不屈伸刺陰股下三寸內陷令人遺溺刺腋下脅間內陷令人咳刺少腹中膀胱溺出令人少腹滿刺腨腸內陷為腫刺匡上目眶也陷骨中脈為漏為盲刺關節中液出不得屈伸筋失其潤養也素問針解篇刺虛則實之者針下熱也氣實乃熱也滿而泄之者針下寒也氣虛乃寒也菀陳則除之者出惡血也菀積陳久也言絡脈中有積久惡血則宜除之邪盛則虛之者出針勿按也不按針孔以虛其在經之盛邪徐而疾則實者徐出針而疾按之經氣不泄乃實之也疾而徐則虛者疾出針而徐按之邪氣得泄乃虛之也言實與虛者寒虛溫實氣多少也氣少為虛氣多為實若無若有者疾不可知也言針下氣至疾速難知也察後與先者知病先後也為虛與實者工勿失其法勿失虛補實瀉之法若得若失者離其法也言不能守其法虛實之要九針最妙者為其各有所宜也補瀉之時者與氣開闔相合也氣至應時謂之開已過未至謂之闔又若針下氣來謂之開可以迎而瀉之針下氣去謂之闔可以隨而補之此皆針與氣開闔相合之義以上解靈樞九針十二原篇文九針之名各不同形者針窮其所當補瀉也則實須其虛者留針陰氣隆至針下寒乃去針也刺虛須其實者陽氣隆至針下熱乃去針也經氣已至慎守勿失者勿變更也淺深在志者知病之內外也遠近如一者深淺其候等也四肢胸背之孔穴雖有遠近不同其淺深取氣則一也如臨深淵者不敢墮也手如握虎者欲其壯也壯持針堅而定也神無營於衆物者靜志觀病人無左右視也以上解寶命全形論文義無邪下者欲端以正也必正其神者欲瞻病人目制其神令氣易行也下下針也目者神之竅欲正病者之神必瞻其目制彼精神令無散越則氣為神使脈道易行也此即九針十二原篇正指直刺無針左右神在秋毫屬意病者審視血脈刺之無殆等文之義夫一天二地三人四時五音六律七星八風九野身形亦應之針各有所宜故曰九針人皮應天無物不包天之象也人肉應地溫柔博厚地之象也人脈應人內營外衛人在氣交之中之象人筋應時長短大小四時盈虛之象人聲應音清濁長短五音之生也人陰陽合氣應律六陰六陽天地之氣十二律之象也人齒面目應星森羅布列星之象也人出入氣應風呼吸出入風之象也人九竅三百六十五絡應野形骸周遍野之象也故一針皮二針肉三針脈四針筋五針骨六針調陰陽七針益精八針除風九針通九竅除三百六十五節氣此之謂各有所主也總結上文人心意應八風人之心意多變天之八風無常故相應人氣應天氣屬陽而運行不息故應天人發齒耳目五聲應五音六律發之多齒之列耳之聰目之明五聲之抑揚清濁皆紛紛不亂各有條理故應五音六律人陰陽脈血氣應地人陰陽脈血氣之行於肉中亦由經水之在土也故應於地自人心意應八風下復明上文不盡之意也素問長刺節論長刺長於刺者也節論猶要論也刺家不診聽病者言在頭頭疾痛為針之刺至骨病已止如言病在頭而頭疾痛則為之針頭頭痛已而後止其刺無傷骨肉及皮皮者道也無得妄為提按動搖而傷骨分肉分皮分之真氣陰刺入一傍四處治寒熱吳注陰刺者不搖動也入一傍四謂刺百會一前後兩旁又各一也陰刺疑誤當是揚刺深專者刺本藏寒熱之氣深而專於一藏者求其本藏而刺之迫藏刺背背輸也所為刺本藏者謂迫近其藏而刺背背者俞之所在是也刺之迫藏藏會刺俞之迫藏者以其為藏氣所會集也腹中寒熱去而止以寒熱去為期與刺之要髮針而淺出血言凡與刺五臟俞者不宜出血太多要在髮針淺而少出其血也治腐腫者刺腐上視癰小大深淺刺刺大者多血小者深之必端內針為故止為故猶言為則止無他術之意病在少腹有積刺皮䯏以下䯏音括骨端也此指章門期門穴至少腹而止如足陽明之天樞歸來足太陰之府舍衝門足少陰之氣穴四滿皆主奔豚積聚刺俠脊兩旁四椎間肓之原在臍下故刺膏肓穴刺兩髂音格髎居髎穴季脅肋間京門穴導引也腹中氣熱下已病在少腹腹痛不得大小便病名曰疝得之寒小腹間痛二便不行者為疝病乃寒氣之所致刺少腹去肝腎經之寒兩股間去陽明太陰之邪刺腰髁骨間刺而多之盡炅病已凡腰中在後在側之成片大骨皆曰髁骨在後者足太陽之所行在側者足少陽之所行凡此諸病皆非寒疝但察邪之所在多取其穴而刺之俟其少腹盡熱則病已矣病在筋筋攣節痛不可以行名曰筋痹刺筋上為故刺分肉間不可中骨也筋炅病已止病在肌膚肌膚盡痛名曰肌痹傷於寒濕刺大分小分大肉之分小肉之分多髮針而深之以熱為故無傷筋骨傷筋骨癰發若變氣沉而不散則癰發而變其常諸分盡熱病已止病在骨骨重不可舉骨髓痠痛寒氣至名曰骨痹深者刺無傷脈肉為故其道大分小分刺入之道骨熱病已止病在諸陽脈且寒且熱諸分且寒且熱名曰狂刺之虛脈視分盡熱病已止刺諸經之脈之虛視虛脈分間盡熱則陽氣流布不並於一而為狂矣病初發歲一發不治月一發不治月四五發名曰癲病刺諸分諸脈其無寒者以針調之病已止癲僕之病癇是也刺諸分諸脈者調其大小寒熱遲疾陷下也病風且寒且熱炅汗出寒去獨熱而汗出也一日數過先刺諸分理絡脈汗出且寒且熱既汗而復汗出者邪盛也三日一刺百日而已病大風骨節重鬚眉墮名曰大風刺肌肉為故汗出百日泄衛中之怫熱刺骨髓汗出百日泄營中之怫熱凡二百日鬚眉生而止針怫熱屏退陰氣內復故多汗出鬚眉生也素問皮部論欲知皮部以經脈為紀者陽主外陰主內諸經皆然其色多青則痛多黑則痹黃赤則熱多白則寒五色皆見則寒熱也絡盛則入客於經絡中之邪既盛則入客於經脈凡十二經絡脈者皮之部也浮絡見於皮是故百病之始生也必先於皮毛邪中之則腠理開開則入客於絡脈留而不去傳入於經留而不去傳入於腑廩舍也於腸胃邪之始入於皮也泝淅同然起毫毛開腠理其入於絡也則絡脈盛色變其入客於絡也則感虛經氣虛乃感也乃陷下脈陷下也其留於筋骨之間寒多則筋攣骨痛熱多則筋弛骨消肉爍膕破毛直而敗皮者脈之部也邪客於皮則腠理開開則邪入客於絡脈絡脈滿則注於經脈經脈滿則入舍於府藏也故皮者有分部不與而生大病也言邪客皮部則壅滯經氣不及而生大病素問氣穴論經曰氣穴三百六十五以應一歲人身孔穴皆氣所居故曰氣穴背與心相控而痛所治天突與十椎中樞及上紀中脘上紀者胃脘也下紀者關元也中脘胃之募也為手太陽少陽足陽明所生任脈之會關元小腸募也為足三陰任脈之會故曰上紀下紀背胸邪系陰陽左右如此其病前後痛澀胸脅痛而不得息不得臥上氣短氣偏痛脈滿起斜出尻脈絡胸脅支心貫鬲上肩加天突斜下肩交十椎下此詳言上文背與心相控而痛者悉由任督二脈之為病也任在前督在後其在下者斜出尻脈在上者絡胸脅支心貫鬲上肩加天突左右斜下肩交十椎下所以當刺天突中樞中脘關元等穴吳注刪以上八十七字新校正疑其為骨空論文脫誤於此肉之大會為谷肉之小會為溪肉分之間溪谷之會以行榮衛以會大氣邪溢氣壅脈熱肉敗榮衛不行必將為膿內消骨髓外破大膕此為癰毒也留於節湊必將為敗留於骨節之間津液所湊之處必為敗爛此皆氣壅脈熱所致積寒留舍榮衛不居卷肉縮筋肋肘不得伸內為骨痹外為不仁命曰不足陽氣不足大寒留於溪谷也溪谷三百六十五穴會亦應一歲人身骨節三百六十五而溪谷穴俞應之故曰穴會亦應一歲之數其小痹淫溢循脈往來微針所及與法相同小痹邪之微者孫絡之脈別經者其血盛而當瀉者亦三百六十五脈並注於絡傳注十二絡脈非獨十四絡脈也孫絡之多皆傳注於十二經之大絡非獨十四絡穴也內解瀉於中者十脈解解散也瀉瀉去其實也中者五臟也絡雖十二而分屬於五臟左右各五故云解寫於中者十脈素問骨空論骨空髓孔也風者百病之始生也風從外入令人振寒汗出頭痛身重惡寒治在風府調其陰陽不足則補正氣不足有餘則瀉邪氣有餘大風頸項痛刺風府大風汗出灸噫嘻在俠脊旁三寸所厭之令病者呼噫嘻噫嘻應手從風憎風刺眉頭攢竹失枕在肩上橫骨間缺盆折使榆臂齊肘正灸脊中榆當作揄引也謂使病者引臂下齊肘端以度脊中乃其當灸之處蓋即督脈陽關穴也䏚絡季脅引少腹而痛脹刺噫嘻䏚俠脊兩旁空軟處腰痛不可以轉搖急引陰卵刺八髎與痛上八髎在腰尻分間鼠瘻寒熱瘰癧一名鼠瘻蓋以寒熱之毒留於經脈所致還刺寒府寒府在附膝外解營膝臏最寒故名寒府營窟也鼠瘻在頸腋之間病由肝膽取足少陽經陽關穴取膝上外者使之拜取足心者使之跪任脈為病男子內結七疝寒水筋血氣狐㿗女子帶下瘕聚帶下白赤帶也瘕聚氣痛不常之名衝脈為病逆氣裡急氣有餘則逆血不足則急督脈為病脊強反折督脈者起於少腹以下骨中央女子入系廷孔其孔溺孔之端也陰廷之孔其絡循陰器合篡間二陰之間繞篡後肛門之後別繞臀至少陰與巨陽中絡者合少陰中行之絡上股內後廉貫脊屬腎與太陽起於目內眥上額交巔上入絡腦還出別下項循肩膊內俠脊抵腰中入循膂絡腎其男子循莖下至篡與女子等此督脈並太陽之經者也其少腹直上者貫齊臍同中央上貫心入喉上頤環唇上系兩目之下中央此督脈並於任脈者也此生病從少腹上衝心而痛不得前後為沖疝其女子不孕癃痔遺溺嗌乾沖督任三脈一原而三歧衝脈起於胞中病故不孕督脈系廷孔循陰器合篡間繞篡後故為癃為痔衝脈並於少陰故遺溺少陰之脈循喉嚨故嗌乾督脈生病治督脈治在骨上曲骨穴甚者在齊下營陰交穴其上氣有音者治其喉中央在缺盆中者天突穴其病上衝喉者治其漸漸者上俠頤也陽明之脈由俠頤之大迎穴漸上頤面故名俠頤為漸也蹇膝伸不屈治其楗膝痛偃能伸而不能屈取輔骨上橫骨下為楗楗股骨也坐而膝痛治其機俠髖為機立而暑解熱蓄骨解治其骸關注見下膝痛痛及拇指足小拇指治其膕坐而膝痛如物隱者邪所著如物隱伏其中治其關膝解為骼關膝之節解也膝之外側上骨為連核下骨為輔輔骨之上為膕膕上為關也膝痛不可屈伸治其背內太陽經氣穴連䯒若折治陽明中俞髎陽明經井滎俞原經合穴中取其所宜若別治巨陽少陰滎若䯒痛支別者宜治足太陽通谷穴足少陰然谷穴淫濼脛酸不能久立淫濼似乎痠痛而無力也治少陽之維在外踝上五寸光明穴按經脈之交者為維少陽之維是陽交穴當在外踝上七寸灸寒熱之法先灸項大椎以年為壯數如患人之年數次灸橛骨即尾窮以年為壯數視背俞陷者灸之察其諸俞陷下宜灸者舉臂肩上陷者灸之肩髃穴兩季脅之間灸之京門穴外踝上絶骨之端灸之陽輔穴足小指次指間灸之俠溪穴腨下陷脈灸之承山穴外踝後灸之崑崙穴缺盆骨上切之堅痛如筋者灸之此乃肉間結核也膺中陷骨間灸之天突穴掌束骨下灸之陰郤穴齊下關元三寸灸之關元穴毛際動脈灸之氣街穴膝下三寸分間灸之三里穴足陽明跗上動脈灸之衝陽穴巔上一灸之百會穴犬所齧之處灸之三壯即以犬傷病法灸之言犬傷令人寒熱古有灸法故云然也幾當灸二十九處總結上文傷食灸之傷食寒熱如上文灸之不已者必視其經之過於陽者數刺其俞而藥之刺以瀉其陽藥以和其陰素問水熱穴論水俞五十七穴熱俞五十九穴詳於此篇腎何以能聚水而生病腎者胃之關也關門不利故聚水而從其類也胃納水穀腎主前陰利水後陰利谷是胃之關也關閉則水積下焦以腎屬水而從之也上下溢於皮膚故為胕腫胕腫者聚水而生病也脾主肌肉寒水侮之故反聚水而為肌膚浮腫腎者牝藏也地氣上者屬於腎而生水液也故曰至陰牝陰也勇而勞甚則腎汗出腎汗出逢於風內不得入於臟腑外不得越於皮膚客於玄府行於皮里傳為胕腫本之於腎名曰風水此則因水因風也所謂玄府者汗空也孔同腎腧五十七穴積陰之所聚也水所從出入也尻上五行行五者此腎腧督脈所發長強腰俞命門懸樞脊中次兩旁白環俞中呂俞膀胱俞小腸俞大腸俞又次兩旁秩邊胞肓志室肓門胃倉其二十五穴皆在下焦而主水故皆曰腎俞故水病下為胕腫大腹上為喘呼不得臥者標本俱病故肺為喘呼腎為水腫肺為逆不得臥分為相輸俱受病者水氣之所留也水病則氣虛氣病則水虛伏兔上各二行行五者此腎之街也少陰脈氣所發橫骨大赫氣穴四滿中注陽明脈氣所發氣街歸來水道大巨外陵左右共二十穴街往來道也三陰之所交結於腳也足太陰經有三陰交穴踝上各一行行六穴此腎脈之下行也名曰太衝踝上各一行獨指足少陰經行六穴大鐘照海復溜交信築賓陰谷左右十二穴也腎之大絡並衝脈下行於足而盛曰太衝凡五十七穴皆藏之陰絡腎經支絡水之所客也春者木始治肝氣始生肝氣急其風疾經脈常深其氣少不能深入故取絡脈分肉間夏者火始治心氣始生脈瘦氣弱陽氣流溢熱熏分腠內至於經故取盛經分腠絶膚而病去者邪居淺也所謂盛經者陽脈也秋者金始治肺將收殺金將勝火陽氣在合陰氣所勝濕氣及體陰氣未盛未能深入故取俞以瀉陰邪取合以虛陽邪陽氣始衰故取於合冬者水始治腎方閉陽氣衰少陰氣堅盛巨陽伏沉陽脈乃去故取井以下陰逆取滎以實陽氣故曰冬取井滎春不鼽衄此之謂也治熱病五十九俞頭上五行行五者以越諸陽之熱逆也中行督脈之上星囟會前頂百會後頂也次兩旁足太陽之五處承光通大絡卻玉枕也又次兩旁足少陽之臨泣目窗正營承臨腦空也五行共二十五穴散越熱氣之逆於上者大杼足太陽經膺俞手太陰中府穴缺盆足陽明經背俞足太陽風門穴一名熱府此八者以瀉胸中之熱也氣街二里巨虛上下廉俱足陽明經此八者以瀉胃中之熱也雲門手太陰經髃骨即肩髃穴委中足太陽經髓空督脈腰俞穴此八者以瀉四肢之熱也此八者止有七穴五臟俞傍五魄戶神堂魂門意舍志室此十者以瀉五臟之熱也凡此五十九穴者當為五十八穴皆熱之左右也人傷於寒而傳為熱者夫寒甚則生熱也寒盛於表在表之陽不得宣越故令生熱也又熱病五十九穴見靈樞熱病篇素問調經論經經隧也夫心藏神肺藏氣肝藏血脾藏肉腎藏志而各成形志意通調內連骨髓而成身形五臟五臟之道皆出於經隧以行血氣血氣不和百病乃變化而生是故守經隧焉五臟在內經隧在外脈道相通故但守經隧則可以治五臟之病神有餘則笑不休神不足則悲陽勝則神王故多喜而笑陽衰則陰慘乘之故多憂而悲血氣未並正氣未與邪並五臟安定邪客於形灑淅起於毫毛未入於經絡也故命曰神之微此以浮淺微邪在脈之表神之微也神有餘則瀉其小絡之血勿之深斥無中其大經神氣乃平小絡孫絡也斥刺也神不足者視其虛絡按而致之刺而利之無出其血無泄其氣以通其經神氣乃平以按摩致氣於其虛絡又刺而利之補不足以行其滯也刺微者按摩勿釋著針勿斥移氣於不足神氣乃得復微邪在心經之表當按摩勿釋欲散其外也著針勿斥母傷其內也氣有餘則喘咳上氣不足則息利少氣血氣未並五臟安定皮膚微病命曰白氣微泄肺主皮膚其色白微邪客之故命曰白氣微泄氣有餘則寫其經隧無傷其經無出其血無泄其氣有餘尚爾不足可知不足則補其經隧無出其氣刺微者按摩勿釋出針視之曰我將深之適人必革精氣自伏邪氣散亂無所休息氣泄腠理真氣乃相得先行按摩之法欲經隧之氣不滯次出針視之曰我將深之欲其恐懼而精神內伏也然針之至人必變革前説而刺仍淺也如是則精氣潛伏邪氣散亂無所止息而泄於外真氣得其所矣血有餘則怒不足則恐血氣未並五臟安定孫絡外溢則經有留血此肝經之表邪也但察其孫絡之脈有外溢者則大經之內有留止瘀血血有餘則瀉其盛經出其血瀉不足則視其虛經內針其脈中久留而視脈大疾出其針無令血泄補虛之法必留針候氣視其脈漸大是氣已至則當連出針矣刺留血者視其血絡刺出其血無令惡血得入於經以成其疾形有餘則腹脹涇溲不利脾濕勝則氣壅不行不足則四肢不用脾主四肢虛則不用血氣未並五臟安定肌肉蠕音軟動命曰微風脾土畏風木風主動肌肉間如蟲行動故命曰微風形有餘則瀉其陽經刺足陽明經解溪穴胃為脾之陽也不足則補其陽絡刺足陽明絡豐隆穴刺微者取分肉間無中其經無傷其絡衛氣得復邪氣乃索散也志有餘則腹脹飧泄水化寒寒氣在腹故爾不足則厥陰虛則陽勝故厥逆上衝血氣未並五臟安定骨節有動邪未入藏而薄於骨故但於骨節之間有鼓動之狀志有餘則瀉然谷血者血出血也不足則補其復溜皆足少陰經穴刺未並者即取之無中其經邪所乃能立虛即其邪居之所取之故無中其經穴則邪自能去氣血以並陰陽不和自為並一也陰陽相傾傾傾陷也氣亂於衛血逆於經血氣離居一實一虛血氣不相營合也血並於陰是為重陰氣並於陽是為重陽故為驚狂病癲狂也血並於陽表寒氣並於陰裡寒乃為炅炯同中熱中也血並於上氣並於下心煩惋善怒血為陰並於鬲上則陰邪抑心故煩惋氣為陽並於鬲下則火動於肝故善怒血並於下氣並於上亂而喜忘血並於下則陰氣不升氣並於上則陽氣不降陰陽離散故神亂而喜忘血氣者喜溫而惡寒寒則泣不能流溫則消而去之此言血氣並病之由也故氣之所併為血虛血之所併為氣虛言氣並於陽血並於陰也有者為實無者為虛故氣並則無血血並則無氣血與氣相失故為虛焉絡絡之與孫絡俱輸於經血與氣並則為實焉血之與氣並走於上則為大厥厥則暴死無陽則死氣復反則生不反則死夫陰與陽皆有俞會經穴有俞有會陽注於陰陰滿之外陰陽勻平以充其形九候若一命曰平人夫邪之生也或生於陰或生於陽其生於陽者得之風雨寒暑其生於陰者得之飲食居處陰陽喜怒風雨之傷人也先客於皮膚傳入於孫脈孫脈滿則傳入於絡脈絡脈滿則輸於大經脈血氣與邪並客於分腠之間其脈堅大故曰實實者外堅充滿不可按之按之則痛寒濕之中人也皮膚不收肌膚虛浮不收斂也肌肉堅緊榮血澀衛氣去故曰虛虛者聶闢氣不足按之則氣足以溫之故快然而不痛言語輕小曰聶足弱不能行曰闢陰之生實者喜怒不節則陰氣上逆上逆則下虛下虛則陽氣走之湊之也故曰實矣陰之生虛者喜則氣下悲則氣消消則脈虛空因寒飲食寒氣熏滿則血泣氣去故曰虛矣此內傷之生虛也若飲食過度留滯不消雖亦內傷此為虛中挾實也陽虛則外寒陰虛則內熱陽盛則外熱陰盛則內寒義如下文陽受氣於上焦以溫皮膚分肉之間今寒氣在外則上焦不通上焦不通則寒氣獨留於外故寒栗此明陽虛則外寒也有所勞倦形陰氣衰少穀氣不盛上焦不行下脘不通胃氣熱熱氣熏胸中故內熱此明陰虛生內熱也上焦不通利則皮膚緻密腠理閉塞玄府不通衛氣不得泄越故外熱上焦之氣主陽分也故外傷寒邪則上焦不通肌表閉塞衛氣鬱聚無所流行而為外熱此明陽盛則外熱外感症也厥氣上逆寒氣積於胸中而不瀉不瀉則溫氣去寒獨留留則血凝泣凝泣則脈不通其脈盛大以澀故中寒厥氣寒厥之氣也寒留中焦陽氣乃去故經脈凝滯此明陰盛生內寒內傷症也陰與陽並血氣以並病形以成刺之奈何刺此者取之經隧取血於營取氣於衛用形哉因四時多少高下凡刺必用其形之長短肥瘦大小為法又當因天之四時寒暑溫涼消息多少者如以月生死為痏數也高下者如春俞在頸項夏俞在胸脅秋俞在肩背冬俞在腰股也血氣以並病形以成陰陽相傾補瀉奈何瀉實者氣盛乃內針因病人之吸氣而入針針與氣俱內氣內則神人不欲亂其真也以開其門如利其戶針與氣俱出候病人之呼氣而出針精氣不傷邪氣乃下外門不閉以出其疾搖大其道如利其路是為大瀉必切而出大氣乃屈行上文之法又必切中其疾而後出針則大邪之氣屈伏真氣亦無攢也補虛奈何持針勿置以定其意候呼內針氣出針入針空四塞精無從去針下氣實則真氣聚而不散也方實而疾出針氣入針出方其氣至而針下實當即候吸出針也熱不得還閉塞其門邪氣布散精氣乃得存熱針下之氣熱也動氣候時近氣不失遠氣乃來是謂追之追而濟之是補法五臟者故得六府與為表裡經絡支節各生虛實其病所居隨而調之臟腑相為表裡故為十二經經絡各生支節故為三百六十五節氣脈貫通故皆合於五臟其間各生虛實則病有所在調之之義如下文病在脈調之血脈者血之府病在血調之絡血和則孫脈先滿溢乃注於絡脈故血病者當調絡也病在氣調之衛衛主陽氣病在肉調之分肉隨所在而取於分肉之間病在筋調之筋燔針劫刺其下及與急者病在骨調之骨淬針藥尉燔針者內針之後以火燔之暖淬針者用火先赤其針而後刺不但暖也若寒毒固結非此不可今名火針即此藥尉者以辛熱之藥尉而散之病有淺深故用分微甚耳病不知所痛兩蹺為上濕痹為患當取足太陽之申脈身形有痛九候莫病則繆刺之病不在經而在絡當刺絡脈也痛在於左而右脈病者巨刺之刺大經也必謹察其九候諸經之九候針道備矣素問繆刺論繆刺者左病刺右右病刺左身病刺四肢繆其病處也所以行繆刺者絡病而經不病故也夫邪之客於形也必先舍於皮毛留而不去入舍於孫絡留而不去入舍於絡脈留而不去入舍於經脈內連五臟散於腸外陰陽俱感五臟乃傷此邪之從皮毛而入極於五臟之次也如此則治其經焉不用繆刺之法今邪客於皮毛入舍於孫絡留而不去閉塞不通不得入於經流溢於大絡而生奇病也夫邪客大絡者左注右右注左上下左右與經相干而布於四末其氣無常處不入於經俞命曰繆刺其與巨刺何以別之曰邪客於經左盛則右病右盛則左病亦有移易者左痛未已而右脈先病如此者必巨刺之必中其經非絡脈也右病右反病左病左反病也故絡病者其痛於經脈繆處故命曰繆刺繆處者與經脈常行之處差繆也邪客於足少陰之絡令人卒心痛暴脹胸脅支滿無積者刺然骨之前然谷穴出血如食頃而已食頃一飯頃也不已左取右右取左此正繆刺也余準此又令人嗌痛不可內食無故善怒氣上走賁上刺湧泉嗌痛在中者左右各刺三痏痛在一邊者在左取右在右取左賁鬲也嗌中腫不能內唾時不能出唾者刺然谷出血立已令人嗌痛不可內食句至此舊本在邪客於足少陽第一節之下邪客於手少陽之絡令人喉痹舌卷口乾心煩臂外廉痛手不及頭刺關衝邪客於足厥陰之絡令人卒疝暴痛刺大敦邪客於足太陽之絡令人頭項肩痛刺至陰立已不已刺外踝下三痏金門京骨通谷又令人拘攣背急引脅而痛刺之從項始數脊椎俠脊疾按之應手如痛刺之此不拘穴俞而刺謂之應痛穴令人拘攣背急句至此舊本在邪客於足太陰一節之下邪客於手陽明之絡令人氣滿胸中喘息而支胠胸中熱刺商陽又令人耳聾時不聞音刺商陽立聞手陽明之別者入耳不已刺關衝舊作中指爪甲上以心主之脈出耳後合少陽完骨之下故刺手厥陰之井中衝穴吳氏改小指次指以手少陽之絡從耳後入耳中故刺手少陽井關衝穴其不時聞者不可刺也時或有聞者尚為可治其不時關者絡氣已絶故不刺耳中生風者如風聲者雖聾猶有所聞亦刺之如此數令人耳聾句至此舊本在人有所墮墜節之下邪客於臂掌之間手厥陰經不可得屈刺其踝後本節踝後內關穴也先以指按之痛乃刺之此以應痛為痏不拘穴法以月生死為痏數邪客於足陽蹺之脈令人目痛從內眥始刺申脈人有所墮墜惡血留內腹中滿脹不得前後先飲利藥利瘀血也此上傷厥陰之脈下傷少陰之絡刺然骨之前血脈出血即少陰絡刺足跗上動脈王氏吳氏為衝陽穴以腹滿脹故刺之張氏作足厥陰之俞太衝穴亦安不已刺大敦見血立已善悲驚不樂刺如上方凡痹往來行無常處者在分肉間痛刺之以月生死為數言用針者隨氣盛衰以為痏數也針過其日數則脫氣不及日數則氣不瀉左刺右右刺左病已止不已復刺之如法月生一日一痏二日二痏漸多之十五日十五痏十六日十四痏漸少之邪客於足陽明之絡令人鼽衄上齒寒刺厲兌邪客於足少陽之絡令人脅痛不得息咳而汗出刺竅陰不得息立已汗出立止咳者溫衣飲食一日已不已復刺如法又令人留於樞中痛髀不可舉刺環跳寒則久留針以月死生為數立已令人留於樞中痛句至此舊本在邪客於足太陽次節之下邪客於足太陰之絡令人腰痛引少腹控䏚不可以仰息刺腰尻之解兩胂之上是腰俞以月死生為痏數髮針立已王注腰俞左右即足太陽經下髎穴吳氏去是腰俞三字注為脾俞穴按腰痛論曰腰痛引少腹控䏚不可以仰刺腰尻交者兩髁胂上又骨空論曰腰痛不可以轉搖急引陰卵刺八髎與痛上八髎在腰尻分間此言是腰俞即指足太陽經上次中下髎穴也詳見刺腰痛論治諸經之所過者不病則繆刺之經不病則邪在絡故主繆刺耳聾刺手陽明商陽合谷陽溪偏歷不已刺其通脈出耳前者聽會齒齲痛也刺手陽明穴如上不已刺其脈入齒中者立已手陽明脈入下齒中故刺齦交穴邪客於五臟之間五臟絡也其病也脈引而痛時來時止視其病繆刺之於手足爪甲上但視病處各取其井而繆刺之視其脈出其血間日一刺一刺不已五刺已繆傳引上齒齒唇寒痛視其手背脈血者去之足陽明病則齒唇熱痛今下齒而引及上齒是手陽明病故齒唇寒痛取手陽明之絡有血者先去之足陽明中指爪甲上此足陽明支脈所出也一作厲兌穴手大指次指爪甲上商陽各一痏立已邪客於手足少陰太陰足陽明之絡此五絡皆會於耳中上絡左角五絡俱竭令人身脈皆動而形無知也其狀若尸或曰尸厥刺陰白湧泉厲兌各一痏後刺少商中衝神門不已以竹管吹其兩耳髢其左角之發方一寸燔治飲以美酒一杯不能飲者灌之立已凡刺之數先視其經脈切而從之審其虛實而調之不調者經刺之必中其經非絡脈也有痛而經不病者繆刺之身有痛處而其經脈所至之分不皆病者是為絡病非經病也因視其皮部有血絡者盡取之泄絡中之結邪也此繆刺之數也數節目也素問四時刺逆從論春者天氣始開地氣始泄凍解冰釋水行經通故人氣在脈即經脈也夏者經滿氣溢入孫絡孫絡受血皮膚充實人氣在孫絡長夏者經絡皆盛內溢肌中人氣在肌肉中秋者天氣始收腠理閉塞皮膚引急人氣在皮膚冬者蓋藏血氣在中內著骨髓通於五臟人氣在骨髓中是故邪氣者常隨四時之氣血而入客也至其變化不可為度然必從其經氣闢除其邪除其邪則亂氣不生春刺絡脈血氣外溢令人少氣春刺夏分氣未至而誤刺之故少氣春刺肌肉血氣環逆令人上氣木旺則土虛復刺肌肉是為重虛血氣環周皆逆不相運行故上氣春刺筋骨血氣內著令人腹脹春氣發越而復深取筋骨以傷其陰故血氣內著而腹脹夏刺經脈血氣乃竭令人解㑊氣不在經脈而誤刺之故血氣內竭形迹困倦夏刺肌肉血氣內卻令人善恐長夏未至而先奪其氣血氣卻弱故令善恐夏刺筋骨血氣上逆令人善怒夏刺冬分則陰虛於內陽勝於外故血氣逆而為怒秋刺經脈血氣上逆令人善忘心主脈誤刺經脈則心氣虛故善忘秋刺絡脈氣不衛外令人臥不欲動氣已去絡而復刺之則氣虛不能衛外故臥不欲動秋刺筋骨血氣內散令人寒栗氣未至筋骨而誤刺之則血氣內散而中氣虛故寒栗冬刺經脈血氣皆脫令人目不明氣未至而先奪之故血氣脫而目不明也冬刺絡脈內氣外泄留為大痹當陽氣伏藏之時刺其陽分則陽氣外泄經脈滯是生大痹冬刺肌肉陽氣竭絶令人善忘冬時而刺夏分則陽氣竭絶陽氣者精則養神陽虛則神衰故善忘凡此四時刺者大逆之病不可不從也反之則生亂氣相淫病焉刺失四時是為大逆此時氣之不可不從也若反常法必生亂氣互相淫泆為病矣凡刺不知四時之經病之所生以從為逆正氣內亂與精相搏從順也搏邪正相迫也必審九候正氣不亂精氣不轉九候各有其部所以審明病之所在從而刺之庶正氣不亂精氣不致轉變矣素問方盛衰論肺氣虛則使人夢見白物金色曰見人斬血籍籍虛者必怯籍籍驚惕也得其時則夢見兵戰時金旺之時也腎氣虛則使人夢見舟船溺人腎合水得其時則夢伏水中若有畏恐時水旺之時也肝氣虛則夢見菌香生草肝合木得其時則夢伏樹下不敢起雖得木旺之時而肝氣本虛故夢伏而不敢起心氣虛則夢救火陽物心合火陽物即屬火之類得其時則夢燔灼時火旺之時也脾氣虛則夢飲食不足倉廩空虛也得其時則夢築垣蓋屋時土旺之時也此皆五臟氣虛陽氣有餘陰氣不足凡人陽氣不足陰氣有餘則當晝而寐若陽氣有餘陰氣不足則當夕而夢所以為厥為夢者皆陽不附陰之所致合之五診察五臟見症調之陰陽以在經脈和陰陽在十二經脈以求之也夢魂顛到變化異常惟邪正衰旺之分耳陽旺則吉陰旺則凶
