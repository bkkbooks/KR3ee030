body:
  text: 卷四經穴考正骨度古數如左然骨有大者則太過小者則不及此亦言其則耳頭之大骨圍二尺六寸頭骨謂之髑髏男子自項及耳並腦後共八片惟蔡州人多一共九片腦後橫一縫當正直下至髮際別有一直縫女人頭骨六片亦腦後一橫縫當正直下則無縫也發所覆者顱至項一尺二寸覆者言前髮際至後項髮際也發以下至頤長一尺兩顴相去七寸目下高骨曰顴耳前當耳門者廣一尺三寸耳後當完骨者廣九寸完骨耳後髮際高骨也左右相去廣九寸以上頭部前後之尺寸結喉以下至缺盆中長四寸缺盆天突穴處也缺盆以下至𩩲骭長九寸𩩲骭鳩尾也𩩲骭以下至天樞長八寸天樞以下至橫骨長六寸半當作五寸橫骨陰毛中曲骨也橫骨橫長六寸半一曰七寸半胸圍四尺五寸乳之間為胸胸前橫骨三條左右肋骨各十二條八長四短女人多檠夫骨二條左右各十四條腰圍四尺二寸平臍周圍曰腰人之肥瘦不同腰之大小亦異四尺二寸以中人之大略言也兩乳之間廣九寸半兩髀之間廣六寸半此當兩股之中橫骨兩頭之處俗名髀縫以上胸腹部角以下至柱骨長一尺頭側大骨曰角頸項根曰柱骨行腋中不見者長四寸自柱骨通腋中不見之處也腋以下至季脅長一尺二寸自腋至脅下盡處也季脅以下至髀樞長六寸足股曰髀髀上外側骨縫曰樞此運動之機也以上頭身側部項發以下至背骨長三寸半自後髮際以至大椎項骨三節處靈樞作二寸半圖翼作三寸半今依折法為三寸膂骨以下至尾骶二十一節長三尺膂骨脊骨也脊骨外小而內巨共二十四節今云二十一節者除項骨三節不在內也男子尾骶骨尖女子尾骶骨平以上頭背部肩至肘長一尺七寸肘至腕長一尺二寸半臂掌之節曰腕腕至中指本節長四寸本節至其末長四寸半指之後節曰本節其末指端也手之大指三節兩節在外本節在掌食指中指無名指小指俱四節三節在外本節在掌其節節交接處皆有碎骨筋膜聯絡足趾同橫骨上廉下至內輔之上廉長一尺八寸骨際曰廉膝旁之骨內曰內輔外曰外輔內輔之上廉以下至下廉長三寸半內輔下廉下至內踝長一尺三寸踝髁骨也內踝以下至地長三寸自橫骨至此皆內側以下皆外側髀樞下至膝中長一尺九寸膝中言膝外側骨縫之次膝以下至外踝長一尺六寸外踝以下至京骨長三寸京骨足小指本節後大骨下赤白肉際也京骨以下至地長一寸膝膕以下至跗屬長一尺二寸膝在前膕在後跗屬者凡兩踝前後脛掌所交之處皆為跗之屬也跗屬以下至地長三寸足長一尺二寸廣四寸半足足掌也廣闊也以下四肢部頭部折法前髮際至後髮際折為一尺二寸如人前髮際不明者取眉心直上行三寸後髮際不明者取大椎上行三寸詳見骨度前後俱不明者眉心起至大椎共折作一尺八寸頭部直寸法依此橫寸法以眼內眥角至外眥角此為一寸按足太陽經曲差開督脈神庭一寸半足少陽經本神開曲差一寸半足陽明經頭維開本神一寸半自神庭至頭維共得四寸半皆以頭之大骨圍二尺六寸折法取之眼內眥角至外眥角為一寸不能皆合背部折法大椎穴至尾骶骨共計二十一節通折三尺項骨三節不在數上七椎各一寸四分一釐共九寸八分七釐中七椎各一寸六分一釐共一尺一寸二分七釐下七椎各一寸二分六釐共八寸八分二釐總共二尺九寸九分六釐不足四釐者有零未盡也背部直寸法依此橫寸依中指同身寸法脊骨內闊一寸第二行夾脊一寸半三行夾脊三寸脊骨左右各半寸未算也凡夾脊一寸半者當作去中二寸大杼等穴並依此法凡夾脊三寸者當作去中三寸半附分等穴並依此法胸腹部折法天突宛中至膻中折為八寸下行一寸六分為中庭共得九寸六分一作八寸四分誤𩩲骭上蔽骨尖下至臍心折為八寸人無蔽骨者取岐骨下至臍共折九寸臍心下至毛際曲骨穴折為五寸胸腹直寸法依此橫寸法用兩乳相去折為八寸按骨度篇兩乳間廣九寸半詳較針灸書足厥陰經期門在乳旁一寸半章門去中六寸得兩乳為九寸之數而足陽明經乳根去中四寸足少陽經帶脈去中七寸半得兩乳間為八寸之數故各經開中寸法以兩乳間橫折八寸約取之中指同身寸法以男左女右手大指中指圓曲交接如環取中指中節橫文兩頭盡處比為一寸凡手臂一作足字誤尺寸及背腹橫寸無折法之處皆依此法同身寸説類經圖翼同身寸者謂同於人身之尺寸也人之長短肥瘦各自不同而穴之橫直尺寸亦不能一如今以中指同身寸法一概混用則人瘦而指長人肥而指短豈不謬誤故必因其形而取之方得其當如標幽賦曰取五穴用一穴而必端取三經用一經而可正蓋謂並鄰經而正一經聯鄰穴而正一穴譬之切字之法上用一音下用一韻而夾其聲於中則其經穴之情自無所遁矣故頭必因於頭腹必因於腹背必因於背手足必因於手足總其長短大小而折中之庶得謂之同身寸法周身骨部名目巔頂巔也腦頭中髓也囟音信腦蓋骨也嬰兒腦骨未合軟而跳動之處謂之囟門額顱囟前為髮際髮際前為額顱顏額上曰顏説文曰眉目之間也頞音遏鼻梁亦名下極即山根也䪼音拙目下為䪼顳顬顳柔涉切顬音如耳前動處蓋即俗所云兩太陽也一曰鬢骨顑音坎鳩音求顴頰間骨頰耳下曲處為頰頤音移頷中為頤頷音含腮下也目系目內深處脈也目內眥目內角也目鋭眥目外角也人中唇之上鼻之下也齒牙前小者曰齒後大者曰牙舌本舌根也咽所以通飲食居喉之後喉所以通呼吸居咽之前嗌音益喉也會厭在喉間為音聲啓閉之戶肺系喉嚨也頏顙頏音杭咽顙也頸項頭莖之側曰頸頭莖之後曰項又腦後曰項天柱骨肩骨上際頸骨之根也肩解膂上兩角為肩解肩胛胛音甲肩解下成片骨也亦名肩膊巨骨膺上橫骨膺音英胸前為膺一曰胸兩旁高處為膺胸中兩乳之間也膈膈膜也膈上宗氣之所聚是為膻中腋脅之上際季脅脅下盡處短小之肋胠音區腋之下脅之上也鳩尾蔽心骨也𩩲骭音吉干即鳩尾別名牛宀隹中牛宀隹音杪季脅下兩旁空軟處也脊骨脊音即椎骨也胂音申膂內曰胂夾脊肉也膂呂同脊骨曰呂象形也又曰夾脊兩旁肉也髃骨髃音魚端也肩端之骨腰骨尻上橫骨也腰髁髁苦瓦反即腰胯骨自十六椎而下俠脊附著之處也腹臍之上下皆曰腹臍下為少腹毛際曲骨兩旁為毛際其動脈即足陽明之氣衝也臚閭盧二音皮也又腹前曰臚睪音高陰丸也篡初貫切屏翳兩筋間為篡篡內深處為下極下極兩陰之間屏翳處也即會陰穴臀音屯機後為臀尻旁大肉也機俠腰髖骨兩旁為機髖音寬尻臀也一曰兩股間尻開高切尾骶骨也亦名窮骨肛音工俗音綱大腸門也臑音猱肩膊下內側對腋處高起耎白肉也肘手臂中節也一曰自曲池以上為脈臂肘之上下皆名為臂一曰自曲池以下為臂腕臂掌之交也兌骨手外髁也寸口開前後兩手動脈皆曰寸口闕手掌後動脈高起處曰關魚際手腕之前其肥肉隆起處形如魚者統謂之魚寸之前魚之後曰魚際穴大指次指謂大指之次指即食指也足同小指次指謂小指之次指即無名指也足同髀音彼股也一曰股骨髀關伏兔上交紋處髀厭捷骨之下為髀厭即髀樞中也髀樞捷骨之下髀之上曰髀樞當環跳穴股大腿也伏兔髀前膝下起肉處臏音頻膝蓋骨也膕音國膝後曲處輔骨膝下內外側大骨也成骨膝外廉之骨獨起者腨音篆一名腓腸下腿肚也腓腸腓音肥足肚也胻骨䯒音杭足脛骨也骭音干足脛骨也脛形去聲足莖骨也絶骨外髁上尖骨也䐃音窘筋肉結聚之處也直音云腸中脂王氏曰肘膝後肉如塊者髁骨髁音科足跗後兩旁圓骨內曰內踝外曰外髁一作踝骨俗名孤拐骨手宛兩旁圓骨亦名髁骨跗附甫二音足面也內筋內踝上大筋在大陰後上踝二寸所足岐骨大指本節後曰岐骨跟骨跟音根足根也核骨一作核骨足大指本節後內側圓骨也踵足根也踹音足根也又與腨通用三毛足大指爪甲後為三毛毛後橫紋為聚毛十二經絡次序十四經發揮十二經絡始於手太陰其支者從腕後出次指端而交於手陽明手陽明之支者從缺盆上挾口鼻而交於足陽明足陽明之支者從跗上出大指端而交於足太陰足太陰之支者從胃別上膈注心中而交於手少陰手少陰無支者直自本經少衝穴而交於手太陽手太陽之支者別頰上至目內眥而交於足太陽足太陽之支者從膊內左右別下合膕中下至小指外側端而交於足少陰足少陰之支者從肺出注胸中而交於手厥陰手厥陰之支者從掌中循小指次指出其端而交於手少陽手少陽之支者從耳後出目鋭眥而交於足少陽足少陽之支者從跗上入大指爪甲出三毛而交於足厥陰足厥陰之支者從肝別貫膈上注肺入喉嚨之後上額循巔行督脈絡陰器過毛中行任脈入缺盆下注肺中而復交於手太陰也按人一呼脈行三寸呼吸定息脈行六寸一日一夜凡一萬三千五百息脈行八百一十丈每刻一百三十五息每時八刻計一千八十息脈行六十四丈八尺營衛四周於身十二時九十六刻計一萬二千九百六十息脈行七百七十七丈六尺為四十八周身刻之餘分得五百四十息脈行三十二丈四尺為二周於身總之為五十度周身八百一十丈脈合一萬三千五百息也故五十營篇曰二百七十息氣行十六丈二尺一周於身此經脈之常度也而子午流注針灸等書因人身經脈之行始於水下一刻遂以寅時定為肺經以十二時挨配十二經而為之歌曰肺寅大卯胃辰宮脾巳心午小未中膀申腎酉心包戌亥三子膽醜肝通繼後張世賢熊宗立復為分時注釋殊不知紀漏者以寅初一刻為始而經脈運行之度起於肺經亦以寅初一刻為紀故首言水下一刻而一刻之中氣脈凡半周於身矣焉得有大腸屬卯時胃屬辰時等次也且如手三陰脈長三尺五寸足三陽脈長八尺手少陰厥陰左右俱止十八穴足太陽左右一百三十四穴此其長短多寡大相懸絶安得按時分配其失經旨遠矣手太陰肺經穴考左右二十二穴中府一名膺俞在雲門下一寸六分乳上三肋間動脈應手陷中旁開華蓋任脈穴名六寸仰取之肺之募手足太陰之會針三分灸五壯治肺急胸滿少氣不得臥雲門在巨骨下俠胃經氣戶旁二寸間中六寸動脈應手陷中舉臂取之針三分灸五壯治四肢熱不已咳逆短氣喉痹癭氣臂痛不舉天府在臂臑內廉腋下三寸動脈陷中點墨於鼻尖湊到臂處是穴針四分禁灸灸之令人氣通治惡語善忘衄血喘息痎瘧寒熱目眩癭氣俠白在天府下肘中約紋上去五寸動脈中手太陰之別針三分灸五壯治心痛氣短尺澤在肘中約紋上屈肘橫紋兩筋間動脈陷中肺脈所入為合實則瀉之針三分灸五壯治心煩氣短喉痹口乾咳血小便數肩痛四肢腫善嚏悲哭小兒慢驚風孔最在腕上七寸上骨下骨間陷中側取之手太陰郤同隙針三分灸五壯治肘臂痛屈伸難咳逆吐血失音咽痛列缺在腕後側上一寸五分兩手交叉當食指末處筋骨罅中手太陰之絡別走陽明人有寸關尺三部脈不見而見於列缺陽溪謂之反關脈此經脈虛而絡脈滿也千金翼謂陽脈逆反大於寸口三倍者即此針二分灸七壯治寒熱瘧偏風頭痛驚癇口噤咳嗽下牙疼經渠在寸口陷中動脈應手肺脈所行為經針二分禁灸治胸背拘急喉痹咳逆心痛嘔吐熱病汗不出太淵在掌後內側橫紋頭動脈中肺脈所注為俞陰經俞即原下仿此虛則補之脈會太淵每日平旦寅時氣血從此始故曰寸口者脈之大會針二分灸三壯