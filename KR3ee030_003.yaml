body:
  text: 卷三群書匯粹標本陰陽素問子午之歲上見少陰丑未之歲上見太陰寅申之歲上見少陽卯酉之歲上見陽明辰戌之歲上見太陽巳亥之歲上見厥陰此即三陰三陽之應地支也是為六氣上者言司天如子午之歲上見少陰司天是也十二年皆然少陰所謂標也厥陰所謂終也標首也終盡也六十年陰陽之序始於子午故少陰謂標盡於巳亥故厥陰謂終厥陰之上風氣主之少陰之上熱氣主之太陰之上濕氣主之少陽之上相火主之陽明之上燥氣主之太陽之上寒氣主之所謂本也是謂六元三陰三陽者由六氣之化為之主而風化厥陰熱化少陰濕化太陰火化少陽燥化陽明寒化太陽故六氣謂本三陰三陽謂標也然此六者皆天元一氣之所化一分為六故曰六元少陽之上火氣治之中見厥陰此以下言三陰三陽各有表裡其氣相通故各有互根之中氣也少陽之本火故火氣在上與厥陰為表裡故中見厥陰是以相火而兼風木之化也陽明之上燥氣治之中見太陰陽明之本燥故燥氣在上與太陰為表裡故中見太陰是以燥金而兼濕土之化也太陽之上寒氣治之中見少陰太陽之本寒故寒氣在上與少陰為表裡故中見少陰是以寒水而兼君火之化也厥陰之上風氣治之中見少陽厥陰之本風故風氣在上與少陽為表裡故中見少陽是以風木而兼相火之化也少陰之上熱氣治之中見太陽少陰之本熱故熱氣在上與太陽為表裡故中見太陽是以君火而兼寒水之化也太陰之上濕氣治之中見陽明太陰之本濕故濕氣在上與陽明為表裡故中見陽明是以濕土而兼燥金之化也所謂本也本之下中之見也見之下氣之標也此言三陰三陽為六氣之標而兼見於標本之間者是陰陽表裡之相合而互為中見之氣也本標不同氣應異象六經之氣以風寒熱濕火燥為本三陰三陽為標本標之中見者為中氣中氣者如少陽厥陰為表裡陽明太陰為表裡太陽少陰為表裡表裡相通則彼此互為中氣百病之起多生於本六氣之用則有生於標者有生於中氣者太陽寒水本寒標熱少陰君火本熱標寒其治或從本或從標審寒熱而異施也少陽相火從火化為本太陰濕土從濕化為本其治但從火濕之本不從少陽太陰之標也陽明燥金金從燥化燥為本陽明為標厥陰風木木從風化風為本厥陰為標其治不從標本而從乎中中者中見之氣也蓋陽明與太陰為表裡其氣互通於中是以燥金從濕土之中氣為治厥陰與少陽為表裡其氣互通於中是以風木從相火之中氣為治亦以二經標本之氣不合故從中見之氣以定治耳人肖天地此事難知集天地之形如卵橫臥於東南西北者自然之勢也血氣運行故始於手太陰終於足厥陰帝曰地之為下否乎岐伯曰地為人之下太虛之中也曰馮乎言地在太虛之中而不墜者有所憑依否曰大氣舉之也大氣太虛之元氣也是地如卵黃在其中矣又曰地者所以載生成之形類也易曰坤厚載物德合無疆信乎天之包地形如卵焉故人首之上為天之天足之下為地之天人之浮於地之上如地之浮於太虛之中也地之西始於寅終於醜血之東根於辛納於乙相隨往來不息獨缺於乾巽為天地之門戶也啓元子云戊土屬乾己土屬巽遁甲曰六戊為天門六己為地戶此之謂也經雲天地者萬物之上下左右者陰陽之道路氣血者父母也父母者天地也血氣周流於十二經總包六子於其中六氣五行是也無形者包有形而天總包地也天左行而西氣隨之百川並進而東血隨之臟腑經絡之標本本藏府為本居里十二經為標居表表裡相絡者為中氣居中所謂相絡者乃表裡互相維絡如足太陽膀胱經絡於腎足少陰腎經亦絡於膀胱也余仿此井滎陰陽配合五行剛柔類經本輸篇曰肺出於少商為井木心出於中衝為井木肝出於大敦為井木脾出於隱白為井木腎出於湧泉為井木此五臟之井皆始於木也又曰膀胱出於至陰為井金膽出於竅陰為井金胃出於厲兌為井金三焦出於關衝為井金小腸出於少澤為井金大腸出於商陽為井金此六腑之井皆始於金也此靈樞發各經金木之理而未具五行生合之義及難經乃始分析五行剛柔而滑伯仁又詳注陰井木生陰滎火陰滎火生陰腧土陰腧土生陰經金陰經金生陰合水陽井金生陽滎水陽滎水生陽腧木陽腧木生陽經火陽經火生陽合土也又如陰井乙木陽井庚金是乙與庚合也陰滎丁火陽滎壬水是丁與壬合也陽腧甲木陰腧巳土是甲與巳合也陽經丙火陰經辛金是丙與辛合也陽合戊土陰合癸水是戊與癸合也庚為陽金故曰陽井庚者乙之剛也乙為陰木故曰陰井乙者庚之柔也此其生髮象四時潮宗合河海上下有相生之義陰陽有相配之理蓋其上法天時中合人事而下應地理者乎十二原解九針十二原篇云肺之原出於太淵心之原出於太陵肝之原出於太衝脾之原出於太白腎之原出於太溪膏之原出於鳩尾肓之原出於脖音勃胦惡平聲脖胦臍也凡此十二原者主治五臟六腑之有疾者也本輸篇乃以太淵太陵太衝太白太溪等五原為五臟之腧六腑則膀胱之束骨為腧京骨為原膽之臨泣為腧丘墟為原胃之陷谷為腧衝陽為原三焦之中渚為腧陽池為原小腸之後溪為腧腕骨為原大腸之三間為腧合谷為原又曰心出於中衝溜於勞宮注於太陵行於間使入於曲澤手少陰也中衝以下皆手心主經穴本篇指為手少陰而少陰經腧別無載者邪客篇帝曰手少陰之脈獨無腧何也岐伯曰諸邪之在於心者皆在於心之包絡包絡者心主之脈也故獨無腧焉帝曰少陰獨無腧者不病乎岐伯曰其外經病而藏不病故獨取其經於掌後鋭骨之端即神門穴手少陰腧其餘脈出入屈折行之徐疾皆如手少陰心主之脈行也故王氏注氣穴論藏腧五十穴亦惟有心主井腧而無心經之五腧維獨繆刺篇曰少陰鋭骨之端各一病王氏注謂神門穴為手少陰之腧者蓋亦本於邪客篇也前三篇之説各有不同在九針十二原篇止言五臟之原左右各二而復有膏之原肓之原共為十二原在本輸篇則以前篇五臟之原為五腧復有六腑之原而無膏肓之原且手少陰之脈獨無腧而以手厥陰之腧代之在邪客篇則明指手少陰之腧在掌後鋭骨之端而亦皆無少陰井滎經合併膏肓等原難經亦然及查甲乙經乃云少衝者木也少陰脈所出為井少府者火也少陰脈所溜為滎神門者土也少陰脈所注為腧靈道者金也少陰脈所行為經少海者水也少陰脈所入為合而十二經之井滎始全矣然詳求腧原之義如九針十二原篇及本輸篇所云則陰經之原即腧也陽經雖有腧原之分而腧過於原亦為同氣故陽經治原即所以治腧也陰經治腧即所以治原也六十六難曰十二經皆以腧為原者何也然五臟腧者三焦之所行氣之所留止也又曰原者三焦之尊號也故所止輒為原五臟六腑之有病者皆取其原也及考之順氣一日分為四時篇則曰原獨不應五時以經合之以應其數然則腧可合原經亦可合原矣蓋腧在原之前經在原之後穴鄰脈近故其氣數皆相應也論子午流注法徐氏書今較正子午流注者謂剛柔相配陰陽相合氣血循環時穴開闔也子時一刻乃一陽之生午時一刻乃一陰之生子午為陰陽之消息也流者往也注者住也天干有十經有十二甲膽乙肝丙小腸丁心戊胃己脾庚大腸辛肺壬膀胱癸腎余兩經三焦包絡也三焦乃陽氣之父包絡乃陰血之母三焦寄於丙包絡寄於丁以類從也舊本三焦寄於壬包絡寄於癸誤每經之中有井滎腧經合以配金水木火土是故陰井木而陽井金陰滎火而陽滎水陰腧土而陽腧木陰經金而陽經火陰合水而陽合土經中有返本還元者乃十二經出入之門也陽經有原遇腧穴並過之陰經無原以腧穴代為之是以甲出丘墟乙出太衝又按千金云六陰經亦有原穴乙中都丁通里內關舊本包絡內關寄於癸誤巳公孫辛列缺癸水泉是也故陽日氣先行而血後隨也陰日血先行而氣後隨也得時為之開失時為之闔陽干注府甲丙戊庚壬而重見者氣納三焦陰乾注藏乙丁己辛癸而重見者血納包絡如甲日甲戌時開在膽井至戊寅時正當胃腧而又並過膽原至甲申時重見甲是以氣納三焦滎穴陽滎屬水甲屬木是以水生木謂甲合還元化木又如乙日乙酉時開在肝井至己丑時當脾之腧並過肝原至乙未時重見乙是以血納包絡滎穴陰滎屬火乙屬木是以木生火也余仿此俱以子午相生陰陽相濟陽日無陰時陰日無陽時故甲與己合乙與庚合丙與辛合丁與壬合戊與癸合也何以甲與己合蓋中央戊己屬土畏東方甲乙之木所克戊乃陽為兄己屬陰為妹戊兄遂將己妹嫁與木家與甲為妻庶得陰陽和合而不相傷所以甲與己合其餘皆然此所謂子午之法也上陽圖法以膽小腸胃大腸膀胱挨去如膽井竅陰至小腸滎前谷胃腧陷谷大腸經陽溪膀胱合委中數之第二次小腸並少澤胃滎內庭大腸腧三間膀胱經崑崙膽合陽陵泉第三次胃井厲兌大腸滎二間膀胱腧束骨膽經陽輔小腸合小海第四次大腸並商陽膀胱滎通谷膽腧臨泣小腸經陽谷胃合三里第五次膀胱井至陰膽滎俠溪小腸腧後溪胃經解痏大腸合曲池以上各陽經原穴俱於腧穴並過之重遇陽干氣納三焦陰圖以肝心脾肺腎挨次輸數如陽圖通轉各陰經原穴即腧也亦於腧穴並過之重遇陰乾血納包絡逐日按時流注穴甲日乙丑時肝滎行間從湧泉至此腎水生肝木井木生滎火也丁卯心俞神門並過腎原太溪己巳脾經商丘辛未肺合尺澤癸酉與前癸亥時重遇陰乾血納包絡井中衝陰井屬木癸水生木甲戌膽井竅陰引氣行乙日丙子小腸滎前谷戊寅胃俞陷谷並過膽原丘墟庚辰大腸經陽溪壬午膀胱合委中甲申與前甲戌時重遇陽干氣納三焦滎液門陽滎屬水生甲木乙酉肝井大敦引血行丁亥心滎少府丙日己丑脾俞太白並過肝原太衝辛卯肺經經渠癸巳腎合陰谷乙未與前乙酉時重遇陰乾血納包絡滎勞宮陰滎屬火乙木生火丙申小腸井少澤引氣行戊戌胃滎內庭丁日庚子大腸俞三間並過小腸原宛骨又過三焦原陽池返本還原壬寅膀胱經崑崙甲辰膽合陽陵泉丙午與前丙申時重遇陽干氣納三焦俞中渚陽俞木生內火丁未心井少衝引血行己酉脾滎大都辛亥肺俞太淵並過心原神門又過絡原太陵返本還原戊日癸丑腎經復溜乙卯肝合曲泉丁巳與前丁未時重遇陰乾血納包絡俞太陵陰俞屬上丁火生土戊午胃並厲兌引氣行庚申大腸滎二間壬戌膀胱俞束骨並過胃原衝陽己日甲子膽經陽輔丙寅小腸合小戊辰與前戊午時重遇陽干氣納三焦經支溝陽經火生戊土己巳脾並隱白引血行辛未肺滎魚際癸酉腎俞太溪並過原太白乙亥肝經中封庚日丁丑心合少海己卯與前己巳時重遇陰乾血納包絡經間使陰經屬金己土生金庚辰大腸並商陽引氣行壬午膀胱榮通谷甲申膽俞臨泣並過大腸原合谷丙戌小腸經陽谷辛日戊子胃合三里庚寅與前庚辰時重遇陽干氣納三焦合天井陽合屬土生庚金辛卯肺並少商引血行癸巳腎滎然谷乙未肝俞太衝並過肺原太淵丁酉心經靈道己亥脾合陰陵泉壬日辛丑與前辛卯時重遇陰乾血納包絡合曲澤陰合屬水辛金生水壬寅膀胱並至陰引氣行甲辰膽滎俠溪丙午小腸俞後溪並過膀胱原京骨戊申胃經解溪庚戌大腸合曲池癸日壬子與前壬寅時重遇陽干氣納三焦並關衝陽井金生壬水癸亥腎並湧泉引血行流注開闔醫學入門人每日一身周流六十六穴每時周流五穴除六原穴乃過經之所相生相合者為開則刺之相剋者為闔則不刺陽生陰死陰生陽死如甲木死於午生於亥乙木死於亥生於午丙火生於寅死於酉丁火生於酉死於寅戊土生於寅死於酉己土生於酉死於寅庚金生於巳死於子辛金生於子死於巳壬水生於申死於卯癸水生於卯死於申凡值生我我生及相合者乃氣血生旺之時故可辨虛實刺之克我我克及闔閉時穴氣血衰絶非氣行未至即氣行已過不得妄引邪氣壞亂真氣也流注時日陽日陽時陽穴陰日陰時陰穴陽以陰為闔陰以陽為闔闔者閉也閉則以本時天干與某穴相合者針之陽日遇陰時陰日遇陽時則前穴已閉取其合穴針之合者甲與己合化土乙與庚合化金丙與辛合化水丁與壬合化木戊與癸合化火五門十變此之謂也其所以然者陽日注腑則氣先至而血後行陰日注藏則血先至而氣後行順陰陽者所以順氣血也或曰陽日陽時已過陰日陰時已過遇有急疾奈何曰夫妻子母互用必適其病為貴耳妻閉則針其夫夫閉則針其妻子閉則針其母母閉則針其子必穴與病相宜乃可針也用穴則先主而後客用時則棄主而從賓假如甲日膽經為主他穴為客針必先主後客其甲戍等時主穴不開則針客穴按日起時循經尋穴時上有穴穴上有時分明實落不必數上衍數此所以寧守子午而舍爾靈龜也按徐氏靈龜飛騰針法乃無稽之説故此不録所可宗者惟八脈交會八穴也八脈交會八穴公孫二穴父通衝脈內關二穴母通陰維脈合於心胸胃後溪二穴夫通督脈由脈二穴妻通陽蹺脈合於目內眥頸項耳肩膊小腸膀胱臨泣二穴男通帶脈外關二穴女通陽維脈合於目鋭眥耳後頰頸肩列缺二穴主通任脈照海二穴客通陰蹺脈合於肺系咽喉胸膈按此八穴乃通奇經八脈參交互注猶十二經之有井滎俞經合也其治病主客相應之法詳見卷五十二經納天干歌諸府配陽諸藏配陰甲膽乙肝丙小腸丁心戊胃己脾鄉庚屬大腸辛屬肺壬屬膀胱癸腎藏三焦陽府須歸丙包絡從陰丁火旁景嶽曰舊云三焦亦向壬中寄包絡同歸入癸方雖三焦為決瀆之官猶可言壬而包絡附心主安得云癸且二藏表裡皆相火也今改正之子午流注逐日按時定穴歌甲日戌時膽竅陰丙子時中前谷滎戊寅陷谷陽明腧返本丘墟木在寅庚辰經注陽溪穴壬午膀胱委中尋甲申時納三焦水滎合天干取液門乙日酉時肝大敦丁亥時滎少府心己丑太白太衝穴辛卯經渠是肺經癸巳腎官陰谷合乙未勞宮火穴滎丙日申時少懌當戊戌內庭醫脹康庚子時在三間腧本原腕骨可祛黃三焦寄有陽池穴返本還原慎莫忘三焦陽池舊本在壬日下誤壬寅經火崑崙上甲辰陽陵泉合長丙午時受三焦腧中渚之中仔細詳丁日未時心少衝己酉大都脾土逢辛亥太淵神門穴包絡太陵寄丁宮此是寄宮真的法包絡太陵舊本在癸日下誤癸丑復溜腎水通乙卯肝經曲泉合丁己包絡太陵中戊日午時厲兌先庚申滎穴二間遷壬戍膀胱尋束骨衝陽土穴必還原甲子膽經陽輔是丙寅小海穴安然戊辰氣納三焦脈經穴支溝刺必痊己日巳時隱白始辛未時中魚際取癸酉太溪太白原乙亥中封內踝比丁丑時合少海心己卯間使包絡止庚日辰時商陽居壬午膀胱通谷之甲申臨泣為腧木合谷金原返本歸丙戌小腸陽谷火戊子時居三里宜庚寅氣納三焦合天井之中不用疑辛日卯時少商木癸巳然谷何須忖乙未太衝原太淵丁酉心經靈道引己亥脾合陰陵泉辛丑曲澤包絡準土日寅時起至陰甲辰膽脈俠溪尋丙午小腸後溪腧本原京骨亦同斟戊申時至解溪胃庚戌大腸曲池臨壬子氣納三焦位井穴關衝一片金癸日亥時井湧泉乙丑行間穴定然丁卯腧穴神門是本尋腎水太溪原己巳商丘內踝穴辛未肺經尺澤連癸酉中衝包絡納流傳後學莫忘言十二經病井滎腧經合補瀉針灸聚英今較正手太陰肺屬辛金辛日乙未時血行本原太淵補虛又丁日辛亥時太淵為腧土土生金為母經曰虛則補其母瀉實用甲日辛未時尺澤為合水金生水為子經曰實則瀉其子手陽明大腸屬庚金庚日甲申時氣行木原合谷補用壬日庚戌時曲池為合土瀉用戊日庚申時二間為滎水足陽明胃屬戊土戊日壬戌時氣行本原衝陽補用壬日戊申時解溪為經火瀉用戊日戊午時厲兌為井金足太陰脾屬巳土己日癸酉時血行本原太白補用丁日己酉時大都為滎火瀉用甲日己巳時商丘為經金手少陰心屬丁火丁日辛亥時血行本原神門補用丁日丁未時少衝為井木瀉又甲日丁卯時神門為腧土手太陽小腸屬丙火丁日庚子時氣行本原宛骨補用壬日丙午時後溪為腧木瀉用己日丙寅時小海為合土足太陽膀胱屬壬水壬日丙午時氣行本原京骨補用壬日壬寅時至陰為井金瀉用戊日壬戌時束骨為腧土足少陰腎屬癸水甲日丁卯時血行本原太溪補用戊日癸丑時復溜為經金瀉用癸日癸亥時湧泉為井木手厥陰心包絡寄丁屬相火丁日辛亥時血行本原太陵補用甲日癸酉時中衝為井木瀉又戊日丁巳時太陵為腧土手少陽三焦寄丙屬相火丁日庚子時氣行本原陽池補用丁日丙午時中渚為腧木瀉用辛日庚寅時天井為合土足少陽膽屬甲木乙日戊寅時氣行本原丘墟補用壬日甲辰時俠溪為滎水瀉用己日甲子時陽輔為經火足厥陰肝屬乙木丙日乙丑時血行木原太衝補用戊日乙卯時曲泉為合水瀉用甲日乙丑時行間為滎火按臟腑各有五行生合之義並滎俞經合各有氣血流注日時今合為一法則學者易曉也又如心病虛者補其肝木實者瀉其脾土是亦補母瀉子之謂又如心虛者取少海之水所以伐其勝也心實者取少府之火所以泄其實也余藏皆同論治者當於此會而通之子母補瀉迎隨六十九難曰虛者補其母實者瀉其子當先補之然後瀉之此以別經為子母也母生我之經如肝虛則補腎經也母氣實則生之益力子我生之經如肝實則瀉心經也子氣衰則食其母益甚不虛不實以經取之者是正經自生病不中他邪也當自取其經故言以經取之即於本經取所當刺之穴不必補母瀉子也七十五難曰東方實西方虛瀉南方補北方何謂也然金木水火土當更相平言金剋木木剋土循環相制不令一藏獨盛而生病也東方木也西方金也木欲實金當平之火欲實水當平之土欲實木當平之金欲實火當平之水欲實土當平之東方者肝也則知肝實西方者肺也則知肺虛瀉南方火補北方水火者木之子也木者木之母也水勝火瀉火者一則以奪木之氣一則以去金之克補水者一則以益金之氣一則以制火之光故曰水勝火子能令母實母能令子虛故瀉火補水欲令金得平木也母能令子實子能令母虛乃五行之生化即虛者補母實者瀉子之義今言子能令母實母能令子虛者用針之子奪也經曰不能治其虛何問其餘此之謂也虛指肺虛而言也七十二難曰所謂迎隨者知營衛之流行經脈之往來也隨其逆順而取之故曰迎隨迎者針鋒逆其來處為瀉隨者針鋒順其往處為補瀉南方補北方論芑洄集王安道曰夫子能令母實母能令子虛以常情觀之則曰心火實致肝木亦實此子能令母實也脾土虛致肺金亦虛此母能令子虛也心火實固由自旺脾土虛乃由肝木製之法當瀉心補脾則肝肺皆平矣越人則不然其子能令母實子謂火母謂水固與常情無異其母能令子虛母謂水子謂木則與常情不同矣故曰水者木之母也子能令母實一句言病因也母能令子虛一句言治法也蓋火為木之子子助其母使之過分而為病矣水為本之毋若補水之虛使力可勝火火勢退而木勢亦退此則母能虛子之義所謂不治之治也此虛謂抑其過而欲虛之也水勝火三字此越人寓意處雖瀉火補水並言而其要又在於補水耳然水不虛而火獨暴旺者固不必補水也若先因水虛而致火旺者不補水可乎且夫肝之實也其因有二心助肝肝實之一因也肺不能制肝肝實之二因也肺之虛也其因亦有二心克肺肺虛之一因也脾受肝克而不能生肺肺虛之二因也今補水而瀉火火退則木氣削又金不受克而制木東方不實矣金氣得平又土不受克而生金西方不虛矣若以虛則補母言之肺虛則當補脾豈知肝勢正盛剋土之深雖每日補脾安能敵其正盛之勢哉縱使土能生金金受火克亦所得不償所失矣此所以不補土而補水也或疑木旺補水恐水生木而木愈旺殊不知木已旺矣何待生乎況水之虛雖峻補尚不能復其本氣安有餘力生木哉若能生木則能勝火矣瀉火補水使金得平木正所謂能治其虛不補土不補金乃瀉火補水使金自平此法之巧而妙者苟不能曉此法而不能治此虛則不須問其他必是無能之人矣奇經八脈總論本草剛目人身有經脈絡脈直行曰經旁行曰絡經凡十二手之三陰三陽足之三陰三陽是也絡凡十五乃十二經各有一別絡而脾又有一大絡並任督二絡為十五絡也其二十七氣相隨上下如泉之流如日月之行不得休息陰脈營於五臟陽脈營於六腑陰陽相貫如環無端其流溢之氣入於奇經轉相灌溉內溫臟腑外濡腠理奇經凡八脈不拘制於十二正經無表裡配合故謂之奇蓋正經猶溝渠奇經猶河澤正經之脈隆盛則溢於奇經故秦越人比之天雨降下溝渠溢滿滂沛妄行流於河澤此靈素未發之旨也八脈陽維起於諸陽之會由外踝而上行於衛分陰維起於諸陰之交由內踝而上行於營分所以為一身之綱維也陽蹺起於跟中循外踝上行於身之左右陰蹺起於跟中循內踝上行於身之左右所以使機關之蹺捷也督脈起於會陰循背而行於身之後為陽脈之總督故曰陽脈之海任脈起於會陰循腹而行於身之前為陰脈之承任故曰陰脈之海衝脈起於會陰夾臍而行直衝於上為諸脈之衝要故曰十二經脈之海帶脈則橫圍於腰狀如束帶所以總約諸脈者也是故陽維主一身之表陰維主一身之裡以乾坤言也陽蹺主一身左右之陽陰蹺主一身左右之陰以東西言也督主身後之陽任沖主身前之陰以南北言也帶脈橫束諸脈以六合言也故醫而知此八脈則十二經十五絡之大旨得矣絡脈論醫門法律經有十二絡亦有十二絡者兜絡之義即十二經之外城也復有胃之大絡脾之大絡及奇經之大絡則又外城之通界皇華出入之總途也故又曰絡有十五焉十二經生十二絡十二絡生一百八十系絡系絡生一百八十纏絡纏絡生三萬四千孫絡自內而生出者愈多則愈小稍大者在俞穴肌肉間營氣所主外廓徭是出諸皮毛方為小絡方為衛氣所主故外邪從衛而入不遽入於營亦以絡脈纏絆之也至絡中邪盛則入於營矣故曰絡盛則入於經以營行經脈之中故也然風寒六淫外邪無形易入絡脈不能禁止而盛則入於經矣若營氣自內所生諸病為血為氣為痰飲為積聚種種有形勢不能出於絡外故經盛入絡絡盛返經留連不已是以有取於砭射以決出其絡中之邪難經以陽蹺陰蹺脾之大絡共為十五絡遂為後世定名昌謂陽蹺陰蹺二絡之名原誤當是共指奇經為一大絡也蓋十二經各有一絡共十二絡矣此外有胃之一大絡由胃下直貫膈肓統絡諸絡脈於上覆有脾之一大絡徭脾外橫貫脅腹統絡諸絡脈於中復有奇經之一大絡徭奇經環貫諸經之絡於周身上下蓋十二絡以絡其經三大絡以絡其絡也嘗推奇經之義督脈督諸陽而行於背任脈任諸陰而行於前不相絡也衝脈直衝於胸中帶脈橫束於腰際不相絡也陽蹺陰蹺同起於足跟一循外踝一循內踝並行而鬥其捷全無相絡之意陽維陰維一起於諸陽之會一起於諸陰之交名雖曰維乃是陽自維其陽陰自維其陰非交相維絡也設陽蹺陰蹺可言二絡則陽維陰維更可言二絡矣督任沖帶俱可共言八絡矣難經云奇經之脈如溝渠滿溢流於深湖故聖人不能圖是則奇經明等之絡夫豈有江河大經之水擬諸溝渠者哉又云人脈隆盛入於八脈而不環周故十二經亦不能拘之溢蓄不能環流灌溉諸經者也全是經盛入絡故溢蓄止在於絡不能環溉諸經也然則奇經共為一大絡夫復何疑周身經絡部位歌類經脈絡周身十四經六經表裡督和任陰陽手足經皆六督總諸陽任總陰諸陽行外陰行里四肢腹背皆如此督由脊骨過齦交臍腹中行任脈是足太陽經小指藏從跟入膕會尻旁上行夾脊行分四前系睛明脈最長少陽四指端前起外踝陽關環跳里從脅貫肩行曲鬢耳前耳後連眥尾大指次指足陽明三里天樞貫乳行腹第三行通上齒環唇俠鼻目顴迎足有三陰行內廉厥中少後太交前腎出足心從內踝俠任胸腹上廉泉太厥兩陰皆足拇內側外側非相聯太陰內側衝門去腹四行兮挨次編厥陰毛際循陰器斜絡期門乳肋間手外三陽誰在上陽明食指肩髃向頰中鑽入下牙床相逢鼻外迎香旁三焦名指陽明後貼耳周回眉竹湊太陽小指行下低肩後盤旋耳顴遘還有三陰行臂內太陰大指肩前配厥從中指腋連胸極泉小內心經位手足三陽俱上頭三陰穴止乳胸遊唯有厥陰由顙後上巔會督下任流經脈從來皆直行絡從本部絡他經經凡十四絡十六請君切記須分明經脈篇止十五絡平人氣象論曰胃之大絡名曰虛里貫膈絡肺出於左乳下其動應衣是共十六絡也手太陰肺經穴分寸歌從胸至手左右二十二穴肺起中府三肋間上行寸六抵雲門腋下三寸動脈求天府俠白肘端五寸論尺澤肘中約紋是孔最腕上七寸取列缺去腕一寸半經渠寸口陷中主太淵掌後橫紋頭魚際節後散脈里少商大指內側端相離爪甲如非耳手陽明大腸經穴分寸歌從手至頭左右四十穴商陽食指內側邊二間來尋本節前三間節後陷中取合谷虎口岐骨聯陽溪腕中上側是偏歷腕後三寸安溫溜腕後去五寸下廉曲池前五寸看上廉曲池下三寸池下二寸三里逢曲池曲肘紋頭盡肘髎大骨外廉中肘上三寸尋五里臂臑髃下一寸空肩髃肩端兩骨罅巨骨肩尖義骨中天鼎頸中缺盆上扶空頰下一寸詳禾髎水溝旁五分鼻孔半寸號迎香足陽明胃經穴分寸歌從頭至足左右九十穴胃之經兮足陽明承泣目下七分尋承下三分名四白巨髎鼻孔旁八分地倉挾吻四分近大迎頷下寸三程頰車耳下八分穴下關耳前動脈行頭維神庭旁四寸五分人迎結喉旁寸半真水突筋前直迎下氣舍喉下一寸乘缺盆舍下橫骨陷氣戶璇璣四寸旁庫房屋翳及膺窗乳中乳根穴寸六量自庫房至乳根左右十穴各去一寸六分不容巨闕旁二寸再下寸五承滿屯承滿下一寸梁門起關門太乙滑肉門天樞須認臍旁是樞下一寸取外陵下至大巨水道穴歸來氣街一寸憑自梁門以下至氣街左右二十穴各去一寸髀關膝上尺有二伏兔膝上六寸登陰市膝上方三寸梁丘離膝二寸稱犢鼻膝臏尋陷中膝下三寸三里興里下三寸上廉穴再下二寸條口應下廉條下一寸是踝上八寸覓豐隆解溪足腕陷中的溪下寸半衝陽通陷谷庭後還二寸內庭次指外陷中厲兌大次指端上去爪如韭井穴空足太陰脾經穴分寸歌從足至腹左右四十二穴大指內側脾隱白節後陷中求大都太白內側核骨下節後一寸公孫呼商丘內踝微前陷踝上三寸三陰交再上三寸漏谷是膝下五寸地機朝膝下內側陰陵泉血海膝臏上內廉箕門穴在魚腹上動脈應手越筋間衝門橫骨兩端動府舍再上七分看腹結府舍上三寸腹結穴在衝門上三寸七分大橫下一寸三分大橫臍旁三寸半腹哀巨闕旁六寸食竇乳邊寸半算天溪胸鄉周榮貫相去一寸六分同自食竇至周榮左右八穴各去一寸六分開中六寸大包腋下有六寸季脅中間大絡通手少陰心經穴分寸歌從胸至手左右十八穴少陰心起極泉穴腋下筋間動引胸青靈肘上三寸取少海屈肘五分供靈道掌後一寸半通里腕後一寸蹤陰郤腕後方半寸神門掌後鋭骨隆少府小指本節末小指內側取少衝手太陽小腸經穴分寸歌從手至頭左右三十八穴小指端外為少澤前谷節前看外側節後橫紋取後溪腕骨腕前骨陷側陽谷鋭骨下陷處腕上一寸名養老支正腕後量五寸小海肘端五分好肩貞肩端後陷中臑腧大骨下陷考天宗肩大骨下陷秉風肩上舉有空曲垣肩中曲胛里外腧胛上一寸從肩中腧大椎旁二寸天窗頰下動脈詳天容耳下曲頰後顴髎面頄鋭骨量聽宮耳內如珠子俱屬小腸手太陽足太陽膀胱經穴分寸歌從頭至足靈樞經脈篇馬氏注止有一百二十六穴今較正得左右一百三十四穴足太陽兮膀胱經目眥內角始睛明眉頭陷中取攢竹額下眉衝動脈輕曲差神庭旁寸半五處挨排列上星上星旁一寸半承光通天絡卻玉枕穴後循一寸五分行天柱項後髮際內大筋外廉之陷中自此脊中開二寸第一大杼二風門三椎肺腧厥陰四心五督六膈七論肝九膽十脾十一胃腧十二椎下捫十三三焦十四腎氣海腧在十五究大腸腧當十六椎關元腧穴十七記十八椎下小腸腧十九椎邊號膀胱中膂內腧二十椎白環二十一椎當上次髎與中下髎腰胯骨下八空昭十六椎至十八椎處俠脊高起之骨名腰髎骨會陽陰尾尻骨旁背部二行諸穴了又開脊中三寸半第二椎下為附分三椎魄戶四膏肓五椎之下神堂欣噫嘻六椎膈關七魂門第九陽綱十十一意舍脾相應十二胃倉穴推循十三肓門正坐取十四志室不須論十九胞肓草秩邊背部三行諸穴勻承扶臀下陰紋處下行六寸是殷門浮郤斜上殷一寸委陽還下並殷門委中膝膕約紋里