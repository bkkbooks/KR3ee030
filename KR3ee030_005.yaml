body:
  text: 卷五證治參詳中風門有補遺中風風邪入臟以致氣塞涎壅不語昏危百會風池大椎肩井曲池間使足三里凡覺心中憒亂神思不怡或手足頑麻將有中風之候速針灸以上穴中風卒倒不醒神闕用淨鹽炒乾納於臍中令滿上加厚姜一片灸百壯至五百壯姜焦則易之或以川椒代鹽或用椒於下上蓋以鹽再蓋以姜灸之亦佳丹田氣海二穴俱連命門實為生氣之海經脈之本灸之皆有大效目戴上足太陽之證目上視上視之甚而定直不動者名戴眼也神庭絲竹空人中景岳全書曰治目睛直視脊骨三椎並五椎上各灸七壯齊下火立效背反張風氣乘虛入於諸陽之經則腰脊反折攣急如角弓之狀一名角弓反張也百會神門間使太衝僕參又法針啞門風府口噤手三陽之筋結入於頷頰足陽明之筋上夾於口風寒乘虛而入其筋則攣故令牙關急而口噤也人中承漿頰車合谷口眼喎斜此由邪犯陽明少陽經絡水溝承漿頰車針向地倉地倉針向頰車聽會客主人合谷凡口喎向右者是左脈中風而緩也宜灸左喎陷中二七壯艾炷如麥粒喎向左者是右脈中風而緩也宜灸右喎陷中二七壯喑啞心受風故舌強不語風寒客於會厭故卒然無音又有腎脈不上循喉嚨挾舌本則不能言此腎虛熱痰靈道魚際陰谷復溜豐隆中風無汗惡寒針至陰出血崑崙陽蹺中風有汗惡風針風府以上二症太陽經中風也中風無汗身熱不惡寒中風有汗身熱不惡風針陷谷去陽明之賊針厲兌瀉陽明經之實熱以上二症陽明經中風也中風無汗身涼針隱白去太陰經之賊也此症太陰經中風也中風有汗無熱針太谿此症少陰經中風也中風六症混淆系之於少陽厥陰或肢節攣痛或木不仁者厥陰之井大敦針以通其經少陽經之絕骨灸以引其熱也凡初中風跌倒卒暴昏沉痰涎壅滯牙關緊閉者急以針刺手指上十二井穴去惡血又治一切暴死惡候及絞腸痧症少商二穴商陽二穴中衝二穴關衝二穴少衝二穴少澤二穴癱瘓此由將息失宜心火暴甚腎水虛不能制之則陰虛陽實而熱氣怫鬱心神昏冒筋骨不用而卒倒無知也肩井肩髃曲池陽谿合谷中渚風市陽陵泉陽輔崑崙足三里半身不遂此由氣血不周一名偏枯是也或但手不舉口不能言而無他症者此中經也各隨其經絡俞穴而針灸之兼用藥補血養筋方能有效百會肩井肩髃曲池手三里列缺風市絕骨足三里以上穴先針無病手足後針有病手足痙病一名痓病痙者強也千金云太陽中風重感寒濕則變痙蓋太陽中風身必多汗或衣被不更寒濕內襲或重感天時之寒地氣之濕因而變痙風挾寒則血澀無汗為剛痙風挾濕則液出有汗為柔痙亦有血虛筋脈無所榮養而成痙者筋急而縮為瘛筋弛而緩為縱伸縮不已為瘛瘲俗謂之搐搦是也有補遺百會風池曲池合谷復溜崑崙太衝癇病有補遺羊癇目上竄作羊聲即心癇也馬癇張口搖頭身體反折按古五癇之名無馬癇別錄有馬癇而無犬癇一云心癇目瞪吐舌彷彿馬鳴馬屬火亦屬心也雞癇張口前僕提住即醒即肺癇也一云驚跳反折手瘲其聲如雞又巽為雞屬木金剋木也犬癇反折上竄其聲如犬犬屬木即肝癇也牛癇直視腹滿聲如牛吼即脾癇也豬癇吐涎沫如綿作豬聲即腎癇也以上癇症大率痰熱驚三者所致百會神庭上星風府風池絲竹空神門肺俞一本心俞誤巨闕鳩尾上脘神闕陽陵泉陽輔發於晝者陽蹺發於夜者陰蹺按癇病僕時身軟或作六畜聲若中風中寒之類則仆地無聲醒時無涎沫亦不復發痙病雖時發時止必身體強直反張如弓為辨癲狂癲即癡病有補遺癲多喜病在心脾包絡時作時止常昏倦陰主靜也狂多怒病在肝膽胃經少臥而不飢逾坑上屋者陽盛則四肢實也人中治笑哭間使神門治癡呆後谿申脈下巨墟治狂衝陽男灸此癲狂並治骨骶灸二十壯治癲兩手足大指左右相併用繩縛定艾炷灸兩指歧縫中七壯須甲肉四處著火病者哀告我自去為效又孫真人十三鬼穴挨次針之如偏穴男先針左女先針右人中少商隱白太陵申脈風府頰車承漿勞宮上星會陰曲池舌下中縫橫箸一枚於口令舌不動刺出血效大成曰凡男婦或歌或笑或哭或吟或多言或久默或朝夕嗔怒或晝夜妄行或口眼俱斜或披頭跣足或裸形露體或言見鬼神如此之類乃飛蟲精靈妖孽狂鬼百邪侵害也欲治之時先要愉悅書符定神禱神然後行針愉悅謂病家敬信醫人醫人誠心療治兩相喜悅邪鬼方除若主惡砭石不可以言治醫貪貨財不足以言德書符先用硃砂書太乙靈符二道一道燒灰酒調病人服一道貼於病人房內書符時念小天罡咒唸咒先取氣一口次念天罡大神日月常輪上朝金關下覆崑崙貪狼巨門祿存文曲廉真武曲破軍輔弼大周天界細入微塵玄黃正氣速赴我身所有凶神惡殺速赴我魁之下毋動毋作急急如律令定神謂醫與病人各正自己之神禱神謂臨針之時閉目存想一會針法心思神農黃帝孫韋真人儼然在前密言從吾針後病不許復乃掐穴咒曰大哉乾元威通神天金針到處萬病如拈吾奉太上老君急急如律令屍厥有補遺屍厥陰陽逆也其狀如瓦猶微有息而不恆脈尚動而形無知也脈沉大而滑身溫而汗此為入府氣復自愈若唇青身冷此為入藏即死手冷過肘足冷過膝者死指甲青黑者死人中針入至齒百會間使列缺期門巨闕氣海金門厲兌大都隱白大敦一屍厥卒忤中惡等證在乳後三寸男左女右灸之五邪治法人虛即神遊失守使鬼神外干令人暴亡肝虛者見白屍鬼丘墟刺三分得氣則補留三呼腹中鳴者可治肝俞刺三分得氣氣留補心虛者見黑屍鬼陽池刺三分留一呼次進一分留三呼徐出捫穴心俞刺三分得氣留補即蘇脾虛者見青屍鬼衝陽刺三分得氣則補留三呼徐出捫穴脾俞刺三分留二呼氣至徐徐退針即蘇肺虛者見赤屍鬼合谷刺三分得氣則補留三呼退一分徐出針肺俞刺一分半得氣留補徐徐出針腎虛者見黃屍鬼京骨刺一分半留三呼進三分留一呼徐出捫穴腎俞刺三分得氣則補留三呼徐出捫穴張景岳曰凡犯屍鬼暴厥不省人事若四肢雖冷無氣但覺目有神采心腹尚溫口中無涎舌不卷囊不縮汗不出及未過一時者尚可刺之復甦刺法用毫針先以口含針令溫暖而刺之則經脈之氣無拒逆也傷寒熱病門有補遺頭痛身熱風池風府上星攢竹懸顱商陽魚際神道期門足三里陷谷太谿一名呂細汗不出腕骨陽谷合谷瀉復溜補汗出寒熱風池五處攢竹上脘少商合谷補復溜瀉熱無度汗不出陷谷泄陽明之熱大煩熱晝夜不息刺十指間出血謂之八關大刺惡寒後谿喘三間結胸藏氣閉而不流布也按之痛為小結不按自痛為大結肺俞期門熱入血室譫語期門腹脹三里內庭發狂此陽明胃經邪熱熾盛燥火鬱結於中所致百會合谷間使足三里復溜鬱冒郁為氣不舒冒為神不清即昏迷也關衝少澤竅陰至陰厥三陰三陽之脈俱相接於手足陰主寒陽主熱陽氣內陷不與陰氣相順接則手足厥冷也支溝內庭太谿大都行間若脈絕者間使氣海復溜餘熱不盡曲池間使合谷後谿過經不解期門發黃陽明瘀熱在裡身必發黃大率溫熱之黃如橘色寒濕之黃如熏色外關腕骨申脈湧泉小便不利邪蓄於內津液不行也陰谷陰陵泉關元寒鬱不通者用炒熱鹽熨關元石門陰寒甚小便不利囊縮腹痛欲死者灸石門大便秘塞章門照海瘟疫瘟疫六七日不解以致熱入血室發黃身如煙燻目如金色口燥而熱結砭刺曲池出惡血或用鋒針刺肘中曲澤之大絡使邪毒隨惡血而出極效大頭瘟因風熱時邪凡憎寒發熱咽喉腫痛頭目面部腫及於耳結塊則止不散必出膿而後愈外科有時毒證即此也甚至項肩俱腫狀如蝦蟆故又名蝦蟆瘟也有補遺大迎曲池合谷瘧疾證治詳見刺瘧論篇此特通用刺灸要穴痰瘧寒熱合谷曲池後谿久瘧熱多寒少間使太谿丘墟治振寒久瘧不食公孫內庭商丘治嘔瘧由寒濕飲食傷脾若久不愈黃瘦無力者灸脾腧七壯凡治瘧先針而後灸大椎三七壯一日三壯愈又灸三椎骨脊上三壯暑病有補遺中暑暑乃天之氣所以中手少陰心經初病即渴其脈虛弱人中中脘氣海曲池合谷中衝三里內庭暑郁中焦腹痛上下攻絞不得吐瀉用生熟水調白礬三錢少頃探吐去其暑毒如胸背四肢發紅點者以菜油燈火遍淬之痧症黑痧腹痛頭疼發熱惡寒腰背強痛白痧腹痛吐瀉四肢厥冷十指甲黑不得睡臥黑白痧頭疼發汗口渴泄瀉惡寒肢冷不得睡臥或腸鳴腹響名絞腸痧也百勞列缺十宣委中以上刺痧通用天府黑痧兼刺之太陵大敦白痧兼刺之竅陰黑白痧兼刺之中脘丹田治小腹絞痛又痧有青筋紫筋或現於數處或現於一處必用針刺放去其毒血或有誤飲熱湯則青紫筋反隱而不現即放之毒血不流此當急飲冷水以解之然後再放而血流再刮而痧出或有痧毒方發而為食物積滯所阻此當先消食積而再放刮或有痧毒方發兼遇惱怒氣逆則愈作脹此當先用破氣藥以順之而再放刮則痧可漸消也若刮已到放已盡而不愈則是痧毒惟在腸胃肝脾腎二陰經絡必須據症用藥放痧有十頭頂心百會穴印堂兩太陽穴喉中兩旁舌下兩旁兩乳兩手十指頭十宣穴兩臂彎兩腿彎兩足十指頭霍亂霍亂揮霍撩亂也邪在上焦則吐在下焦則瀉在中焦則吐瀉交作此濕霍亂易治若不能吐利邪不得出壅遏正氣關格陰陽也至於舌卷陽縮入腹者不治又霍亂為胃氣反逆誤犯穀食米飲必死關衝支溝委中承山三陰交公孫太白太谿吐瀉神效夾脊穴吐瀉不止者中脘天樞氣海或針或灸立愈霍亂將死者以細白乾鹽填滿臍中艾灸七壯立蘇噁心嘔吐噦病見補遺噁心胃口有邪見飲食便生畏惡心下欲吐不吐若寒氣噁心者嘔清水痰火噁心嘔酸水煩渴胃俞幽門中脘商丘嘔吐吐屬太陽有物無聲乃血病也嘔屬陽明有物有聲氣血俱病也太淵太陵兩乳穴即乳根灸三壯中脘氣海足三里通谷翻胃噎隔有補遺翻胃上焦吐者氣上衝胸食已即吐中焦吐者胸中痞悶或先痛後吐或先吐後痛下焦吐者朝食暮吐暮食朝吐四肢冷小便清大便不通或飲食後兩日吐者脾絕胃枯不可治也隔俞脾俞上脘中脘各灸二七壯天樞氣海三里太白噎病憂噎胸中痞滿氣逆時嘔食不下思噎心悸善忘氣噎心下痞噎噦不食胸背痛勞噎氣上膈支滿背痛食噎食急胸痛不得喘息噎是神思間病惟內觀靜養者可治天突胃俞中脘氣海三里膏肓俞脾俞思噎更效膻中治氣噎膈俞治勞噎三消三消證三焦受病也上消屬肺大渴引飲以上焦之津液枯涸名曰膈消亦曰消渴中消屬胃多食善飢而曰漸消瘦名曰消中亦曰消穀下消屬腎煩躁引飲面黑耳焦溺如膏名曰腎消亦曰內消是皆心胃之火上炎真陰不足也承漿金津玉液腎俞咳嗽哮喘門咳嗽有聲無痰曰咳傷於肺氣也有痰無聲曰嗽動於脾濕也有聲有痰名曰咳嗽因傷肺氣復動脾濕也天突膻中乳根三壯風門肺俞經渠列缺魚際前谷三里咳逆因喘咳以至氣逆咳嗽之甚者也肺俞肺募太陵三里行間一法刺期門風勞百病風勞初起原因咳嗽鼻塞久則風邪傳裡漸變成勞在表令人自汗在裡令人內熱在肺咳嗽在肝吐血在脾體瘦在腎遺精肩井灸二百壯哮哮病有五水哮飲水則發氣哮怒氣所感痰飲壅滿則發咸哮多食鹹味則髮乳哮小兒初生便哮酒哮醉酒行房所致飲酒則發水哮乳哮酒哮俱難治天突華蓋膽中俞府三里肩中俞治風哮又法以線一條套頸上垂下至鳩尾尖截斷牽往後脊中線頭盡處是穴灸七壯效小兒咸哮男左女右手小指尖上用小艾炷灸七壯無不除根喘凡喘促而喉中如水雞聲者謂之哮氣急而連續不能以息者謂之喘氣喘不能臥風冷久嗽六椎下靈臺灸三壯愈諸喘氣急七椎下至陽灸三壯虛勞門有補遺骨蒸寒熱蒸上則見喘咳痰血唇焦面紅耳鳴目眩肺痿肺癰蒸中則見腹肋脹痛體倦肉瘦多食而飢蒸下則見遺精淋濁瀉泄燥急腰疼腳瘦陰莖自強肺俞膏肓俞足三里四花穴令病人平身正立用草一條納長三四尺一頭與足中指端一作大指比齊順腳心至後跟貼肉直上比至曲瞅大紋截斷次令病人正坐解發分頂卻將此草自鼻尖量從頭正中循項背貼肉垂下至草盡處用墨點記又取短草一條雙摺按定鼻柱根左右分開至兩口角截斷如人字樣展直取中橫加於背脊墨點上兩邊草盡處為第一次應灸二穴即五椎心俞心主血故灸之隨年紀多灸一壯累效如人三十歲灸三十一壯又取前所量足之草中折正按結喉上其草兩頭垂脊間至盡處以墨點記次以前所量短草亦如前法橫加於墨點上兩邊草盡處為第二次應灸二穴即七椎膈俞靳曰血會膈俞蓋骨蒸勞熱血虛火旺故灸之崔知悌立四花穴法而不指穴名為粗工吉也如婦人纏足者以草自右膊肩髃穴起伸手貼肉量至中指頭截斷以代量足之法凡男婦五五勞七傷肌肉削瘦盜汗潮熱煩躁咳嗽吐血等證初灸七壯或二七壯三七壯再灸膏肓二穴按類經圖翼云四花上二穴近五椎心俞下二穴近九椎肝俞而依其法度之未合大成云上二穴膈俞下二穴膽俞依其法度之亦不合今與資生灸勞穴等法較正如上骨熱不可治前板齒乾燥灸骨會大椎真氣不足灸氣海足三里注夏羸瘦凡在夏初而患頭疼足軟體熱食少者名曰注夏一作疰夏大椎肺俞膈俞胃俞中脘傳屍勞有補遺第一代蟲傷心灸心俞並上下如四花樣按四花穴又有上下二穴之法取心俞當點記五椎下次用草一條雙摺按定鼻柱根分開比至兩口角截斷如人字樣展直取中橫放點處其左右草盡處即心俞二穴又以此草取中點貼直放點處上下草盡處亦為二穴合心俞共灸四穴如灸肺俞點記三椎下為法余仿此第二代灸肺俞四穴如前第三代灸肝俞四穴如前第四代灸厥陰俞四穴如前第五代灸腎俞四穴如前第六代灸三焦俞四穴如前此症五日輕五日重輕日其蟲大醉方可灸又須請普庵咒鎮念之一凡取癆蟲可於三椎骨上一穴並膏肓俞二穴各灸七壯然後以飲食調理方下取蟲藥一灸腰眼穴法於癸亥日二更後將交夜半乃六神皆聚之時令病人解衣舉手向上略轉後些則腰間有微陷是穴正身直立用墨點記然後上床合面而臥各灸七壯或九壯十一壯其蟲必從吐瀉中而出燒煅遠棄之可免傳染此比四花等穴尤易取效失血咳血吐血有補遺間使列缺太淵魚際神門百勞風門肺俞肝俞脾俞乳根上脘三里肺痿肺癰有補遺肺痿咳嗽上氣喘急口中反有濁唾涎沫為肺痿之病肺俞灸三壯氣戶太淵肺癰咳嗽吐臭痰胸中隱隱痛自汗喘急呼吸不利便是肺癰之候尺澤太淵列缺少商合谷間使太陵支溝肺俞灸三壯庫房按金匱云熱在上焦者因咳為肺痿肺痿之病從亡津液得之為陰虛之症如咳久肺癟喉啞聲嘶咯血多不可治肺癰由感受風寒停留肺中蘊發為熱或挾濕熱痰涎蒸淫肺竅以致血為凝滯變成癰膿治法大忌溫補凡初受風寒咳嗽即見上氣喘急將成肺痿肺癰之候可施以灸法若肺痿熱已深肺癰膿已成吐出如米粥者皆不宜灸灸則助邪傷肺反為害矣頭面病頭痛風寒客於經絡令人振寒頭痛身重惡寒腦痛連兩額屬太陽頭額痛連目齒屬陽明頭額痛連耳根屬少陽太陽穴痛屬脾虛巔頂痛屬腎目系痛屬肝有補遺百會天柱真頭痛速灸此三穴風池風府前頂上星攢竹後谿腕骨少海解谿絲竹空中渚合谷頭維頭臨泣足臨泣絲竹空下治偏頭痛以上諸穴當驗邪所從來擇用之醉頭風口吐清涎眩暈或三四五日不省人事不進飲食此痰飲停於胃脘藥宜利氣化痰印堂攢竹風門膻中中脘頭旋有補遺百會絡卻目窗風池俠谿豐隆解谿甲脈至陰頭腫一名發頤腫在耳前後詳見卷六大頭瘟曲池大迎曲差完骨面腫作癢迎香合谷陷谷面目壅腫刺出血愈厲兌目病有補遺目赤腫痛赤熱時氣流行或素有目疾及痰火盛元氣虛者則傳染為累上星睛明攢竹風池合谷三間太陽目窗百會前頂絲竹空大眥痛少澤小眥痛關衝睛痛欲出十指縫中刺出血內關內庭足太陽有通項入於腦者正屬目本名曰眼系凡頭目苦痛取睛明玉枕怕熱羞明皆由火燥血熱若目不赤痛但畏明者乃肝血虧不能運精華以敵陽光之故行間眼紅腫澀爛沿睛明二間三間合谷光明風目眶爛頭維顴髎目眶赤爛俗名為赤瞎刺目眶外出血以瀉濕熱眼生翳膜翳自熱生如碎米者易散梅花瓣者難消其有赤眼與之涼藥過多又滌以水血為之凝翳不能去治宜發物使其邪動翳膜乃浮輔以退翳之藥則能自去此症受病已深未可一時針愈須如法三四次刺之睛明太陽翳風瞳子髎光明合谷命門肝俞臨泣治白翳攢竹液門後谿治赤翳又凡胡椒韭菜根橘葉菊葉之類皆可杵爛為丸用綿裹塞鼻中觸之過夜則星自落眼生倒睫拳毛目病之人脾受風邪則弦緊而外皮鬆令毛倒睫頻頻拭擦毛漸侵睛掃成雲翳藥治無效當用手扳將內眶向外以針刺出血愈青盲無所見商陽左取右右取左肝俞雀目不能夜視此肝虛也蓋木旺於寅絕於申酉戌時木氣衰甚遇夜始生至卯稍盛是以晚暗而曉復明也肝俞灸七壯又刺後穴不宜出血睛明光明臨泣三陰交迎風冷淚此由醉後當風或暴赤眼痛不忌房事恣食熱物所致頭維睛明臨泣攢竹風池液門合谷腕骨後谿婦人經行與男子交感穢氣衝上頭目亦成此證三陰交眼瞼瞤動頭維攢竹偷針眼眼內眥生小塊須視其背上有細紅點如瘡以針刺破即瘥此以解太陽之鬱熱也耳病有補遺耳聾亦名重聽有從外不能達者其病在經有從內不能通者其病在臟新聾多熱取少陽陽明久聾多虛補足少陰液門中渚外關翳風耳門後谿聽宮聽會合谷俠谿耳鳴此乃痰火上升壅閉聽戶或因腦怒而得者少陽之火客於耳也鳴不甚其脈細者多虛耳門聽會聽宮前谷腕骨陽谷絡郄腎俞聤耳生瘡形似赤肉又耳出惡水曰聤聽宮翳風耳門合谷下關鼻病有補遺鼻塞不聞香臭鼻司呼吸往來不息或因風寒閉腠理則鼻塞不利火鬱清道則香臭不知或生息肉而阻塞氣道謂之鼻齆此陽明熱滯留結也百會風府百勞上星水溝迎香通天鼻痔息肉通天囟會各灸七壯效鼻淵又名腦漏鬱熱重者時流濁涕而多臭氣謂之鼻淵熱微者鼻流清涕謂之鼽上星風府曲差人中合谷鼻衄上星風府血由此而入腦注鼻灸三壯立止二間合谷隱白又用蒜一頭搗如泥作餅如錢大一分厚貼腳心左衄貼右右衄貼左兩孔俱出左右俱貼即止舌病有補遺舌腫難言七情所郁及心經熱壅則舌腫不得息金津玉液廉泉少商行間千金曰舌腫滿口溢如吹豬胞氣息不得通須臾不治殺人刺舌兩邊大脈出血勿刺中央原病式曰熱結於舌中舌為之腫名木舌脹木者強而不柔和也嘗治一婦人木舌脹其舌滿口以䤵針銳而小者砭之五七度三日方平針所出血幾盈斗一方用蒲黃末摻之小兒重舌刺行間舌強中風痰滯每有此症啞門三間中衝行間舌緩治同上舌上黃魚際咽喉病有補遺喉痹俗作喉閉閉壅也此症先兩日胸膈氣緊出氣短促驀然喉痛手足厥冷氣閉少商將患者臂以手將下十來次取油發繩扎大拇指使血聚於指刺出血喉痹即解男先針左女先針右曲池合谷三間關衝風府天突豐隆隱白竅陰一凡咽喉腫痛閉塞水粒不下者兼以三稜針刺手大指背頭節上甲根下排刺三針雙乳鵝熱氣上行腫於喉之兩旁為雙鵝腫於一邊為單鵝此其形必圓突如乳乃癰疽之類結於喉間故多致出毒或宜刺出其血並刺後穴若毒未甚膿未成者治之自可消散若生於嚥下者難治咽在喉之後金津玉液少商單乳鵝海泉在舌下中央脈上一作廉泉誤齒牙病有補遺上爿牙疼足陽明病人中太淵衝陽呂細在內踝尖上灸二七壯下爿牙疼手陽明病承漿頰車三間合谷列缺舊名龍元一治牙痛於耳前鬢髮尖內有動脈處隨病左右用小艾炷灸五七壯神效不必貼膏如發再灸即可斷根齒齲齒腐也內經注齒痛也承漿勞宮各灸一壯小海陽谷少海合谷二間厲兌牙床腐爛齒牙脫落名曰走馬牙疳乃熱毒蘊積所致針穴同前宜服清胃瀉火之藥又用黃連五倍子煎水雞毛洗口中齦痛齒根肉曰齦角孫小海腎虛牙疼出血頰車合谷足三里太谿手足病風痹有補遺外關天井少海尺澤曲池合谷委中陽輔肩臂痛肩髃天井尺澤少海曲池三里合谷外關中渚手指拘攣陽谷一法灸膝眼穴腋肘痛或腫小海尺澤間使太陵腿叉風腿膝痠疼是也環跳風市陽陵泉一凡膝以上病灸環跳風市膝以下病灸犢鼻膝關陽陵泉三里足踝以上病灸絕骨崑崙三陰交足踝以下病灸申脈照海膝風腫痛即鶴膝風有補遺陽陵泉陽輔臨泣梁丘膝眼足三里膝關委中陰陵泉商丘太衝中封腳氣此因風寒暑濕所浸或飲酒厚味損傷脾胃濕熱下注肝腎而成其病先從氣衝穴隱核痛起濕勝者筋脈弛縱浮腫但重而不上升四肢俱寒治宜辛溫發散繼以分利祛濕熱勝者筋脈蜷縮枯細不腫四肢俱熱有時上衝治以清火降熱其濕熱分爭濕勝則憎寒熱勝則壯熱有兼頭疼身痛狀類傷寒者但初起於腳膝熱腫或屈弱不能動移為異耳凡腳氣上攻胸膈喘急嘔吐不止自汗脈短促者死入心則恍惚小腹痹脹左寸乍大乍小者死入腎則腰腳腫小便閉額黑胸滿左尺絕者死若見危候而脈未絕者以附子為末津調塗湧泉穴一法刺肩井三里太衝神應經治腳氣一風市灸五十壯二伏兔刺三犢鼻五十壯四膝眼五三里百壯六上廉七下廉百壯八絕骨寒濕腳氣解谿灸七壯效轉筋轉筋在手十指者灸手踝骨上七壯轉筋在脛骨者灸膝下廉筋上三壯腹脹轉筋者灸臍上一寸十四壯腳轉筋承山腳踝上內筋急灸內踝外筋急灸外踝痿躄筋骨軟弱不痛不癢曰痿足弱不能行曰躄由內臟虛耗血脈筋骨肌肉痿弱無力以運所致狀與柔風腳氣相類彼因風寒邪實故作腫痛痿屬血氣之虛但不任用而無痛楚不可混同風治有補遺環跳停針待氣二時方可中瀆三里足不能行三里三陰交復溜行間穿跟草鞋風崑崙丘墟商丘照海腰痛有補遺腰重痛不可忍轉側起臥不便腳膝攣痹屈伸不利灸兩腳曲䐐兩紋頭四處一齊灸各三壯用兩人兩邊同吹至火滅若午時灸了至晚或臟腑鳴或行一二次愈腰痛不可俯仰令患人正立以竹杖拄地平臍點記乃用度脊中灸隨年壯灸訖藏竹勿令人知凡腰痛不能立者須刺人中凡腰痛身之前刺足陽明原衝陽身之後刺足太陽原京骨身之側刺足少陽原丘墟通治腰痛穴腎俞白環俞腰俞委中崑崙心胸胃脘腹痛門心痛心痛在岐骨陷中胸痛則橫滿膈間胃脘痛在心之下有補遺曲澤內關太陵神門中脘諸心痛者皆少陰厥氣上衝也有熱厥心痛者甚則煩躁而吐額自汗出知為熱也其脈洪大當灸太谿崑崙各三壯謂表裡俱瀉之熱病汗不出引熱下行表汗通身出者愈也又心痛針湧泉太衝胸脅痛有補遺支溝天井太陵期門三里章門丘墟陽輔行間腋下痛或腫陽輔丘墟臨泣胃脘痛胃之上口曰賁門與心相連故胃脘當心而痛亦由痰食積氣鬱遏清陽濁陰不降阻礙道路而為痛其或滿脹或嘔吐噎氣吞酸不能食或大便難或瀉痢不止或面浮面黃本病與客邪雜見也內關膈俞胃俞商丘腹痛有補遺內關膈俞脾俞腎俞中脘三里陷谷太白商丘行間繞臍痛天樞氣海水分小腹脹滿痛陰交氣海凡臍下三十六疾小腹痛甚欲死者灸之即生三里內庭太白大敦中封陰寒腹痛欲死人有房事之後或起居犯寒致臍腹痛極者急用大附子為末唾和作餅如錢厚置臍上以大艾炷灸之如倉卒難得大附即用生薑或蔥白頭切片代之若藥餅焦或以津唾和之或另換之宜待灸至汗出體溫而止或更於氣海丹田關元各灸二七壯使陽氣內通逼寒外出手足溫脈息起則陰消而陽復矣中蠱有補遺五蠱毒注中惡不能食中脘照海凡人飲食後忽然腹中不快或煩躁如狂心腹攪痛欲吐不吐驀然僕暈面目青黑四肢逆冷涎唾沉水或嚼生豆而不知腥或嚼生礬不澀者是中蠱也積聚門有補遺脅下積氣期門章門尺澤治肺積行間治肝積伏梁環臍而痛中脘賁豚氣從少腹起氣上衝胸腹痛腎俞章門氣海關元中極痞塊氣壅塞為痞凡人飲食無節以致陽明胃氣一有所逆則陰寒之氣得以乘之而脾不及化則胃絡所出之道以漸留滯結成痞塊必在腸胃之外膈膜之間故宜用灸以拔其結絡之根上脘中脘通谷期門灸積塊在上者腎俞天樞章門氣海關元中極灸積塊在下者脾俞梁門灸諸痞塊凡灸宜先上而後下皆先灸七壯或十四壯以後漸次增加多灸為妙以上諸穴擇宜用之然有不可按穴者如痞之最堅處或頭或尾或突或動處但察其脈絡所由者皆當灸之火力所到則其堅聚之氣自然以漸解散第灸痞之法非一次便能必效須擇其要處至再至三連次陸續灸之無有不愈者一治痞須灸痞根在脊骨十三椎下當中點記兩旁各開三寸半以指揣摸覺微有動脈此即痞根也多灸左邊或左右俱灸或患左灸右患右灸左皆效長桑君針積塊癥瘕法先於塊中針之甚者又於塊頭一針塊尾一針訖以艾灸之立應塊頭二七壯塊中三七壯塊尾七壯黃疸有補遺黃疸發浮百勞膏肓俞腕骨中脘三里陰陵泉治酒疸丹田治色疸遍身面目俱黃小便黃赤或不利脾俞然谷湧泉並以上各穴選用脾疸口甘病脾俞陰陵泉膽疸口苦病膽俞日月陽陵泉腫脹門有補遺水腫陽水先腫上體肩背手膊手三陽經陰水先腫下體腰腹脛胕足三陰經腫屬脾脹屬肝腫則陽氣猶行如單脹而不腫者名蠱脹為木橫剋土難治腫脹朝寬暮急為血虛暮寬朝急為氣血兩虛腫脹由心腹而散四肢者吉由四肢而入心腹者危男自下而上女自上而下者皆難治胃俞腎俞神闕水分以上宜灸水溝足三里解谿公孫陰陵泉復溜中封曲泉以上隨宜灸刺單腹脹脾俞水分公孫復溜行間血鼓脾俞腎俞足三里復溜行間瀉痢胃泄色黃飲食不化胃俞脾泄腹脹滿泄注食即嘔吐逆脾俞大腸泄色白食已窘迫腸鳴切痛大腸俞小腸泄溲澀便膿血少腹痛小腸俞大瘕泄腹痛裡急後重數至圊而不能便莖中痛瘕結也天樞水分以上名為五泄腎泄五更溏泄久而不愈氣海關元洞泄不止腎俞中脘中氣虛寒腹痛瀉痢天樞神闕水泄有渴引飲者是熱在膈上水多入則下膈入胃中胃中本無熱不勝其水名曰水恣故使米穀一時下此證當灸大椎二五壯立已如用藥宜車前子擂丸白朮茯苓之類及五苓散可選用之又諸瀉痢入胃名曰溢飲渴能飲水水下復瀉而又渴此無藥症當灸大椎疝氣有補遺疝屬肝經濕熱痰瘀乘虛下流作病又因外寒所鬱氣不得通筋脈收引則痛或酒色無節濁氣流入下部或勞碌或遇寒發作有時或有形結於小腹不能頓消乃濕熱為標腎虛為本其證或有形如瓜或有聲如蛙有小腹痛連睪丸者有痛在下部一邊者濕熱須分多少而治受熱則挺縱不收受寒則牽引作痛受濕則腫脹下墜肝俞氣海關元中極三陰交外陵在臍左右各開一寸五分灸疝立效永不再發歸來大敦行間太衝闌門一名泉陰一法關元旁三寸青脈上灸七壯即愈左患灸右右患灸左一法令病人合口以草橫量兩口角為一折照此再加二折屈成三角如字樣以上角安臍中兩角安臍下兩旁當下兩角處是穴左患灸右右患灸左左右俱患兩穴俱灸艾炷如麥粒灸十四壯或三七壯神效陰頭腫痛不可忍者卒疝也婦人陰中痛皆刺大敦行間二陰病遺精夢交而出精者謂之夢遺無夢而泄精者謂之滑精膏肓俞腎俞中極以上灸隨年壯三陰交曲泉兼膝脛冷痛者效中封又精宮二穴在十四椎下旁開中三寸灸七壯效白濁腎俞關元中極陽痿此乃腎與膀胱虛寒之症腎俞氣海多灸妙小便不禁此常常出而不覺也蓋膀胱火邪妄動水不得寧故不禁而頻來宜補腎膀陰血瀉火邪為主有睡中遺溺此為虛證嬰兒脬氣未固老人下元不足皆有此患但小兒挾熱者多老人挾寒者多不可不辨氣海小兒遺溺灸亦效關元陰陵泉大敦五淋氣淋小便澀常有餘瀝石淋莖中痛溺如砂石又名砂淋血淋溺血遇熱即發膏淋便出如膏勞淋勞倦即發痛引氣衝有補遺間使氣海關元石門陰陵泉一用白鹽炒熱填滿臍中艾炷灸七壯或灸三陰交即愈小便閉癃閉不通也癃即淋瀝也小腸俞陰交當膀胱之上故灸此陰陵泉大便秘結章門太白照海脾虛不大便三陰交灸三十壯商丘脫肛此由氣血虛而下陷臍中灸隨年壯長強三壯水分灸百壯治洞泄脫肛若兼濕熱者宜用五倍子明礬各三錢研末水二碗煎沸熱洗立收脫肛三五寸者洗過再用赤石脂為末以油紙托上四圍皆摻之妙便血病在胃與大腸故名腸風亦名藏毒糞前者謂之近血糞後者謂之遠血皆由濕熱下注也中脘氣海凡血脫色白飲食少進脈濡弱手足冷灸此二穴妙一凡便血諸治不效者但取脊骨中與臍相平按高凸之處覺痠疼者灸七壯即止如復發再灸七壯永可除根至於衄血一切血症百治不效者經灸永不再發一法於脊間二十椎下灸隨年壯痔漏痔疾若破謂之痔漏大便秘澀必作大痛二白在掌後四寸長強承山復溜商丘又灸十四椎下各開一寸治腸風諸痔效腋氣胎生腋氣先用快刀剃去腋毛淨乃用好定粉水調搽腋下六七日後看有一點黑者必有孔如針大或如簪尖即氣竅也用艾炷如米大者灸三四壯愈癰疽門有補遺凡瘡瘍可灸刺者須分經絡部分血氣多少俞穴遠近或刺或灸泄其邪氣若從背出者當從太陽經至陰通谷束骨崑崙委中五穴選用從鬢出者當從少陽經竅陰俠谿臨泣陽輔陽陵泉五穴選用從髭出者當從陽明經厲兌內庭陷谷衝陽解谿五穴選用從腦而出者初覺腦痛不可忍且欲生瘡也當灸刺絕骨脈浮者從太陽經依前選用脈長者從陽明經依前選用脈弦者從少陽經依前選用井主心下滿瘡青色榮主身熱瘡赤色俞主體重節痛瘡黃色經主咳嗽寒熱瘡白色合主氣逆而泄瘡黑色隨經病而有此症者或宜灸宜刺以泄邪氣凡瘡瘍已覺微漫腫硬皮色不變脈沉不痛者當外灸之引邪氣出而方止如已有膿水者不可灸當淺刺之淺者亦不灸隔蒜灸法用大蒜頭去皮切三分厚片安瘡上以艾炷於隔蒜灸之每五壯換一蒜片或三五十壯或一二百壯如痛者灸至不痛不痛者灸至痛痛者為良肉不痛者為毒氣初灸知痛而後反不痛者毒氣深重多灸為妙先不痛而後覺痛毒氣輕泄如瘡大用蒜搗爛攤患處將艾鋪上燒之蒜敗再換治癰疽初起或痛或不痛或麻木等症或陰毒紫白色不起發不痛不作膿者尤宜多灸仍服托裡之劑如灸後仍不痛或不作膿不起發者不治此氣血虛也背疽漫腫無頭者用濕紙貼腫處一點先干處乃是瘡頭以前法灸之凡用蒜取其辛而散用艾炷取其火力能透灸後瘡潰以膏貼之自愈附子餅灸法潰瘍氣血俱虛不能收斂或因風寒襲之血氣不能運行生肌用炮附子去皮臍研末以唾津和為餅置瘡口上將艾炷於餅上灸之每日灸數壯但令微熱勿令痛如餅乾再用唾津調和視瘡口活潤為度或用炮附子去皮臍切三分厚片如前灸法兼服大補氣血之藥至肉平為度若瘡久成漏內有膿管者灸數日後仍用針頭散蝕腐之方見景岳全書騎竹馬灸穴法以男左女右手臂豎起用薄篾一條自臂腕中橫紋起貼肉量至中指齊肉盡處截斷為則次另用篾量中指取定同身寸二寸然後用木凳兩條擺開約四五尺將大竹槓一條兩頭擱在凳上令病人脫衣正身騎在竹槓中足不著地使人扶定勿令傴僂古令病人騎竹槓使兩人扛起不若用凳擱穩也將前量臂之篾一頭定著竹槓從尾骶骨貼脊直上至篾盡處點記然後取同身寸篾折中橫安點處兩頭盡處是穴灸七壯或五七壯此二穴乃心脈所過之處凡癰疽惡瘡皆心火留滯之毒灸則心火流通而毒自散矣發背肩井騎竹馬穴項上偏枕風門灸二七壯疔瘡初如粟米次如赤豆頂凹堅硬或痛癢麻木或寒熱頭痛面口合谷手上曲池背上肩井委中三里凡疔用隔蒜灸法甚則以蒜膏遍塗四圍只露毒頂用艾著肉灸之以爆為度如不爆者難愈更宜多灸至百壯無不愈者疔瘡初發必用鈹針刺入瘡心四五分挑斷疔根令出惡血針入疔根堅硬如鐵者為順綿軟而不知痛者為逆生項以上者屬三陽經不宜灸火日生疔亦禁灸若初起失治或房勞遺精及食椒酒雞魚豬首等發物以致毒氣內攻走黃不住瘡必塌陷按經尋之有一芒刺直豎乃是疔苗急用針刺出惡血即在刺處用艾灸三壯以宣餘毒乳癰乳房紅腫熱痛十四日成膿乳疽初起寒熱往來乳房堅硬木痛月餘成膿乳房屬足陽明胃經乳頭屬足厥陰肝經男子房勞恚怒傷於肝腎婦人胎產憂鬱損於肝脾皆能致之焮熱痛甚者並宜隔蒜灸乳岩鬱悶則脾氣阻肝氣逆遂成隱核不痛不癢一二載始潰或五六年後方見外腫紫黑內漸潰爛亦有數載方潰而陷下者皆曰乳岩最難治療肩髃靈道各灸二七壯溫溜大人二七壯小人七壯足三里條口治癰下巨墟各灸二七壯足臨泣胃癰生於左者曰胃口疽生於右者曰胃口癰曲池灸三七壯內關七壯腎癰自腎俞穴起會陽灸二七壯腸癰小腹重強按之痛小便如淋汗出惡寒身皮甲錯腹皮急如腫狀脈洪數者膿已成若大便膿血為直腸癰易治或繞臍生瘡或臍間出膿為盤腸癰難治一方用生菜油日幾服有效以其利腸解毒也大腸俞陷谷太白千金方屈兩肘正肘頭銳骨灸百壯下膿血而安大陽脈合曲池小腸脈合小海故灸此流注生於四肢關節或胸腹腰臀初發漫腫不紅用蔥頭細切杵爛炒熱敷患處冷則用熱物熨之多熨為妙或鋪艾灸之亦效若熱痛漸至透紅一點即宜用針開破出膿蜣螂蛀一名僵螂蛀手指骨節堅腫形如蟬肚不紅不腫屈伸艱難日久方知木痛此體虛人由濕痰寒氣凝滯而成初宜服六君子湯外以陽燧錠于堅處灸之自消若失治而堅腫漸爛膿如清水潰久則不能收功陽燧錠蟾酥末硃砂末川烏末草烏各五分末直殭蠶一條末用硫黃一兩五錢置杓內微火烊化次入前藥末攪勻再入麝香二分冰片一分攪勻即傾入濕瓷盆內速蕩轉成片俟冷收瓷罐內用時取甜瓜子大一塊紅棗肉黏於灸處用燈草蘸油點火淬藥錠上灸五壯或七壯九壯候起小疱用線針串破出黃水須貼萬應膏其毒即消如風氣痛用箸子於骨縫中按之痠痛處以墨點記灸之瘰癧瘰癧者結核是也或在耳前後連及頤頷下至缺盆皆為瘰癧或在胸及胸之側下連兩脅皆為馬刀手足少陽主之此經多氣少血故多堅而少軟膿白而稀如泔水狀又獨形而小者為結核續斷連結者為瘰癧形長如蛤者為馬刀此本膏粱火熱之變有因虛勞氣鬱所致治宜補形氣調經脈不必潰發但令熱氣散其瘡自消肩髃曲池合谷手陽明支溝天井手少陽少海手少陰天池手厥陰大迎足三里癧瘡出於頰下取足陽明淵液陽輔足臨泣太衝腋腫馬刀癰取足少陽厥陰以上凡毒深者灸後再二三次報之愈癧初生時男左女右灸風池亦效一灸瘰癧用獨蒜切如錢厚片先從後發核上灸起至初發母核而止多灸自效灸後可服煎藥一劑用牙皂七個殭蠶七條栝蔞一個連皮子切碎五味子一歲一粒以水二鍾煎熟外加生大黃三五錢量人虛實用之一服即消一治瘰癧不問已潰未潰灸肘尖穴以手仰置肩上微舉起則肘骨尖自見即是灸處灸七壯三次瘡自除在左灸左在右灸右瘤贅瘤者留也若怒動肝火血涸而筋攣者自筋腫起按之如筋久而或有赤縷名曰筋瘤若勞役火動陰血沸騰外邪所搏而為腫者自肌肉腫起久而有赤縷或皮俱赤者名曰血瘤若鬱結傷脾肌肉消薄外邪所搏而為腫者自肌肉腫起按之實軟名曰肉瘤若勞傷肺氣腠理不密外邪所搏而壅腫者自皮膚腫起按之浮軟名曰氣瘤一云有時牽痛者若勞傷腎水不能榮骨而為腫者自骨腫起按之堅硬名曰骨瘤一名石癭五瘤之外又惟粉瘤為最多蓋腠理津沫偶有所滯聚而不散則漸以成瘤是亦粉刺之屬但有淺深耳深者在皮里漸大成瘤也向一人於眼皮下沿生一小瘤初如米粒漸大如豆用鑽針三四枚翻轉眼皮刺其膜少少出血如此二三次其瘤日縮竟得漸消又一人於手臂上生一瘤漸大如龍眼其人用小艾於瘤上灸七壯竟爾漸消不長或隔蒜灸之凡有生此物者當以上二法酌宜用之大都筋病宜灸血病宜刺或有以蘿菔子南星朴硝之類敷而治之亦可暫消若欲拔根無如前法癭瘤頸瘤曰癭瘤氣赤瘤丹熛皆熱勝氣也風池灸百壯大椎天突一切癭瘤初起灸大妙肩髃男左灸十八壯右灸十七壯女右灸十八壯左灸十七壯氣舍臑會雲門天府疣痣疣音由贅也痣音志黑子也當疣上灸三壯即消亦有隻灸一壯以水滴之自去者又灸手中指節宛宛中疣痣皆效癮疹疥癬癮疹皮膚枯燥風氣相搏則生癮疹身體瘙癢凡人汗出不可當風露臥及浴後出早使人身振寒熱以生風疹也肩髃曲池合谷曲澤手三里環跳疥瘡癬瘡曲池合谷間使太陵足三里委中百蟲窠行間癘風有補遺癘風俗稱大麻風濕熱在內而為風鼓之則肌肉生蟲白屑重疊瘙癢頑麻甚則眉毛脫落鼻柱崩壞不可為矣須令病人斷酒戒色清心寡慾忌食發風動氣葷腥鹽醬炙爆生冷之物止食淡飯白粥白煮時菜而已愈後亦須守禁否則再發不救承漿灸七壯灸瘡愈再灸以疏陽明任脈則風熱息而蟲不生矣委中刺出血二三合黑紫圪搭上刺出惡血若毒在外者刺遍身患處及兩臂腿腕兩手足指縫各出血隔一二日更刺之血赤為度毒蟲邪狗咬傷蛇蠍蜈蚣咬傷中毒痛極者急用艾火於傷處灸之拔散毒氣即安或用蒜片貼肉灸之毒甚者灸五十壯服紫金丹更妙邪狗咬傷有補遺孫真人曰春末夏初犬多發狂被其咬者無出於灸即就咬處牙跡上灸之一日灸三壯灸至一百二十日乃止宜常食炙韭菜永不再發一法速用艾火灸咬處三十五壯甚者灸百壯婦人病門經不調氣海三陰交間使治結塊中極治漏下照海經不行血崩此證多因血熱而兼氣不能收攝所致亦有上焦壅塞氣不疏通而血暴崩於下者腎俞氣海關元中極俱灸妙三陰交赤白帶間使腎俞白環俞氣海關元中極三陰交不孕子宮關元穴左邊去中二寸中極陰挺婦人陰中突出一物長五六寸或生一物牽引腰腹痛甚不思飲食是名陰挺又名㿗疝曲泉太衝照海轉胞臍下急痛小便不通是也關元灸二七壯陰陵泉若胎漏尿出名曰遺尿治同上難產合谷三陰交崑崙一法橫逆難產急於右足小指尖頭灸三壯立產一作至陰穴艾炷如小麥一凡難產橫生死胎皆取太衝子鞠不能下合谷三陰交至陰三稜針出血橫者即轉直巨闕令正坐用人抱頭抱腰微偃針入六分留七呼得氣即瀉昏悶者立蘇一雲子手掬母心生下兒手有針痕子頂母心向前人中有針痕向後枕骨下有針痕可驗按十四經發揮曰凡人心下有膈膜前齊鳩尾後齊十一椎周圍著脊所以遮膈濁氣不使上熏心肺是心在膈上也況兒在腹中有衣胞裹之豈能破膈掬心哉胎衣不下肩井產下厥逆者針五分若覺悶亂者再針足三里中極三陰交產後惡露不止氣海中極三陰交血塊痛氣海三陰交乳汁不通膻中灸少澤欲斷產臍下二寸三分灸三壯一法灸右足內踝上一寸小兒病門面部診候左腮為肝右腮為肺額上為心鼻為脾頦為腎若色赤者熱也隨症治之目部診候目部赤色者心實熱淡紅者心虛熱青者肝實熱淡青者肝虛熱黃者脾實熱微黃者脾虛熱白而混者肺實熱目無睛光者腎虛也額上三指診候小兒半歲之間有病以名中食三指按額前眉上髮際之下兒頭在左舉右手頭在右舉左手食指為上中指為中名指為下若三指俱熱感受風邪鼻塞氣粗三指俱冷感受風寒藏冷吐瀉若食中二指熱上熱下冷名中二指熱夾驚之候食指熱胸膈氣滿乳食不消食指三關脈色孩子未至三歲看虎口三關從虎口上食指第一節為風關第二節為氣關第三節為命關即寅卯辰三關也左手之紋應心肝右手之紋應脾肺若脈見風關易治交氣關難治交命關為死症又當辨其色如獸驚三關必青水驚三關必黑黑一作赤人驚三關必赤赤一作黑若紫色主瀉痢黃色是雷驚三關脈通度乃極驚之症必死有紋或青或紅如線直者是乳食傷脾左右一樣者是驚積齊發紋有三條白主肺傷風痰或齁䶎聲青主傷寒及嗽紅主泄瀉有黑相兼主下痢紅多白痢黑多赤痢有紫相兼虎口脈紋亂乃氣不和也蓋脈紋見有五色由其病甚色能加變至於純黑者不可治矣脾肺心肝四臟俱推上為補推下為瀉何腎與四臟相反蓋四臟居上而腎居下腎虛則推四臟之氣往下以滋腎故門推下補腎水混濁則小便閉赤一往上提疏通水道而小便自清故曰推上為清小便推三關遲六腑運八卦男女俱在左手人以女屬右手獨不思右掌按以八卦則震居西兌居東艮居乾而坤居巽豈後天八卦之定理而為女子之推拿遂變其位置耶兒眼翻上者將大指甲在小天心向掌心下掐即平兒眼翻下者將大指甲在小天心向總筋上掐即平推拿雜病要穴印堂治一切驚風不語頰車治牙關緊瞳子髎治眼閉迎香治口眼俱閉少海治驚風俱宜以掐代針推外關間使止轉筋吐瀉掐陽池止頭痛清補腎水開大小便閉塞又能發汗掐總筋過天河水清心經治口瘡潮熱夜啼四肢常掣掐外勞宮治遍身潮熱肚起青筋揉之效揉勞宮動心火發汗不可輕用後谿推上為瀉主利小便推下為補腎腕骨穴止瀉往下推拂合骨穴在虎口上兩骨合縫處定驚兩手各一焦中廉治筋抽掐之即揉解谿內吊驚往後仰揉掐之膝上鬼眼穴若身後仰掐住身即正此即膝眼共四穴委中治驚時往前僕向下掐住便直僕參治腳掣跳口咬左轉揉之止吐右轉揉之止瀉又驚又吐又瀉掐此穴及腳中趾效大敦驚來若急拿之或鞋帶穴對拿鞋帶穴一作僕參夏氏曰即崑崙穴灸三壯治小兒發癇瘛瘲湧泉治驚吐瀉掐之男左轉揉之止吐右轉揉之止瀉左轉不揉主吐右轉不揉主瀉女反此推驚總法推法開天門二十四下從眉心推上髮際分陰陽九下用兩大指推從眉心分推至太陽太陰此不論寒熱虛實皆用如感寒在太陽上重揉發汗體弱感寒亦揉太陽發汗並揉太陰以留汗使發汗在皮裡膜外之間庶免汗失亡陽更加虛弱之女則揉太陰發汗揉太陽止汗隨向天庭眉心山根準頭人中承漿各穴掐一下以代針法男在左手三關推上三十退六腑五六十以應之又將我兩手握兒左手掌向上於總筋穴分推六七下又在左手掌上運八卦從艮宮推往坎宮二三十回曲兒左手小指重揉外勞宮名曰黃蜂入洞三十下即於五指節逐一揉兩次在左腳委中穴往下捋三十下以上男女各推左手左腳即用元宵燈少定之定驚元宵燈火囟門眉心臍心臍輸臍周圍六焦如𥳇樣少商合骨鞋帶各穴共十五焦用燈心蘸清油點火依次淬之以上推法用蔥姜煎汁浸染醫人大指依次推之至於別穴看症再加揉法幼科雜病有補遺胎寒者胎有寒而下地復感寒於半日一日內通面皆青如靛染口不吮乳四肢必冷先有啼聲後復不啼而昏迷者是也觀兒兩眼鼻準無黃色口不吹噓定是胎寒先於精靈威靈二穴對拿緊並將崑崙穴拿緊其聲稍出即用元宵燈火十五焦斷之法見前或聲不出亦用此穴則聲必出乳必吸青色必漸退矣然此症須防作吐胎寒者臟腑皆寒胃寒不能納故必吐用人參一分桔梗一錢白朮霍香各五分水煎服自愈亦有發於二三日之間者胎有寒而外無感冒也胎熱者面色深紅而燥如滿口熱氣或舌腫而紅紫目內紅赤或大便秘結小便短赤此皆胎熱也如牙齦腫硬不能吸乳用銀簪於牙上下合骨處刺破出血乳自能吸隨用連翹木通各一錢甘草五分水煎服胎驚風驚與風名異而症同小兒初生面青口噤手足抽掣身熱背強是胎驚風症也若目直竄視最為難治宜先拿精威二穴並崑崙穴少頃即曲兒小指重揉外勞宮隨用元宵燈火定之臍風嬰兒出世剪落臍帶時風由臍入腹風性急速三朝之內便見七朝之外則非是矣臍風初發吸乳必較前稍松兩眼角挨眉心處忽有黃色宜急治之治之最易黃色到鼻治之仍易到人中承漿治之稍難口不撮而微有吹噓猶可治也至唇口收束鎖緊舌頭強直不治矣一見眼角及人中有黃色而唇不撮累者曲兒小指揉外勞宮即用燈火於囟門眉心人中承漿兩手少商各穴一焦臍輪六焦未落帶於帶口火燃既落帶於落處一焦共十三焦風便止而黃即退矣急驚風小兒急驚因聞大聲或驚而發搐搐止如故此熱生於心身熱面赤引飲口中氣熱二便黃赤甚則發搐蓋熱甚生風陽盛而陰虛也宜利驚丸身熱而不抽昏迷無知是心熱也治宜用半夏陳皮桔梗甘草連翹木通各等分煎服利驚丸天竹黃二錢輕粉青黛各一錢黑牽牛炒五錢為末蜜丸豌豆大每歲服一丸薄荷湯下慢驚一名慢症小兒慢驚或因病後藥餌傷損脾胃或由汁久亡陰吐久傷胃瀉久絕脾而成故曰慢脾之症其候昏睡露睛兩目無神而多漂泥咽喉有牽踞之聲四肢厥冷瘛瘲大便瀉青而小便清利此脾虛也有見兒眼翻手掣握拳形狀似驚以驚名之即或推或拿或火亦無驚可療無風可祛無痰可除無熱可解其實惟脾間枯痰虛熱往來耳治宜六君子湯之類發搐驚癇發搐男則目左視無聲右視有聲女則右視無聲左視有聲相勝故也男則握拳拇指叉入食指中為順於外為逆女則叉入食指中為逆於外為順傷風發搐口中氣熱呵欠煩悶手足動搖傷食發搐身溫多睡或吐不思食百日內發搐真者不過二三次必死假者頻發不死真者內生驚癇假者外傷風冷血氣未實不能勝任故發搐驚癇生死如驚痰築不省人事手不抽掣時把精威二穴對拿緊不咬齒不搖頭不直視亦無掙聲之狀將兒向我以我兩手騎兒背大指握前以第二兩指並狠狠揉肺俞二穴聲雖不出一掙一掙恰似有聲無音之狀此乃肺被痰築如鐘磬中塞實即重扣亦不響定是活症急灸肺俞穴各三壯若發驚拿醒便知人事如兒身體不肥痰不甚盛不省人事張目視人者在精威二穴對拿緊不知痛竟無掙聲之狀惟咬齒搖頭此肺經已絕治之無益驚癇先驚怖啼叫乃發後頂上旋毛中一名泥丸穴耳後青絡各灸三壯風癇先屈食指如數物乃發絲竹空針神庭百會神闕灸瘰癧風熱毒邪與血氣相搏鬱結成核如貫珠於耳項之間腫硬白色而有根者便是瘰癧或潰爛成惡毒用燈火焦法如瘰在左則焦左邊瘰在右則焦右邊前自頸上耳腳下起離六分地一點一點直下乳次過腋環至肺俞穴至頸上耳後止在瘰上周圍亦焦第二次照原路空處補之便愈若只有核而搖得動者不是瘰癧初起紅腫便是癰疽不可作瘰癧治霍亂崑崙水分天樞吐乳汁中庭灸一壯口中轉屎因母食寒涼所致中脘灸七壯脅下滿瀉痢體重不收痃癖積聚腹痛不嗜食痎瘧寒熱或腹脹引背食飲多漸漸黃瘦者十一椎下各開一寸五分灸七壯黃疸灸三壯當是脾俞二穴肚大青筋堅如鐵石於臍之上下左右離五分地各灸二壯即消疳眼由飢飽失調致食積傷脾腹大面黃午後發熱日久發稀作瀉瀉甚則渴但見白珠紅色漸生翳膜遮滿黑珠突起如黑豆如香菇之狀是疳眼也有補遺合谷各灸一壯雞胸一名龜胸由咳嗽喘促肺氣脹滿攻於胸膈漸成此症中府膻中靈道足三里龜背一名鱉背由客風吹背傳入於髓故背突如龜或咳嗽久而肺虛致腎無所生腎主骨風寒乘虛而入於骨髓精血不能流通故骨弓而駝肩中俞治咳嗽者膏肓俞腎俞癖氣久不消章門三壯臍後脊中即命門灸三壯治瘧母神效秋深冷痢臍下三寸灸七壯或隨年壯脫肛瀉血秋深不效用薑片置臍上艾灸三壯千金曰灸隨年壯龜尾即長強穴灸三壯脫肛乃肺氣下陷兼用補中益氣湯數帖效久不瘥者灸百會陰腫崑崙灸三壯戒逆針灸無病而先針灸曰逆小兒初生無病不可針灸如逆針灸則動其五臟因恐成癇河洛關中土地多寒兒每成痓生兒三日多逆灸以防之吳蜀地溫無此疾也今人不分南北灸之多有害者不若任其自然免致夭橫也徐氏八法證治一凡治病先取公孫為主次取各穴應之九種心疼一切冷氣太陵中脘隱白痰涎隔悶胸中隱痛勞宮間使膻中氣隔五噎飲食不下膻中三里太白臍腹脹滿食不消化天樞水分內庭脅肋下痛起止艱難支溝章門陽陵泉泄瀉不止裡急後重下脘天樞照海胸中刺痛隱隱不樂內關太陵彧中兩脅脹滿氣攻疼痛章門陽陵泉絕骨中滿不快翻胃吐食中魁中脘太白胃脘停痰口吐清水巨闕中脘厲兌胃脘停食疼刺不已中脘三里解谿嘔吐痰涎眩暈膻中中魁豐隆心瘧令人心內怔忡百勞心俞神門脾瘧令人怕寒腹痛脾俞三里商丘肝瘧令人色蒼蒼惡寒發熱肝俞絕骨中封肺瘧令人心寒怕驚列缺合谷肺俞腎瘧令人灑熱腰脊強痛腎俞大鐘申脈瘧疾大熱不退間使百勞絕骨瘧疾先寒後熱後谿曲池勞宮瘧疾先熱後寒百勞曲池絕骨瘧疾心胸疼痛內關太陵上脘瘧疾頭痛眩暈吐痰不已列缺合谷中脘瘧疾骨節痠疼百勞魄戶然谷瘧疾口渴不已人中間使關衝胃瘧令人善飢不能食胃俞厲兌大都膽瘧令人惡寒怕驚臥不安膽俞期門臨泣黃疸四肢俱腫汗出染衣百勞腕骨至陽中脘足三里黃疸遍身皮膚面目小便俱黃百勞至陽脾俞腕骨三里隱白谷疸食畢則心眩怫鬱遍體發黃至陽胃俞腕骨陰谷三里內庭酒疸身目俱黃心中痛面發赤斑小便赤黃膽俞至陽腕骨委中女勞疸身目俱黃發熱惡寒小便不利至陽腎俞關元然谷以上諸症俱足太陰經公孫為主一凡治病先取內關為主次取各穴應之中滿不快胃脘傷寒太陵膽中中脘三里中焦痞滿兩脅刺痛支溝膽中章門脾胃虛冷嘔吐不已中脘氣海內庭公孫脾胃氣虛心腹脹滿水分氣海三里太白脅肋下疼心脘刺痛氣海陽陵泉行間痞塊不散心中悶痛太陵中脘三陰交食癥不散人漸羸瘦腕骨脾俞公孫食積血瘕胸中隱痛胃俞氣海行間五積氣塊血積血癖膈俞肝俞大敦照海臟腑虛冷兩脅疼痛支溝通里章門陽陵泉風壅氣滯心腹刺痛風門膻中勞宮三里大腸虛冷脫肛不收百會命門長強承山大便艱難用力脫肛百會支溝照海臟毒腫痛便血膈俞肝俞長強承山痔疾腫痛長強合陽委中五癇口中吐沫後谿神門心俞鬼眼心性呆癡悲泣不已通里後谿神門大鐘心驚發狂不識親疏少衝十宣心俞中脘健忘易失言語不紀通里少衝心俞心氣虛損或歌或笑靈道通里心俞心中驚悸言語錯亂少海少府後谿心俞心中虛惕神思不安通里心俞膽俞乳根心驚中風不省人事百會中衝大敦心藏諸虛怔忡驚悸通里陰郄心俞心虛膽寒四體顫掉通里膽俞臨泣以上諸症俱手厥陰經內關為主一凡治病先取後谿為主次取各穴應之手足攣急屈伸艱難曲池尺澤合谷陽陵泉行間手足俱顫不能握物行步曲池陽谿腕骨陽陵泉絕骨太衝公孫頸項強痛不能回顧風府風池承漿兩腮頰痛紅腫大迎頰車合谷咽喉閉塞水粒不下商陽十宣天突照海雙鵝風喉閉不通少商十宣金津玉液單鵝風喉中腫痛關衝合谷天突偏正頭風兩額角痛臨泣絲竹空太陽紫脈合谷列缺兩眉角痛頭維橫竹陽白印堂合谷頭目昏沉太陽痛頭維太陽紫脈合谷頭項拘急引肩背痛百會承漿肩井中渚醉頭風嘔吐不止惡聞人言百勞合谷列缺湧泉眼赤腫衝風淚下臨泣攢竹合谷小骨空破傷風因他事觸發渾身發熱項強太陽紫脈合谷十宣大敦行間以上諸症俱手太陽經後谿為主一凡治病先取申脈為主次取各穴應之腰背強不可俯仰膏肓俞腰俞委中肢節煩痛牽引腰腳肩髃曲池陽陵崑崙中風不省人事百會印堂合谷大敦中衝中風不語前頂啞門人中合谷少商中風半身癱瘓手三里合谷腕骨風市絕骨三陰交行間中風偏枯疼痛無時肩髃曲池太淵三里絕骨崑崙中風四肢麻痹不仁肘髎上廉魚際風市膝關三陰交中風手足瘙癢不能握物臑會合谷腕骨風市陽陵行間中風口眼喎斜牽連不已人中合谷太淵十宣童子髎頰車針入一分沿皮向下透地倉穴喎右寫左喎左寫右中風口噤不開言語謇澀