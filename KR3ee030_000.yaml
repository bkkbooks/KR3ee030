body:
  text: 續刻素問經文補遺脈要精微論次診要經終論之後夫脈者血之府也營行脈中故為血府府聚也長則氣治氣充和也短則氣病氣不足也數則煩心內熱大則病進邪盛上盛則氣高下盛則氣脹代則氣衰動而中止曰代為真氣衰乏細則氣少減於常脈為細澀則心痛脈往來難曰澀澀為血少為膹郁故心痛也渾渾濁亂不明革至如皮革之堅如湧泉其來汩汩無序但出不返病進而色弊言必病進色弊綿綿其去如弦絶死脈微而又如弦之斷絶者真氣絶無故死夫精明見於目五色者顯於面氣之華也赤欲如白裹朱不欲如赭白欲如鵝羽不欲如鹽青欲如蒼璧之澤不欲如藍黃欲如羅裹雄黃不欲如黃土黑欲如重漆色不欲如地蒼皆欲其潤澤惡其枯稿五色精微象見其壽不久也言精氣化作色相畢見於外更無藏蓄是真氣脫也故壽不久夫精明者所以視萬物別黑白審短長若以視也長為短以白為黑如是則精衰矣精衰則神散夫五臟者身之強也藏氣充則形體強健頭者精明之府臟腑之精氣皆上升於頭頭傾低垂視深目陷無光也精神將奪矣奪失也背者胸中之府背曲肩隨府將壞矣此亦臟腑之失強腰者腎之府轉搖不能腎將憊矣膝者筋之府維絡關節者膝膕之筋為最屈伸不能行則僂附筋將憊矣僂曲身附附物而行憊壞也骨者髓之府不能久立行則振掉骨將憊矣髓不充於骨也得強則生失強則死平人氣象論首節人一呼脈再動一吸脈亦再動呼吸定息脈五動閏以太息命曰平人平人者不病也呼出氣也吸入氣也定息將復呼吸之際也閏余也人一呼脈一動一吸脈一動曰少氣十四難以為離經脈正氣衰也人一呼脈三動一吸脈三動而躁尺熱身有熱曰病溫尺不熱脈滑曰病風氣有餘也脈澀曰痹血不足也人一呼脈四動以上曰死一呼四至曰脫精脈絶不至曰死元氣已竭乍疏乍數曰死陰陽敗亂玉機真藏論春脈者肝也東方木也萬物之所以始生也故其氣來耎軟同弱輕虛而滑端直以長故曰弦端正也反此者病其氣來實而強此謂太過病在外其氣來不實而微此謂不及病在中外病多有餘內病多不足太過則令人善怒舊本忘從吳氏改怒忽忽眩目轉冒昏昧而癲疾其不及則令人胸痛引背下則兩脅胠滿吳注作痛夏脈者心也南方火也萬物之所以盛長也故其氣來盛去衰故曰鉤鉤義如木之垂枝即洪脈也反此者病其氣來盛去亦盛此為太過病在外其氣來不盛去反盛此謂不及病在中脈自骨肉之分出於皮膚之際謂之來自皮膚之際還於骨肉之分謂之去太過則令人身熱而膚痛熱不得泄越為浸淫浸漬而淫蒸熱不已也其不及則令人煩心上見咳唾下為氣泄心虛不能自安故煩虛陽乘肺則咳乘脾則唾下陷則為後陰氣失也秋脈者肺也西方金也萬物之所以收成也故其氣來輕虛以浮來急去散故曰浮未至沉下故來急去散即毛也反此者病其氣來毛而中央堅兩旁虛此謂太過病在外其氣來毛而微此謂不及病在中太過則令人逆氣而背痛慍慍然悲傷不樂之貌其不及則令人喘呼吸少氣而咳上氣見血及聞病音喘息則喉下有聲也舊本下聞病音今從吳氏改及冬脈者腎也北方水也萬物之所以合藏也故其氣來沉以搏故曰營搏言伏鼓也沉伏而鼓是營守乎中之意故曰營扁鵲曰盛冬水凝如石脈之來沉濡而滑故曰石反此者病其氣來如彈石者堅強之象此謂太過病在外其去如數者類於數疾此謂不及病在中太過則令人解㑊四體懈怠脊脈痛而少氣不欲言腎之精氣傷其不及則令人心懸如病飢腎水不能濟心火䏚中清冷也脊中痛少腹滿小便變脾脈者土也孤藏以灌四旁者也脾居中央貫通肝心肺腎善者不可得見惡者可見脾無病則灌溉周而四藏安故善者不可見惡者即病脈也其來如水之流者散而無蹤此謂太過病在外如鳥之喙者堅鋭而不和喙音海咮也此謂不及病在中太過則令人四肢不舉濕勝其不及則令人九竅不通名曰重強藏氣皆不和順脈從四時謂之可治從順也脈弱以滑是有胃氣命曰易治取之以時合於時令形氣相失謂之難治偏勝則生克賊色夭不澤謂之難已氣血皆壞脈實以堅謂之益甚邪盛脈逆四時為不可治所謂逆四時者春得肺脈夏得腎脈秋得心脈冬得脾脈其至皆懸絶沉澀者命曰逆四時懸脈來懸異絶陰陽偏絶無復沖和之氣但見真藏脈來也沉為絶陽澀為絶陰未有藏形於春夏而脈沉澀秋冬而脈浮大名曰逆四時也未有真藏脈形但於生長之時脈反沉澀秋冬收藏之時脈反浮大與四時相失亦名曰逆四時病熱脈靜陽症陰脈泄而脈大真氣衰邪益進病在中脈實堅宜不及而反實堅是真藏形也病在外脈不堅者宜太過而反不實堅是真陽不足以鼓也皆難治脈盛心實皮熱肺腹脹脾前後不通腎悶瞀肝此謂五實邪氣實也瞀音務又音茂脈細心虛皮寒肺氣少肝泄利前後腎飲食不入脾此謂五虛醬粥入胃泄注止則虛者活土氣猶存虛可回也身汗表邪解得後利里邪去則實者活三部九候論吳氏作決死生論形盛脈細少氣不足以息者危外有餘而中不足形瘦脈大胸中多氣者死陽有餘而陰不足故脈反大而多氣喘滿也參伍不調者病言於三部九候或有一二不調為愆和有病三部九候皆相失者死以天人言上中下謂之三才以人身言上中下謂之三部三部而各分其三謂之三候三候有天有地有人合為九候也上古診脈不獨寸口於諸經之動脈皆診之如本篇云上部天兩額之動脈以候頭角之氣上部地兩頰之動脈以候口齒之氣上部人耳前之動脈以候耳目之氣中部天手太陰也取寸口以侯肺中部地手陽明也取合谷以候胸中之氣中部人手少陰也取神門以候心下部天足厥陰也取太衝以候肝下部地足少陰也取太溪以候腎下部人足太陰也取其門之動脈又取跗上之衝陽以候脾胃之氣此三部九候是也十八難曰三部者寸闕尺也九候者浮中沉也乃單以寸口而分三部九候之診後世言脈者皆宗之察九候獨小者病九候之中一部獨小下同獨大者病獨疾者病獨遲者病獨熱者病獨寒者病獨陷下者病陷下沉伏也形肉已脫脾氣大壞九候雖調猶死七診雖見謂獨小獨大獨疾獨遲獨寒獨熱獨陷下也九候皆從者不死從順也脈順四時之令及合諸經之體者是也經脈別論食氣入胃散精於肝淫氣於筋精精華也胃家散布干肝浸淫滋養於筋也食氣入胃濁氣歸心淫精於脈心主血脈故食氣之厚者歸心精氣浸淫於脈也脈氣流經經氣歸於肺肺朝百脈輸精於皮毛脈流於經必由於氣氣主於肺故肺為百脈之朝宗其精氣輸之於皮毛也毛脈合精行氣於府毛屬肺脈屬心合一氣一血之精行氣於府言氣聚膻中也府精神明留於四藏氣歸於權衡宗氣積於肺神明出於心氣盛則神旺故氣府之精為神明肺肝脾腎四藏無不賴神明之留以為主宰然後藏氣感得其平而歸於權衡矣權衡平也權衡以平氣口成寸以決死生持權衡之法氣口分其三部成其尺寸百脈俱朝於此故可以決死生飲入於胃遊溢精氣上輸於脾水飲入胃則其氣化精微必先輸送於脾是謂中焦如漚也脾氣散精上歸於肺脾得水穀精氣則散而升之上如雲霧而歸肺是謂上焦如霧也通調水道下輸膀胱肺氣運行水隨而注故能通調水道下輸膀胱是謂下焦如瀆也水精四布五經並行水因氣生而清濁有分清者為精濁者為水故精歸五臟水歸膀胱宣明五氣論次藏氣生時論之後五氣所病心為噫噯氣也心脾胃皆有是證由火之郁而氣有不得舒伸也肺為咳肺屬金故邪擊之有聲也肝為語問答之聲曰語象木之仗條委曲也脾為吞象土包含為物所歸腎為欠呵欠為嚏音帝噴嚏也陽未盡而陰引之故欠陽欲達而陰發之故嚏故凡陽盛者不欠下虛者無嚏胃為氣逆為噦厄逆為恐胃中寒為噦土實傷水故腎為恐大腸小腸為泄泄利下焦溢為水下焦為分注之所氣窒不瀉則溢於肌肉而為水膀胱不利為癃不約為遺溺邪實膀胱氣不通利則謂之癃若下焦不能約束膀胱以固津液則為遺溺膽為怒怒肝忘也而膽亦然者肝取決於膽也是為五病五精所並聚也精氣並於心則喜並於肺則悲並於肝則憂並於脾則畏並於腎則恐五臟精氣各有所藏若合而並於一藏則邪氣實之各顯其志如此是謂五並虛而相併者也言藏氣有不足則勝氣得相併也五臟所惡心惡熱肺惡寒肝惡風脾惡濕腎惡燥是謂五惡五臟化液心為汗血之餘也肺為涕涕出於鼻肝為淚淚出於目脾為涎涎出於口腎為唾唾出於舌下廉泉二竅足少陰腎脈循喉嚨挾舌本也是謂五液五味所禁辛走氣氣病無多食辛辛散則氣益虛耗咸走血血病無多食鹹血得咸則凝結不流苦走骨骨病無多食苦苦味沉降故走骨九針論曰苦走血火化苦也咸走骨水化咸也甘走肉肉病無多食甘甘能生脹酸走筋筋病無多食酸酸能收縮在筋則病拘攣又令人癃也是謂五禁無令多食通評虛實論首節邪氣盛則實精氣奪則虛氣虛者肺虛也氣逆者足寒也氣逆不行則無以及於四肢陽虛於下故足寒非其時則生當其時則死餘臟皆如此心肝脾腎各有衰旺之時例皆同也吳注時當旺之時也如夏月人皆氣虛冬月人皆足寒皆非肺旺之時故生若當秋而氣虛則金衰於當旺時也故死類經注曰以肺虛而遇秋冬非相賊之時故生若當春則金木不和病必甚當夏則金虛受克病必死也於義似通所謂重實者言大熱病氣熱脈滿是謂重實證脈皆熱經絡皆實是寸脈急而尺緩吳注作緊滑則從陽氣勝也澀則逆也陰邪勝絡氣不足經氣有餘者脈口熱而尺寒也秋冬為逆陽虛者畏陰勝之時春夏為從治主病者義見下文經虛絡滿者尺熱滿脈口寒澀也此春夏死秋冬生也陰虛者畏陽盛之時絡滿經虛灸陰刺陽經滿絡虛刺陰灸陽此正以絡主陽經主陰灸所以補刺所以瀉也脈氣上虛尺虛甲乙經作脈虛氣虛尺虛吳注同是謂重虛所謂氣虛者言無常也上虛為氣虛故言語輕微尺虛者行步恇然尺虛為陰虛故行步恇然怯弱也乳子而病熱陽證脈懸小者何如懸絶而小陰脈也曰手足溫則生寒則死乳子中風熱喘鳴肩息者脈何如曰喘鳴肩息者脈當實大也緩則生大而緩為有胃氣急則死實而急為真藏見腸澼滯下便血何如身熱則死寒則生腸澼下白沫何如白為氣病在大腸脈沉則生陰氣無傷脈浮則死腸澼下膿血何如赤白並下脈懸絶則死滑大則生滑為陰血大為陽氣癲疾何如脈搏大滑久自已氣血俱有餘脈小堅實死不治肝之真藏脈也癲疾之脈虛則可治言邪氣微實則死言邪氣氣盛消疸虛實何如消中而熱善飲善食也脈實大血氣尚盛病久可治脈懸小堅病久不可治腹中論次卒痛論之後有病心腹滿旦食則不能暮食朝寬暮急病在營血名為鼓脹虛大而急亦名蠱脹治之以雞矢醴一劑知二劑已雞矢之性消積下氣一劑可知其效二劑則已其病用羯雞矢一升研細炒微焦入無灰酒三碗煎至一半用布濾取汁五更熱飲則腹鳴辰巳時行二三次皆黑水也次日覺足面漸有皺紋又飲一次而病愈矣有病胸脅支滿者妨於食病至則先聞腥臊臭肺氣腥肝氣臊出清液清冷臭液先唾血肝不能藏血四支清脾虛則陽氣不行於四末目眩肝虛時時前後血陰失其守病名血枯此得之年少時有所大脫血若醉入房中氣竭肝傷故月事衰少不來也以四烏鰂骨一藘茹二物併合之丸以雀卵大如小豆以五丸為後飯先藥後飯也飲以鮑魚汁利腸中烏鰂魚骨澀物也藘茹即藺茹味苦氣芳雀卵益元陽鮑魚味厚益陰病有少腹盛上下左右皆有根病名曰伏梁難經伏梁為心之積與此不同裹大膿血居腸胃之外不可治治之每切按之致死切按之謂過於妄攻也此下則因陰必下膿血上則迫胃脘生鬲俠胃脘內癰內潰之癰此久病也難治居臍上為逆居臍下為從勿動亟奪言勿得動胃氣行大便而數奪之也人有身體髀股䯒皆腫環臍而痛病名伏梁此風根也風毒根於中也其氣溢於大腸而著於肓肓之原在臍下故環臍而痛也不可動之動之為水溺澀之病言不可下之而動其便何以知懷子之且生也生者無後患之意身有病而無邪脈也如有嘔惡頭痛諸症而脈不病若經閉知其為胎氣也風論次刺腰痛論之後風者善行而數變腠理開則灑然寒閉則熱而悶其寒也則衰食飲寒則胃氣凝滯其熱也則消肌肉熱則津液燥涸故使人怢音突栗而不能食名曰寒熱怢栗猶戰栗也風氣與陽明入胃循脈而上至目內眥其人肥則風氣不得外泄則為熱中而目黃風內郁故熱中人瘦則外泄而寒則為寒中而泣出腠理疏故寒中風氣與太陽俱入行諸脈俞散於分肉之間與衛氣相干其道不利故使肌肉憤䐜而有瘍憤䐜腫起也瘍癰毒也衛氣有所凝而不行故其肉有不仁也頑痹不知痛癢癘者有榮氣熱胕腐同其氣不清故使鼻柱壞而色敗皮膚瘍潰風寒客於脈而不去名曰癘風潰破也風中五臟六腑之俞亦為臟腑之風各入其門戶所中則為偏風即偏枯也風氣循風府而上則為腦風風入系頭眼系在腦後則為目風眼寒飲酒中風則為漏風或多汗常不可單衣食則汗出甚則身汗喘息惡風衣常濡口乾善渴不能勞事入房汗出中風則為內風風乘虛犯令人遺精咳血寢汗骨蒸新沐中風則為首風頭面多汗惡風當先風一日則病甚頭痛不可以出納至其風日則病少愈久風人中則為腸風飧泄傳入腸胃熱則下血寒則泄瀉外在腠理則為泄風多汗汗出泄衣上口中乾上漬其風不能勞事身體盡痛則寒故風者百病之長也至其變化乃為他病無常方所也然致有風氣也肺風之狀多汗惡風色皏然白時咳短氣晝日則差瘥同暮則甚診在眉上其色白皏音烹上聲心風之狀多汗惡風焦絶善怒嚇赤色病甚則言不可快診在口其色赤焦喉舌燥也絶唇口裂也心脈俠咽喉而主舌故見此諸症肝風之狀多汗惡風善悲色微蒼嗌乾善怒時憎女子肝衰則惡色診在目下其色青脾風之狀多汗惡風身體怠墮惰同四肢不欲動色薄微黃不嗜食診在鼻上其色黃腎風之狀多汗惡風面疣然浮腫脊痛不能正立骨衰其色炲音一隱曲不利診在肌上其色黑胃風之狀頸多汗惡風食飲不下鬲塞不通腹善滿失衣則䐜脹食寒則泄診形瘦而腹大痹論風寒濕三氣雜至合而為痹也壅閉經絡血氣不行而病為痹共風氣勝者為行痹走注歷節疼痛之類寒氣勝者為痛痹陰寒之氣乘於肌肉筋骨陽氣不行故痛濕氣勝者為著痹也著於一處或為疼痛或為頑木濕從土化病在肌肉以冬過此者為骨痹冬主骨此指風寒濕也以春遇此者為筋痹春主筋以夏遇此者為脈痹夏主脈以至陰遇此者為肌痹長夏主肌肉以秋遇此者為皮痹秋主皮五臟皆有合病久而不去者內舍於其合也肺痹者煩滿喘而嘔肺脈循胃口心痹者脈不通煩則心下鼓暴上氣而喘嗌乾善噫厥氣上則恐腎水上逆故令恐肝痹者夜臥則驚多飲數小便上為引如懷上下牽引腹大如有所懷腎痹者善脹尻以代踵足不能伸也春以代頭頭不能舉也脾痹者四肢解懈同惰發咳嘔汁上為大塞隔塞腸痹者數飲而出不得中氣喘爭時發飧泄下焦氣閉水液混於大腸胞痹者少腹膀胱按之內痛若沃以湯澀於小便上為清涕胞同脬膀胱也脬音拋六腑亦各有俞風寒濕氣中其俞而食飲應之循俞而入各舍其府也痛者寒氣多也有寒故痛也其不痛不仁者病久入深榮衛之行澀經絡時疏故不痛舊本不通皮膚不營故為不仁無營血充養其寒者陽氣少陰氣多與病相益故寒也寒從中生其熱者陽氣多陰氣少病氣勝陽遇陰甲乙經改陽乘陰故為痹熱陽盛逢陰則陰不能勝陽其多汗而濡者此其逢濕甚也陽氣少陰氣盛兩氣相感故汗出而濡也痹在於骨則重在於脈則血凝而不流在於筋則屈不伸在於肉則不仁在於皮則寒故具此五者則不痛也具備有之也凡痹之類逢寒則急急舊本蟲誤逢熱則縱痿論肺熱葉焦則皮毛虛弱急薄著則生痿躄也熱乘肺金在內為葉焦在外則皮毛虛弱而為急薄若熱氣留著不去而及於筋脈骨肉則病痿躄躄音璧足弱不能行也心氣熱則下脈足三陰厥而上上則下脈虛虛則生脈痿樞折挈脛縱而不任地也樞紐關節之處如折而不能提挈又足脛縱弛而不能任地肝氣熱則膽泄口苦筋膜乾筋膜乾則筋急而攣發為筋痿血液乾燥脾氣熱則胃干而渴肌肉不仁發為肉痿肉不知痛癢腎氣熱則腰脊不舉骨枯而髓減發為骨痿肺者藏之長也為心之蓋也有所失亡所求不得則發肺鳴鳴則肺熱葉焦肺志不伸則氣鬱生火故發喘鳴而葉焦故曰五臟因肺熱葉焦發為痿躄氣無所主悲哀太甚則胞絡絶胞之絡脈屬心胞絡絶則陽氣內動發為心下崩數泄血也心血下崩故本病曰古經篇名大經空虛發為肌痹傳為脈痿血失則大絶空虛無以灌滲肌肉發為肌肉頑痹傳變而為脈痿也思想無窮所願不得意淫於外傷脾入房太甚宗筋弛縱發為筋痿及為白淫白淫濁帶也生於肝使內也房勞肝吳注改疾有漸於濕漸近也以水為事有事於卑濕之所若有所留水濕留著居處相濕肌肉濡漬痹而不仁發為肉痿得之濕地也病生於脾有所遠行勞倦逢大熱而渴渴則陽氣內伐內戕真陰內伐則熱舍於腎腎者水藏也今水不勝火則骨枯而髓虛故足不任身發為骨痿生於大熱也治痿者獨取陽明何也陽明者五臟六腑之海主閏潤同宗筋陰毛橫骨上下之豎筋宗筋主束骨而利機關也衝脈者經脈之海也受十二經之血主滲灌溪谷與陽明合於宗筋陰陽總宗筋之會會於氣街而陽明為之長皆屬於帶脈而絡於督脈故陽明虛則宗筋縱帶脈不引不能收引故足痿不用也厥論陽氣衰於下則為寒厥陰氣衰於下則為熱厥陽足三陽脈陰盛陽衰則陰起於下故寒厥必從五指至膝上寒陰足三陰脈陽盛陰虛則陽乘陰位故熱厥必足下熱寒厥何失而然也前陰者宗筋之所聚太陰陽明之所合也春夏則陽氣多而陰氣少秋冬則陰氣盛而陽氣衰此人者質壯以秋冬奪於所用多欲奪陰下氣上爭不能復陽搏陰激身半以下之氣亦引而上爭不能復歸其經精氣溢下陰精下泄邪氣因從之而上也陽虛則陰勝為邪氣因於中氣即精氣邪氣皆出內而生也此句吳注在上文前陰者之上陽氣衰不能滲營其經絡陽氣日損陰氣獨在故手足為之寒也四肢為諸陽之本熱厥何如而然也酒入於胃則絡脈滿而經脈虛脾主為胃行其津液者也陰氣虛則陽氣入濕熱在脾則陰虛陽亢陽氣入則胃不和胃不和則精氣竭精氣竭則不營其四肢也脾胃俱病不生精氣營充養也此人必數醉若飽以入房傷其脾腎氣聚於脾中不得散酒氣與穀氣相搏熱盛於中故熱遍於身內熱而溺赤也夫酒氣盛而慓悍腎氣日衰陽氣獨勝故手足為之熱也病能論人病胃脘癰者當候胃脈沉細者氣逆陽明多氣多血脈當洪大若見沉細氣逆於常也逆者人迎甚盛甚盛則熱胃氣逆而人迎盛所謂人迎三盛病在陽明是也人迎者胃脈也謂結喉旁動脈今作左手關前脈逆而盛則熱聚於胃口而不行故胃脘為癰也有病怒狂者名曰陽厥治之奪其食即已夫食入於陰長氣於陽故奪其食即已使之服以生鐵洛為飲夫生鐵洛者下氣疾也寒而鎮重故下氣速又怒為肝志是木欲實金當平之也有病身熱懈惰濕熱傷筋汗出如浴熱蒸於肌膚惡風少氣衛虛病名曰酒風即風論中所云漏風也以澤瀉術各十分麋銜五分合以三指撮約其數為煎劑為後飯澤瀉滲利濕熱白朮燥濕止汗麋銜即薇銜一名無心草一名吳風草苦平微寒治風濕奇病論人有重身懷孕九月而喑失音胞之絡脈絶也為胎阻絶胞絡者繫於腎少陰之脈貫腎系舌本故不能言系根系也無治也當十月復十月子生少陰之脈通則言復矣病脅下滿氣逆二三歲不已名曰息積喘粗息難也此不妨於食不可灸刺喘者忌灸恐助火邪病不在經故不可刺積纍也為導引服藥藥不能獨治也導引以開其滯藥餌以利其氣所以然者治之不易人有病頭痛以數歲不已當有所犯大寒內至骨髓凡身之骨髓皆是髓者以腦為主腦逆故令頭痛齒亦痛病名曰厥逆寒氣逆於上有病口甘者此五氣之溢也五味之氣上溢名曰脾疸熱也夫五味入口藏於胃脾為之行其精氣津液在脾故令人口甘也此肥美之所發也此人必數食甘美而多肥也肥者令人內熱甘者令人中滿故其氣上溢傳為消渴飲水善消而渴不已治之以蘭香草除陳氣也有病口苦者名為膽疸夫肝者中之將也取決於膽咽為之使膽脈挾咽此人者數謀慮不決故膽虛氣上溢而口為之苦治之以膽募俞日月膽俞左右各兩穴吳注作膽噓氣上溢凡謀慮不決者必噓出其氣之意有癃者一日數十溲此不足也身熱如炭頸膺如格拒也人迎躁盛喘息氣逆此有餘也太陰脈細如髮者此不足也病在太陰日數十溲脈細是脾氣不足其盛在胃人迎三盛病在陽明也頗在肺喘息氣逆病名曰厥逆也死不治此所謂得五有餘二不足也如上文外得五有餘內得二不足此其身不表不里表裡相為違逆亦正死明矣人生而有病癲疾者病名為胎病此得之在母腹時其母有所大驚氣上而不下精氣並居故令子發為癲疾也舊作巔吳注改癲刺志論吳注作虛實要論次刺禁論之後氣實形實氣虛形虛此其常也反此者病谷盛氣盛谷虛氣虛此其常也反此者病谷納穀也脈實血實脈虛血虛此其常也反此者病氣盛身寒此謂反也氣虛身熱此謂反也谷入多而氣少此謂反也谷不入而氣多此謂反也脈盛陽實血少陰虛此謂反也脈少陽虛血多陰虛此謂反也氣盛身寒得之傷寒寒傷形氣虛身熱得之傷暑暑傷氣谷入多而氣少者得之有所脫血濕居下也氣不生長谷入少而氣多者邪在胃及肺也脈小血多者飲中熱也或酒或飲中於熱也脈大血少者脈中有風氣水漿不入此之謂也此釋上文反者為病之詞夫實者氣入也邪實虛者氣出也正氣漏泄氣實者熱也陽盛氣虛者寒也陽虛入實者右手開針空也凡刺實持針搖大其道是也入虛者左手閉針空也凡刺虛以手推闔其門是也此用針補瀉法五運行大論次四時刺逆從論之後東方生風風生木木生酸酸生肝肝生筋筋生心此原東方生生之理其在天為玄在人為道在地為化化生五味道生智玄生神化生氣氣由化生物因氣化神在天為風在地為木在體為筋在氣為柔得木化者其氣柔軟在藏為肝其性為暄音萱溫暖也其德為和其用為動其色為蒼淺青色其化為榮物色榮美其蟲毛毛蟲得木氣其政為散其令宣發其變摧拉風氣剛強是木之變摧拉折壞也其眚災也為隕墜落也其味為酸其志為怒此東方之生化怒傷肝悲勝怒悲憂為肺之志風傷肝燥勝風金氣勝木酸傷筋辛勝酸此東方木氣偏勝為病平以西方金令也南方生熱熱生火火生苦苦生心心生血血生脾此原南方生生之理其在天為熱在地為火在體為脈在氣為息心主血脈在藏為心其性為暑其德為顯明其用為躁動其色為赤其化為茂萬物茂盛其蟲羽火性飛越其政為明其令鬱蒸其變炎爍炎爍焦枯是火之變其眚燔焫焚燒其味為苦其志為喜此南方之生化喜傷心恐勝喜熱傷氣寒勝熱苦傷氣咸勝苦此南方火氣偏勝為病平以北方水令也中央生濕濕生土土生甘甘生脾脾生肉肉生肺此原中央生生之理其在天為濕在地為土在體為肉在氣為充土氣充實在藏為脾其性靜堅土養萬物其德為濡其用為化其色為黃其化為盈萬物充盈其蟲倮露體也其政為謐音密靜也其令雲雨其變動注風動而注濕勝而兼風木之化亢承之理也其眚淫潰淫雨崩潰其味為甘其志為思此中央之生化思傷脾怒勝思濕傷肉風勝濕甘傷脾酸勝甘此中央土氣偏勝為病平以東方木令也西方生燥燥生金金生辛辛生肺肺生皮毛皮毛生腎此原西方生生之理其在天為燥在地為金在體為皮毛在氣為成金白堅成在藏為肺其性為涼其德為清其用為固其色為白其化為斂萬物收斂其蟲介皮甲堅固其政為徑金體剛徑其令霧露其變肅殺其青蒼落色蒼敗落肅殺之令太過也其味為辛其志為憂此西方之生化也憂傷肺喜勝憂燥傷皮毛熱勝燥舊本熱傷皮毛寒勝熱吳注改此辛傷皮毛苦勝辛此西方金氣偏勝為病平以南方火令也北方生寒寒生水水生鹹鹹生腎腎生骨髓髓生肝此原北方生生之理其在天為寒在地為水在體為骨在氣為堅在藏為腎其性為懍戰栗其德為寒其用為藏舊本闕藏字其色為黑其化為肅其蟲鱗其政為靜其令霰音線雪舊本闕二字吳注補霰雪一作閉塞其變凝冽寒凝嚴冽其眚冰雹音泊其味為咸其志為恐此北方之生化也恐傷腎思勝恐寒傷血燥勝寒咸傷血甘勝咸此北方水氣偏勝為病平以中央土令也五氣更立各有所先應運之氣非其位則邪木居火位金居木位之類當其位則正本位氣相得則微子居母位母居子位不相得則甚勝已者與已所勝者氣有餘則制已所勝而侮所不勝如木既剋土而反侮金之類其不及則已所不勝侮而乘之已所勝輕而侮之如金既剋木而土反麥木之類侮反受邪始於侮彼求勝終則已反受邪侮而受邪寡於畏也畏謂剋制也五行之氣必有所畏憚乃能守位即六微旨大論承製之義六微旨大論相火之下水氣承之水位之下土氣承之土位之下風氣承之風位之下金氣承之金位之下火氣承之君火之下陰精承之六氣各專一令專令者常太過故各有所承以制其太過不使亢甚為害也亢則害承乃制六氣亢甚而過其常則必害作承氣乃生於下制之使不過也制則生化言有所制則無亢害而生生化化舊作制生則化外列盛衰即損益彰矣之意害則敗亂生化大病若一於亢害必致於敗亂而生化之原由此大病矣非其位則邪歲不與本長逢會當其位則正如下文木運臨卯邪則變甚正則微木運臨卯丁卯歲火運臨午戊午歲土運臨四季甲辰甲戌己丑己未歲金運臨酉乙酉歲水運臨子丙子歲所謂歲會氣之平也天干之化運與地支之主歲相合為歲會氣平者物生脈應無先後也土運之歲上見太陰己丑己未歲上謂司天也火運之歲上見少陽戊寅戊申少陰戊子戊午金運之歲上見陽明乙卯乙酉木運之歲上見厥陰丁巳丁亥水運之歲上見太陽丙辰丙戌天與之會也故曰天符司天與運氣符會以上己丑己未戊午乙酉乃天符歲會相同又為太乙天符即天元紀所謂三合為治一者天會二者歲會三者運會是也六元正紀大論春氣西行夏氣北行秋氣東行冬氣南行近東者先受春氣漸次及西近南者先受夏氣漸次及北近西者先受秋氣漸次及東近北者先受冬氣漸次及南故春氣始於下由下而升秋氣始於上由上而降故至高之地冬氣常在高山之巔夏月凝雪至下之地春氣常在卑下之澤冬月草生發表不遠熱攻裡不遠寒發表利用熱夏月發表不遠熱也攻裡利用寒冬月攻裡不遠寒也以發表攻裡之品不留於中而有所宜也不發不攻寒熱內賊其病益甚不以發攻而犯寒犯熱故病益甚若無病而犯寒犯熱則生寒生熱木鬱達之郁怫也木性發達治則升之令其條達火鬱發之火性發越治則散之令其發越土鬱奪之土性疏通故宜奪之金鬱泄之金性清利故宜泄之水鬱折之水性就下故折之令其無沖逆也然調其氣過者折之以其畏也所謂瀉之上文詳其五郁之治因言既治之必調其氣而復有過而不調者則折之以其所畏折之之義即所謂瀉之也畏者木畏酸火畏甘土畏苦金畏辛水畏咸也至真要大論六氣分治司天地者其至何如曰厥陰司天巳亥之年其化以風木氣化風少陰司天子午之年其化以熱少陰君火化熱太陰司天丑未之年其化以濕土氣化濕少陽司天寅申之年其化以火少陽相火也其化畏火陽明司天卯酉之年其化以燥金氣化燥太陽司天辰戊之年其化以寒水氣化寒以所臨藏位命其病者也王注肝木位東心火位南脾土位中央及四維肺金位西腎水位北是五臟定位然五運即六氣所至氣相得則和不相得則病故先以六氣所臨後言五臟之病也地化奈何地化在泉之化也曰司天同候言天氣既遷地氣用事因藏位而命其病皆與司天候法同間氣皆然間氣用事因藏位而命其病皆與司天候法同司左司右者是謂間氣也歲有六氣以一氣司天一氣在泉餘四氣一為司天左間一為右間一為在泉左間一為右間也五運行大論左右者諸上見厥陰左少陰右太陽見少陰左太陰右厥陰見太陰左少陽右少陰見少陽左陽明右太陰見陽明左太陽右少陽見太陽左厥陰右陽明所謂面北而命其位厥陰在上則少陽在下左陽明右太陰少陰在上則陽明在下左太陽右少陽太陰在上則太陽在下左厥陰右陽明少陽在上則厥陰在下左少陰右太陽陽明在上則少陰在下左太陰右厥陰太陽在上則太陰在下左少陽右少陰所謂面南而命其位上主司天位在南故面北而言其左右左主西言右主東言下主在泉位在北故面南而言其左右左主東言右主西言上下異而左右殊也諸氣在泉風淫於內言自外而淫於內也治以辛涼金勝木氣佐以苦甘辛過甚恐傷其氣故佐以苦勝辛甘益氣也以甘緩之以辛散之木性急故宜甘緩辛散熱淫於內治以鹹寒君火之氣水能勝之佐以甘苦甘勝鹹苦瀉熱以酸收之以苦發之熱盛於經宜酸收熱結於內宜苦發濕淫於內治以苦熱濕為土氣苦熱從火化能燥濕也佐以酸淡酸能制土淡能利竅以苦燥之以淡泄之濕熱宜苦燥濕濡而腫宜淡泄泄滲與汗也火淫於內治以鹹冷佐以苦辛吳注相火畏火也故以鹹苦辛瀉熱而滋陰水以酸收之以苦發之義與上文熱淫條同燥淫於內治以苦溫燥為金氣苦溫從火化所以勝金氣佐以甘辛木受金傷宜甘緩辛散以苦下之燥結邪實宜以苦下之寒淫於內治以甘熱寒為水氣甘從土化熱從火化所以制水勝寒佐以苦辛苦而辛亦熱品也以咸瀉之水之正味咸瀉之也以辛潤之以苦堅之腎苦燥急食辛以潤之腎欲堅急食苦以堅之即此之義司天之氣風淫所勝平以辛涼佐以苦甘以甘緩之以酸瀉之木氣升而不降故以酸瀉熱淫所勝平以鹹寒佐以苦甘以酸收之收其浮熱濕淫所勝平以苦熱佐以酸辛酸而辛則非飲矣以苦燥之以淡泄之濕上甚而熱治以苦溫燥濕佐以甘益土辛散滯以汗為故而止得汗則濕外泄燥淫所勝平以苦濕苦而濕則燥得其潤佐以酸生液辛潤燥以苦下之燥甚非攻下不除寒淫所勝平以辛散寒熱回陽佐以苦甘濟和辛熱以咸瀉之傷寒大胃則為裡熱者宜以咸瀉之李頻湖曰司天主上半年天氣司之故六淫謂之所勝上淫於下也故曰平之在泉主下半年地氣司之故六淫謂之於內外淫於內也故曰治之當其時反得勝已之氣者謂之反勝六氣之勝何以徵之如燥勝則地干暑勝則地熱風勝則地動濕勝則地泥寒勝則地裂火勝則地固是也春不沉夏不弦冬不澀秋不數是為四塞春弦夏數秋澀冬沉脈之常也若春至沉脈盡去夏至弦脈盡去冬至澀脈盡去秋至數脈盡去已雖專王而絶去其母氣矣是謂四塞五臟不相交通也參見曰病復見曰病未去而去曰病去而不去曰病一部之中參見諸脈狀此乘侮交至也既見於本部復見於他部此淫氣太過也未去而去為本氣不足來氣有餘去而不去為本氣有餘來氣不足反者死反謂春脈澀夏脈沉秋脈數冬脈緩反見勝已之脈故死諸風掉眩皆屬於肝風類不一故曰諸風掉搖眩運也諸寒收引皆屬於腎收斂引急也腎主寒水之化凡陽氣不達則營衛凝聚形體拘攣諸氣膹音憤郁皆屬於肺膹喘急郁不暢也諸濕腫滿皆屬於脾腫者腫於外滿者滿於中痞脹是也諸熱瞀瘛抽掣皆屬於火諸痛癢瘡皆屬於心熱甚則瘡痛熱微則瘡癢心屬火化熱故瘡瘍屬於心也諸厥固泄皆屬於下厥逆也固溲便閉也泄溲便不禁也下謂腎也腎居五臟下兼水火之司陰精衰則火獨治而有熱厥命門衰則水獨治而有寒厥腎開竅於二陰其水虧火盛則精液乾枯為熱結陰虛則無氣致清濁不化為寒閉腎家水衰則火迫注遺為熱泄命門火衰則陽虛失禁為寒泄諸痿萎同喘嘔皆屬於上肺主氣肺熱葉焦則手足無以受氣故有筋痿肉痿脈痿骨痿諸症息氣急曰喘病在肺聲逆上曰嘔病在胃口故皆上焦之病諸禁鼓栗如喪神守皆屬於火禁作噤咬牙也鼓鼓頷也栗戰也神能御形謂之神守禁鼓栗而神不能支持如喪失神守皆火之病若心火亢極反兼水化制之故為寒栗者火之實也若陰勝則為寒寒則真氣去去則虛虛則寒搏於皮膚之間者火之虛也瘧氣之發陽並於陰則陰實而陽虛陽明虛則寒栗鼓喘又傷寒將解其人本虛邪與正爭而為戰汗故凡戰栗者皆陰陽之爭也諸痙項強皆屬於濕痙風強病也此濕甚而兼風木之化諸逆衝上皆屬於火火性炎上諸脹腹大皆屬於熱熱氣內盛者在肺則脹於上在脾胃則脹於中在肝腎則脹於下此以火邪所至乃為煩滿也諸躁狂越皆屬於火躁煩躁狂狂亂越乘越也火入於肺則煩火入於腎則躁然氣交變大論曰歲水太過寒氣流行害心火身熱煩心陰厥謔妄之類是為陰盛發躁成無已曰雖躁欲坐井中但欲水不得入口是也諸暴強直皆屬於風暴猝也強直筋病強徑也諸病有聲腸鳴鼓之如鼓鼓脹皆屬於熱為陽氣所逆故屬於熱諸病胕腫疼酸驚駭皆屬於火浮腫者陽實於外火在經也疼酸者火甚制金不能平木木實作酸也驚駭者君火甚也諸轉反戾水液渾濁皆屬於熱木勝協火則筋引急或偏引之則為轉為反而乖戾於常水液小便也諸病水液澄徹清冷皆屬於寒水液上下所出水液也諸嘔吐酸火炎上也暴注下迫皆屬於熱腸胃熱則傳化失常故猝暴注泄下迫後重裡急迫痛也寒者熱之熱者寒之此正治也微者逆之甚者從之逆者正治以寒治熱以熱治寒逆其病者謂之正治從者反治以寒治寒以熱治熱從其病者謂之反治從少從多觀其事也從少謂一同而二異從多謂二同而一異熱因寒用熱藥冷服寒因熱用寒藥熱服塞因塞用如下氣虛乏中焦氣壅欲散滿則益虛其下補下則滿甚於中而先攻其滿藥入或減藥過依然乃不知少服則資壅多服則宣通疏啓其中峻補其下下虛既實中滿自除通因通用如大熱內蓄注泄不止以寒下之寒積久泄以熱下之必伏其所主而先其所因以上四治必隱伏其所主而先求其病之由是為反治也論言治寒以熱治熱以寒而方士不能廢繩墨而更其道也有病熱者寒之而熱言以苦寒治熱而熱如故有病寒者熱之而寒言以辛熱治寒而寒如故二者皆在新病復起奈何治日諸寒之而熱者取之陰補陰以配其陽則陰氣復而熱自退熱之而寒者取之陽補水中之火則陽氣復而寒自消所謂求其屬也服寒而反熱服熱而反寒其故何也曰治其旺氣是以反也如治火旺用苦寒降陰則火愈盛如治陰旺用辛溫耗氣則寒愈盛此皆專治旺氣故其病反如此不治旺而然者何也曰不治五味屬也夫五味入胃各歸所喜攻酸先入肝苦先入心甘先入脾辛先入肺咸先入腎久而增氣物化之常也氣增而久夭之由也五味各入其所屬如偏用久而增氣此物化之常氣增不已則藏有偏勝而有偏絶矣如生氣通天論曰味過於酸肝氣以津脾氣乃絶味過於咸大骨氣勞短肌心氣抑味過於甘心氣喘滿色黑腎氣不衡味過於苦脾氣不濡胃氣乃厚味過於辛筋脈阻
