肓俞中極然谷老人虛損手足轉筋不能舉動尺澤合谷陽陵泉承山臨泣太衝霍亂吐瀉手足轉筋尺澤曲池腕骨三里陽陵泉承山京骨寒濕腳氣發熱大痛委中三陰交太衝腎虛腳氣紅腫大熱不退血海三陰交氣衝委中太谿公孫乾腳氣膝頭及內踝五指疼痛陰陵泉三陰交膝關委中絕骨渾身脹滿浮腫生水合谷曲池氣海三里三陰交內庭行間單腹蠱脹氣喘不息膻中氣海水分三里三陰交行間胸腹脹大如盆膻中中脘水分三陰交面目四肢浮腫不退人中合谷曲池三里三陰交臨泣婦人脾氣水血氣石蠱病膻中氣海支溝三里三陰交水分水行間血公孫氣內庭石女人血分單腹氣喘膻中下脘氣海三里行間女人血氣勞倦五心煩熱肢體皆痛頭目昏沉百會膏肓俞腎俞曲池合谷絕骨婦人虛損形瘦赤白帶下百勞腎俞關元三陰交女人子宮久冷不受胎孕中極子宮三陰交經水正行頭暈小腹痛合谷陽交內庭室女月水不調臍腹疼痛腎俞關元三陰交婦人產難合谷三陰交獨陰難產胎衣不下合谷三陰交巨闕獨陰產後臍腹痛惡露不已膏肓俞水分關元三陰交大便不通陰陵泉三陰交申脈太谿以上諸症俱足少陰經照海為主八脈交會八穴歌有圖見卷三以下李仙槎著公孫為父通衝脈內關母與陰維接四經會合胃心胸心脾有病治堪適頭面頸項四肢風後谿申脈當詳核二穴督脈陽蹺通兼屬夫妻自和悅臨泣稱男帶脈連外關女與陽維一氣貫耳頰肩頸目四肢風痛病如失若遇喉風藏病凶客尋照海主列缺列缺原來任脈通陰蹺照海本同轍八穴主客證治歌九種心疼延悶結胸翻胃難停胎衣不下血迷心法瀉公孫立應積塊堅橫脅搶心胸痞脹腸鳴傷寒不解病深沉瘧疾內關可定手足背腰疼痛中風不語癇癲頭眩眼腫項腮牽且向後溪穴針癰毒四肢麻木耳聾身腫綿延頭疼鼻衄淚漣漣申脈針時可痊中風手足不舉腿疼脅脹拘攣頭風咽腫項腮連臨泣亟須針砭肢節腫疼膝冷背胯內外筋牽傷寒盜汗熱難捐主客外關有驗痔瘧便腫泄痢吐紅溺血咳痰死胎不下膈中寒列缺並醫噎咽喉塞便淋酒積昏迷臨產艱難膈中氣核並心煩照海行針可散
