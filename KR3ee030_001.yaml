body:
  text: 卷一靈樞經文靈樞九針十二原篇夫氣之在脈也邪氣在上賊風邪氣之中人高而在上濁氣在中小針寧曰水穀皆入於胃其精氣上注於肺獨溜於腸胃若寒溫不適飲食不節病生於腸胃之間此濁氣在中也清氣在下言清濕地氣之中人必在下而從足始故針陷脈則邪氣出諸經孔穴多在陷者之中故刺各經陷脈則經氣行而邪氣出乃所以針陽邪之在上者針中脈則濁氣出小針解曰取之陽明合也足三里穴刺之可以清腸胃之留滯此下缺清氣在下之義或有所失針太深則邪氣反沉病益言淺病深刺之則邪氣從之入反沉病益深也故曰皮肉筋脈各有所處病各有所宜經絡疾病各有所處各不同形各以任其所宜言九針各不同形故其任用亦各有所宜也無實無虛無實實無虛虛也損不足而益有餘是為甚病病益甚反而為之適所以增病取五脈者死五脈五臟五腧也病在中氣不足而復盡寫其諸陰之脈虛虛故必死取三脈者恇三脈手足三陽六腑脈也若不知虛實而盡寫之令人羸敗恇衰殘也奪陰者死本輸篇曰尺脈動在五里五腧之禁也言取尺之五里五往以奪之則五臟之腧氣皆竭也故曰奪陰者死奪陽者狂如上文取三陽之謂針害畢矣刺之而氣不至無問其數必以氣至為度也刺之而氣至乃去之勿復針氣至勿復針恐其真氣脫也針各有所宜各不同形各任其所為皮肉筋骨病各有處用針各有所宜也刺之要氣至而有效效之信若風之吹雲明乎若見蒼天刺之道畢矣刺以氣為要以效為信促其要則效如風之吹雲邪氣去則正氣見故明乎若見蒼天也五臟五腧五五二十五腧六腑六腧六六三十六腧腧穴之總名五腧即各經井滎俞經合穴也六腑復多一原穴故各有六腧經脈十二絡脈十五凡二十七氣以上下臟有五腑有六而復有手厥陰心主一經是為十二經十二經各有絡脈如手太陰別絡在列缺之類又有任脈之絡曰屏翳督脈之絡曰長強脾之大絡曰大包共為十五絡總二十七氣以通周身上下也所出為井所溜為滎急流曰溜所注為腧注灌溉也所行為經所入為合二十七氣所行皆在五腧也按張景岳解井滎俞經合云井如水源出井其氣正深北方水也滎小水也脈氣尚微東方春也腧輸運也脈由此而輸彼其氣方盛南方夏也經者脈氣大行正盛於此應長夏也合者脈氣由此內行歸合於腑臟西方金也合於本輸水熱穴等篇之旨余如六十五難曰井主春合主冬項氏曰井象水之泉滎象水之陂俞象水之窬經象水之流合象水之歸與靈素經旨不合節之交三百六十五會絡脈之滲灌諸節者也所言節者神氣之所遊行出入也非皮肉筋骨也節者即神氣之所遊行出入以穴腧為言也凡將用針必先診脈視氣之劇易乃可以治也五臟之氣已絕於內而用針者反實其外是謂重竭重竭必死其死也靜臟氣已絕於內陰虛也反實其外誤益陽也益陽則愈損其陰是重竭也陰竭必死死則靜也治之者輒反其氣取腋與膺腋與膺皆臟脈所出氣絕於內而復取之則致氣於外而陰愈竭矣五臟之氣已絕於外而用針者反實其內是謂逆厥逆厥則必死其死也躁臟氣已絕於外陽虛也反實其內誤補陰也助陰則陽氣愈竭故致四逆而厥逆厥必死死必躁也治之者反取四末四末為諸陽之本氣絕於外而取其本則陰氣至而陽愈陷矣四關主治五臟五臟有疾當取之十二原四關者即兩肘兩膝乃周身骨節之大關也故凡井滎俞原經合穴皆手不過肘足不過膝也十二原者本篇言肺原太淵心原即心主俞太陵肝原太衝脾原太白腎原太谿左右各二穴並膏之原鳩尾肓之原脖胦共為十二原穴而臟腑表裡之氣皆通於此故可以治五臟之疾及考六十六難又有心原神門膽原丘墟胃原衝陽三焦原陽池膀胱原京骨大陽原合谷小腸原腕骨合共肺心主肝脾腎之原總為十二原而膏之原肓之原不在其中脹取三陽胃膽膀胱飧泄取三陰脾肝腎靈樞本輸篇輸腧俞占通用春取絡脈諸滎大經分肉之間甚者深取之閒者淺取之春以少陽之令將升未升其氣在中故刺可深可淺絡脈十二經之大絡如列缺之類諸榮如魚際之類夏取諸腧孫絡肌肉皮膚之上夏以老陽之令陽盛於仲故宜淺刺諸腧如太淵之類孫絡詳在後經脈篇中秋取諸合如尺澤之類余如春法秋以少陰之令將降未降其氣在中故亦宜中取於大經分肉之間可淺可深也冬取諸井諸腧之分欲深而留之冬以老陰之令陽氣伏藏諸井如少商之類諸腧謂臟腑之腧如肺腧之類其氣深皆主冬氣故曰欲深而留之也此四時之序氣之所處病之所舍藏之所宜此節言經絡淺深兼諸腧而分主四時也宜與素問四時刺逆從論參其義靈樞邪氣臟腑病形篇諸急者多寒緊急之脈多風寒而氣化從乎肝也緩者多熱縱緩之脈多中縶而氣化從乎脾胃也大者多氣少血脈大為湯有餘氣實血虛而氣化從乎心也小者血氣皆少小者近於微細在陽為陽虛在陰為陰弱脈體屬陰而氣化從乎腎也滑者陽氣盛微有熱滑脈為陽從乎胃也澀者多血少氣微有寒澀為氣滯為血少氣血俱虛則陽氣不足故微有寒也仲景曰澀者榮氣不足亦血少之謂而此曰多血必有誤觀下文刺澀者無令其血出血少可知矣澀脈近毛故氣化從乎肺也是故刺急者深內而久留之刺緩者淺內而疾髮針以去其熱刺大者微瀉其氣無出其血刺滑者疾髮針而淺內之以瀉其陽氣而去其熱刺澀者必中其脈隨其逆順而久留之必先按而循之已髮針疾按其痏無令其血出以和其脈諸小者陰陽形氣俱不足勿取以針而調以甘藥也滎輸治外經合治內府滎俞氣脈浮淺可治外經之病合則氣脈深入可治內府之病胃合於三里胃足陽明也三里為合大腸合於巨墟上廉大腸手陽明也合在曲池其下俞則合於足陽明之巨墟上廉小腸合於巨墟下廉小腸手太陽也合在小海其下俞則合於足陽明之巨墟下廉三焦合入於委陽三焦手少陽也合在天井其下俞則合於足太陽之委中膀胱合入於委中央膀胱足太陽也委中為合膽合於陽陵泉膽足少陽也陽陵泉為合面熱者足陽明病其脈行於面魚絡血手陽明病其脈行於手魚之表兩跗上脈豎陷者足陽明病此胃脈也兩跗之上脈即衝陽也豎者堅而骨陷者弱而虛皆足陽明胃脈之病此胃脈也兼下文手陽明而言大腸病者腸中切痛而鳴濯濯冬月重感於寒即泄當臍而痛不能久立與胃同候取巨墟上廉大腸屬胃故取足陽明之穴胃病者腹䐜脹胃脘當心而痛上支兩脅膈咽不通食飲不下取之三里也小腸病者小腹痛腰脊控睪音高陰丸也而痛時窘之後當耳前熱若寒甚若獨肩上熱甚及手小指次指之間熱若脈陷者此其候也其候則脈有陷者手太陽病也取之巨虛下廉三焦病者腹氣滿小腹尤堅不得小便窘急溢則水留即為脹候在足太陽之外大絡大絡在太陽少陽之間亦見於脈取委陽膀胱病者小腹偏腫而痛以手按之即欲小便而不得肩上熱若脈陷凡大杼等穴脈有陷者及足小指外廉及脛踝後皆熱若脈陷義如上取委中央膽病者善太息口苦嘔宿汁心下澹澹恐人將捕之嗌中吤吤然有聲數唾在足少陽之本末亦視其脈之陷下者灸之其寒熱者取陽陵泉刺此者必中氣穴經氣所至無中肉節中氣穴則針遊於巷巷街也氣脈相通之義中肉節即皮膚痛補瀉反則病益篤中筋則筋緩邪氣不出與其真相搏亂而不去反還內著用針不審以順為逆也靈樞根結篇太陽為開謂陽氣發於外為三陽之表也開折則肉節瀆而暴病起矣折損傷也瀆者皮肉宛膲而弱也消瘦干苦之謂陽明為闔謂陽氣蓄於內為三陽之裡也闔折則氣無所止息而痿疾起矣無所止息者真氣稽留謂胃氣不行邪氣居之矣少陽為樞謂陽氣在表裡之間可出可入如樞機也樞折即骨徭而不安於地骨徭者節緩而不收也太陰為開居陰分之表也開折則倉廩無所輸不運行也膈洞膈隔塞洞者食不化下嗌還出也厥陰為闔居陰分之裡也闔折即氣絕而喜悲肝傷則肺氣乘之也少陰為樞居陰分之中也樞折則脈有所結而不通下焦不通也素問陰陽離合篇與此略同王公大人血食之君身體柔脆肌肉軟弱血氣剽悍滑利其刺之徐疾淺深多少者氣滑則出疾言其出針宜速其氣澀則出遲氣悍則針小而入淺氣澀則針大而入深深則欲留淺則欲疾以此觀之刺布衣者深以留之刺大人者微以徐之此皆因氣剽悍滑利也形氣不足病氣有餘是邪勝也急瀉之形氣有餘病氣不足正氣衰也急補之形氣不足病氣不足此陰陽俱不足也不可刺之刺之則重不足重不足則陰陽俱竭血氣皆盡五臟空虛筋骨髓枯老者絕滅壯者不復矣形氣有餘病氣有餘此謂陰陽俱有餘也急寫其邪調其虛實既刺之後防其驟虛故宜調之也故曰有餘者瀉之不足者補之此之謂也故曰刺不知逆順真邪相搏補瀉反施乃為之逆不知逆順則真氣與邪氣相搏病必甚也滿而補之則陰陽四溢腸胃充郭肝肺內䐜陰陽相錯虛而瀉之則經脈空虛血氣竭枯腸胃㒤闢皮膚薄者毛腠夭膲子之死期㒤醜涉切畏怯也辟邪澼不正也薄著瘦而澀也夭短折也故曰用針之要在於知調陰與陽調陰與陽精氣乃光合形與氣使神內藏故曰上工平氣中工亂脈下工絕氣危生故曰下工不可不慎也必審五臟變化之病五脈之應經絡之實虛皮之柔粗而後取之也靈樞壽天剛柔篇陰中有陰陽中有陽審知陰陽刺之有方得病所始刺之有理謹度病端與時相應內合於五臟六腑外合於筋骨皮膚是故內有陰陽外亦有陰陽在內者五臟為陰六腑為陽在外者筋骨為陰皮膚為陽故曰病在陰之陰者陰病在陰分刺陰之滎輸如手太陰經魚際大淵也病在陽之陽者陽病在陽分刺陽之合如手陽明經曲池也病在陽之陰者陽病在陰分刺陰之經如手太陰經經渠其氣正盛即陰中之陽也病在陰之陽者陰病在陽分刺絡脈如手陽明偏歷也故曰病在陽者名曰風病在陰者名曰痹病陰陽俱病命曰風痹病有形而不痛者陽之類也病淺在外無形而痛者陰之類也病深在內無形而痛者其陽完固也而陰傷之也急治其陰無攻其陽有形而不痛者其陰完而陽傷之也急治其陽無攻其陰凡表裡虛實其治皆然陰陽俱動表裡皆病乍有形乍無形往來不常加以煩心命曰陰勝其陽陰病甚於陽也此謂不表不里其形不久若求其在表而里亦病求其在裡而表亦病此以陰陽並傷故曰不表不里治之為難形將不久矣風寒傷形憂恐忿怒傷氣氣傷臟乃病臟寒傷形乃應形風傷筋脈筋脈乃應此形氣內外之相應也病九日者三刺而已病一月者十刺而已多少遠近以此哀之久痹不去身者視其血絡盡出其血刺營者出血刺衛者出氣刺寒痹者內熱寒痹之留於經者刺後使內熱也營之生病也寒熱少氣血上下行衛之生病也氣痛時來時去怫愾音凱賁響腸胃雷鳴風寒客於腸胃之中寒痹之為病也留而不去時痛而皮不仁刺布衣者以火淬之刺大人者以藥熨之此明上文刺寒痹者內爇之法靈樞官針篇官者任也任九針之所宜也九針之宜各有所為長短大小各有所施也病在皮膚無常處者取以鑱針於病所膚白勿取病在分肉間取以圓針於病所病在經絡痼痹者取以鋒針病在脈氣少當補之者取之鍉針於井滎分輸病為大膿者取以鈹針病痹氣暴發者取以圓利針病痹氣痛而不去者取以毫針病在中者取以長針病水腫不能通關節者取以大針病在五臟固痹者取以鋒針瀉於井滎分輸取以四時前言病在經絡痼痹取以鋒針者止取經絡此則瀉其井滎與俞也四時義見本輸篇凡刺有十二節以應十二經一曰偶刺偶刺者以手直心若背直痛所一刺前一刺後以治心痹刺此者傍針之也二曰報刺重刺也報刺者刺痛無常處也上下行者直內無拔針以左手隨病所按之乃出針復刺之也三曰懨刺懨刺者刺傍之舉之前後懨筋急以治筋痹也懨懨廓也筋急者必刺其傍數舉其針或前或後以懨其氣則筋痹可舒也四曰齊刺齊刺者直入一傍入二三針齊用也以治寒氣小深者或曰三刺三刺者治痹氣小深者也五曰揚刺揚刺者正內一傍內四而浮之以治寒氣之博大者也揚散也中傍共五針而用在浮泛以祛散寒氣六曰直針刺直針刺者引皮乃刺之直入不深以治寒氣之淺者也七曰輸刺輸刺者直入直出輸瀉其邪用其銳也稀髮針而深之留之久也以治氣盛而熱者也八曰短刺短刺者刺骨痹稍搖而深之人之漸也致針骨所以上下摩骨也摩迫切也九曰浮刺浮刺者傍入而浮之以治肌急而寒者也十曰陰刺陰刺者左右率統也刺之以治寒厥中寒厥刺足踝後少陰也刺陰邪也十一曰傍針刺傍針刺者直刺傍刺各一以治留痹久居者也正刺其經傍刺其絡十二曰贊刺贊刺者直入直出數髮針而淺之出血是為治癰腫也贊助也數髮針而淺之以後助前可使之出血脈之所居深不見者刺之微內針而久留之以致其空脈氣也脈淺者勿刺按絕其脈乃刺之無含精出獨出其邪氣耳凡刺有五以應五臟一曰半刺半刺者淺內而疾髮針無針傷肉如拔毛狀以取皮氣此肺之應也二曰豹文刺言其多也豹文刺者左右前後針之中脈為故以取經絡之血者此心之應也三曰關刺關刺者直刺左右盡筋上以取筋痹慎無出血血以養筋也此肝之應也或曰淵刺一曰豈刺淵刺豈刺皆古名四曰合谷刺合谷刺者左右雞足針於分肉之間以取肌痹此脾之應也合谷刺者言三四攢合如雞足刺之邪在肉間所以應脾五曰輸刺輸刺者直入直出義見前深內之至骨以取骨痹此腎之應也靈樞終始篇凡刺之道氣調而止補陰瀉陽音氣益彰耳目聰明此陰陽以表裡言正氣在中故當補陰邪自外入故當瀉陽陽邪去而真氣復故音氣益彰耳目聰明也反此者血氣不行所謂氣至而有效者瀉則益虛虛者脈大如其故而不堅也瀉者欲其虛也既瀉之後雖其脈大如舊但得和軟不堅即其效也堅如其故者適雖言故病未去也脈堅如舊雖言病去復舊而病實未除也補則益實實者脈大如其故而益堅也補者欲其實實則脈堅夫如其故而不堅者適雖言快病未去也既補之後而脈之大小如舊雖言身體已快病未除也二節云大者概指脈體進退而言也故補則實瀉則虛痛雖不隨針病必衰去補則脈堅瀉則脈不堅者若或有痛雖未隨針即愈亦必以漸而去矣必先通十二經脈之所生病而後可得傳於終始矣必治其病所從生而後可得終始之義終始即本末之謂故陰陽不相移虛實不相傾取之其經或陰或陽無所改易不相移也虛者自虛實者自實亦不相傷此則無所從生而各病其病但求其經而取之凡刺之屬三刺至穀氣義如下文邪辟妄合陰陽易居逆順相反沉浮異處四時不得稽留淫泆六句言病變也凡此者皆須用針治以三刺之法則諸病可去也故一刺則陽邪出初刺之在於淺近故可出陽分之邪再刺則陰邪出再刺之在於深遠故可出陰分之邪三刺則穀氣至穀氣至而止所為穀氣至者已補而實已瀉而虛故以知穀氣至也三刺之在侯穀氣即元氣也止出針也蓋邪氣來也緊而疾穀氣來也徐而和必邪氣去而後穀氣至故已補而實則虛者堅已瀉而虛則堅者軟是以知穀氣之至也邪氣獨去者陰與陽未能調而病知愈也故曰補則實瀉則虛痛雖不隨針病必衰去矣穀氣至者知邪氣之去也雖陰陽經氣未見即調而病則已愈故上文曰補則實寫則虛病必衰去陰盛而陽虛脈口盛也先補其陽後瀉其陰而和之陰虛而陽盛人迎盛也先補其陰後瀉其陽而和之治病皆宜先顧正氣後治邪氣三脈動於足大指之間三脈謂陽明經屬兌至衝陽厥陰經大敦至太衝少陰經自湧泉以上太谿三者皆在足大指之後也必審其實虛虛而瀉之是為重虛重虛病益甚凡刺此者以指按之脈動而實且疾者疾瀉之虛而徐者則補之反此者病益甚其動也陽明在上在足跗上也厥陰在內在足跗內也少陰在下湧泉穴起於足心在足跗下也補當作刺須一方實深取之稀按其痏以極出其邪氣刺法惟二則補瀉而已一者因其方實故深刺勿按其痏以出其邪氣此瀉法也一方虛淺刺之以養其脈疾按其痏無使邪氣得入一者因其方虛故淺刺以養血脈疾按其穴以拒邪氣此補法也邪氣來也緊而疾穀氣來也徐而和此雖言針下之氣然脈氣之至亦如此脈實者深刺之以泄其氣脈虛者淺刺之使精氣無得出以養其脈獨出其邪氣刺諸痛者其脈皆實上重舌刺舌柱舌下之筋如柱者以鈹針也手屈而不伸者其病在筋伸而不屈者其病在骨病生於頭者頭重生於手者臂重生於足者足重治病者先刺其病所從生者也春氣在毛夏氣在皮膚秋氣在分肉冬氣在筋骨此言病氣之中人隨時氣而為淺深也刺此病者各以其時為齊同劑針曰砭齊故刺肥人者以秋冬之齊刺瘦人者以春夏之齊癢痛者陰也痛而以手按之不得者陰也深刺之病在上者陽也病在下者陰也癢者陽也淺刺之邪之在表者其氣外發或氣往來行則流而為癢刺熱厥者二陰一陽補陰經二次瀉陽經一次刺寒厥者二陽一陰補陽經二次瀉陰經一次久病者邪氣入深刺此病者深內而久留之間日而復刺之必先調其左右去其血脈刺道畢矣凡刺之法必察其形氣形肉未脫少氣而脈又躁躁厥者必為繆刺之散氣可收聚氣可布痏少氣而形肉未脫其脈躁急其病躁而厥逆者氣虛於內邪實於經也所刺在絡其用輕淺則精氣之散者可收邪氣之聚者可散也深居靜處占神往來閉戶塞牖魂魄不散專意一神精氣之分母聞人聲以收其精必一其神令志在針言刺此者必清必靜聚精會神詳察秋毫令志在針庶於虛實疑似之間無誤也淺而留之微而浮之以移其神氣至乃休言氣虛邪熱之病用針宜從容以移其神耳男內女外堅拒勿出謹守勿內是謂得氣既刺之後尤當戒慎男子忌內女子忌外忌外者堅拒勿出忌內者謹守勿內則其邪氣必去正氣必復是為得氣凡刺之禁新內勿刺新刺勿內已醉勿刺已刺勿醉新怒勿刺已刺勿怒新勞勿刺已刺勿勞已飽勿刺已刺勿飽已飢勿刺已刺勿飢已渴勿刺已刺勿渴大驚大恐必定其氣乃刺之乘車來者臥而休之如食頃乃刺之步行來者坐而休之如行十里𭎸乃刺之凡此十二禁者其脈亂氣散逆其營衛經氣不次因而刺之則陽病入於陰陰病出為陽則邪氣復生粗工勿察是為伐身形體淫泆乃消腦髓津液不化脫其五味是為失氣也靈樞經脈篇肺手太陰之脈起於中焦當胃中脘在臍上四寸之分下絡大腸絡聯絡也當任脈水分穴之分凡在本經者皆曰屬以此通彼者皆曰絡還循胃口循巡繞也上膈屬肺膈膈膜也人有膈膜居心肺之下前齊鳩尾後齊十一椎周圍相著所以遮隔濁氣不使上熏心肺也屬者所部之謂從肺系橫出腋下肺系喉嚨也腋下中府之旁下循臑內天府俠白之次行少陰心主之前手之三陰肺太陰在前心主厥陰在中心少陰在後也下肘中循臂內從尺澤穴行孔最列缺經渠之次上骨下廉入寸口骨掌後高骨也下廉骨下側也寸口即太淵穴處上魚循魚際手腕之前肥肉隆起形如魚者統謂之魚魚之後曰魚際穴出大指之端端指尖也手太陰經止於少商穴其支者從腕後直出次指內廉出其端支者如卞之有枝此以正經之外而復有旁通之絡也從列缺穴直出次指之端交少商穴而接手陽明經也是動則病肺脹滿膨膨而喘咳動言變也缺盆中痛缺盆雖十二經之道路而肺為尤近也甚則交兩手而瞀音茂此為臂厥瞀木痛不仁也是主肺所生病者本篇凡在五臟則各言藏所生病凡在六腑則或言氣或言血或脈或筋或骨或津液其所生病本各有所主咳上氣喘渴煩心胸滿臑臂內前廉痛厥掌中熱渴當作喝聲粗急也太陰之別直入掌中故為痛厥掌熱氣盛有餘則肩背痛風寒汗出中風風寒在表也小便數而欠邪傷其氣也氣虛則肩背痛寒少氣不足以息溺色變金衰則水涸也為此諸病盛則瀉之虛則補之熱則疾之氣至速也寒則留之氣至遲也陷下則灸之陽氣內衰脈不起也不盛不虛以經取之病有不因血氣之虛實而惟逆於經者則當隨經所在或飲藥或刺灸以取之也盛者寸口大三倍於人迎虛者則寸口反小於人迎也寸口主陰故肺氣盛者寸口大三倍於人迎虛則反小也人迎在結喉旁一寸五分乃三陽脈氣所至也大腸手陽明之脈起於大指次指之端穴名商陽循指上廉二間三間也出合谷兩骨之間合谷在大指次指後歧骨間上入兩筋之中陽谿穴也循臂上廉入肘外廉行曲池穴處上臑外前廉行肘髎五里臂臑穴處上肩出髃骨之前廉肩髃巨骨穴處上出於柱骨之會上肩背之上頸項之根為天柱骨六陽皆會於督脈之大椎是為會上下入缺盆絡肺下膈屬大腸當臍旁天樞之分屬於大腸與肺為表裡也其支者從缺盆上頸貫頰天鼎扶突穴處入下齒中還出挾口交人中左之右右之左由人中而左右互交上挾鼻孔自禾髎以交於迎香穴也是動則病齒痛頸腫是主津液所生病者凡大腸之或泄或秘皆津液所生之病目黃口乾鼻丸衄喉痹肩前臑痛大指次指痛不用手陽明之別者合於宗脈敵目黃其他諸病皆本經之脈所及氣有餘則當脈所過者熱腫虛則寒慄不復不易溫也為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之義如前盛者人迎大三倍於寸口虛者人迎反小於寸口也人迎主陽故手陽明脈候在人迎胃足陽明之脈起於鼻之交頞中其脈左右互交頞鼻根也旁納太陽之脈納入也下循鼻外即承泣四白巨髎之分入上齒中還出挾口環唇下交承漿任脈穴名卻循頤後下廉出大迎由地倉以下大迎也循頰車上耳前下關穴也過客主人足少陽經穴名循髮際頭維穴也至額顱髮際前督脈之神庭穴也其支者從大迎前下人迎太經穴名循喉嚨入缺盆下膈屬胃絡脾此支自缺盆穴入內下膈當上脘中脘之分屬於胃與脾為表裡也其直者從缺盆下乳內廉直下而外行者從缺盆下行氣戶等穴以至乳中乳根也下挾臍天樞等穴入氣街中自外陵等穴下入氣街也其支者起於胃口下脘之分下循腹裡過足少陰肓俞之外下至氣街中而合與直者復合於氣街之中以下髀關抵伏兔下膝臏中下循脛外廉下足跗入中指內間髀關伏兔皆膝上穴名自此由陰市諸穴犢鼻巨虛沖陽等穴之次乃循內庭入中指內間而出厲兌足陽明經止此其支者下廉三寸而別下入中指外間其支自豐隆穴別行入中指外間其支者別跗上入大指間出其端又其支自跗上衝陽穴次別行入大指間斜出足厥陰行間之次循大指出其端而接足太陰經也是動則病洒洒振寒風之勝也善呻數欠胃之郁也顏黑土病則水無所畏故黑色反見於顏面病至則惡人與火邪客陽明則熱甚也聞木聲則惕然而驚土惡木也心欲動獨閉戶塞牖而處陰陽相薄陽盡而陰盛故欲獨閉戶而處也甚則欲上高而歌陽盛則四肢實也棄衣而走熱盛於身也賁響腸胃雷鳴腹脹是為骭厥骭足脛也陽明之脈所及故為厥逆是主血所生病者中焦受谷變化而赤為血故陽明之經主血所生病狂瘧溫淫汗出鼽衄口喎唇胗頸腫喉痹陽明熱勝則狂風勝則瘧溫氣淫泆則汗出鼽衄口喎等症胗瘡也大腹水腫土病則不能制水也膝臏腫痛循膺乳氣街股伏兔骭外廉足跗上皆痛中指不用皆陽明經脈之所及氣盛則身以前皆熱其有餘於胃則消穀善飢溺色黃此陽明實熱在經在臟之辨也氣不足則身以前皆寒慄胃中寒則脹滿為此諸病此陽屬虛寒在經在臟之辨也盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之義如前盛者人迎大三倍於寸口虛者人迎反小於寸口也脈之盛衰見於人迎脾足太陰之脈起於大指之端隱白穴循指內側白肉際過核骨後上內踝前廉行大都太白等穴上踹內循脛骨後交出厥陰之前自漏谷上行地機陰陵泉上膝股內前廉股大腿也前廉上側也當血海箕門之次入腹屬脾絡胃自衝門穴人腹內行當中脘下脘之分屬脾絡胃也上膈挾咽連舌本散舌下自胃脘上行至咽連舌本散舌下而終其支者復從胃別上膈注心中足太陰外行者由腹而上府舍腹結等穴散於胸中止於大包穴其內行而支者自胃脘別上膈注心中而接手少陰經也是動則病舌本強食則嘔胃脘痛腹脹善噫噫噯嘆聲得後與氣則快然如衰脾氣通也身體皆重是主脾所生病者舌本痛體不能動搖食不下煩心心下急痛太陰脈支者上膈注心中故為煩心心痛溏瘕泄水閉黃疸不能臥脾寒則為溏泄脾滯則為癥瘕脾病不能制水則為泄為水閉黃疸不能臥強立股膝內腫厥足大指不用為此諸病皆足太陰經脈之所及盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之義如前盛者寸口大三倍於人迎虛者寸口僅小於人迎脈之盛衰候於氣口心手少陰之脈起於心中出屬心系必當五椎之下其繫有五上系連肺肺下繫心心下三系連脾肝腎故心通五臟之氣而為之主也下膈絡小腸當臍上二寸下脘之分絡小腸也具支者從心系上挾咽系目系支者從心系出任脈之外上行挾咽系目系合於內眥其直者復從心系卻上肺下出腋下直者經之正脈也此自心系復上肺由足少陽淵腋之次出腋下上行極泉穴手少陰經行於外者始此下循臑內後廉青靈穴也行太陰心主之後手之三陰少陰居太陰厥陰之後下肘內循臂內後廉少海靈道等穴抵掌後銳骨之端神門穴也入掌內後廉少府穴循小指之內出其端少衝穴手少陰經止此乃交小指外側而接手太陽經也是動則病嗌乾心痛本經支者從心系上挾咽也渴而欲飲心火炎則心液耗也是為臂厥是主心所生病者目黃脅痛少陰之脈系目系出腋下也臑臂內後廉痛厥掌中熱痛為此諸病皆手少陰經脈之所及盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之義如前盛者寸口大再倍於人迎虛者寸口反小於人迎也脈之盛衰候在寸口小腸手太陽之脈起於小指之端小指外側少澤穴循手外側上腕出踝中前谷後谿腕骨穴也直上循臂骨下廉陽谷等穴出肘內側兩筋之間小海穴也上循臑外後廉行手陽明少陽之外出肩解肩貞穴繞肩胛臑俞天宗之處交肩上秉風曲垣等穴左右交於兩肩之上會於督脈之大椎入缺盆絡心行於內者自缺盆由胸下行入膻中絡心循咽下膈抵胃屬小腸當臍上二寸之分屬小腸也其支者從缺盆循頸上頰其支行於外者出缺盆抵頸中天窗穴而上頰後天容穴至目銳眥卻入耳中由顴髎入聽宮穴手太陽經止此其支者別頰上䪼抵鼻至目銳眥斜絡於顴又其發自顧肩穴交目內眥而接足太陽經也是動則病嗌痛頷腫不可以顧肩似拔臑似折肩臑之痛如拔如折是主液所生病者小腸主沁別清濁耳聾目黃頰腫頸頷肩臑肘臂外後廉痛為此諸病皆小腸經脈之所及盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之義如前盛者人迎大再倍於寸口虛者人迎反小於寸口也脈之盛衰候在人迎膀胱足太陽之脈起於目內眥睛明穴上額交巔由攢竹上額歷曲差五處等穴自絡卻穴左右斜行交於頂巔之百會穴其支者從巔至耳上角由百會旁行過足少陽之曲鬢率谷天衝浮白竅陰完骨穴處其直者從巔入絡腦自百會行通天絡卻玉枕入絡於腦中也還出別下項循肩膊內挾脊抵腰中目腦復出別下項由天柱而下會於督脈之大椎陶道卻循肩膊內分四行而下此節言內兩行夾脊兩旁各去一寸半自大杼行風門及藏府諸俞而抵腰中等穴也入循膂絡腎屬膀胱自腰中入膂絡腎前屬膀胱其支者從腰中下挾脊歷四髎穴貫臀入膕中貫醫之會陽穴下行承扶殷門浮卻委陽人委中也其支者從膊內左右別下貫胛挾脊內此支言肩膊內大杼下外兩行也左右貫胛去脊各三寸別行歷附分魄戶膏肓等穴下至秩邊而過脾樞也過髀樞循髀外從後廉下合膕中過髀樞會於足少陽之環跳循髀外後廉去承扶一寸五分之間下行復與前之入膕中者相合以下貫腨內由合陽以下承筋承山等穴出外踝之後崑崙僕參等穴循京骨即穴名至小指外側至陰穴也足太陽經止此乃交於小指之下而接足少陰經也是動則病沖頭痛邪氣上衝而為頭痛目似脫項如拔脊痛腰似折髀不可以曲膕如結疏如裂是為踝厥足太陽筋結於外踝是主筋所生病者周身筋脈惟足太陽為多凡為攣為弛為反張戴眼之類皆足太陽之水虧而主筋所生病痔瘧狂癲疾脈人肛故為痔經屬表故為瘧邪人於陽故為狂癲疾頭囟項痛目黃淚出鼽衄項背腰尻膕踹腳皆痛小指不用為此諸病皆足太陽經脈之所及盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之義如前盛者人迎大再倍於寸口虛者人迎反小於寸口也脈之盛衰候在人迎腎足少陰之脈起於小指之下邪走足心湧泉穴出於然谷之下循內踝之後別入跟中太谿大鐘等穴以上踹內出膕內廉自復溜交信過足太陰之三陰交以上踹內之築賓出膕內廉之陰谷上股內後廉貫脊屬腎絡膀胱上股內後廉結於督脈之長強貫脊中而後屬於腎前當關元中極之分絡於膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本直行者從肓俞穴屬腎處上行循商曲石關陰都通谷諸穴貫肝上循幽門上膈歷步廊人肺中循神封靈墟神藏彧中俞府上循喉嚨並人迎挾舌本而終也其支者從肺出絡心注胸中其支自神藏之際從肺絡心注胸中以上俞府諸穴足少陰經止於此而接手厥陰經也是動則病飢不欲食腎雖陰藏元陽所居水中有火為脾胃之母陰動則陽衰陽衰則脾困故病雖飢而不欲食面如漆柴水色黑陰邪色見於面故如漆腎藏精精衰則枯故如柴咳唾則有血喝喝而喘真陰損及其母也坐而欲起陰虛不能靜也目䀮䀮如無所見凡目多昏黑者必真水虧於腎也心如懸若飢狀心腎不交則精神離散故心如懸陰虛則內餒故當告飢狀氣不足則善恐心惕惕如人將捕之腎氣怯也是為骨厥厥逆在骨是主腎所生病者口熱舌乾咽腫上氣嗌乾及痛煩心心痛黃疽腸澼脊股內後廉痛痿厥嗜臥足下熱而痛為此諸病皆足少陰經脈之所及盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之義如前灸則強食生肉緩帶披髮大杖重履而步味厚所以補精節勞安靜所以養氣諸經不言此法而唯腎經言之者以真陰所在精為元氣之根也盛者寸口大再倍於人迎虛者寸口反小於人迎也脈之盛衰候在寸口心主手厥陰心包絡之脈起於胸中心主者心之所主也心本手少陰而復有手厥陰者心包絡之經也出屬心包絡即包心之膜絡也下膈歷絡三焦包絡為心主之外衛三焦為臟腑之外衛故為表裡而相絡諸經皆無歷字獨此有之蓋指上中下而言上即膻中中即中脘下即臍下之陰交穴為三焦膜也其支者循胸出脅下腋三寸天池穴上抵腋下天泉穴循臑內行太陰少陰之間手之三陰厥陰在中也入肘中下臂行兩筋之間入曲澤穴至郄門間使內關太陵也入掌中勞宮穴循中指出其端中衝穴手厥陰經止於此其支者別掌中循小指次指出其端其支自勞宮別行無名指端而接手少陽經也是動則病手心熱臂肘攣急腋腫甚則胸脅支滿心中憺憺大動手厥陰出屬心包絡循胸出脅故也憺憺動而不寧之貌面赤目黃心之華在面目者心之使故也喜笑不休心在聲為笑是主脈所生病者心主脈也煩心心痛掌中熱為此諸病脈起心胸入掌中也盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之義如前盛者寸口大一倍於人迎虛者寸口反小於人迎也脈之盛衰候在寸口三焦手少陽之脈起於小指次指之端關衝穴上出兩指之間即小指次指之間液門中渚穴也循手表腕陽池出臂外兩骨之間外關支溝等穴上貫肘天井循臑外上肩而交出足少陽之後循臑外行手太陽之前手陽明之後歷清冷淵消濼臑會上肩髎過足少陽之肩並自天髎而交出足少陽之後也入缺盆布膻中散絡心包下膈循屬三焦其內行者入缺盆復由足陽明之外下布膻中散絡心包相為表裡乃自上焦下膈循中焦下行並足太陽之正入絡膀胱以約下焦故足太陽經委陽穴為三焦下輔俞也其支者從膻中上出缺盆上項系耳後直上出耳上角以屈下頰至䪼其支行於外者自膻中上行出缺盆循天髎上項會於督脈之大椎循天牖系耳後之翳風瘛脈盧囟出角孫過足少陽之懸釐頷厭下行耳頰至䪼會於手太陽顴髎之分其支者從耳後入耳中出走耳前過客主人前交頰至目銳眥此支從耳後翳風入耳中過手太陽之聽宮出走耳前之耳門過足少陽之客主人交頰循和髎上絲竹空至目銳眥會於瞳子髎而接足少陽經也是動則病耳聾渾渾焞焞不明貌嗌腫喉痹三焦之脈上項系耳後故為是病汗出目銳眥痛頰痛耳後肩臑肘臂外皆痛小指次指不用為此諸病三焦出氣以溫肌肉充皮膚故為汗出盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之義如前盛者人迎大一倍於寸口虛者人迎反小於寸口也脈之盛衰候在人迎膽足少陽之脈起於目銳眥上抵頭角下耳後自瞳子髎由聽會客主人上抵頭角循頷厭下懸盧懸釐入曲賓率谷歷手少陽之角孫外折下耳後行天衝浮白竅陰有完骨外折上行循本神前至陽白復內折上行循臨泣目窗正營承靈腦空出風池而下行也循頸行手少陽之前至肩上卻交出手少陽之後入缺盆目風池循頸過手少陽之天牖行少陽之前下至肩上循肩井復交出手少陽之後過督脈之大椎會於手太陽之秉風而前入於足陽明缺盆之外其支者從耳後入耳中出走耳前至目銳眥後其支者從耳後顳顬間過手少陽之翳風入耳中過手太陽之聽宮出走耳前復自聽會至目銳眥後瞳子髎之分其支者別銳眥下大迎合於手少陽抵於䪼共支者別自目外眥瞳子髎下足陽明大迎之次由手少陽之絲竹和髎而下抵於䪼也下加頰車下頸合缺盆其下於足陽明者合於下關乃自頰車下頸循本經之前與前之入缺盆者相合以下胸中貫膈絡肝屬膽循脅裡出氣街繞毛際橫入髀厭中其內行者由缺盆下胸當手厥陰天地之分貫膈足厥陰期門之分絡肝本經日月之分屬膽而相為表裡乃循脅裡由足厥陰之章門下行出足陽明之氣街繞毛際合於足厥陰以橫入髀厭中之環跳穴也其直者從缺盆下腋循胸過季脅下合髀厭中其直下而行於外者從缺盆下腋循胸歷淵腋輒筋日月過季脅循京門帶脈等穴下行由居髎入足太陽之上髎中髎下髎下行復與前之入髀厭者相合以下循髀陽出膝外廉下外輔骨之前由髀之外側行太陽陽明之中歷中瀆陽關出膝外廉自陽陵泉以下陽交等穴直下抵絕骨之端陽輔穴下出外踝之前下行懸鐘循足跗上入小指次指之間循丘墟臨泣等穴乃入小指次指之間至竅陰穴其支者別跗上入大指之間循大指歧骨內出其端還貫爪甲出三毛其支者自足跗上別行入大指循歧骨內出大指端還貫入爪甲出三毛而接足厥陰經也是動則病口苦善太息心脅痛不能轉側足少陽之別貫心循脅裡也甚則面微有塵體無膏澤膽木為病燥金勝之故面微有塵體無膏澤足外反熱是為陽厥木病從火故為陽厥是主骨所生病者膽病則失其剛故病及於骨頭痛頷痛目銳眥痛缺盆中腫痛腋下腫馬刀俠癭馬刀瘰癧也俠癭俠頸之瘤屬也汗出振寒瘧少陽居三陽之中半表半裡者也故陽勝則汗出風勝則振寒為瘧胸脅肋髀膝外至脛絕骨外踝前及諸節皆痛小指次指不用為此諸病皆足少陽經脈之所及盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之義如前盛者人迎大一倍於寸口虛者人迎反小於寸口也脈之盛衰候在人迎肝足厥陰之脈起於大指叢毛之際大敦穴上循足跗上廉行間太衝去內踝一寸中封上踝八寸交出太陰之後上膕內廉上踝過足太陰之三陰交歷蠡溝中都復上一寸交出太陰之後上膕內廉至膝關曲泉也循股陰入毛中過陰器循股內之陰包五里陰廉上會於足太陰之衝門府舍入陰毛中之急脈遂左右相交環繞陰器而會於任脈之曲骨抵小腹挾胃屬肝絡膽自陰上入小腹會於任脈之中極關元循章門至期門之所挾胃屬肝下足少陽日月之所絡膽也循喉嚨之後上入頏顙連目系上出額與督脈會於巔其內行而上者自脅肋間由足陽明人迎之外循喉嚨之後入頏顙行足陽明大迎地倉四白之外內連目系上出足少陽陽白之外臨泣之裡與督脈相會於頂巔之百會其支者從目系下頰裡環唇內此支者從前目系之分下行任脈之外本經之裡下頰裡交環於口唇之內其支者復從肝別貫膈上注肺又其支者從前期門屬肝所行足太陰食竇之外本經之裡別貫膈上注於肺下行至中焦挾中脘之分復接於手太陰肺經以盡十二經之一周終而復始也是動則病腰痛不可以俯仰足厥陰支別者與太陰少陽之脈同結於腰髁下中髎下髎之間故為腰痛丈夫㿉疝婦人少腹腫足厥陰氣逆則為睪腫卒疝婦人少腹腫即疝病也甚則嗌乾面塵脫色是肝所生病者胸滿嘔逆飧泄狐疝遺溺閉癃足厥陰經上行者挾胃貫膈下行者過陰器抵小腹也為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之義如前盛者寸口大一倍於人迎虛者寸口反小於人迎也脈之盛衰候在寸口諸絡脈皆不能經大節之間必行絕道而出入復合於皮中其會皆見於外經脈伏行分肉必由溪谷大節之間絡脈行於阻絕之道出入聯絡以相通然絡有大小大絡猶木之干行有出人其十二大絡生一百八十系絡系絡生一百八十纏絡纏絡生三萬四千孫絡孫絡猶木之枝散於膚腠故其會皆見於外故諸刺絡脈者必刺其結上甚血者雖無結急取之以瀉其邪而出其血留之發為痹也此以血之所聚其結粗突倍常即常刺處也若血聚已甚雖無結絡亦急取之以去其邪血否則發為痹痛之病凡診絡脈脈色青則寒且痛赤則有熱胃中寒手魚之絡多青矣胃中有熱魚際絡赤其暴黑者留久痹也其有赤有黑有青者寒熱氣也其青短者少氣也視各經絡脈之色以察病則魚際尤為易見凡刺寒熱者皆多血絡必間日而一取之血盡而止乃調其虛實此言邪氣客於皮毛未入於經而為寒熱者病在血絡取候血盡則邪盡止針而後因其虛實以調治之其小而短者少氣甚者瀉之則悶虛甚而瀉必致昏悶悶甚則僕不得言運僕暴脫不能出言悶則急坐之也須於初悶時急扶靜坐使得氣轉若偃臥則氣滯恐致不救也手太陰之別名曰列缺起於腕上分間並太陰之經直入掌中散入魚際其病實則手銳掌熱虛則欠㰦音去小便遺數取之去腕寸半別走陽明也手少陰之別名曰通里去腕一寸別而上行循經入於心中系舌本屬目系其實則支膈虛則不能言取之掌後一寸別走太陽也手心主之別名曰內關去腕二寸出於兩筋之間循經上繫於心包絡心系實則心痛虛則為頭強皆取之手太陽之別名曰支正上腕五寸內注少陰其別者上走肘絡肩髃實則節弛肘廢虛則生疣小者如指痂疥取之所別也如指間痂疥之類手陽明之別名曰偏歷去腕三寸別入太陰其別者上循臂乘肩髃上曲頰偏齒其別者入耳合於宗脈實則齲聾虛則齒寒痹隔取之所別也手少陽之別名曰外關去腕二寸外繞臂注胸中合心主病實則肘攣虛則不收取之所別也足太陽之別名曰飛揚去踝七寸別走少陰實則鼽窒頭背痛虛則鼽衄取之所別也足少陽之別名曰光明去踝五寸別走厥陰下絡足跗實則厥虛則痿躄坐不能起取之所別也足陽明之別名曰豐隆去踝八寸別走太陰其別者循脛骨外廉上絡頭項合諸經之氣下絡喉嗌其病氣逆則喉痹瘁喑實則狂癲虛則足不收脛枯取之所別也足太陰之別名曰公孫去本節之後一寸別走陽明其別者入絡腸胃厥氣上逆則霍亂實則腸中切痛虛則鼓脹取之所別也足少陰之別名曰大鐘當踝後繞跟別走太陽其別者並經上走於心包下外貫腰脊其病氣逆則煩悶實則閉癃虛則腰痛取之所別也足厥陰之別名曰蠡溝去內踝五寸別走少陽其別者循莖上睪結於莖其病氣逆則睪腫卒疝實則挺長虛則暴癢取之所別也任脈之別名曰尾翳下鳩尾散於腹實則腹皮痛虛則癢搔取之尾翳誤任脈之絡名屏翳即會陰穴此任督沖三脈所起之處由鳩尾下行散於腹也督脈之別名曰長強俠膂上項散頭上下當肩胛左右別走太陽人貫膂實則脊強虛則頭重高搖之挾脊之有過者取之所別也脾之大絡名曰大包出淵液下三寸布胸脅實則身盡痛虛則百節盡皆縱此脈若羅絡之血者皆取脾之大絡脈也凡此十五絡者實則必見虛則必下視之不見求之上下人經不同絡脈異所別也絡滿經虛灸陰刺陽經滿絡虛刺陰灸陽絡主陽經主陰灸為補刺為瀉詳在素問通評虛實論靈樞經水足陽明五臟六腑之海也其脈大血多氣盛熱壯刺此者不深弗散不留不瀉也足陽明刺深六分留十呼足太陽深五分留七呼足少陽深四分留五呼足太陰深一分留四呼足少陰深二分留三呼足厥陰深一分留二呼手之陰陽其受氣之道近其氣之來疾其刺深者皆無過二分其留皆無過一呼其少長大小肥瘦以心撩之命曰法天之常灸之一然灸而過此者得惡火則骨枯脈澀刺而過此者則脫氣靈樞脈度手之六陽從手至頭長五尺五六三丈手之六陰從手至胸中三尺五寸三六一丈八尺五六三尺合二丈一尺足之六陽從足上至頭八尺六八四丈八尺足之六陰從足至胸中六尺五寸六六三丈六尺五六三尺合三丈九尺蹺脈從足至目七尺五寸二七一丈四尺二五一尺合一丈五尺督任脈各四尺五寸二四八尺二五一尺合九尺凡都合一十六丈二尺此氣之大經隧也經脈為里支而橫者為絡絡之別者為孫盛而血者疾誅之盛者瀉之虛者飲藥以補之蹺脈者少陰之別起於然骨之後上內踝之上直上循陰股入陰上循胸裡入缺盆上出人迎之前入頄屬目內眥合於太陽陽蹺而上行氣並相還則為濡目氣不營則目不合男子數其陽女子數其陰當數者為經不當數者為絡也男子以陽蹺為經陰蹺為絡女子以陰蹺為經陽蹺為絡也靈樞四時氣篇飧泄完穀不化也補三陰之上補陰陵泉皆久留之熱行乃止轉筋於陽治其陽轉筋於陰治其陰皆卒刺之凡手足之外廉皆屬陽經手足之內廉皆屬陰經徒㽷水同先取環谷下三寸有水無風故曰徒水環谷無所考或即環跳穴今曰環谷下三寸當作風市穴以鈹針針之間日一刺之㽷盡乃止飲閉藥小便閉須飲通閉之藥以利其水著痹不去久寒不已卒取其三里溫補胃氣則寒濕散腸中不便取三里盛瀉之虛補之言大便不通者由於邪氣之盛則瀉之由於正氣之虛則補之癘風者素刺其腫上已刺以銳針針其處按出其惡氣腫盡乃止常食方食無食他食癘音癩即大風也素問長刺節論骨空論皆有刺法腹中常鳴氣上衝胸喘不能久立邪在大腸刺肓之原氣海巨虛上廉三里小腹控睪音皋引腰脊上衝心邪在小腸者連睪系屬於脊貫肝肺絡心系氣盛則厥逆上衝腸胃熏肝散於肓結於臍故取之肓原以散之刺氣海散臍腹之結刺太陰以予之補肺經之虛取厥陰以下之瀉肝經之實取巨虛下廉以去之下巨虛小腸之所屬按其所過之經以調之善嘔嘔有苦長太息心中憺憺心虛貌恐人將捕之邪在膽逆在胃膽液泄則口苦胃氣逆則嘔苦故曰嘔膽取三里以下胃氣逆側刺少陽血絡以閉膽逆閉止也卻調其虛實以去其邪其指膽胃兩經飲食不下膈塞不通邪在胃脘在上脘則刺抑而下之在下脘則散而去之小腹腫痛不得小便邪在三焦約三焦下輸出於委陽並足太陽之正入絡膀胱約下焦也取之太陽大絡飛揚視其絡脈與厥陰小絡結而血者腫上及胃脘取三里靈樞五邪篇此論五臟之邪邪在肺則病皮膚痛寒熱上氣喘汗出咳動肩臂一作背取之膺中外俞雲門中府等穴背三節之旁肺俞一本三節下有五節二字以手疾按之快然乃刺之按其處覺快爽者是穴取之缺盆中胃經穴以越之邪在肝則兩脅中痛寒中惡血在內行善掣節時腳腫取之行間以引脅下補三里以溫胃中取血脈以散惡血刺肝經血絡外見者取耳間青脈以去其掣音徹邪在脾胃則病肌肉痛陽氣有餘陰氣不足則熱中善飢陽氣不足陰氣有餘則寒中腸鳴腹痛陰陽俱有餘脾胃之邪氣皆盛若俱不足脾胃之正氣皆虛則有寒有熱皆調於三里邪在腎則病骨痛陰痹陰痹者按之而不得腹脹腰痛大便難肩背頸項痛時眩取之湧泉崑崙視有血者盡取之邪在心則病心痛喜悲時眩僕視有餘不足而調之其輸也應補應瀉皆當取手厥陰俞太陵少陰俞神門靈樞寒熱病篇此主外感言皮寒熱者不可附席邪在外故畏於近席毛髮焦鼻槁臘音昔干也不得汗取三陽之絡太陽經飛揚穴以補手太陰太淵肌寒熱者肌痛毛髮焦而唇槁臘不得汗取三陽於下以去其血者俱刺絡穴補足太陰以出其汗大都太白骨寒熱者病無所安汗注不休齒未槁取少陰之絡大鐘齒已槁死不治骨厥亦然骨寒而厥身有所傷血出多及中風寒若有所墮墜四肢懈惰不收名曰體惰取其小腹臍下三結交三結交者陽明太陰也臍下三寸關元也陽迎頭痛胸滿不得息取之人迎迎逆也陽邪逆於陽經而為頭痛胸滿者當刺足陽明人迎穴暴喑氣梗取扶突與舌本出血暴聾氣蒙耳目不明取天牖暴攣癇眩足不任身取天柱暴癉熱也內逆肝肺相搏血溢鼻口取天府此為天牖五部總結上文五穴天牖五部者舉一穴以統前後上下而言也臂陽明有入頄遍齒者名曰大迎下齒齲取之臂商陽二間三間皆治齒痛惡寒補之不惡寒瀉之足太陽有入頄遍齒者名曰角孫上齒齲取之在鼻與頄前方病之時其脈盛盛則瀉之虛則補之一曰取之出鼻外地倉巨髎等穴足陽明有挾鼻入於面者名曰懸顱屬口對入系目本視有過者取之損有餘蓋不足反者益甚其足太陽有通項入於腦者正屬目本名曰眼系頭目苦痛取之在項中兩筋間王枕穴入腦乃別陰蹺陽蹺陰陽相交陽入陰陰出陽交於目銳眥陽氣盛則瞋目陰氣盛則瞑目熱厥陽邪有餘陰氣不足取足太陰補少陽瀉皆留之寒厥陰邪有餘陽氣不足取足陽明補少陰瀉皆留之此言補脾胃二經以實四肢瀉水火二經以泄邪氣舌縱涎下煩悗取足少陰振寒洒洒鼓頷不得汗出腹脹煩悗取手太陰此二節皆兼寒熱二厥言刺虛者刺其去也乘其氣之去而隨之如候呼內針也刺實者刺其來也乘其氣之來而迎之如候吸內針也五臟身有五部言五臟在內要害繫於外者有五伏兔一腓二腓者腨也背三五臟之腧四項五此五部有癰疽者死此即刺癰之法病始手臂者先取手陽明太陰而汗出病始頭面者先取項太陽而汗出病始足脛者先取足陽明而汗出此三節當與刺熱篇參看臂太陰可汗出取魚際太淵足陽明可汗出取內庭陷谷故取陰而汗出甚者止之於陽取陽而汗出甚者止之於陰陰陽平而汗自止也當與熱病篇熱病而汗且出一節參看凡刺之害中而不去則精泄針已中病即當去針不中而去則致氣針未中病而去針邪氣仍致精泄則病甚而恇病益甚而恇羸也致氣則生為癰疽也靈樞癲狂篇癲疾始生先不樂神志將亂頭重痛視舉目赤厥氣上行甚作極已而煩心躁急不寧癲疾將作之兆候之於顏顏天庭也邪色必見於此取手太陽支正小海陽明偏歷溫溜太陰太淵列缺血變而止瀉去邪血必得其血色變而後止針癲疾始作而引口啼呼喘悸者候之手陽明太陽穴如前左強者攻其右右強者攻其左血變而止強堅強左右牽引病多在絡故用繆刺之法癲疾始作先反僵因而脊痛候之足太陽取委陽飛揚僕參金門陽明三里解谿太陰隱白公孫手太陽支正小海血變而止治癲疾者常與之居察其所當取之處病至視之有過者瀉之刺出其血置其血於瓠壺之中至其發時血獨動矣不動灸窮骨二十壯窮骨者骶骨也瓠壺瓠盧也若前病發而瓠中之血不動者乃可灸之骨癲疾者顑齒諸腧分肉皆滿而骨居汗出煩悗嘔多沃沫氣下泄不治病深在骨其頭齒諸穴分肉之間皆邪氣壅閉故為脹滿形則尫羸惟骨獨居汗出於外煩悶於內以為危證若嘔多沃沫氣泄於下者脾腎俱敗必不可治筋癲疾者身蜷攣脈急大刺項大經之大杼脈嘔多沃沫氣下泄不治脈癲疾者暴僕四肢之脈皆脹而縱弛縱也脈滿盡刺之出血脈滿脹當刺之不滿灸之挾項太陽天柱大杼灸帶脈於腰少陽經穴諸分肉本輸諸經分肉之間及四肢之俞凡脹縱之所皆當取也嘔多沃沫氣下泄不治癲疾者疾發如狂者死不治癲疾發於陰狂病發於陽陽多有餘故狂發無時其狀疾而暴陰多不足故癲發有時其狀靜而徐此癲狂之辨也今以癲疾而如狂者陽邪盛極而陰之竭也故死不治以上皆言癲病狂始生先自悲也神不足喜忘志傷苦怒肝乘脾善恐血不足者得之憂飢致傷臟氣治之取手足太陰陽明肺經太淵列缺脾經隱白公孫大腸經偏歷溫溜胃經三里解谿血變而止狂始發少臥不飢自高賢也自辨智也自尊貴也善罵詈日夜不休治之取手陽明太陽太陰各經穴如前舌下廉泉少陰心經神門視之盛者皆取之其血脈盛不盛摶之也諸治皆然狂言驚善笑好歌樂妄行不休者得之大恐恐傷志故病如上治之取手陽明太陽太陰各經穴如前狂目妄見耳妄聞善呼者少氣之所生也氣衰則神恍故妄見妄聞而驚呼也治之取手太陽太陰陽明足太陰各經穴如前頭兩顑義如骨癲疾者狂者多食善見鬼神善笑而不發於外者得之有所大喜見鬼善暗笑皆傷神所致治之取足太陰太陽陽明後取手太陰太陽陽明各經穴如前狂而新發未應如此者先取曲泉左右動脈及盛者見血有頃已不已以法取之灸骨骶二十壯若狂病新起未有如上文五節之見症宜先取足厥陰經曲泉穴左右皆刺之及諸經之脈有盛者皆出其血病當自已如不已則當照前五節求法以取之仍灸骨脈之長強穴以上皆言狂病風逆風感於外厥氣內逆暴四肢腫身漯漯皮毛寒慄唏然時寒氣咽抽息而噤也飢則煩飽則善變寒變也俗云噯腹氣取手太陰表裡肺與大腸足少陰陽明之經肉清音倩寒冷也取滎魚際二間然谷內庭骨清取井經也少商經渠商陽陽谿湧泉復溜厲兌解谿厥逆為病也足暴清胸若將裂腸若將以刀切之懊憹痛楚也煩而不能食氣逆於中也暖身體溫暖取足少陰馬注築實穴清身體清冷取足陽明清則補之溫則瀉之張景岳曰足少陰則湧泉然谷足陽明則厲兌內庭解谿豐隆皆主厥逆厥逆腹脹滿腸鳴胸滿不得息取之下胸二脅咳而動手者足厥陰之期門章門與背腧以手按之立快者是也又當取足大腸之肺俞膈俞以上皆言厥逆之病內閉不得泄病在水臟刺足少陰湧泉築實太陽委陽飛揚僕參金門等穴與骶上以長針督脈長強穴長針第八針也義未詳氣逆則取其太陰脾經隱白公孫陽明胃經三里解谿厥陰肝經期門章門甚取少陰陽明動者之經也謂察其所病之經而刺之也少氣身漯漯也言吸吸也氣怯骨酸體重懈惰不能動補足少陰此皆精虛不能化氣當刺復溜穴短氣息短不屬動作氣索補足少陰去血絡也刺亦如上但察有血絡則當去之以上皆言厥逆兼症也後二節皆屬氣虛不補手太陰而補足少陰者陽根於陰氣化於精也治必求本於此可見用針用藥其道皆然靈樞熱病篇偏枯身偏不用而痛言不變志不亂病在分腠之間巨針取之益其不足損其有餘乃可復也痱之為病也身無痛者四肢不收痱亦風屬猶言廢也上節言身偏不用而痛此言身不知痛而四肢不收此偏枯痱病之辨也痱肥沸二音智亂不甚其言微知可治其言微有知者神氣未為全去甚則不能言不可治也神失則無能為矣病先起於陽後入於陰者先取其陽後取其陰浮而取之當刺其表也若病始於陰直中臟也多不可治故不復言之風痙強直也身反折反張向後此風症在膀胱經也先取足太陽及膕中京骨束骨及委中及血絡出血又刺浮淺之絡皆出其血中有寒取三里若中氣有寒當取足陽明之三里溫補胃氣而風寒可除也此節本在後熱病三日而氣口靜人迎躁者病在三陽取之諸陽五十九刺以瀉其熱而出其汗實其陰以補其不足者瀉陽邪之實仍補三陰之不足也五十九刺法如下文身熱甚陰陽皆靜者勿刺也其可刺者急取之不汗出則泄所謂勿刺者有死徵也陽症得陰脈故不宜刺若察其可刺者當急取之雖不汗出則邪亦從而泄矣此言勿刺者以其脈症相反有死徵也下文皆然熱病七日八日脈口動喘而弦者急刺之汗且自出淺刺手大指間少商穴弦一本作短熱病七日八日脈微小正氣虛也病者溲血口中乾傷其陰也一日半而死脈代者一日死脈要精微論吳氏注五來一止七來一止曰代脈熱病已得汗出而脈尚躁氣喘且復熱勿刺其膚刺則重傷其氣喘甚者死熱病七日八日脈不躁躁不散數後三日中有汗三日不汗四日死未曾汗者勿腠刺之脈躁盛為將汗之兆入熱病七日八日而脈猶不躁即有躁意而力不散大至不數疾皆正氣衰微不能鼓動故當再俟三日庶得有汗若三日不汗又逾四日陰陽不應期當死也凡若此者既不得汗其氣必虛故勿為膚腠之刺熱病先膚痛窒鼻充面取之皮以第一針五十九邪在膚腠肺經病也當用鑱針以刺五十九穴之皮部苛疹鼻索皮於肺不得索之火火者心也苛疥也軫當作疹鼻上生疹皆屬於肺求之於皮即所以求於肺也如刺此而不得效則當求之於火按舊釋為補心經火以制金則肺熱自退然以上諸症皆屬邪火爍金治肺不應故瀉心火以泄熱熱病先身澀倚而熱煩悗干唇口嗌取之脈以第一針五十九膚脹口乾寒汗出索脈於心不得索之水水者腎也澀燥澀也倚身無力也兼之熱而煩悶唇口與嗌俱乾者邪在血脈心經病也故當用鑱針以刺五十九穴之脈分膚脹口乾令汗出亦皆脈病求之於脈即所以求於心也如刺此而不得效則當求之於水水旺足以制火而心熱自退矣熱病嗌乾多飲善驚臥不能起取之膚肉以第六針五十九目眥青索肉於脾不得索之木木者肝也邪在膚肉脾經病也當用員利針以刺五十九穴之肉分也若目眥青者木氣乘土亦為脾病求之於肉即所以求於脾也如刺此而不得效則當補其肝木木能勝土而脾熱當自平矣熱病面青肝色腦痛厥陰肝經與督脈會於巔手足躁木病在四未取之筋間筋結之間以第四針於四逆用鋒針瀉其四逆等症筋躄足不能行目浸淚出不收索筋於肝不得索之金金者肺也此皆肝病其合在筋故但求之於筋即所以求於肝也如刺此而不得效則當補其肺金金能勝木而肝熱可平矣熱病數驚瘛瘲而狂取之脈以第四針鋒針急瀉有餘者癲疾毛髮去索血於心不得索之水水者腎也此皆心經病也若陽極陰虛而病癲疾發為血餘故毛髮亦去心主血脈求之於血即所以求於心也如刺此而不得效當補腎水以制火真陰自復矣熱病身重骨痛耳聾而好瞑取之骨以第四針五十九刺骨病不食齧齒耳青索骨於腎不得索之土土者脾也腎經之病故當用鋒針以刺五十九穴之骨分其不食者陰邪盛也齧齒耳青皆為腎病腎屬水其合在骨故但求之於骨即所以求於腎也如刺此而不得效當補脾氣之肉分則土能勝水而腎邪可平矣熱病不知所痛耳聾不能自收口乾陽熱甚陰頗寒者陰勝之時熱在髓死不可治熱病頭痛顳顬目瘛脈痛足少陽脈連目脈抽掣而痛善衄鼻血厥熱病也熱逆於上取之以第三針鍉針也視有餘不足熱病體重腸中熱取之以第四針於其腧脾胃二經之俞太白陷谷及下諸指間又如膀胱束骨膽臨泣詳在後索氣於胃胳得氣也胳當作絡陽明之絡曰豐隆別走太陰故取此可以得氣熱病挾臍急痛腎經所行胸脅滿脾經所行取之湧泉與陰陵泉取以第四針針嗌裡少陰太陰之脈俱上絡咽嗌即下支所謂廉泉也熱病而汗且出及脈順可汗者取之魚際太淵大都太白瀉之則熱去補之則汗出汗出太甚取內踝上橫脈三陰交以止之寒熱病篇臂太陰可汗出一節當參看熱病已得汗而脈尚躁盛此陰脈之極也死其得汗而脈靜者生熱病者脈尚盛躁而不得汗者此陽脈之極也死脈盛躁得汗靜者生熱病不可刺者有九一曰汗不出大顴發赤噦者死汗不得出面戴陽者皆陰不足也歲屬邪犯陽明胃虛甚也二曰泄而腹滿甚者死脾衰三曰目不明熱不已者死目不明臟腑之精氣竭也熱不已表裡之陰氣竭也四曰老人嬰兒熱而腹滿者死邪傷脾藏也五曰汗不出嘔下血者死邪盛陰傷也六曰舌本爛熱不已者死心肝脾腎之脈皆繫於舌本舌本爛加之熱不已三陰俱損也七曰咳而衄邪在肺汗不出或出不至足者死真陰潰竭也八曰髓熱者死邪入最深乃為髓熱腎氣敗竭也九曰熱而痙者死熱極生風腰折瘛瘲抽掣齒噤齘也牙關不開曰噤切齒曰齘皆痙之謂也齘音解所謂五十九刺者兩手外內側各三凡十二痏六經井穴五指間各一凡八痏足亦如是此言本節之後各一穴也如手經則太陽之後谿少陽之中渚陽明之三間少陰之少府左右共八痏也足亦如是者太陽之束骨少陽之臨泣陽明之陷谷太陰之太白左右又共八穴也頭入發一寸旁三分各三凡六痏五處承光通天更入發三寸邊五凡十痏自上星之次向後去中三寸兩邊各五即足少陽之臨泣目窗正營承靈腦空左右共十穴也耳前後口下者各一聽會完骨承漿共五穴項中一啞門凡六痏巔上一百會囟會一髮際一前髮際神庭後髮際風府凡二痏廉泉一風池二天柱二按此篇熱病五十九俞與素問水熱穴論熱病五十九俞惟十八穴相合其餘皆異然本篇所言者多在四肢蓋以瀉熱之本也水熱穴論所言者多隨邪之所在蓋以瀉熱之標也當總求二篇之義各隨其宜而取用之氣滿胸中喘息取足太陰大指之端隱白寒則留之熱則疾之氣下乃止心疝暴痛取足太陰厥陰盡刺去其血絡此二經有血絡者刺去其血喉痹舌卷口中乾煩心心痛臂內廉痛不可及頭取關衝目中赤痛從內眥始取之陰蹺照海穴癃取之陰蹺及三毛上肝經大敦及血絡出血腎與膀胱為表裡肝經行於少腹故當取此二經若其有血絡者皆刺出血男子如蠱女子如怚身體腰脊如解不欲飲食先取湧泉見血視跗上盛者盡見血也蠱如犯蠱毒脹悶也馬注怚疑當作疽類經注怚當作胎如蠱如胎無是病而形相似也身體腰脊如解倦散不收也跗上足面也以陽明經為言凡其盛者皆當刺出其血靈樞厥病篇厥頭痛面若腫起而煩心取之足陽明太陰厥逆也邪逆於經上幹頭腦而為厥頭痛也足陽明之脈上行於面其悍氣上衝頭者循眼系入絡腦足太陰支者注心中故以頭痛而兼面腫煩心者當取足陽明之解谿太陰之公孫也厥頭痛頭脈痛心悲善泣視頭動脈反盛者刺盡去血後調足厥陰以肝脈會於巔也可刺曲泉穴厥頭痛貞貞堅固貌頭重而痛瀉頭上五行行五如上星至後頂及五處至玉枕臨泣至腦空詳在素問水熱穴論先取手少陰神門後取足少陰復溜穴此即瀉南方以去火補北方以壯水也厥頭痛意善忘按之不得陽邪在頭無定所也取頭面左右動脈後取足太陰大都厥頭痛項先痛腰脊為應先取天柱後取足太陽申脈委中厥頭痛頭痛甚耳前後脈湧有熱瀉出其血後取足少陽耳之前後足少陽經也有熱一本作有動脈真頭痛頭痛甚腦盡痛手足寒至節死不治頭為諸陽之會四肢為諸陽之本若頭痛甚而遍盡於腦手足寒至節者則元陽敗竭陰邪直淖髓海故不可治頭痛不可取於腧者有所擊墮惡血在於內若肉傷痛未已可則刺不可遠取也此非大經之病但可刺去其痛處之血不可遠取滎俞頭痛不可刺者大痹為惡風寒濕三氣雜至合成惡患令人頭痛不可刺也日作者猶有間止可令少愈不可已不能全已頭半寒痛偏頭冷痛先取手少陽陽明刺絲竹空中渚合谷後取足少陽陽明刺頭臨泣足臨泣頭維厥心痛與背相控善瘈音記狂也如從後觸其心傴僂者腎心痛陰邪上衝先取京骨崑崙髮針不已取然谷五臟道氣上干於心而為痛者謂之厥心痛下仿此厥心痛腹脹胸滿心尤痛甚胃心痛也多由停滯取之大都太白胃與脾為表裡故當取此厥心痛痛如以錐針刺其心心痛甚者脾心痛也寒逆中焦取之然谷太谿脾之支脈注於心中若脾不能運而逆氣攻心其痛必甚有如錐刺者是為脾心痛也何以取足少陰之滎俞蓋濕因寒滯則相挾乘心須泄腎邪當刺此也厥心痛色蒼蒼如死狀終日不得太息肝心痛也多由木火之郁病在血分取之行間太衝厥心痛臥若徒居心痛間動作痛益甚色不變肺心痛也取之魚際太淵徒空也臥若徒居無倚傍也間或動作則益甚者氣逆不舒畏於動也色不變不在血也是皆病在氣分故曰肺心痛也真心痛手足清至節心痛甚旦發夕死夕發旦死邪氣正犯心主也心痛不可刺者中有盛聚不可取於腧或積或血停聚於中病在臟而不在經腸中有蟲瘕結聚也及蛟蛕音回蛔也蛟即蛕屬皆不可取以小針謂力小不能制也心腸痛憹作痛難忍之狀腫聚往來上下行肚腹腫起或行無定處痛有休止蟲動則痛靜則不痛腹熱喜渴涎出者是蛟蛕也此皆蟲瘕在腸胃中為心腹痛也以手聚按而堅持之無令得移以大針刺之久持之蟲不動乃出針此即治蟲瘕蛟蛕之法蘵腹憹痛形中上者此重言症之如此其形自中自上而漸升者即當以蟲治之也蘵音烹滿也耳聾無聞取耳中即手太陽經聽宮穴又取手少陽經關衝穴及足少陽經竅陰穴耳鳴取耳前動脈即手少陽經耳門穴又取手厥陰經中衝穴及足少陽經竅陰穴足髀不可舉側而取之在樞閤中足少陽環跳穴以員利針大針不可刺病注下血取曲泉以肝不能納血故當刺此風痹淫濼病不可已者邪氣消爍病難得愈足如履冰寒時如入湯中熱股脛淫濼似乎痠痛而無力也煩心頭痛時嘔時悶眩已汗出久則目眩悲已喜恐短氣不樂不出三年死也靈樞雜病篇厥挾脊而痛至頂頭沉沉然目䀮䀮然腰脊強取足太陽膕中血絡厥胸滿面腫唇漯漯然腫起貌暴言難甚則不能言取足陽明可刺解谿衝陽陷谷厥氣走喉而不能言手足清大便不利取足少陰可刺湧泉太谿交信厥而腹響響然寒氣滯於脾也多寒氣腹中谷谷音斛水穀不分之聲也便溲難取足太陰可刺大都太白三陰交陰陵泉府舍等穴痿厥為四未束悗乃疾解之日二當刺四支之穴每日二次不仁者十日而知無休病已止此節連在後噦以草刺鼻之上今從類經分列嗌乾口中熱如膠取足少陰刺復溜穴補腎水則火衰也膝中痛取犢鼻以員利針發而間之間非止一次也喉痹不能言取足陽明重者當瀉其下刺三里下廉豐隆內庭厲兌能言取手陽明輕者但刺之上如合谷陽谿偏歷溫溜扶突禾髎等穴瘧不渴間日而作取足陽明可刺陷谷內庭厲兌刺瘧論曰刺足太陽渴而日作取手陽明可刺商陽三間合谷陽谿大迎等穴齒痛不惡清飲取足陽明內庭厲兌惡清飲取手陽明商陽三間合谷偏歷聾而不痛者取足少陽客主人聾而痛者取手陽明偏歷衄而不止衃血流取足太陽委中衃血取手太陽宛骨不已刺宛骨下手少陰通里陰郄神門不已刺膕中出血即委中鼻中出血曰衄敗血凝聚色紫黑者曰衃衃血成流其去多也下云衃血其聚而不流者也中熱而喘取足少陰膕中血絡刺復溜穴又刺足太陽喜怒而不欲食言益小取足太陰宜刺公孫穴怒而多言刺足少陰復溜穴滋水以制火也一作刺足少陽顑痛刺足陽明曲周動脈頰車見血立已不已按人迎於經立已人迎穴淺刺之顑與頷同此節本在後項痛不可俯仰刺足太陽痛在項後刺天柱束骨不可以顧刺手太陽痛在頸側刺少澤後谿天窗小腹滿大上走胃至心淅淅身時寒熱小便不利取足厥陰太中腹滿大便不利腹大亦上走胸嗌喘息喝喝然取足少陰太谿腹滿食不化腹響響然不能大便取足太陰太白心痛引腰脊欲嘔腎邪上逆取足少陰太谿心痛腹脹嗇嗇然澀滯貌大便不利取足太陰太白心痛引背不得息刺足少陰不已取手少陽足少陰之脈貫脊故痛引於背當刺大鐘穴手少陽之脈布膻中故不得息當刺支溝穴心痛引小腹滿上下無定處便溲難刺足厥陰太衝心痛但短氣不足以息刺手太陰尺澤太淵心痛當九節刺之按已刺按之立已不已上下求之得之立已此總言刺心痛之法也九節指督脈之筋縮穴宜先按之按已而刺刺後覆按之其痛當立已如不已則上而手經下而足經求得其故而刺之則立已也氣逆上刺膺中陷者膺窗與下胸動脈膻中腹痛刺臍左右動脈已刺按之立已如足陽明之天樞足少陰之肓俞皆主腹痛不已刺氣街即氣衝已刺按之立已噦即呃逆也以草刺鼻嚏嚏而已嚏則氣達無息而疾迎引之立已閉口鼻之氣使之無息乃迎其氣而引散之勿令上逆大驚之亦可已言以他事驚之則亦可已噦舊本歲馬注歲疑作歲今從類經作噦靈樞周痹篇眾痹各在其處更發更止更居更起以右應左以左應右非能周也更發更休也各在其處謂隨聚而發也不能周遍上下但或左或右更發更休患無定所故曰眾痹刺此者痛雖已止必刺其處勿令復起此言必刺其原痛之處也周痹者在於血脈之中隨脈以上隨脈以下不能左右各當其所能上能下但隨血脈而周遍於身故曰周痹痛從上下者先刺其下以過之後刺其上以脫之痛從下上者先刺其上以過之後刺其下以脫之過者去之之謂先去其標也脫者拔絕之謂後拔其本也此風寒濕氣客於外分肉之間迫切而為沫沫得寒則聚聚則排分肉而分裂也分裂則痛邪氣客於肌表漸入分肉之間則迫切津液而為汁沫沫得寒則聚而不散故排裂肉理為痛痛則神歸之神歸之則熱熱則痛解痛解則厥厥則他痹發發則如是痛則心注其處故神歸之神歸即氣歸故熱熱則寒散而痛暫解其氣尚逆而為厥厥則三氣隨血脈以上下者或痛從上而下或痛從下而上則彼之為痹發於血脈之中非若眾痹之左右移易也此內不在臟而外未發於皮獨居分肉之間真氣不能周即一身之痛症故命曰周痹周身氣閉也故刺痹者必先切侑其下之六經足六經也及大絡之血結而不通宜瀉之及虛而脈陷空者而調之宜補之熨而通之寒凝而氣不周者宜之其瘛堅轉瘛急轉筋之謂引而行之針引其氣而行之也靈樞海論人亦有四海十二經水經水者皆注於海四海者百川之宗胃者水穀之海其輸上在氣街下至三里水穀入口藏於胃以養五臟氣其胃氣運行之輸上者在氣衝下者在三里衝脈者為十二經之海其輸上在於大杼下出於巨虛之上下廉此即血海也衝脈起於胞中其前行者並足少陰之經俠臍上行至胸中而散其後行者上循背裡為經絡之海故其輸上在於足太陽之大杼下在於足陽明之巨虛上下廉水穀之海者言水穀盛貯於此營衛由之而化生也血海者言受納諸經之灌注精血於此而蓄藏也膻中者為氣之海其輸上在於柱骨之上下前在於人迎膻中胸中也宗氣積於胸中出於喉嚨以貫心脈而行呼吸故膻中謂之氣海氣海運行之輸一在頏顙之後即柱骨之上下謂督脈之喑門大椎也一在頏顙之前謂足陽明之人迎也腦為髓之海其輸上在於其蓋下在風府諸髓皆屬於腦腦為髓之海蓋腦蓋骨也即督脈之囟會風府此皆髓海之上下輸也氣海有餘者氣滿胸中悗息面赤邪氣實也氣海不足則氣少不足以言正氣虛也血海有餘則常想其身大怫然不知其所病怫怫鬱也重滯不舒之貌血海不足亦常想其身小狹然不知其所病狹隘狹也索然不廣之貌病在血者徐而不顯故茫然不覺其所病水穀之海有餘則腹滿水穀留滯於中故腹為脹滿水穀之海不足則飢不受穀食胃虛則不能納故雖飢不受穀食髓海有餘則輕勁多力自過其度骨髓充足之徵髓海不足則腦轉耳鳴脛酸眩冒目無所見懈怠安臥髓為精類精衰則氣去而諸症見矣審守其輸而調其虛實無犯其害順者得復逆者必敗凡此四海俱有順逆順者知所養者也不知所養則逆矣故審察其俞穴如上文無犯其害無盛盛無虛虛也靈樞五亂清氣在陰濁氣在陽營氣順脈衛氣逆行清濁相干亂於胸中是謂大悗清氣屬陽而升在陰則亂濁氣屬陰而降在陽則亂營氣陰性精專行常順脈衛氣陽性剽悍晝當行陽夜當行陰若衛氣逆行則陰陽相犯亂於胸中而為悗悶總由衛氣之為亂耳故氣亂於心則煩心密嘿俯首靜伏取手少陰心主之腧神門大陵亂於肺則俯仰喘喝接手以呼取手太陰滎足少陰腧魚際太谿亂於腸胃則為霍亂取足太陰陽明太白陷谷不下者取之三里氣亂於內者上則在心肺下則在腸胃也亂於臂脛則為四厥取之先去血脈臂足之有血絡者刺去其血後取其陽明少陽之滎腧在臂取二間三間液門中渚在足取內庭陷谷俠谿臨泣亂於頭則為厥逆頭重眩僕取之天柱大杼足太陽經穴不知取足太陽滎輸通谷束骨氣亂於外者下則在四肢上則在頭也徐入徐出謂之導氣補瀉無形謂之同精凡行針補瀉皆貴和緩故當徐入徐出導氣復元而已然補者導其正氣瀉者導其邪氣總在保其精氣故曰補瀉無形謂之同精是非有餘不足也亂氣之相逆也言此非為有餘不足而設特以亂氣相逆宜導治之如是耳靈樞逆順肥瘦年質壯大血氣充盈膚革堅固因加以邪刺之者深而留之此肥人也氣血正盛故與肥壯之人同其法廣肩腋項肉薄厚皮而黑色唇臨臨然唇厚質濁之謂其血黑以濁其氣澀以遲為人貪於取與刺此者深而留之多益其數也久留針瘦人者皮薄色少肉廉廉然薄也薄唇輕言肉瘦氣少其血清氣滑易脫於氣易損於血刺此者淺而疾之刺常人視其白黑各為調之白者同瘦人黑者同肥人當調其深淺之數也端正敦厚者其血氣和調即常人之度刺此者無失常數也如經水篇足陽明刺深六分留十呼之類嬰兒者其肉脆血少氣弱刺此者以毫針淺刺而疾髮針日再可也若邪有未盡寧日加再刺少陰之脈獨下行何也夫衝脈者五臟六腑之海也五臟六腑皆稟焉其上者出於頏顙滲諸陽灌諸精其上行者輸於大杼故出於頏顙滲灌諸陽之精其下者注少陰之大絡出於氣街循陰股內廉入膕中伏行䯒骨內下至內踝之後屬而別其下者並於少陰之經滲三陰自少陰以滲及肝脾二經所以下行也其前者伏行出跗屬下足掌屬也循跗入大指間滲諸絡而溫肌肉皆衝脈之氣也故別絡結則跗上不動不動則厥厥則寒矣若衝脈之絡因邪而結則跗上之經不動而為厥寒矣足三陰脈從足走腹而獨有足少陰腎脈繞而下行者以衝脈與之並行故耳靈樞血絡論脈氣盛而血虛者刺之則脫氣脫氣則僕苦瀉其氣則陰陽俱脫故為仆倒血氣俱盛而陰氣多者其血滑刺之則射陽氣蓄積久留而不瀉者其血黑以濁故不能射陽氣久留不瀉陰血日枯新飲而液滲於絡未合和於血也故血出而汁別焉血汁相半其不新飲者身中有水久則為腫陰氣積於陽其氣因於絡故刺之血未出而氣先行故腫陰滯於陽而不易散陰陽之氣其新相得而未和合血氣初調因而瀉之則陰陽俱脫表裡相離故脫色而蒼蒼然衰危之色刺之血出多色不變而煩悗者刺絡而虛及經虛經之屬於陰者陰脫故煩悗陰陽相得而合為痹者此為內溢於經外注於絡如是者陰陽俱有餘雖多出血而弗能虛也熱氣因於針則針熱熱則肉著於針故堅焉肉著者即針入而緊澀難窮堅不可拔也靈樞淫邪發夢陰氣盛則夢涉大水而恐懼以陰勝陽故夢多陰象陽氣盛則夢大火而燔焫以陽勝陰故夢多陽象陰陽俱盛則夢相殺俱盛則爭上盛則夢飛陽勝者親乎上也下盛則夢墮陰勝者親乎下也甚飢則夢取因不足也甚飽則夢予與同因有餘也肝氣盛則夢怒肝在志為怒也肺氣盛則夢恐懼哭泣飛揚肺在志為憂故夢恐懼哭泣肺主氣故夢飛揚心氣盛則夢喜笑恐畏心在志為喜在變動為憂也脾氣盛則夢歌樂身體重不舉脾在聲為歌喜音樂主肌肉也腎氣盛則夢腰脊兩解不屬腰為腎之腑故若腰脊不相運屬凡此十二盛者至而瀉之立已陽盛則有餘於腑陰盛則有餘於臟但察其邪之所在而以針瀉之則已厥氣客於心則夢見丘山煙火厥之在人也謂其為陽則本非陽盛謂其為陰則又非陰盛蓋以五臟隔絕精神散越故為妄夢心屬火故夢煙火客於肺則夢飛揚見金鐵之奇物肺屬金也客於肝則夢山林樹木肝屬木也客於脾則夢見丘陵大澤壞屋風雨脾屬士其主濕也客於腎則夢臨淵沒居水中腎屬水也客於膀胱則夢遊行膀胱屬三陽之表也客於胃則夢飲食胃為水穀之海也客於大腸則夢田野大腸為傳導之官其曲折納沃類田野也客於小腸則夢聚邑沖衢小腸為受盛之官物之所聚類邑衢也客於膽則夢鬥訟自刳膽主決斷其氣剛也客於陰器則夢接內欲念之所注也客於頂則夢斬首恐怖之所及也客於脛則夢行走而不能前及居深地髎苑中厥逆之邪在下也客於股肱則夢禮節拜起勞倦之所致也客於胞䐈則夢泄便胞溲脬也䐈大腸也在前則夢泄在後則夢便凡此十五不足者至而補之立已也當各隨其經以針補之靈樞順氣一日分為四時春生夏長秋收冬藏是氣之常也皆以陽氣為言人亦應之以一日分為四時朝則為春日中為夏日入為秋夜半為冬自子之後太陽從左而升升則為陽自午之後太陽從右而降降則為陰大而一歲小而一日無不皆然故一日亦分四時也朝則人氣始生病氣衰故旦慧日中人氣長長則勝邪故安夕則人氣始衰邪氣始生故加夜半人氣入藏邪氣獨居於身故甚也其時有反者是不應四時之氣藏獨主其病是必以藏氣之所不勝時者甚如脾病畏木之類值其時口故病必甚以其所勝時者起也如脾病喜火土肺病喜土金腎病喜金水肝病喜水木心病喜木火值其時日故病當起人有五臟五臟有五變五變有五輸故五五二十五輸以應五時病在臟者取之井臟主冬冬刺井病變於色者取之滎色主春春刺滎病時間時甚者取之輸時主夏夏刺俞病變於音者取之經經滿而血者音主長夏長夏刺經病在胃及以飲食不節得病者取之於合故命曰味主合味主秋秋刺合按本篇五時之刺以應五俞謂冬刺井春刺滎夏刺俞長夏刺經秋刺合者以井應冬滎應春俞應夏經應長夏合應秋也考他篇文義皆與此同及六十六難曰井者東方春也萬物之始生合者北方冬也陽氣入藏七十四難曰經言春刺井夏刺滎季夏刺俞秋刺經冬刺合與本篇不合必難經之誤也靈樞五變人之有常病也亦因其骨節皮膚腠理之不堅固者邪之所舍也故常為病也靈樞論勇大忍痛與不忍痛者皮膚之薄厚肌肉之堅脆緩急之分也非勇怯之謂也靈樞論痛人之骨強筋弱肉緩皮膚厚者耐痛其於針石之痛火焫亦然焫音泄艾火燒灼堅肉薄皮者不耐針石之痛於火焫亦然靈樞背腧背中大腧在杼骨之端肺腧在三焦之間心腧在五焦之間膈腧在七焦之間肝腧在九焦之間脾腧在十一焦之間腎腧在十四焦之間皆挾脊相去三寸所則欲得而驗之按其處應在中而痛解乃其腧也灸之則可刺之則不可氣盛則瀉之虛則補之以火補者毋吹其火須自滅也以火瀉者疾吹其火傳其艾須其火滅也靈樞逆順氣之逆順者所以應天地陰陽四時五行也脈之盛衰者所以候血氣之虛實有餘不足也刺之大約者必明知病之可刺與其未可刺與其已不可刺也已者言病既已也賊風篇賊風邪氣之傷人也令人病焉嘗有所傷於濕氣藏於血脈之中分肉之間久留而不去若有所墮墜惡血在內而不去卒然喜怒不節飲食不適寒溫不時腠理閉而不通其開而遇風寒則血氣凝結與故邪相襲則為寒痹其有熱則汗出汗出則受風雖不遇賊風邪氣必有因加而發焉靈樞衛氣失常篇衛氣之留於腹中蓄積不行菀蘊不得常所使人肢脅胃中滿喘呼逆息者何以去之衛氣者水穀之悍氣也循皮膚之中分肉之間熏於肓膜散於胸腹此衛氣之常也失其常則隨邪內陷留於腹中蓄積不行而菀蘊為病其氣積於胸中者上取之積於腹中者下取之上下皆滿者旁取之俱如下文積於上瀉大迎足陽明經天突任脈喉中即廉泉穴積於胸中病喘呼逆息故常瀉之於上積於下者瀉三里氣街積於腹中病胃中滿故當瀉其下上下皆滿者上下取之與季脅之下一寸重者雞足取之上下皆病胸中與腹中俱滿當取上五穴又旁取季脅之章門穴其積重者即積針以刺之如雞足之狀診視其脈大而弦急及絕不至者及腹皮急甚者不可刺也何以知皮肉氣血筋骨之病也色起兩眉薄澤者病在皮其應主肺唇色青黃赤白黑者病在肌肉脾氣通於唇營氣濡然者病在血氣營本無形若膚腠之汗肌肉之脹二便之泄利皆濡然之謂其病在營則氣血也目色青黃赤白黑者病在筋目為肝竅肝主筋也耳焦枯受塵垢病在骨耳為腎竅腎主骨也人年五十以上為老二十以上為壯十八以下為少六歲以下為小此言人之老壯少小以年而別以下之下舊本上膏者多氣多氣者熱熱者耐寒膏者油也人有多膏者其肉淖粗理者身寒細理者身熱故能耐寒而多氣皮緩故能縱腹垂腴也肉者多血多血則充形充形則平人有多肉者皮肉不相離身體容大而寒熱和平也脂者其血清氣滑少故不能大此別於眾人者也脂者骨中髓也多脂者肉堅其血必清氣滑且少故身形不大而必能耐寒也此言人之有膏有肉有脂其氣血各有多少若眾人皮肉脂膏之不加多各自稱其身也靈樞玉版篇病之生時有喜怒不測飲食不節陰氣不足陽氣有餘營氣不行乃發為癰疽陰陽不通兩熱相搏乃化為膿夫癰疽之生膿血之成也積微之所生也由微而積以小治小者其功小以大治大者多害故其已成膿血者其惟砭石鈹鋒之所取也言治癰膿小針不適用大針即可用砭與鈹針鋒針諸病皆有逆順腹脹身熱脈大是一逆也邪正盛腹鳴而滿四肢清冷也泄其脈大是二逆也此陰證得陽脈衄而不止脈大是三逆也亦陰證得陽脈咳且溲血脫形其脈小勁是四逆也正氣已衰咳脫形身熱正衰火盛脈小以疾邪亦未衰是謂五逆也如是者不過十五日而死矣其腹大脹四末清脫形泄甚是一逆也腹脹便血其脈大時絕是二逆也以陰證得陽脈時絕者死脈也咳溲血形肉脫脈搏是三逆也火盛水虧嘔血胸滿引背脈小而疾是四逆也脈小帶疾虛而火盛也咳嘔腹脹且飧泄病已虛其脈絕是五逆也如是者不過一時而死矣工不察此者而刺之是謂逆治人之所受氣者谷也谷之所注者胃也胃者水穀氣血之海也海之所行雲氣者天下也胃之所出氣血者經隧也經隧者五臟六腑之大絡也迎而奪之而已矣上下有數乎問手足經也迎之五里中道而止五至而已五往而臟之氣盡矣故五五二十五而竭其輸矣此所謂奪其天氣者也五里手陽明經穴陰氣之所在也若迎而奪之則臟氣敗絕必致中道而止且一臟之氣大約五至而已針凡五往以奪之則一臟之氣已盡若奪至二十五至則五臟之輸氣皆竭此所謂奪其天真之氣也靈樞五禁刺有五禁禁其不可刺也甲乙日自乘無刺頭無發朦於耳內丙丁日自乘無振埃於肩喉廉泉戊己日自乘四季戊己為手足四肢合辰戌丑未之四季無刺腹去爪瀉水庚辛日自乘無刺關節與股膝壬癸日自乘無刺足脛是為五禁此言天干應於人身故凡天干目乘之日皆無刺之發朦等名見刺節真邪篇靈樞陰陽二十五人篇本篇云二十五人之形血氣之所生別而陰陽和平之人不與金木水火土別其五色五形之人各有其五故名篇形勝色色勝形者至其勝時年加感則病行失則憂矣形色相得者富貴大樂形與色必有相得如木形人蒼色火形人赤色土形人黃色金形人白色水形人黑色也人有形勝色者如得木形而黃色現也色勝形者如得木形而白色現也但此等之人不以本形本色相見而有他色來見至其形色相勝之時值有年忌相加此感則病行失則憂也凡年忌下上之人犬忌常加年忌者忌有常數也下上義詳全篇五行之人中七歲十六歲二十五歲三十四歲四十三歲五十二歲六十一歲皆人之大忌不可不自安也年忌始於七歲七為陽之少九為陽之老陽數極於九而極必變故自七歲以後凡遇九年皆為年忌按其寸口人迎以調陰陽切深也循察也其經絡之凝澀結而不通者此於身皆為痛痹甚則不行故凝澀凝澀者致氣以溫之留針血和乃止其結絡者脈結血不行決之乃行開泄之謂故曰氣有餘於上者導而下之刺其在下之穴以引而下之氣不足於上者推而休之刺其在上之穴推轉其針久留以待氣其稽留不至者因而迎之因氣未來當引之而使其必來必明於經隧經脈之道路乃能持之寒與熱爭者導而行之其宛陳血不結者則而予之則度也靈樞五音五味篇衝脈任脈皆起於胞中上循背裡為經絡之海其浮而外者循腹右上行會於咽喉別而絡唇口血氣盛則充膚熱肉血獨盛則澹滲皮膚生毫毛婦人有餘於氣不足於血以其數脫血也衝任之脈不榮口唇故須髭不生靈樞行針篇陰陽和調而血氣淖澤滑利故針入而氣出疾而相逢也多陰而少陽其氣沉而氣往難故數刺乃知也其氣逆與其數刺病益甚者非陰陽之氣浮沉之勢也此皆粗之所敗工之所失營氣主沉衛氣主浮刺衛當淺刺營當深針入而氣逆者特以宜淺反深宜深反淺也靈樞上膈篇氣為上膈者食飲入而還出因於氣則病在上故食飲一入即時還出夫氣有虛實實而氣壅則食無所容虛而氣寒則食不得化皆令食入即出也蟲為下膈下膈者食晬時乃出因於蟲則病在下下文詳言之喜怒不適食飲不節寒溫不時則寒汁流於腸中流於腸中則蟲寒蟲寒則積聚守於下管脘同則腸胃充廓衛氣不營邪氣居之凡瘍胃氣則陽虛而寒汁流於腸中蟲寒不行則聚於下脘而腸胃充滿也衛氣脾氣也脾氣不能營運故邪得聚而居之人食則蟲上食蟲上食則下管虛下管虛則邪氣勝之積聚以留留則癰壅同成癰成則下管約邪氣乘虛留聚以致壅於下脘要約不行則亦因陽氣之虛於下故食入周時復出也其癰在管內者即而痛深其癰在外者則癰外而痛深癰上皮熱管之內外即言下脘也邪伏於中故熱見於皮肉之上微按其癰視氣所行察其氣所必由以刺之也先淺刺其旁稍內益深還而刺之毋過三行先以泄其流行之邪後刺其所病之正穴以拔其積聚之本但至再三而止不可過也察其浮沉以為深淺已刺必熨令熱入中日使熱內邪氣益衰大癰乃潰散也伍以參禁以除其內恬憺無為乃能行氣幾食息起居必參伍宜否守其禁以除內之再傷又必恬憺無為以養其氣則正氣乃行而邪氣可散蓋膈症最為難愈故當切戒如此後以鹹苦化谷乃下矣咸從水化可以潤下軟堅苦從火化可以溫胃故皆能下谷也下膈一症有食入周日復出而不止晬時者有不因蟲壅而下焦不通者矣此篇特言蟲壅者蓋亦下膈之一症耳靈樞憂恚無言咽喉者水穀之道也喉嚨者氣之所以上下者也人有二喉一軟一硬軟者居後是謂咽喉硬者居前是謂喉嚨喉主天氣咽主地氣會厭者音聲之戶也喉間是薄膜周關會合上連懸壅咽喉入息之道得以不亂者賴其遮厭故謂之會厭能開能闔聲由以出故謂之戶口唇者音聲之扇也唇啟則聲揚故謂之扇舌者音聲之機也舌動則音生故謂之機懸雍垂者音聲之關也此即懸而下垂者俗謂之小舌當氣道之沖為喉間要會故謂之關頏顙者分氣之所泄也頏顙即頸中之喉顙當咽喉之上懸雍之後張口可見者也顙前有竅息通於鼻故為分氣之所泄橫骨者神氣所使主發舌者也橫骨即喉上之軟骨下連心肺故為神氣所使上連舌本故主舉發舌機故人之鼻洞涕出不收者頏顙不開分氣失也鼻洞者涕液流泄於鼻也頏顙之竅不開則清氣不行清氣不行則濁液聚而下出由於分氣之失職也是故厭小而疾薄則發氣疾速也其開闔利其出氣易其厭大而厚則開闔難其氣出遲故重言也重言言語謇澀之謂人卒然無音者寒氣客於厭則厭不能發發不能下至其開闔不致不能也故無音寒氣客於會厭則氣道不利既不能發縱而高又不能低抑而下開闔俱有不便故卒然失音此下言刺法足之少陰上繫於舌絡於橫骨終於會厭兩瀉其血脈刺兩足之太谿穴濁氣乃闢闢開也觀此節之義凡有虛勞而漸致失音者亦屬腎經其治當同此法會厭之脈上絡任脈取之天突其厭乃發也天突為陰維任脈之會取治暴喑靈樞寒熱篇寒熱瘰癧在於頸腋者此皆鼠瘻有寒熱之毒氣也留於脈而不去者也瘰癧一名鼠瘻瘡生於頸腋間乃陽明少陽兩經之所屬鼠瘻之本皆在於藏其末上出於頸腋之間其浮於脈中而未內著於肌肉而外為膿血者易去也從其本引其末此謂治法去其致之之本則外見之末自可引而衰也審按其道以子之予與之針也徐往徐來以去之其小如脈者初起也一刺知三刺而已骨空論日刺寒府靈樞邪客篇持針縱舍奈何縱言從緩舍言弗用也必先明知十二經脈之本末皮膚之寒熱脈之盛衰滑澀其脈滑而盛者病日進虛而細者久以持大以澀者為痛痹此言病氣之盛及元氣之虛者皆難取速效當從緩治以漸除之者也陰陽如一者病難治表裡俱傷血氣皆敗者是為陰陽如一刺之必反甚當舍而勿刺也其本末尚熱者病尚在胸腹臟腑為本經絡四肢為末尚熱者餘邪未蓋也宜從緩治其熱已衰者其病亦去矣可舍針也持其尺察其肉之堅脆小大滑澀脈形寒溫燥濕體氣因視目之五色以知五臟而決死生目為五臟六腑之精視其血脈視陷下與否察其色察血脈之五色以知其寒熱痛痹如是可以行持針縱舍之法持針之道欲端以正安以靜先知虛實而行疾徐左指執骨右手循之無與肉裡針入必中其穴故無與肉裡瀉欲端以正補必閉膚輔針導氣邪得淫泆真氣得居此持針縱舍之道也肺心有邪其氣留於兩肘在肺則尺澤在心則少海之次留當作流下同肝有邪其氣留於兩腋期門淵腋等穴之次脾有邪其氣留於兩筋脾與胃合其脈皆自脛股上出衝門氣衝之間故邪氣留於髀跨者為脾經之病腎有邪其氣留於兩膕腎與膀胱為表裡其經皆出膝後陰谷委中之間故邪氣留於兩膕者為腎經之病凡此八虛者皆機關之室真氣之所過血絡之所遊邪氣惡血固不得住留住留則傷經絡骨節機關不得屈伸故疴攣也兩肘兩腋兩髀兩膕皆筋骨之隙氣血之所流注者故曰八虛正氣居之則為用邪氣居之則傷經絡機關而屈伸不利此八虛可候五臟也機樞機也關要會處也室猶房室也靈樞論疾診尺診目痛赤脈從上下者太陽病從下上者陽明病從外走內者少陽病靈樞刺節真邪篇刺有五節一曰振埃二曰發朦三曰去爪四曰徹衣五曰解惑振埃者刺外去陽病也振埃猶振落塵埃故取其外經可以去陽病也陽氣大逆上滿於胸中憤䐜肩息大氣逆上喘喝坐伏病惡埃煙𩜺古噎字不得息皆陽邪在上之症取之天容手太陽其咳上氣窮詘音屈胸痛者取之廉泉任脈血變而止發朦者刺府輸去府病也發朦如去其矇蔽也耳無所聞目無所見刺此者必於日中陽旺氣行之時刺其聽宮中其眸子聽宮手太陽脈也與目相通故能中其眸子刺之而聲應於耳乃其穴也刺邪以手堅按其兩鼻竅而疾偃臥其聲必應於針也去爪者刺關節肢絡也去爪猶脫去余爪故取關節肢骼可以去血道不通之病腰脊者身之大關節也肢脛者人之管鍵也以趨翔也莖垂者前陰宗筋身中之機可見命門元氣盛衰陰精之候精由此泄津液之道也故飲食不節喜怒不時津液內溢乃下流於睪血道不通日大不休俯仰不便趨翔不能此病滎然有水不上不下鈹石所取形不可匿常不得蔽不可蔽匿等症即㿗疝之類常察在何經以取其關節肢絡故命曰去爪徹衣者盡刺諸陽之奇輸也陰氣不足則內熱陽氣有餘則外熱內熱相搏熱於懷炭外畏綿帛近不欲衣不可近身畏氣又不可近席憎衣腠理閉塞則汗不出舌焦唇稿臘干嗌燥飲食不讓美惡取之天府手太陰經大杼中膂俱足太陽以去其熱補足手太陰大都太淵以出其汗熱去汗稀此治傷寒邪熱之類也疾於徹衣言病除之速有如徹去衣服也解惑者盡知調陰陽補瀉有餘不足相傾移也解惑猶解其迷惑故在盡知陰陽調其虛實可以移易其病也大風在身血脈偏虛輕重不得顛倒無常甚於迷惑此即中風之類瀉其有餘補其不足陰陽平復用針若此疾於解惑陰陽者寒暑也熱則滋雨而在上地氣上蒸根核少汁物之氣亦不在下而在上人氣在外皮膚緩腠理開血氣減汗大泄皮淖澤以人身論之其氣之在表者如此寒則地凍水冰天地氣寒人氣在中皮膚致腠理閉汗不出血氣強肉間澀當是之時善行水者不能往水水成冰故不能使之往流善穿地者不能鑿凍地正凍故不能鑿善用針者亦不能取四厥四肢厥逆血脈凝結堅搏不往來者亦未可即柔故行水者必待天溫冰釋凍解而水可行地可穿也人脈猶是也治厥者必先熨調和其經掌與腋肘與腳項與脊以調之火氣已通血脈乃行然後視其病脈淖澤者刺而平之堅緊者破而散之氣下乃止此所謂以解結者也上寒下熱陽虛於上而實於下也先刺其頂太陽久留之大杼天柱等穴留其針而補之已刺則熨項與肩胛令熱下合乃止此所謂推而上之者也刺後當溫熨肩項之間候其氣至上熱與下相合乃止其針此推其下者而使之上也上熱下寒陽實於上而虛於下也視其虛脈而陷之於經絡者取之此所謂引而下之者也當視其虛陷之經取而補之使其陽氣下行而後止此引而下之之謂也大熱遍身狂而妄見妄聞妄言視足陽明及大絡取之虛者補之血而實者瀉之因其偃臥居其頭前以兩手四指挾按頸脈動即人迎大迎處久持之卷而切推下至缺盆中而復止如前熱去乃止此所謂推而散之也三陽在頭故可獨取人迎而推散其熱也真氣者所受於天與穀氣並而充身者也真氣即元氣也正氣者正風也從一方來非實風又非虛風也風得時之正者是為正風故又曰正氣從一方來者謂正風實風本同一方也然正風之來徐而和實風之來暴而烈故與虛風對言也邪氣者虛風之賊傷人也其中人也深不能自去從沖後來者為虛風詳九宮八風正風者其中人也淺合而自去其氣來柔弱不能勝真氣故自去謂邪與正合而正勝之故自去虛邪之中人也灑淅動形起毫毛而發腠理其入深內搏於骨則為骨痹搏於筋則為筋攣搏於脈中則為血閉不通則為癰搏於肉與衛氣相搏陽勝者則為熱陰勝者則為寒寒則真氣去去則虛虛則寒搏於皮膚之間陽勝則熱陰勝則寒皆邪氣也獨曰寒則真氣去蓋氣屬陽人以氣為主寒勝則陽虛所重在氣也其氣外發腠理開毫毛搖氣往來行則為癢留而不去則痹衛氣不行則為不仁邪之在表者其氣外發或腠理開則汗為不斂或毫毛動搖則毛悴而敗或氣往來行則流而為癢或邪留不去則痛而為痹若衛氣受傷虛而不行則不知痛癢是謂不仁虛邪偏客於身半其入深內居營衛營衛稍衰則真氣去邪氣獨留發為偏枯其邪氣淺者脈偏痛虛邪之入於身也深寒與熱相搏久留而內著寒勝其熱則骨疼肉枯傷於陽也熱勝其寒則爛肉腐肌為膿傷於陰也內傷骨內傷骨為骨蝕最深者內傷於骨是為骨蝕謂侵蝕及骨也有所疾前筋筋屈不得伸邪氣居其間而不反發為筋溜言疾有始於筋者筋初著邪則筋屈不得伸若久居其間而不退則發為筋溜有所流注而結聚於筋也即贅瘤之屬下仿此有所結氣歸之衛氣留之不得反津液久留合而為腸溜邪有所結氣必歸之故致衛氣失常留而不反則蓄積於中流注於腸胃之間乃結為腸溜久者數歲乃成以手按之柔已有所結氣歸之津液留之邪氣中之凝結日以易甚連以聚居為昔瘤其始按之雖柔或上或下已有所結及其久也氣漸歸之津液留之復中邪氣則易於日甚乃結為昔瘤昔瘤者非一朝夕之謂以手按之堅有所結深中骨氣因於骨骨與氣並日以益大則為骨疽又有按之而堅者其結日大名為附骨疽也有所結中於肉宗氣歸之邪留而不去有熱則化而為膿無熱則為肉疽宗大也以陽明之氣為言邪留為熱則潰腐肌肉故為膿無熱則結為粉漿之屬聚而不散是為肉疽凡此數氣者其發無常處而有常名也靈樞衛氣行歲有十二月日有十二辰子午為經卯酉為緯天象定者為經動者為緯子午當南北二極居其所而不移故為經卯酉常東昇西降列宿周旋無已故為緯天周二十八宿而一面七星四七二十八星東方角亢氏房心尾箕北方鬥牛女虛危室壁西方奎婁胃昴畢觜參南方井鬼柳星張翼疹是為四七二十八星房昴為緯房在卯昴在酉虛張為經虛在子張在午是故房至畢為陽其位在卯辰巳午未申昴至心為陰其位在酉戌亥子醜寅陽主晝陰主夜故衛氣之行一日一夜五十周於身晝日行於陽二十五周自足太陽經至手陽明經詳見下文夜行於陰二十五周周於五歲按經言自足少陰經而行手少陰經手太陰經足厥陰經足太陰經此獨遣手厥陰經當於他篇參詳歲當作臟謂天之陽主晝人之陽主腑故衛氣晝則行於陽分二十五周天之陰主夜人之陰主臟故夜則周於五臟是故平旦陰盡陽氣出於目睛明穴目張則氣上行於頭循項下足太陽循背下至小指之端至陰穴其散者別於目銳眥下手太陽下至手小指之間外側少澤穴其散者別於目銳眥瞳子髎下足少陽注小指次指之間竅陰穴以上循手少陽之分側下至小指次指之間關衝穴別者以上至耳前合於頷脈承泣頰車之分注足陽明以下行至跗上入次指之間厲兌穴其散者從耳下下手陽明入大指次指之間入掌中其至於足也入足心出內踝下行陰分復合於目故為一周靈樞九針篇夫聖人之起天地之數也一而九之故以立九野九而九之九九八十一以起黃鐘數焉以針應數也一者天也天者陽也五臟之應天者肺肺者五臟六腑之蓋也皮者肺之合也人之陽也故為之治針必以大其頭而銳其末令母得深入而陽氣出所用在淺但欲出其陽邪耳二者地也人之所以應土者肉也故為之治針必筒其身而圓其末令母得傷肉分傷則氣得竭三者人也人之所以成生者血脈也故為之治針必大其身而圓其末令可以按脈勿陷以致其氣令邪氣獨出用在按脈致氣以出其邪勿得過深陷於血脈之分也四者時也時者四時八風之客於經絡之中為瘤病者也瘤留也故為之治針必筒其身而鋒其末令可以瀉熱出血而痼病竭五者音也音者冬夏之分分於子午陰與陽別寒與熱爭兩氣相搏合為癰膿者也故為之治針必令其末如劍鋒可以取大膿六者律也律者調陰陽四時而合十二經脈虛邪客於經絡而為暴痹者也故為之治針必令尖如毛毫同且圓且銳中身微大以取暴氣七者星也星者人之七竅邪之所客於經而為痛痹舍於經絡者也故為之治針令尖如蚊虻喙靜以徐往微以久留正氣因之真邪俱往出針而養者也用在微細徐緩漸散其邪以養真氣八者風也風者人之股肱八節也八正之虛風八風傷人內舍於骨解腰脊節腠理之間為深痹也故為之治針必長其身鋒其末可以取深邪遠痹九者野也野者人之節解皮膚之間也淫邪流溢於身如風水之狀而溜不能過於機關大節者也故為之治針令小大如挺其鋒微圓以取大氣之不能過於關節者也九針圖在卷三身形之應九野也左足應立脊其日戊寅己丑此左足應艮宮東北方也立春後東北節氣也寅醜二日東北日辰也故其氣皆應於艮宮然乾坤艮巽四隅之宮也震兌坎離四正之宮也土王於四季故四隅之宮皆應戊己而四震之宮各有所王後仿此左脅應春分其日乙卯此左脅應正宮正東方也春分後正東節氣也乙卯日東方之正也故其氣皆相應左手應立夏其日戊辰己巳此左手應巽宮東南方也立夏後東南節氣也戊辰己巳東南日辰也故其氣皆相應膺喉首頭應夏至其日丙午膺喉首頭應離宮正南方也夏至後正南節氣也丙午日南方之正也故其氣皆相應右手應立秋其日戊申己未此右手應坤宮西南方也立秋後西南節氣也戊申己未西南日辰也故其氣皆相應右脅應秋分其日辛酉此右脅應兌宮正西方也秋分後正西節氣也辛酉日西方之正也故其氣皆相應右足應立冬其日戊戌己亥此右足應乾宮西北方也立冬後西北節氣也戊戌己亥西北日辰也故其氣皆相應腰尻下竅應冬至其日壬子此腰尻下竅應坎宮正北方也冬至後正北節氣也壬子日北方之正也故其氣皆相應六腑膈下三臟應中州其大禁大禁太乙所在之日及諸戊己此膈下應中宮也膈下腹中也三臟肝脾腎也六腑三臟俱在膈下腹中故應中州其大禁者在太乙所在之日及諸戊己日蓋戊己屬上雖寄王於四季而實為中宮之辰故其氣應亦如太乙即冬至居葉蟄宮四十六日立春居天留宮四十六日之類是也張景岳曰九宮八風篇止言八宮而不及中宮此節乃言中宮太乙所在之日意者於八宮太乙數中幾值四季土王用專之日即中宮太乙之期也惟博者正之凡此九者九宮善候八正所在之處八正即八方王氣之所在太乙之謂也九宮定則八正之氣可候矣所主左右上下身體有癰腫者欲治之無以其所直之日潰治之是謂天忌日也太乙所在天忌圖在卷三靈樞癰疽篇寒邪客於經絡之中則血澀血澀則不通不通則衛氣歸之不得復反故癰腫言其留聚不散也寒氣化為熱熱勝則腐肉肉腐則為膿膿不瀉則爛筋筋爛則傷骨骨傷則髓消不當骨空不得泄瀉血枯空虛則筋骨肌肉不相榮經脈敗漏熏於五臟臟傷故死矣癰毒由淺至深傷臟則死如下文所云癰發於嗌中名曰猛疽猛疽不治化為膿膿不瀉塞咽半日死其化為膿者瀉則合豕膏冷食三日已猛疽言為害之急也若膿已瀉當服豕膏可以愈之即豬脂之練淨者也發於頸前頸也名曰天疽其癰大以赤黑毒甚也不急治則熱氣下入淵腋前傷任脈內熏肝肺熏肝肺十餘日而死矣陽氣大發邪熱之甚也消腦留項名曰腦爍其色不樂傷乎神也項痛而如刺以針毒之銳也煩心者死不可治邪犯其臟故不可治發於肩及臑名曰疵癰其狀赤黑急治之此令人汗出至足不害五臟癰發四五日逞焫之逞疾也焫艾炷也發於脅下赤堅者名曰米疽治之以砭石欲細而長疏砭之塗以豕膏六日已勿裹之其癰堅而不潰者為馬刀挾纓急治之此即瘰癧也挾纓經脈篇作俠癭發於胸名曰井疽其狀如大豆三四日起不早治下入腹不治七日死矣發於胸者能熏心肺若不早治而使之入腹毒尤甚矣故死期之速如此發於膺名曰甘疽色青其狀如谷實栝蔞即栝蔞也言癰所結聚形如谷實之累累栝蔞之軟而不潰中有所蓄如子也此症延綿難愈蓋即乳癰之屬發於脅名曰敗疵敗疵者女子之病也灸之其病大癰膿治之其中乃有生肉大如赤小豆銼䔖𧄍草根各一升以水一斗六升煮之竭為取三升則強飲厚衣坐於釜上令汗出至足已葭芰也𧄍連𧄍也二草之根俱能解毒故各用一升大約古之一升得今之三合有零以水一斗六升煮取三升手摺數類此發於股脛大股也名曰股脛疽其狀不甚變亦形不顯也而癰膿搏骨言膿著於骨今人所謂貼骨癰也不急治三十日死矣發於尻名曰銳疽其狀赤堅大急治之不治三十日死矣發於股陰名曰赤施不急治六十日死在兩股之內不治十日而當死股陰大股內側也當足太陰箕門血海及足厥陰五里陰包之間皆陰氣所聚之處故不治則死若兩股俱病則傷陰之極其死尤速發於膝名曰疵癰其狀大癰色不變寒熱如堅石勿石石之者死須其柔乃石之者生膝癰未成而石之者傷其筋之府故致於死若柔則膿成矣砭之無害也諸癰疽之發於節而相應者不可治也發於陽者百日死發於陰者三十日死諸節者神氣之所遊行出入也皆不宜有癰毒之患若其相應則發於上而應於下發於左而應於右其害尤甚為不可治然發於三陽之分者毒淺在臟其死稍緩發於三陰之分者毒深在臟不能出一月也發於脛名曰兔齧其狀赤至骨急治之不治害人也兔齧如有所齧傷也發於內踝名曰走緩其狀癰也色不變數石其輸砭其所腫之處也而止其寒熱不死發於足上下名曰四淫其狀大癰急治之百日死陽受氣於四末而大癰淫於其間陽毒之盛極也當急治否則真陰日敗故逾三月而死發於足旁名曰厲癰其狀不大初如小指發急治之去其黑者不消輒益謂初如小指而不治則日以益大也不治百日死發於足指名曰脫癰其狀赤黑死不治不赤黑不死不衰急斬之不則死矣癰發於足者多為凶候至於足指皆六井所出而癰色赤黑其毒尤甚若無衰退之狀則急當斬去其指庶得保生否則毒氣連臟必至死矣滎衛稽留於經脈之中則血澀而不行不行則衛氣從之而不通壅遏而不得行故熱大熱不止熱勝則肉腐腐則為膿然不能陷骨髓不為焦枯五臟不為傷故命曰癰此辨癰之浮淺在表也熱氣淳盛下陷肌膚筋髓枯內連五臟血氣竭當其癰下筋骨良肉皆無餘故命曰疽此言疽之毒深故內連五臟外敗筋骨良肉也疽者上之皮夭以堅上如牛領之皮言皮色黑黯不澤也癰者其皮上薄以澤此其候也
