門婦人帶下經不調氣海白環赤白帶下可刺之中極燒腎腧關元並照海間使穴其三陰交婦人臨産若艱難一瀉三陰交即安合谷獨陰在足第二指下橫紋中挨次取勝教方術服仙丹補瀉雪心歌聚英行針補瀉分寒熱瀉寒瀉熱須分別捻指向外瀉之方捻指向內補之訣補左須當大指前補右大指往後拽舊本瀉左瀉右誤瀉左次指向前搓瀉右大指往上拽舊本補左補右誤如何補瀉有兩般蓋是經從兩邊發補瀉又要識迎隨經絡之逆順隨則為補迎為瀉古人補瀉左右分今人乃為男女別男女經脈一般生晝夜循環無暫歇兩手陽經從上頭陰經胸走手指輒兩足陽經頭走足陰經上走腹中結隨則針頭隨經行迎則針頭迎經奪更有補瀉定呼吸吸瀉呼補真奇絶補則呼出卻入針循摩針用三飛法循摩舊本㘞聲按道家演法必從泥丸宮運祖氣㘞的一聲㘞聲是也針家不用此法故易之三飛法見下氣至出針吸氣入疾而一退急捫穴瀉則吸氣方入針伸提氣令通身達伸提氣令舊本㘞聲祖氣氣至出針呼氣入徐而三退穴開捺此訣出自梓桑君我今授汝心已雪正是補瀉元中元莫向人前輕易説瀉訣補訣神應經陳宏剛曰取穴既正左手大指掐其穴右手置針於宋上令患人咳嗽一聲隨咳內針至分寸候數穴針畢停少時用右手大指及食指持針細細動搖進退搓捻其針如手顫之狀謂之催氣約行五六次覺針下氣緊卻用瀉法如針左邊用右手大指食指持針大指向前食指向後以針頭輕提往左轉如有數針俱依此法俱轉畢仍用右手大指食指持針以食指連搓三下謂之飛仍輕提往左轉略退針半分許謂之三飛一退依此法行至五六次覺針下沉緊是氣至極矣再輕提往左轉一二次如針右邊以左手大指食指持針大指向前食指向後依前法連搓三下輕提針頭向右轉是針右邊瀉法欲出針時令病人咳嗽一聲隨咳出針此為瀉法凡人有疾皆邪氣所湊雖病人瘦弱不可專行補法經曰邪之所湊其氣必虛如患赤目等疾明見其為邪熱所致可專行瀉法其餘諸疾只宜平補平瀉須先瀉後補謂之先瀉邪氣後補真氣此乃先師不傳之祕訣也如人有疾依前用手法催氣取氣瀉之既畢卻行補法令病人吸氣一口隨吸轉針如針左邊捻針頭向右邊用右手大指食指持針食指向前大指向後仍捻針深入一二分使真氣深入肌肉之分如針右邊捻針頭轉向左邊用左手大指食指持針食指向前大指向後仍捻針深入一二分如有數穴依此法行之既畢停少時於針頭上輕彈三下如此三次仍用左手大指食指持針以大指連搓三下謂之飛將針深進一二分以針頭向左邊謂之一進三飛依此法行至五六次覺針下沉緊或針下氣熱是氣至足矣令病人吸氣一口隨吸出針急以手按其穴此為補法按補瀉散見於寶命八正離合真邪針解等篇又有併合流注迎隨諸法而大成書中有燒山火透天涼青龍白虎等名皆失經義內經針即刺也俗以針在穴中良久者謂針針至穴即去者謂刺非也用針咒天靈節榮願保長生太玄之一守其真形五臟神君各保安寧神針一下萬毒潛形急急如律令攝凡針默念咒一遍吹氣在針上想針如火龍從病人心腹中出其病速愈制針法本草云馬銜鐵無毒日華子云古舊鋌者好或作醫工針柔鐵即熟鐵有毒故用馬銜則無毒以馬屬午屬火火剋金解鐵毒故用以作針古曰金針者貴之也又金為總名銅鐵金銀之屬皆是也若用金針更佳煮針方先將鐵絲於火中煅紅次截之或二寸或三寸或五寸長短不拘次以蟾酥塗針上仍入火中微煅不可令紅取起照前塗酥煅三次至第三次乘熱插入臘肉皮之裡肉之外將後藥先以水二碗煎沸次入針肉在內煮至水乾傾出待冷將針取出於黃土中插百餘下以去火毒色明方佳次以銅絲纏上其針尖要磨圓不可用尖刃麝香五分膽礬石斛各一錢穿山甲當歸尾硃砂沒藥川芎廣鬱金細辛各三錢沉香甘草各五錢磁石一兩能引諸藥入鐵內上藥同針入水用瓷罐煮半日洗擇之又方巴豆去殼烏頭各一兩麻黃五錢木鱉子切片烏梅各十個石藥同針入水如前煮法原方有硫黃五錢硫黃損鐵故去之九針圖靈樞一曰鑱針頭大末鋭取法於巾針至末寸半漸鋭之長一寸六分主熱在頭身用之金鑑曰鑱者鋭也欲淺刺不令深入二曰員針筒其身卵其鋒取法於絮針長一寸六分主治分肉間氣滿三曰匙針其身大其末員取法於黍粟之鋭長三寸半主按脈取氣令邪氣出四曰鋒針筒其身鋒其末取法於絮針長一寸六分主癰熱出血用之金鑑曰刃三隅其上去八分下留八分五曰鈹針其末如斂鋒廣二分半長四寸主取大癰膿又名斂針也鈹音批扉同六曰員利針尖如𤫱且員且鋭微大其末反小其身取法於𤫱針長一寸六分主取癰痹七曰毫針尖如蚊虻喙取法於毫毛長一寸六分主寒熱痛痹在絡八曰長針長其身鋒其末取法於綦針長七寸主取深邪遠痹大成曰今之名跳針是也九曰大針其鋒微員取法於鋒針長四寸主取大氣不出關節解肌排毒用之金鑑曰形如鋌相而且巨按類經注曰巾針絮針綦針等制必古針名也大成第一鑱計注曰箭頭針也第四鋒針注曰三稜針也其針式皆與靈樞不同意亦相通第九大針針注曰一名燔針調經論注燔針者內針之後以火燔之暖耳粹針者用火先赤其針而後刺第二次止痛方乳香沒藥當歸花乳石各五錢可加甘草三錢上藥同針煮半日取出用皂角水洗再於犬肉內煮一日仍用瓦屑打磨淨端直今以細砂皮先在木上打光然後磨針亦得再用松子油塗之長近人氣暖針法素問遺篇注云用圓利針長針未刺之時先口內溫針暖而用之又曰毫針於人近體暖針至溫方刺舊云口體溫針欲針入經絡氣得溫而易行也今或投針於熱湯中亦此意耳口溫與體溫微有不同口溫者針頭雖熱而柄尚寒不若著身溫之則針通身皆熱矣王節齋曰近有溫針者乃楚人之法其法針穴上以香白芷作圓餅套針上以艾灸之多以取效此即調經論燔針也可以治筋寒病然古者針則不灸灸則不針夫針而加灸灸而且針乃後人俗法此行於山野貧賤之人經絡受風寒者或有效只是溫針通氣而已於血宜行於疾無與也古針法最妙但恐不得其精而誤用之則危拙見於頃刻惟灸得穴有益無害火針法火針即淬針頻以麻油蘸其針燈上燒令通紅用方有效若不紅不能去病反損於人燒時令針頭低下恐油熱傷手先令他人燒針醫者臨時用之以免手熱先以墨點穴使針時無差火針甚難須有臨陳之將心方可行針先以左手按穴右手用針切忌太深恐傷經絡太淺不能去病惟消息取中耳凡行火針必先安慰病人勿令驚懼與灸略同而疼無幾時一針之後速便出針不可久留即以左手速按針孔則能止痛人身諸處皆可行火針惟面上忌之火針不宜針腳氣反加腫痛宜破癰疽發背潰膿在內外面皮無頭者但按毒上軟處以潰膿其闊大者按頭尾及中以墨點記宜下三針決破出膿凡針腫上不可按之即以手指從兩旁捺之令膿隨手而出或腫大膿多針時須側身回避恐膿射出汗身也孫真人雷火針法治閃挫諸骨間痛及寒濕氣而畏刺者用沉香木香乳香茵陳羌活乾薑穿山甲各三錢麝香少許艾葉二兩以綿紙半尺先鋪艾茵於上次將藥末摻之卷極緊收用按定痛穴以筆點記外用紙六七層隔穴將卷艾藥取太陽真火用圓珠火鏡皆可燃紅按穴上良久取起剪去灰再燒再按九次即愈其法灸一火念咒一遍先捻火在手念咒曰雷霆官將火德星君藥奏奇功方得三界六腑之神針藏烈焰煉成於仙都九轉之門蠲除痛患掃蕩妖氛吾奉南鬥六星太上老君急急如律令咒畢即以雷火針按穴灸之務要誠敬勿令婦女雞犬見太乙針法艾絨二兩桃樹皮乳香沒藥硫黃雄黃穿山甲川烏草烏各一錢麝香三分上藥為末用綿紙一層藥一層卷緊或用線扎灸時用紅布襯於痛處將此針在火上燒著灸之如雷火針法艾葉本草云艾味苦氣微溫陰中之陽無毒主灸百病三月三日五月五日採曝乾陳久者良辟惡殺鬼又採艾之法五月五日灼艾有效制艾先要如法令乾燥入石臼搗細篩去塵屑取潔白為上須令焙大燥則灸有力火易燃如潤無功圖經云舊不著所出但云生田野間今隨處有之惟蘄州所産葉厚而干高氣味最勝用之尤妙丹溪曰艾性至熱入火灸則上行入藥服則下行艾炷大小先後明堂曰灸炷下廣三分若不三分則火氣不達病不愈則是灸炷欲大惟頭與四肢欲小耳又曰艾炷依小箸頭作其病脈粗細狀如細線但令當脈灸之雀糞大炷亦能愈疾如腹脹疝瘕痃癖伏梁氣等須大艾炷小品曰腹背爛燒四肢但去風邪而已不宜大炷如巨闕鳩尾當脈上灸之不過四五壯艾炷宜小若艾炷大而復灸多其人永無心力頭上灸多令人失精神背腳灸多令人血脈枯竭四肢細而無力外臺云人年三十以上灸頭不灸三里令人氣上衝目明堂云先灸上後灸下先灸少後灸多皆宜審之資生云凡灸當先陽後陰言從頭向左而漸下次從頭向右而漸下壯數多少灸法千金云凡言壯數者若丁壯病根深篤可倍於方數老少羸弱可減半扁鵲灸法有至三五百壯千壯此亦太過曹氏灸法有百壯五十壯小品諸方亦然惟明堂云針入六分灸三壯更無餘治故後人無準惟以病之輕重而增損之凡灸頭項止於七壯積至七七壯止灸法坐點穴則坐灸臥點穴則臥灸立點穴則立灸須得身體平直毋令傾側若傾側穴不正徒破好肉耳艾灸補瀉圖翼云灸法有二報三報以至連年不絶者前後相催其效尤速或自三壯五壯以至百壯千壯者由漸而增也凡以火補者勿吹其火必待其從容徹底自滅灸畢即可用膏貼之以養火氣若欲報者直待報畢貼之可也以火瀉者可吹其火傳其艾宜於迅速須待灸瘡潰發然後貼膏此補瀉之法也然用火之法惟陽虛多寒經絡凝滯者為宜若診其脈數口乾咽痛面赤內熱等症俱不宜灸也灸瘡要法資生云凡著艾得瘡發所患即瘥若不發其病不愈甲乙經云灸瘡不發者故履底炙令熱尉之三日即發今人用赤皮蔥三五莖去青於溏灰中煨熱拍破熱尉瘡上十餘遍其瘡三月遂發又以生麻油漬之而發亦有用皂角煎湯候冷頻點之而亦有恐血氣衰不發服四物湯滋養血氣不可一概論也有復灸一二壯遂發有食熱炙之物如燒魚煎豆腐羊肉之類而發在人以意取助不可順其自然灸後調攝法寶鑑云灸後不可就飲茶恐解火氣及食恐滯經氣宜停一二時須得靜室臥平心定氣戒色欲勞怒飢飽寒熱食忌生冷瓜果惟食清淡養胃之物使氣血流通艾火逐出病氣若食厚味醇酒致生痰涎阻滯病氣矣鮮魚雞羊雖能發火可施於初灸旬日之內不可加於半月之後今人不知恬養雖灸何益故因灸而反致害者有之洗灸瘡古人灸艾炷大便用洗法以赤皮蔥薄荷煎湯溫洗瘡周圍約一時久驅逐風邪於瘡口出更令經脈往來不澀自然疾愈若灸火退痂後用東南桃枝青嫩皮煎湯溫洗能護瘡中諸風若瘡黑爛加胡荽煎洗若疼不可忍加黃連煎神效如不應灸而誤灸之灸瘡痛不可忍以致飛肉成片名曰飛蝶宜用大黃芒硝煎濃汁頻洗灸處痛仍不止可將此藥吃一二杯即除矣貼灸瘡古人貼灸瘡不用膏藥要得膿出多而疾除資生云春用柳絮夏用竹膜秋用新綿冬用兔腹下白細毛或貓腹毛今人多以膏藥貼之亦取其便不可速易若膏藥不壞久貼之可也若速易瘡亦速愈恐病根不盡除也灸瘡膏方白芷川芎黃連薄荷金星草乳香當歸黃芩蔥白淡竹葉上藥各等分用香麻油煎膏臨好用鉛粉炒熱收又方生地元參黃耆當歸川芎防風乳香蔥白各等分如前法煎治誤針傷絡血不止方花蕊石赤石脂乳香沒藥兒茶血竭自然銅血餘灰白𧂠藤黃上藥各等分為細末摻上即愈治折針法一用靈磁石引其肉中針即出一用青蛙眼珠搗爛塗之針即出一將原針穴邊復下一針補之針即出一用硫黃研細水調塗上以紙花貼之覺癢時針即出一用象牙屑碾細水和塗上針即出一用雙杏仁搗爛用鮮豬脂調勻貼針瘡上針即出一用螻蛄腦子搗爛塗上針即出倘因折針經絡有傷膿血不止用黃耆當歸木香沉香乳香肉桂別研緑豆粉糊丸每服五十丸熱湯送下禁針穴歌禁針穴道要先明腦戶囟會及神庭絡卻玉枕角孫穴顱息承泣隨承靈神道靈臺膻中忌水分神闕並會陰橫骨氣衝手五里箕門承筋及青靈會宗乳中犢鼻里厥陰急脈須丁寧共三十五穴刺中五臟膽皆死衝陽血出投幽冥孕婦不宜針合谷三陰交內亦同論石門針灸應須忌女子終身無妊娠外有云門並鳩尾缺盆肩井客主人針若深時多暈倒急補三里可平神要知天突低頭取背部諸腧切莫深禁灸穴歌禁灸之穴四十七承光啞門風府逆睛明攢竹下迎香天柱素髎上臨泣腦戶耳門瘈脈通禾髎顴窖絲竹空頭維下關人迎等肩貞天牖心腧同乳中脊中白環腧鳩尾淵液和周榮腹哀少商並魚際經渠天府及中衝陽池陽關地五會漏谷陰陵條口逢殷門申脈承扶上伏兔髀關連委中陰市下行尋犢鼻諸穴休將艾火攻逐日人神所在歌人神之法將何起一日先從足大指二日外踝三股內四在腰髀五口裡六手七居內踝次八腕九尻十腰背十一鼻柱二髮際十三牙齒皆相類十四胃脘五遍身六胸十七氣衝尋十八股內十九足二十外踝須分明草一在手小指間草二外踝三足肝草三日在足並肝經草四手陽明勿錯草五足陽明一般草六在胸草七膝草八陰中勿相逼草九元來膝脛前三十足趺須記得四季避忌日春甲乙夏丙丁四季戊己秋庚辛冬壬癸太乙即八極也故太乙立於中宮而鬥建其外然後可以朝八風占吉凶所謂北辰北極天之樞紐者以此太乙所在天忌歌靈樞九宮八風篇以八節分八宮而稱為太乙所居者正合月建之序蓋月建所在之方即時令所主之位人身之氣無不應之故凡針灸家當知避忌者恐傷其王氣耳立春艮上起天留己丑戊寅左足求春分震位倉門定左脅東方乙卯投立夏戊辰與己巳巽宮陰洛左手愁夏至上天丙午日離宮膺至喉首頭立秋哀委當右手己未戊申坤上遊秋分倉果西方兌辛酉還從右脅謀立冬右足加新洛戊戌己亥乾位收冬至坎方臨葉蟄壬子腰尻下竅流五臟六腑並臍腹招搖戊巳應中州針灸不拘三伏裴子言醫針灸諸病從未有以時令拘也而世俗專泥於伏暑之月不思病之感也有淺有深其治療也有緩有急豈可概至伏暑之月而後針且灸耶考諸素問靈樞以及月令禁忌等書不見有伏暑始宜針灸之説不知世俗何所據而云然但一歲之中最不可犯者獨在冬至前後旬餘日蓋此時正在剝極復生陰盛陽微之候君子於此自宜深潛玩密保護微陽而不便有所泄易謂先王以至日閉關商旅不行後不省方素問謂蟄蟲周密君子居室去寒就溫無泄皮膚皆此義也當此之際則又考諸針灸禁忌有太乙人神周身血忌逐年尻神逐日人神男忌除女忌破男忌戌女忌巳之類醫者不能知此避忌反致氣怯神傷其病難瘳理固然也但卒僕痰厥唇疔喉痹等急症宜即用針灸治療若論忌神少緩恐至不救薛立齋治疔患適值望日針之其症乃愈大抵尻神日忌遇有急症亦不可拖泥也此尻神禁忌一歲起坤二歲至震逐年順飛九宮周而復始行年到處所主傷敗切忌針灸若誤犯之恐變生他病問疑針灸大成問用針渾是瀉而無補古人用之所以導氣治之以有餘之病也今人鮮用之或知其無補而不用歟抑元氣稟賦之薄而不用歟或斫喪之多而用針無益歟抑不善用而不用歟經曰陽不足者溫之以氣精不足者補之以味針乃砭石所制既無氣又無味破皮損肉發竅於身氣皆從竅出矣何得為補經曰氣血陰陽俱不足勿取以針和以甘藥是也又曰形氣不足病氣不足此陰陽皆不足也不可刺之刺之重竭其氣老者絶滅壯者不復矣若此謂者皆是有瀉而無補也問病有在氣分者有在血分者不知針家亦分氣與血否曰氣分血分之病針家亦所當知病在氣分遊行不定病在血分沉著不移以積塊言之腹中或上或下或有或無者是氣分也或在兩脅或在心下或在臍上下左右一定不移以漸而長者是血分也以病風言之或左手移於右手右足移於左足移動不常者氣分也或常在左足或偏在右手著而不走者血分也凡病莫不皆然須知在氣分者上有病下取之下有病上取之在左取右在右取左在血分者隨其血之所在應病取之苟或血病瀉氣氣病瀉血是謂誅伐無過咎將誰歸問皮肉筋骨脈病咎曰百病所起皆始於榮衛然後淫於皮肉筋脈故經言是動脈者氣也所生病者血也先為是動而後所生病也由此推之則知皮肉經脈亦是後所生之病耳刺法但舉榮衛逆順則皮骨肉筋之治在其中矣問呼吸之理答曰此乃調和陰陽法也故經言呼者因陽出吸者隨陰入雖此呼吸分陰陽實由一氣而為體蓋呼則出其氣吸則入其氣欲補之時氣出針入氣入針出欲瀉之時氣入入針氣出出針呼而不過三口是外隨三焦之陽吸而不過五口是內迎五臟之陰先呼而後吸者為陽中之陰先吸而後呼者為陰中之陽乃各隨其病氣陰陽寒熱而用之問針入幾分留幾呼答曰不如是之相拘蓋肌肉有淺深病去有遲速若肌肉厚實處則可深淺薄處則宜淺病去則速出針病滯則久留針問補瀉有不在井榮腧經合者多如何答曰如睛明瞳子髎治目疼聽宮絲竹空聽會治耳聾迎香治鼻病地倉治口喎風池頭維治頭項古人亦有不繫井榮俞經合者如此蓋以其病在上取之上也問經穴流注病在各經絡按時補瀉能去病否答曰病著於經其經自有虛實補虛瀉實亦自中病也有一針而愈有數針始愈蓋病有新痼淺深新淺者一針可愈深痼者必屢針乃除丹溪東垣有一劑愈者有至數十劑而愈者今人用一針不愈則不再針矣且病非獨出於一經一絡者其發必有六氣之兼感標本之差殊或一針以愈其標而本未盡除或獨取其本而標尚復作必數針方絶其病之鄰也問內經治病湯液少而針灸多何也答曰古者勞不至倦逸不至流食不肥鮮以戕其內衣不蘊熱以傷其外起居有節寒暑知避恬淡虛無精神內守病安從生雖有賊風虛邪不能深入不過湊於皮膚經滯氣鬱而已以針行氣以灸散郁則病隨已何待湯液耶今者道德日衰以酒為漿以妄為常縱欲以竭其精多慮以散其真不知持滿不解御神務快其心過於逸樂起居無節寒暑不避故病多從內生外邪亦易中也經曰針刺治其外湯液治其內病既屬內非湯液則不能濟也和緩以後方藥甚行而針灸兼用固由世不古若今非昔比亦叢針法之不精傳授之未得耳非古用針灸之多今用針灸之少亦非湯液之宜於今而不宜於古也不可遽執四時俱宜針灸之説賊及天和也審經辨證論經絡考張嗣泉曰臟腑陰陽各有其經四肢筋骨各有所主明其部以定經循其流以尋源舍此而欲知病之所在猶適燕而南行豈不逾勞而逾遠哉方書云不讀十二經絡開口動手便錯誠確論也世人以經絡為針灸家書皆懵然罔究妄舉妄談即如頭痛一症左右分經前後異位同一腹痛也而有中脘當臍少腹之分同一害眼也而有大眥小眥黑珠白珠上下胞之異在肺而用心藥則肺病不去而復損心經在血而用氣藥則氣反傷而血病益滋東垣曰傷寒邪在太陽經誤用葛根湯則引邪入陽明是葛根乃陽明經藥非太陽經藥也即此而推其夭於藥者不知其幾矣仁人君子慎勿輕議當留心於此焉病同人異論醫學源流天下有同此一病而治此則效治彼則不效且不惟無效而反有害者則以病同而人異也夫七情六淫之感而受感者或氣體有強弱質性有陰陽生長有南北性情有剛柔筋骨有堅脆肢體有勞逸年力有老少奉養有膏梁藜藿之殊心境有憂勞和樂之別更加天時有寒暖受病有深淺之各異一概施治則病情雖中而氣體相反利害亦相反矣故醫必細審其人之種種不同而後輕重緩急大小先後之法因之而定內經言之極詳即針灸外科治法盡然故凡治病者皆當細審也治法慎疾芻言凡病只服煎藥而愈者惟外感之症為然其餘諸症則必用丸散膏丹針灸砭鐮浸洗尉溻蒸提按摩等法因病施治乃今之醫者既乏資本又惜功夫古方不考手法無傳寫一通治煎方其技已畢而病家不辭遠涉不惜重聘亦只求得一煎方已大滿其願古昔聖人窮思極想製造治病諸法全不一問如此而欲愈大症痼疾無是理也所以今人患輕淺之病猶有服煎藥而愈者若久病大症不過遷延歲月必無愈理也故為醫者必廣求治法以應病者之求至嘗用之藥一時不能即合者亦當豫為修制以待急用所謂工欲善其事必先利其器奈何事救人之術而全無救人之具也
