下一寸璇璣在天突下一寸皆誤天突一名天瞿一名玉戶在頸結喉下三寸宛宛中陰維任脈之會針五分一曰低頭取之針當直下不得低手灸三壯功不及針治上氣咳逆咽腫哮喘舌下急身寒熱廉泉一名舌本一名本池在頷下結喉上中央仰而取之陰維任脈之會針三分灸三壯治咳嗽喘息舌下腫舌根縮舌縱涎出口瘡承漿一名懸漿一名天池在頤前唇稜下宛宛中開口取之針三分灸七壯治偏風口眼喎斜暴喑不能言口齒生瘡督脈者起於長強循背而行以總督陽經也骨空論曰督脈起於少腹以下骨中央女子人系廷孔故又言衝任與督脈同起於會陰督脈穴考背中行二十八穴長強一名氣之陰郤一名骨靈樞謂之窮骨一名骨骶在脊骶骨端下三分伏地取之督脈之𦯚別走任脈針三分灸三十壯治腸風久痔下部疳蝕狂病驚癇小兒囟陷灸尾翠骨七壯治脫肛神良千金作龜尾即窮骨也腰腧一名背解一名腰柱一名腰戶一名髓空在二十一椎下宛宛中䒷身以腹挺地兩手相重支額縱四體取之針八分灸七壯至三七壯治腰脊痛足痹不仁溫瘧汗不出婦人經閉溺赤陽關在十六椎下坐而取之針五分灸三壯治膝痛筋攣不行命門一名屬糶一名精宮在十四椎下與臍相對伏而取之或正立用杖拄地量至臍以墨點記乃用度脊間平點處是穴針五分灸三壯治頭疼身熱如火腰痛骨蒸懸樞在十三椎下伏而取之針三分灸三壯治腰脊強腹中積氣上下行脊中一名神宗一名脊俞在十一椎下俯而取之針五分禁灸灸令人僂治風癇癲邪五痔積聚下痢小兒脫肛可灸三壯中樞在十椎下俯而取之針五分禁灸按中樞穴諸書皆無據氣穴論曰背與心相控而痛所治天突與十椎及上紀又氣府論督脈氣所發二十八穴王注中樞在十椎下脊間故圖翼有中樞穴也筋縮在九椎下俯而取之針五分灸三壯治癲癇驚狂脊強目上視至陽在七椎下俯而取之針五分灸三壯治腰脊痛胃中寒羸瘦身黃寒熱脛酸靈臺在六椎下俯而取之甲乙經無此穴出氣府論注治氣喘不得臥火到即愈灸三壯神道在五椎下俯而取之灸五壯禁針治傷寒頭痛往來痎瘧悲愁健忘驚悸身柱在三椎下俯而取之針五分灸五壯至二七壯治腰脊痛癲狂怒欲殺人瘛瘲身熱妄言見鬼陶道在一椎下俯而取之足太陽督脈之會針五分灸五壯治痎瘧寒熱灑淅脊強頭重目瞑恍惚不樂大椎一名百勞在脊骨第一椎上陷中一曰平肩手足三陽督脈之會針五分灸髓年壯治五勞七傷乏力痎瘧肺脹脅滿背膊拘急啞門一名喑門一名舌厭一名舌橫在項後入髮際五分宛宛中仰頭取之督脈陽維之會入系舌本針三分不可深禁灸灸令人啞治重舌不語衄血寒熱脊強反折瘛瘲癲疾風府一名舌本在項後髮際上一寸大筋內宛宛中疾言其肉立起言休其肉立下足太陽陽維督脈之會針三分禁灸灸之失音治中風舌緩不語振寒汗出半身不遂頭痛項急鼻衄咽痛狂欲自殺腦戶一名會額在枕骨上強間後一寸半足太陽督脈之會針腦戶入腦立死灸令人啞強間一名大羽在後頂後一寸半當作百會後三寸針二分灸五壯治頭痛項強目眩腦旋煩心後頂一名交沖在百會後一寸半枕骨上針二分灸五壯治項強急額顱上痛惡風目眩百會一名三陽五會一名巔上一名天滿在頂中央容豆許去前髮際五寸後髮際七寸直兩耳尖上居中是穴針二分灸七壯治頭風鼻塞中風口噤心神恍惚驚悸健忘痎瘧脫肛小兒夜啼前頂在囟會後一寸半骨間陷中針一分灸三壯治頭風目眩面赤腫鼻多清涕囟會在上星後一寸陷中針二分灸二七壯小兒八歲以下禁針緣囟門未合針之不幸令人夭治腦虛冷痛頭皮腫上星一名神堂在直鼻上入髮際一寸針三分灸五壯不宜多治頭風頭皮腫鼻塞臭涕出血痎瘧寒熱汗不出目眩睛痛不能遠視以細針宣泄諸陽熱氣無令上衝頭目神庭在直鼻上入髮際五分如髮際不明者取以眉心上三寸五分足太陽督脈之會灸七壯禁針針令發狂疾目失明治發狂登高妄走風癇目上視淚出鼻淵驚悸不得安寢素髎一名面王在鼻柱上端準頭針一分禁灸治鼻中息肉不消多涕喎噼衄血酒酢風水溝一名人中在鼻柱下溝中央陷中手足陽明督脈之會針三分灸三壯治中風口噤惡邪鬼擊癲癇瘟疫消渴多飲水氣遍身腫兌端在上唇端手陽明脈氣所發針二分灸三壯炷如麥大治癲癇吐沫消渴鼻衄口臭齒齦痛齦交在唇內上齦縫中任督足陽明之會針三分灸三壯治鼻中息肉牙疳腫痛目赤多淚眵頭額痛面生瘡癬衝脈者起於氣街足陽明經並少陰之經俠臍上行至胸中而散骨空論其右腹也行乎幽門通谷陰都石關商曲肓俞中注四滿氣穴大赫橫骨左右二十二穴難經曰衝脈並足陽明之經上行奇經考曰足陽明去腹中行二寸少陰去腹中行五分衝脈行於二經之間也帶脈者起於季脅回身一周帶脈為病腰腹縱溶溶如囊水之壯溶溶緩慢貌婦人小腹痛裡急後重瘛瘲月事不調赤白帶下明堂足少陰之正至膕中別走太陽而合上至腎當十四椎出屬帶脈直者系舌本復出於項合於太陽經別篇其脈氣所發正名帶脈以其回身一周如朿帶然又與足少陽會於五樞維道左右六穴陽蹺脈者起於跟中循外踝上行入風池陽蹺為病陰緩而陽急難經陽蹺所發之穴生於申脈以附陽為郤本於僕參與足少陽會於居髎又與手陽明會於肩髃及巨骨又與手足太陽陽維會於臑俞又與手足陽明會於地倉巨髎又與任脈足陽明會於承泣又與手足太陽足陽明陰蹺會於睛明左右二十二穴陰蹺脈者起於跟中循內踝上行至咽喉交貫衝脈陰蹺為病陽緩而陰急難經陰蹺在內踝病即其脈急當從內踝以上急外踝以上緩陽蹺在外踝病即其脈急當從