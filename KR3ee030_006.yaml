body:
  text: 卷六論治補遺中風論寸口脈浮而緩浮則為風緩則為虛營緩則為亡血衛緩則為中風邪氣中經絡脈空虛賊邪不瀉或左或右邪氣反緩正氣即急正氣引邪喎僻不遂邪在於絡肌膚不仁邪在於經即重不勝邪入於府即不識人邪入於藏舌即難言口吐涎寸口脈浮而緊緊則為寒浮則為風寒風相搏邪在皮膚則身癢而癮疹心氣不足邪氣入中則胸滿而短氣金匱原文從醫宗金鑑喻嘉言曰傷寒症太陽經之中風者乃風寒暑濕之風自外而入者也真中風之風乃人身自有之風平素蘊蓄而一旦內出者也素問云陽之氣以天地之疾風名之可見真中風之病乃人之數擾其陽所致數擾其陽惟房室一事為最房室過勤縱陰不走而陽氣則已動動而不已必漸積於空郤之所而手微麻足或微疸舌或微蹇風信已至而擾其陽者方未已一旦乘虛橫發與大塊噫氣林木振響黃沙蔽天白浪翻海者初無少異矣其人安得不卒倒乎逮至卒倒而世醫方引風寒暑濕之風為治一誤再誤外風入而與內風交煽任憑軀偉體堅經年不能少減而成廢人者比比甚有不旬日而告斃矣可勝悲哉大法風既自內而生還須自內而熄欲自內而熄何物是熄風之藥養血乎風亦與之俱養補氣乎風亦與之俱補實腠理乎風亦與之俱實將何所取耶養血補氣自不可少而實腠理之藥斷不可用進而求之於法然後不患於無藥也蓋天地間之風得雨則熄所以素問又曰陽之汗以天地之雨名之以雨治風不言治而治在其中以故內風之人腠理斷不可實實則汗不能出也氣血不可不補虛則不足供汗之用也要使元氣足以拒風於腠理之間務如大病退後之人飲湯則汗食粥則汗如此旬日以聽風之自熄然後為當其妙全在助陽而通血脈不取驅風散邪為義與荊防柴葛之輕藥絶不相干世傳以羌防等藥發散一食頃者此但可治偶感之風耳以治內風不去百分之一豈有經年積纍之風而取辦一藥且僅攻皮膚之理哉中風病多見於富貴之人而貧賤絶少貧賤之人非無房室也以其勞苦奔走身中之氣時為蒸動才有微風便從汗解而富貴之人身既安逸內風已熾尚圖乘風納涼沐泉飲水以解其熱致陽氣愈遏不舒加以濃酒厚味之熱挾郁陽而為痰閉塞經絡一旦卒然而中漫不知病所由來古今成方雖多辨症全不清切盍觀平人飲醇食爆積至無算全不見其熱者陽氣有權默為運出耳陽氣遏郁無權勢必轉蒸飲食之物為痰痰與風相結逮發之時其體盛之人病反加重蓋體盛則陽多陽多則風與痰俱多也孰知其風為本而痰為標耶孰知其陽氣為本而風痰為標耶風痰為標可汗可吐而或者見其昏迷舌蹇以為邪入心藏用牛黃清心之類驅風散痰致陽氣愈遏而成不治甚多夫陽遏在內之人臟腑有如火烙平素喜生冷臨病又投金石覆轍相尋明哲罔悟亦獨何耶陽氣為本勢必絶欲而不更擾其陽病根始拔然而陽氣素動習慣漸近自然多不樂於安養風痰才得少息往往思及欲事略一舉動復從本及末蔓而難圖矣古今無人深論及此惟善保生者見體中痰多風熾無俟病發預為絶欲可矣按中風者乃為風邪所中卒倒無知之症西北氣寒有之東南無中風者此惟中氣虛憊故肝風內煽東垣主虛是也虛則無根之火發焉逆上之痰生焉河間主火丹溪主痰是也其卒倒痰壅皆與真中風相似故曰類中但無六經形症為異耳如牙關緊閉兩手握固者乃邪氣閉塞於外元氣猶存宜與開關利竅治法至若口開為心絶眼閉為肝絶手撒為脾絶遺尿為腎絶鼻鼾為肺絶此五臟氣脫也心絶者不過一時死更有髮直頭搖吐沫面赤汗出如珠者皆不治矣間有中氣者為七情所傷氣厥無痰宜用蘇合香丸灌之風濕風者百病之長其變無常其中人也風則上先受之濕則下先受之俱從太陽膀胱經而入風傷其衛濕流關節邪相搏擊故顯汗出惡風短氣發熱頭痛骨節煩疼身重微腫等症此固宜從汗解第取汗貴徐不貴驟驟則風去濕存徐則風濕俱去也其有不可發汗者緣風濕相搏多夾陽虛陽虛即不可汗但可用辛熱氣壯之藥扶陽逐濕而已凡見短氣雖為邪阻其正當慮胸中陽虛凡見汗出微喘雖為肺氣感邪當慮真陽欲脫痙病病者身熱足寒頸項強急惡寒時頭熱面赤目赤頭搖口噤背反張者痙病也詳在金匱外感六淫之邪由太陽而傳六經邪不盡傳即不已故三陽三陰皆足致痙如太陽之傳陽明項背𠘧𠘧少陽之頸項強是知三陽皆有痙矣海藏謂三陽太陰皆病痙獨不及少陰厥陰云背反張屬太陽低頭視下手足牽引肘膝相構屬陽明或左或右一目牽斜一手搐搦屬少陽發熱脈沉細腹痛屬太陰以防風當歸湯治太陽陽明發汗過多而致痙者以柴胡加防風湯治少陽汗後不解寒熱往來而成痙者雖不及少陰厥陰然其製附子散桂心白朮湯附子防風散意原有在觀其白朮湯下云上解三陽下解太陰一種苦心無非謂傳入少陰厥陰必成死證耳詎知傳經之邪如風雨之來而畫地以限其不至豈可得乎靈樞謂足少陰之經筋循脊內俠膂上至項與足太陽筋合其病在此為主癇瘛及痙在外陽病者不能俯在內陰病者不能仰是則足少陰之藏與足太陽之府兩相聯絡而以不能俯者知為太陽主外不能仰者知為少陰主內其辨精矣仲景之以頭強脊強不能俯者指為太陽之痙原以該三陽也而其以身蜷足蜷不能仰者指為少陰之痙以該三陰也痙證之屬三陰者及陽症陰脈者皆不可救其證目正圓及戴眼者不治所以仲景但論三陽治法而不及三陰也小兒之體脆神怯不耐外感壯熱多成痙病後世妄以驚風立名實則指痙病之頭搖手徑者為驚風之抽掣指痙病之卒口噤腳攣急者為驚風之搐搦指痙病之背反張者為驚風之角弓反張妄投鎮驚之藥勾引外邪深入臟腑千中千死又如新産婦人血舍空虛外風襲入而成痙病仲景謂新産亡血虛多汗出喜中風故為病痙宜從血舍驅風若稱産後驚風妄投湯藥亦千中千死也癇病即風癲風癲者由氣血虛邪入於陰經故也又人在胎其母卒大驚精氣並居令子發癇其發則仆地吐涎沫無所覺是也癲狂癡呆凡狂病多因於火此或以謀為失志或以思慮鬱結屈無所伸怒無所泄以致肝膽氣逆木火合邪是誠東方實症也此其邪乘於心則為神魂不守邪乘於胃則為暴橫剛強故當以治火為先而或痰或氣察其甚而兼治之癲病多由痰氣凡氣有所逆痰有所滯皆能壅閉經絡格塞心竅故發則旋暈僵仆口眼相引目睛上視手足搐搦腰脊強直食頃乃蘇此其條病條已者正由氣之條逆條順也故當察痰察氣因其甚者而先治之凡平素無痰而或以鬱結不遂思疑驚恐而漸致癡呆言辭顛倒舉動不經或多汗或善愁其症則千奇萬狀無所不至脈必或弦或數或大或小變易不常此其逆氣在心有可愈者有不可愈者在乎胃氣元氣之強弱待時而復非可急也小兒無狂症惟病癲者常有之凡小兒之病有從胎氣而得者有從生後受驚而得者蓋小兒神氣尚弱驚則肝膽奪氣而神不守舍舍空則正氣不能主而痰邪足以亂之故凡治小兒之驚癇必須先審正氣然後察其病邪酌宜治之邪熱攻心則自笑用止笑散黃連生地麥冬犀角丹砂甘草水煎和童便服笑不休心火盛也用金花湯黃連黃芩黃柏梔子炒製半夏水煎和竹瀝薑汁服厥症辨李惺庵曰暴死者卒然而倒其因甚多詳於諸症今復類舉者欲倉卒之際辨症顯然耳如暴僕口噤吐涎身溫體暖脈虛者中風也二陳湯加天麻鉤藤如腹痛額黑手足收引脈來沉遲無氣以息中寒也急灸關元服理中四逆湯有本於陰虛復遇暑途飢困勞役暴僕昏絶者此暑邪乘虛而犯神明之府生脈散加香薷如有痰聲者名曰痰厥此虛陽載痰上升也四君子加竹瀝薑汁不可用二陳燥痰之劑如行立之間暴眩僕絶喉無痰聲身無邪熱者此陰虛而陽暴絶也獨參湯如暴怒卒倒身冷無涎汙者名曰氣厥四磨湯重者薑湯調蘇合香丸如食後著寒著氣而暴死者名曰食厥二陳湯探吐之小兒多有此症有大怒載血瘀於心胸而暴死者名曰血升宜逐瘀行血婦人産後經行偶著恚怒多有之如感臭穢瘴毒暴死者名曰中惡視膝腕內有紅筋刺出紫血或刺十指頭出血候醒以藿香正氣散調之或探喪入廟或入無人之室或造天地壇場歸來暴絶面赤不語者名口尸厥進藥即死宜移病人東首焚香北面禮拜更宜醋炭熏鼻有傷寒新瘥與婦人交忽患少腹急痛外腎搐縮而黑喘急冷汗自出名曰脫元有因大吐大瀉後卒然四肢厥冷不省人事名曰脫陽俱宜急以蔥白緊縛放臍上以艾火灸之使熱氣入腹後以參附薑湯救之汗止喘息為可治遲則無及矣有男女交接而死者男子名走陽女子名脫陰男雖死陽事猶然不倒女雖死陰戶猶然不閉有夢中脫泄死者其陽必舉陰必泄尸容尚帶喜笑為可證也皆在不救傷寒論太陽病頭痛至七日以上自愈者以行其經盡故也若欲再作經者針足陽明使經不傳則愈七日太陽一經行盡之期而日再作經者太陽過經不解復病陽明而為並病也當刺足陽明之厲兌陷谷衝陽等穴如太陽病脈浮頭痛刺宛骨京骨頭疼惡寒發熱刺合谷以解太陽之餘邪也太陽病初服桂枝湯反煩不解者先刺風池風府卻與桂枝湯則愈風邪不僅在衛而在太陽之經故刺之以解其結陽明病脈長身熱目疼鼻乾不得臥下血譫語者此為熱入血室但頭汗出者刺期門陽明熱盛侵及血室血室不藏溢出前陰故下血刺期門則中焦營氣之結滯易散婦人中風發熱惡寒經水適來得之七八日熱除而脈遲胸脅下滿如結胸狀譫語者此為熱入血室也當刺期門隨其實而瀉之熱入血室屬陽明經男女皆有之太陽少陽並病脈弦頭項強痛或眩冒時如結胸心下痞硬當刺大椎肺俞肝俞肺主氣肝主血此調其氣血也慎不可發汗發汗則譫語若譫語不止當刺期門少陰病脈沉口燥舌乾而渴吐利手足不逆冷反發熱者不死脈不至者灸少陰七壯灸太溪復溜能還大脈若太溪脈絶則死矣傷寒六七日脈微手足厥冷煩躁灸厥陰厥不還者死按聚英云傷寒煩躁者灸厥陰俞即太衝穴病者手足厥冷言我不結胸小腹滿按之痛者此冷結在膀胱關元也灸關元穴下利手足逆冷無脈者灸之少陰經太溪任脈氣海丹田各灸七壯可救萬一不溫若脈不還反微喘者死下利後脈絶手足厥逆晬時脈還手足溫者生脈不還者死傷寒腹滿譫語寸口脈浮而緊此肝乘脾也名曰縱刺期門傷寒發汗嗇嗇惡寒大渴欲飲水其腹必滿此肝乘肺也名曰橫刺期門肝乘脾曰縱者放縱不收克其所勝其病難愈肝乘肺曰橫者木反乘金橫犯其所不勝其病易安刺期門皆所以泄肝之盛氣也傷寒溫病熱病説傷寒以病因而為病名者也溫病熱病以天時與病形而為病名者也由三者皆起於感寒或者通以傷寒稱之夫傷寒即發於天令寒冷之時而寒邪在表閉其腠理有惡風惡寒之症者因風寒在表表氣受傷也溫病熱病後發於天令暄熱之時怫熱自內達外郁其腠理無寒在表故無惡風惡寒之症其有惡風惡寒之症者重有風寒新中而表氣亦受傷故也傷寒汗下不愈而經者亦溫病也溫病之脈行在諸經隨其經之所在而取之大頭瘟大頭瘟者足陽明邪熱太甚恣實少陽相火而為之熾多在少陽或在陽明或傳太陽視其腫勢在何部分隨經取之濕熱為腫火盛則痛此邪見於頭多在兩耳前後以先出為主病也治之不宜藥速速則過其病所謂上熱未除中寒復生況頭乃空虛之部分邪著空虛無所不至治法當先緩而後急先緩者用藥性味俱緩更緩服以浸漬無形之邪也後急者謂緩劑已瀉邪入於中是到陰部染於有形質之所若不速去則損陰也此卻為客邪當急去之也假令少陽陽明為病少陽為邪出於耳前後也陽明為邪者首大腫也先以黃芩黃連甘草通炒過煎湯少少不住服或劑畢再用大黃煨鼠黏子炒香煎成去滓納芒硝俱各等分亦時時呷之得微利及邪氣已只服前藥如不已再依前次第服之取大便利邪氣即止如陽明渴者加石膏少陽渴者加栝蔞根陽明行經升麻芍藥葛根太陽行經羌活防風之類暑風中暑卒倒無知名曰暑風大率有虛實兩途實者痰之實也平素積痰充滿經絡一旦感召暑濕痰阻其氣卒倒流涎此濕暍合病最劇者也宜先吐其痰後清其暑猶易為也虛者陽之虛也平素陽氣衰微不振陰寒久已用事一旦感召盛暑邪湊其虛此濕暍病之得自虛寒者也宜回陽藥中兼清其暑最難為也按金匱中熱中暍皆暑病之稱而病有不同潔古曰中暑者陰症中熱者陽症以中暑由任性納涼陽氣為陰邪所遏其病發熱頭痛惡寒無汗身形拘急痠疼宜解表佐以清暑中熱由日中勞役身冒暑熱頭痛壯熱大渴引飲煩躁汗泄懶動及腹痛水瀉噁心此熱傷氣肺與大腸受之宜涼解暑毒今以卒倒手足搐搦名暑風乃夏月火盛灼金致木旺生風脾土受邪不可以風藥誤治手足逆冷名暑厥大概時令之火鬱極於內不得伸越所致入門曰暑厥即暑暍病兼手足厥冷也嘔吐噦靈樞口問篇岐伯曰谷入於胃胃氣上注於肺今有故寒氣與新穀氣俱還入於胃新故相亂真邪相攻氣並相逆復出於胃故為噦肺主為噦取手太陰太淵足少陰俞府石關嘔即吐之類但吐而無物者曰嘔嘔而有物者曰吐腹脹噯氣曰噫噫者飽食之息即噯氣也厄厄連聲曰噦今以厄逆名之中焦厄逆其聲輕而短水穀為病也下焦厄逆其聲惡而長虛邪相搏也噎隔噎枯在上咽喉壅塞飲雖可入食不能下隔枯在下胸臆痞悶食雖可入至胃復出或食下而眼白口開氣不能順或食入而當心刺痛須臾吐出食出痛止五隔五噎由喜怒太過七情傷於脾胃鬱而生痰痰與氣搏升而不降飲食不下蓋留於咽嗌者則成五噎結於胃膈者則為五隔思憂喜怒悲其病令人胸膈痞悶嘔逆噎塞妨礙飲食治法宜調陰陽化痰下氣陰陽平勻氣順痰下則病無由作矣按七情所傷痰與氣搏故食不下若瘀血阻礙則食下作痛或反胃而吐出總由脾胃虛傷血液枯稿不能運化五穀膈間受病故通名為膈也虛癆積虛成損積損成癆經年不愈謂之久虛有五勞六極七傷之分五勞應五臟曲運神機則勞心盡力謀慮則勞肝意外過思則勞脾預事而憂則勞肺矜持志節則勞腎六極應六腑血極則面枯發落善忘筋極則拘攣轉筋爪黯甲痛肉極則體瘦肉削倦怠嗜臥氣極則喘嗽少氣皮枯毛焦骨極則面垢齒浮腰痠脊痛精極則目暗耳鳴遺溺莖弱七傷者推原勞極之由如久視傷血久臥傷氣久坐傷肉久立傷骨久行傷筋房勞思慮傷心腎心主血腎主精精竭血燥氣衰火旺蒸疰日久則癆生焉癆瘵既久元氣必傷熱毒痰瘀變幻生蟲在肝為毛蟲食人筋膜在心為羽蟲食人血脈在脾為裸蟲食人肌肉在肺為介蟲食人膚膏在腎為鱗蟲食人骨髓其症蒸熱咳嗽胸悶背痛兩目不明四肢無力腰膝痠疼臥不能寐或面色㿠白或兩頰時紅常懷忿怒夢與鬼交若蟲蝕肺系咯血吐痰喉瘡聲啞思食無厭皮枯毛落良可悲憫惟補虛扶元殺蟲以絶其根縱不獲生可絶其傳疰也驗病法用乳香焚熏病者之手令其仰掌以帛覆之熏之良久手背生毛長至寸許白而黃者可治紅者則難青黑者死若熏之良久無毛者非傳尸也初服黑虎丹下諸癆蟲從大便中出真牛黃阿魏各一錢真雷丸南木香各五錢雄雞肫皮洗淨炙乾二錢共研細末用使君子去殼研末二兩加前藥七錢將飛羅白麵打糊丸如梧子大聽用次服小紅丸錦紋大黃為末一兩加前藥末七錢煉蜜丸如黍米大外用硃砂為衣聽用三服打蟲化積丸大黃為末五兩五錢檳榔三兩黑醜頭末三兩五錢用麵糊丸如梧子大聽用初服起於四更時用砂糖水化吞黑虎丹若壯盛者服二錢五分虛弱者服二錢二次五更時服小紅丸白糖水化吞如壯盛者服四十丸虛弱者服三十五丸三次天明服化積丸用片糖化水吞之壯盛者服三錢五分虛弱者服三錢蟲下為驗視其蟲黃白者治青黑者不治如無蟲過二三日再服至若收功常服地黃丸補其血氣如服後瀉不止者宜服異功散咳血吐血咳血少痰亦名干嗽嗽血多痰隨嗽而出此皆肺受熱邪也吐血者逐口吐出嘔血者驟然上出咯血與咳血相似然失血於口有咽喉之異蓋咽為胃之上竅喉為肺之上竅嘔血咯血出於咽咳血嗽血出於喉而血動之由惟火惟氣耳火盛則血逼而妄行氣逆則血亂而妄行凡偶有所傷而根本未搖者易治若元氣大虛真陰不守乃為勞損之症凡失血等症見喘滿咳嗽及左右腔膈間有隱隱脹痛者病在肺胸膈膻中之間覺有牽痛如縷如絲或懊憹嘈雜有不可名狀者病在心主包絡胸腹膨膨不知飢飽食飲無味多涎沫者病在脾脅肋牽痛或躁擾喘息不寧往來寒熱者病在肝氣短似喘聲啞不出骨蒸盜汗咽乾喉痛動氣忡忡者病在腎大嘔大吐煩渴頭痛大熱不得臥者病在胃肺病宜清降不宜升浮心病宜養營不宜耗散脾病宜溫中不宜酸寒肝病或宜疏利或宜甘緩不宜祕滯腎病宜壯水宜滋陰不宜香燥克伐胃病或宜大瀉或宜大補當察兼證虛實而治之肺痿肺癰肺痿之病或從汗出或從嘔吐或從消渴小便利數或從便難又被快藥下利重亡津液故得之寸口脈數其人咳口中反有濁唾涎沫若口中辟辟燥咳即胸中隱隱痛脈滑數為肺癰咳吐膿血脈數虛者為肺痿數實者為肺癰肺痿者其積漸已非一日其寒熱不止一端總由胃中津液不輸於肺肺失所養轉枯轉燥然後成之於是肺火日熾肺熱日深肺中小管日窒咳聲以漸不揚胸中脂膜日乾咳痰艱於上出行動數武氣即喘鳴大要生胃津潤肺燥下逆氣開積痰止濁唾補真氣以通肺之小管散火熱以復肺之清肅然肺雖燥而多不渴勿以其不渴而用燥熱之藥肺痿咳唾咽燥欲飲水者自愈肺痿六脈沉澀而急或細數無神脈口皮膚枯乾而氣息粗者死寸口脈浮而數浮則為風數則為熱浮則汗出數則畏寒風中於衛呼氣不入熱過於營吸而不出風傷皮毛熱傷血脈風舍於肺其人則咳口乾喘滿咽燥不渴時唾濁沫時時振寒熱之所過血為之凝滯蓄結癰膿吐如米粥始萌可救膿成則死金匱原文作脈微而數肺癰由五臟蘊崇之火與胃中停蓄之熱上乘乎肺肺受火熱熏灼即血為之凝血凝即痰為之裹遂成小癰所結之形日長則肺日脹而脅骨日昂乃至咳聲頻並濁痰如膠發熱畏寒日晡尤甚面紅鼻燥胸生甲錯金匱治法最精全在未成膿之先今人誤作虛勞治之逮至血化為膿肺葉朽壞傾囊吐出始識其症嗟無及矣間有癰小氣壯胃強善食其膿不從口出或順趣肛門或旁穿脅肋仍可得生然不過十中二三耳肺癰初起疑似未真用生大豆絞漿飲之不覺腥氣者是也咳則胸脅微痛痛在右畔肺之長葉而坐臥得寧形色如常便溺自調者可治若潰後大熱不止時時惡寒胸中隱痛痛在左畔肺之短葉此金氣虛潰後再難平復而喘汗面赤膿痰腥穢不已者難治若喘鳴不休咯吐膿血滃臭異常正氣大敗而不知痛不得臥爪甲紫而帶彎手掌如枯樹皮顴紅唇反聲啞鼻煽者不治金匱論脈滑數為肺癰滑數者已成之脈又云微而數微數者初起之因也大抵初起脈不宜數大潰後忌短澀脈緩滑面白者生脈弦急面赤者死微當作浮頭痛頭為天象六腑清陽之氣五臟精華之血皆會於此天氣六淫之邪人氣五賊之逆皆能相害或矇蔽其清明或壅遏其經隧與正氣相搏鬱而成熱脈澀而痛若邪氣稽留脈滿而氣血亂則痛乃甚此實痛也寒濕所侵真氣虛弱雖不相搏成熱然邪客於脈外則血澀脈寒捲縮緊急引小絡而痛得溫則痛減此虛痛也因風痛者抽掣惡風因熱痛者煩心惡熱因濕痛者頭重天陰轉甚因痰痛者昏重憒憒欲吐因寒痛者絀急而惡寒戰栗氣虛痛者惡勞動其脈大血虛痛者善驚惕其脈芤頭痛自有多因而古方每用風藥者高巔之上惟風可到味之薄者陰中之陽自地升天者也在風寒濕者固為正用即虛與熱者亦假引經醫書多分頭痛頭風為二門然一病也淺而暴者名頭痛深而久者名頭風頭風必害眼者經所謂東風生於春病在肝目者肝之竅肝風動則邪害空竅也久頭痛而略感風寒便發須重綿包裹者此屬鬱熱蓋本熱而標寒也因其本有鬱熱毛竅長疏故風寒易入內熱閉逆為痛惟瀉火涼血佐以辛溫散表頭痛雖各經皆有火證陽明為最正以陽明胃火盛於頭面而直達頭維故其痛必甚脈必洪多內熱口渴其或頭腦振振痛而兼脈絶無表邪者必火邪也白虎湯加生地麥冬木通澤瀉他經則芍藥花粉芩連知蘖龍膽梔子擇用之但治火不宜佐以升散蓋外邪之火可散而去內郁之火得升愈熾矣頭旋頭眩目花身轉耳聾如立舟車之上起則欲倒此虛極乘寒也或七情鬱而生痰動火隨氣上厥此七情致虛也酒色過度腎虛不能納氣歸元使氣逆奔而上此氣虛也吐衄崩後或産後失血脾虛不能收攝營氣使諸血失道妄行此血虛眩暈也一有每遇風寒即發眩暈不省冷汗時流者名曰鬱冒亦名血厥婦人多有之宜白薇湯白薇當歸各一兩人參甘草各一錢分為五服水煎止眩湯治頭眩疼恐畏胸滿茯神一錢遠志防風細辛白朮前胡人參桂心熟地甘菊各七分枳殼五分清陽湯治目眩夢鬥恐懼色變此屬膽虛防風一錢人參七分細辛川芎甘草茯苓獨活前胡各五分目疾張子和曰聖人雖言目得血而能視然血亦有太過不及也太過則目壅塞而發痛不及則目耗竭而失明故少年之人多太過年老之人多不及但年老之人間有太過者不可不察也夫目之內眥足太陽經所起血多氣少目之鋭眥足少陽經血少氣多目之上綱手太陽經亦血多氣少目之下綱足陽明經血氣俱多然陽明經起於目兩旁交額之中與太陽少陽俱會於目惟足厥陰經連於目系而已故血太過者太陽陽明之實也血不及者厥陰之虛也刺太陽陽明出血則愈明刺少陽出血則愈昏要知無使太過不及以血養目而已凡血太多則溢太少則枯人熱則血行疾而多寒則血行遲而少此常理也目者肝之外候也肝主血在五行屬木木之為物太茂則蔽密太衰則枯瘁矣夫目五輪乃五臟六腑之精華宗脈之所聚其白睛屬肺曰氣輪兩胞屬脾曰肉輪兩眥屬心曰血輸瞳神屬腎曰水輪烏珠屬肝曰風輪氣輪病赤火乘肺也肉輪赤腫火乘脾也黑水即瞳神神光即烏珠被翳火乘肝與腎也赤脈貫目澀痛心火甚也凡目暴赤腫痛羞明隱澀淚出不止暴寒目瞞皆大熱之所為也此言目病皆因火邪然有陰虛冷淚昏眇脫陽等症外障者乃睛外為雲翳所遮多由赤痛而成或為攀睛或為胬肉治以寬中開鬱順氣清痰滋陰降火補腎疏風為主外視其翳色從何經來而刺之蓋目之為病肝熱則昏暗心熱則煩痛風濕則癢血少則澀腎虛則睛損甚則陷突微則翳膜矣內障之病無眵淚痛癢羞明緊澀之症但有如薄紗籠者有如霧露中者有如見黑花者有如見飛蠅者有如見懸珠者然其二目光明同於無病者最難分別惟目珠不動微可辨耳徐彥純曰內障乃瞳神黑小神光昏昧也綱目謂其有翳在黑睛內遮瞳子龍木論曰有腦脂流下作翳有肝風衝上作翳此足太陽厥陰之邪刺天柱風府通里太衝等穴又有用金針於黑眼內撥去雲翳能使頃刻復明夫目屬肝肝主怒怒則火動生痰痰火阻隔肝膽脈道則通光之竅遂蔽是以二目昏朦如煙如霧目既昏花逾生鬱悶故云久病生郁久郁生病不達此理者惟以補肝腎藥投之其肝膽脈道之邪氣逾甚逾蔽致目日昏必究其肝腎果無邪而虛則以補劑投之倘正氣虛而邪氣有餘先驅其邪氣而後補其正氣斯無助邪害正之弊無論內症外瘍目疾善類先要以內科恚中揣摩蓋此涉獵在陷症時以免胸中無把握眼之為病在府為表當除風散熱在臟為里當養血安神暴發者為表易治久病者為里難療如男子先傷左目而右目屢發定不可保女先傷右目而左目屢發亦不能救必須觀人老少壯弱為主先將難易預定如瞳神凸凹者不治青緑白色者不治純黑者不治睛少光彩者不治此老人及血衰之症若翳障如半月之狀亦難治之若睛圓不損不論星多少翳厚薄皆可治之翳怕光滑星怕在瞳神總宜翳障輕薄星點細小若遇翳障未盡不可用刀割蓋目得血而能視刀割則傷血翳膜生自肝火不可以火灸惟服藥於先兼用點藥則病漸退而不復發也凡眼上午不疼下午大痛是虛熱也上午大痛下午不疼是實熱也眼淚多者是虛熱少者是實熱也眼有翳膜漸漸遮睛不痛不疼冷也有疼痛者熱也眼內膜翳帶白色冷也眼膜帶紅色者熱也眼淡白紅者是虛熱也太元真人進還睛丸表伏以醫有神聖巧工之妙人不可不知藥有溫涼寒熱之性醫不可不辨昔黃帝嘗百藥而制本草叔和察六脈而燭病原所以扶世道而救民命者良有在也上古之人咸臻壽考況世之最貴者莫貴於人人之最貴者莫貴於目夫目者五臟六腑之精華百骸九竅之至寶洞觀萬物朗視四方皎潔如珠包含天地內連肝膽外應睛瞳竅雖開於肝門瞳乃屬於腎藏腎屬北方壬癸水心屬南方丙丁火心腎不和水火交戰則血氣停留不散膽損肝虛定然眼中受病凡療眼疾須補腎元次修肝木肝乃腎之苗腎乃肝之本修肝則神魂安靜補腎則精魄安和眼目自然明朗譬如種木當在修根根壯則枝葉茂盛根損則花葉凋零且如黑睛屬腎腎虛則眼淚下流竅門通肝肝風則冷淚常出白睛屬肺肺熱則赤脈系白輪上下瞼屬脾脾風則拳毛倒睫大小眥屬心心熱則攀睛胬肉眼有五輪外應五行木火土金水內應五臟肝心脾肺腎五輪者風血肉氣水八廓者天地水火風雷山澤目有病患須究根源勿用庸醫妄行鉤割夫人好施丹藥脾胃損傷終夜憂思精神耗憊或膽中受熱或肺上受寒或食五辛太多或縱七情過甚或觀星望月或近火沖煙故使三焦受熱致令兩目失明或迎風多淚或視物如煙或觀空中如雲霧或視太陽如濁水五臟虛耗夜夢鬼交眼前如見黑花繞亂黑輪常如白霧昏矇臣竊憫之陛下戒之今按本草製成仙方能養性安神搜風明目卻熱除邪修肝補腎雖遠年內障而可明治近日赤腫而即去藥共二十九味名曰還睛丸修之奇異有君臣佐使之功制不尋常有蒸炮銼煉之妙不問老幼陰陽即見光明清白恭惟皇帝陛下修凝道德攝養精神端居九重之中明鑑萬里之外固不賴於此藥亦可保於未然伏願普頒百姓請嘗試之俯賜群臣必臻捷效臣無任瞻天仰聖激切誠虔之至謹録其方隨表拜進以聞還睛丸方人參茯苓山藥各一兩五錢熟地生地麥冬去心焙天冬去心焙各三兩犀角銼細末防風各八錢川芎黃連五味子甘草炒各七錢杏仁石斛枸杞子牛膝酒洗炒羚羊角菊花菟絲子青箱子蒺藜杵去刺炒枳殼草決明肉蓯蓉杜仲酒洗炒當歸酒洗黃柏酒洗炒各一兩知母酒炒二兩上為細末煉蜜為丸如桐子大每服四五十丸空心鹽湯下一方無後五味名固本還睛丸耳病腎開竅於耳而能聽聲者肺也因肺主氣一身之氣貫於耳也凡治耳聾必先調氣開鬱宗脈虛而風邪乘之氣否不宣是為風聾內必作癢或兼頭痛厥氣搏於耳是為厥聾否塞不通必兼眩暈勞傷血氣淫欲斫喪憔悴昏憒是為勞聾有能將息得宜其聾自輕如日就疲勞則為久聾厚味動胃火左右俱聾忿怒動膽火則左聾色欲動相火則右聾耳瘡屬三焦經若發熱炊痛風熱所致若內熱癢痛兼肝經血熱也耵耳者風熱搏之津液結塞成核能令暴聾宜四物加羌活防風柴胡黃芩連翹玄參聤耳由氣鬱生痰內火攻衝生瘡形似赤肉或出膿水宜二陳加玄參花粉黃芩山梔連翹蔓荊子柴胡耳衄耳中出血也左關脈弦數者為少陽經火宜柴胡清肝散尺脈或躁或弱者少陰經虛宜六味地黃丸鼻病鼻受天氣故曰天牝乃宗氣之道心肺之門戶心肺有病則氣息不利其經絡所至專屬陽明自山根以上則連太陽督脈以通於腦風寒外感則氣壅熱鬱清濁溷亂熱微鼻流清涕為鼽熱重鼻流濁涕為淵或流臭黃水又名腦漏胃中食積熱痰流注肺中令濁氣凝結而生息肉塞滯鼻中又名鼻齆音甕外感者治宜辛散內火上炎治宜清涼又鼽淵瘡痔久不愈者非心血虧則腎水少養血而火自降補腎而金自清鼻塞久者亦有內傷肺胃清氣不能上升非盡外感也衄血必自山根以上睛明之次而來衝脈為十二經之血海附於陽明大抵七情勞傷陰虛火動血從經絡直犯清道而出於鼻治宜甘平以養真陰防風湯治鼻病在標者防風川芎黃芩桔梗甘草大力子外風加羌活荊芥薄荷細辛辛夷白芷內火加山梔連翹花粉元參桑皮舌病心脈系乎舌本肝脈系乎舌旁故舌病皆心肝二經之所主也脾壅則血上泛心熱則舌裂成瘡或因風寒所中則舌捲縮而不能言或房勞過多則舌長寸許而不收或七情所郁則舌腫滿而不消其舌根腫脹者謂之重舌有生如小舌者舌腫而不柔和者謂之木舌起時即宜急治遲則必死有不能言語舌出過唇患者不時弄舌名曰弄舌喉風症此因五臟蘊積風熱或勞役過度而生如患木舌者以自手拔舌舌即不收須用針刺少商穴及手足少陰少陽井以探生死血出者易治黃水出者難治如腫不消者亦難治也用青魚膽汁攪吐其痰宜枳殼牛蒡黃芩連翹山梔射干蘇子金銀花膽星青皮防風生地犀角黃連木通等水煎服又有一種木舌舌脹滿口痰涎極多宜以朴硝紫雪白鹽各五分用竹瀝調敷方中可加大黃芒硝下後即好大半以消痰潤肺理氣之藥治之而愈舌吐出不收以冰片少許點之又黃連人參白芍柴胡菖蒲煎服咽喉病喉痹所屬諸經少陽陽明厥陰少陰而少陽厥陰為木火之藏固多熱症陽明為水穀之海胃氣直透咽喉火為最盛察其以情志鬱怒而起者多屬少陽厥陰以口腹肥甘辛熱而致者多屬陽明宜以實火論治至若少陰之脈絡於橫骨終於會厭繫於舌本凡陰火逆衝於上多為喉痹若少陰之實火自有火症火脈少陰之虛火亦多內熱口渴又有格陽喉痹者由火不歸元無根之火客於咽喉上熱下寒六脈微弱腹不喜冷即其候也喉痹病大概痰火所致急者吐痰後復下之又甚者以針刺出血後用藥吐下內經曰火鬱發之發散也吐痰出血亦發散之端也急喉痹其聲如鼾有如痰在喉中響者此為肺絶之候速宜人參湯和竹瀝薑汁下若服之早者十全七八遲則不救凡火浮於上結於頭面咽喉者最宜清降不可升散蓋火得升愈熾纏喉風症熱結咽喉滿片紅腫腫繞於外痛而且麻且癢多不成膿亦不必出血但使火降其腫自消一邊發者輕兩邊發者重男子延至結喉女子至胸膛治也喉痓症滿喉生瘡紅痛久不能愈此陰虛火炎若瘡破或爛宜用吹藥喉瘤由肺經鬱熱兼多語損氣而成形如圓眼紅絲相里或單或雙生於喉旁或醇酒炙爆或怒氣喊叫犯之則痛忌用針刀宜服益氣清金湯浙貝母麥冬各去心牛蒡子炒研各一錢五分桔梗三錢黃芩二錢白茯苓陳皮梔子薄荷人參另煎甘草各一錢紫蘇五分竹葉三十片水煎食遠服鎖喉風症不腫不痛痰涎壅塞而喉竅緊閉若氣喘目直視頭汗如珠不可治也或痰多以萬年青根即千年藍搗汁和醋攪去痰涎或用土牛膝取汁亦可壁錢散五六月取有子壁錢七個老蟢蛛兩個發扎好用明礬七分溶化以扎好之壁錢入溶礬黏足燈火炙透研細凡熱痛喉症用吹最效齒牙病齒牙者腎之標統屬足少陰經齒根肉曰齦東垣曰上齦隸於坤土足陽明之脈貫絡也止而不動下齦嚼物動而不休手陽明之脈貫絡也上爿痛喜寒飲而惡熱取足陽明也下爿痛喜熱飲而惡冷取手陽明也牙床腫痛齒痛搖動或黑爛脫落世人皆作腎虛治不知此屬陽明濕熱症也蓋齒雖屬腎而生於牙床上下床屬陽明大腸與胃猶木生於土也腸胃傷於美酒厚味膏粱甘滑之物以致濕熱上攻則牙床不清而為腫為痛或出血或生蟲由是齒不得安而動搖黑爛脫落也治宜瀉陽明之濕熱則牙床清而齒固矣骨槽風耳前腮頰痛引筋骨寒熱如瘧牙關緊閉不能進食不待腐潰而齒便脫落此風毒竄入骨槽所致初則堅硬難消宜用生薑片熱頰車穴艾灸二七壯針刺齒齦以泄其毒以冰硼元明粉為散吹搽內服降火化痰消腫之劑久則瘡口難合非參耆歸芍補托兼肉桂麥冬桔梗白朮之類不能破結斂肌若腐腫不消虛熱不退形焦體削者不治痹病風寒濕三氣雜合則壅閉經絡血氣不得通行而為痹凡人氣行脈外血行脈內氣虛則麻血虛則木麻木不已則偏枯痿廢經曰營氣虛則不仁衛氣虛則不用營衛俱虛則不仁且不用也濕痹者濕邪痹其身中之陽氣也利其小便則陽氣通行無礙而關節之痹並解矣設小便利已而關節之痹不解必其人陽氣為濕所持而不得外泄或但頭間有汗而身中無汗反欲得被蓋向火者又當微汗以通其陽也酒濕痹症口眼喎斜舌強肢廢渾似中風當瀉濕毒從微汗微下之法皮痹者邪在皮膚癮疹風瘡搔之不痛宜疏風養血故皮膚枯燥者由血虛風邪也腫而易癢者兼濕熱也痛風痛風即痛痹也又經言熱勝則痛濕勝則腫大率血熱沸騰或涉冷坐濕當風熱血得寒汙濁凝滯所以作痛夜則痛甚行於陰也輕則骨節疼痛走注四肢難以轉移甚則身體瘰塊或腫如匏或痛如掣以其痛循歷節甚如虎咬名曰白虎歷節風上體痛宜祛風豁痰散熱微汗下體痛宜流濕行氣和血舒風陰虛則脈弦散而重在夜陽虛則脈虛大而重在晝亦有氣血兩虛而陰火作痛者既屬虛症而似實症最宜詳辨如年高舉動則筋痛者是血不能養筋名曰筋枯難治鶴膝風鶴膝風乃虧損足三陰經風邪乘虛而入以致內熱食減肢體攣痛膝骨日大而上下肌肉枯細若傷於肝腎者六味地黃湯為主若見症口乾頭暈並用補中益氣湯飲食少胸膨脹大便泄並用六君子湯若欲作膿或潰後十全大補湯佐以大防風湯初起須用蔥尉可以內消膿水清稀肌肉不生並用八珍十全大補湯臍腹冷疼腳膝無力頭暈吐痰小便頻數並用八味丸古方治小兒鶴膝風用六味加鹿茸牛膝共八味不治其風其意最善小兒非必為風寒濕所痹多因先天所稟腎氣衰薄陰寒凝聚於腰膝而不解從外可知其內也故以六味丸補腎中之水以鹿茸補腎中之火以牛膝引至骨節而壯裹擷之筋此治本不治標之法也凡肘膝腫痛臂胻細小者名鶴膝風以其象鶴膝之形而名之也或止兩膝腫大胻腿枯細不能屈伸俗謂之鼓槌風總由風寒濕三氣流注之為病腫痛者必有邪滯枯細者必因血虛凡治此者必以養血為主有風者兼散風有寒濕者兼去寒濕由邪郁成熱者宜滋陰清火有痢後而成者此以瀉痢亡陰尤宜補腎如腫硬不痛而色白者此不愈也屈膝散治鶴膝何首烏男便浸曬天花粉荊芥穗鹿茸各五錢苦參女便浸曬防風薏苡仁牛膝各一錢肥皂核肉一兩共為粗末每用三錢同冷飯糰四兩牯豬油六錢黏米緑豆各一撮水四碗煎至一碗分作三次溫服尉藥方治寒濕痹痛麻木不仁川烏草烏蓽茇甘松山奈各五錢上為粗末炒熱布包尉痛處一治腿膝背腰胸腹諸痛用川椒為末水薑切碎等分蔥三莖鹽一撮小麥麩面四五合微火炒熱布包尉患處亦效痿躄丹溪曰內經謂諸痿起於肺熱又謂治痿獨取陽明蓋肺金體燥而主氣畏火者也脾土性濕而主四肢畏木者也若嗜欲無節則水失所養火寡於畏而侮所勝肺得火邪而熱矣肺受熱則金失所養木寡於畏而侮所勝脾得木邪而傷矣肺熱則不能管攝一身脾傷則四肢不能為用而諸痿作矣瀉南方則肺金清而東方不實何脾傷之有補北方則心火降而西方不虛何肺熱之有故陽明實則宗筋潤能束骨而利機關矣天産屬陽厚味發熱凡病痿者必淡泊食味至於食少肌瘦或泄瀉者雖有內熱必以芳香甘溫先復胃氣為主則飲食進而痿弱自健若拘於寒涼穀氣益衰四末益枯矣濕熱痿者雨濕浸淫邪氣蒸脾流於四肢自覺足脛逆氣上騰或四肢痠軟腫痛或足指麻木頑癢小便赤澀脈來沉濡而數此皆濕熱在下之故所謂濕熱不攘大筋緛短小筋弛長緛短為拘弛長為痿也宜升陽燥濕禁用填補之劑濕痰痿者肥盛之人濕痰內停客於經脈使腰膝麻痹四肢痿弱脈來沉滑此膏粱酒濕之故宜燥脾行痰氣虛痿者因飢餓勞倦百骸溪谷皆失所養故宗筋弛縱骨節空虛凡人病後手足痿弱者皆屬氣虛所謂脾既病不能為胃行其津液四肢不得稟水穀氣而不用也宜補中益氣治痿獨取陽明此為氣虛者立法也陰虛痿者酒色過度下焦肝腎之火燔灼筋骨自覺兩足極熱上衝腿膝酸弱痿軟行步艱難脈來澀弱或左脈雖大按之無力宜補養肝腎血虛痿者凡産後失血後面色痿黃手足無力不能行動者也宜滋養營血往往用養血藥而痿如故者脾虛不能生血也血瘀痿者四肢痛而不能運動致脈澀而芤者宜養血行瘀食積痿者飲食太過升降失常脾氣不得運於四肢手足軟弱或腹膨脹痛或噁心噯氣宜消導食積然後補脾痢後腳軟脛疼或膝腫者此下多亡陰所致宜補脾兼升舉之劑間有痢後兜澀太早積瘀不清下注隧道而成痿者此又當行氣逐瘀與前症迥異矣腰痛腰為腎府腎與膀胱為表裡在經屬太陽在臟屬腎氣諸脈皆貫於腎而絡於腰脊故腰痛悠悠不止乏力痠軟者腎虛也遇陰雨久坐則冷痛沉重者濕也遇寒而痛足冷背強者寒也遇熱而痛者熱也鬱怒而痛者氣滯也憂愁思慮而痛者氣虛也勞動則痛者肝腎衰也風痛則牽連左右腳膝強急挫閃痛者舉身不能俯仰轉側瘀血作痛晝輕夜重便黑溺清刺委中腎著腰痛身重腰冷如冰亦由濕也跌撲傷而腰痛者此傷在筋骨而血脈凝滯也用酒糟蔥薑搗爛罨之最效附箭風説俗以身痛呼為箭風者因其人衛氣虛腠理不密賊風乘虛而入客於經絡營衛不通則痛就痛處按之用針挑出形如羊毛此即閉塞結硬之絡脈也而挑時暫快過則依然治法或燃麻油燈淬之或用艾葉溫散或用白芥子為末調敷或用金銀花內服取效心痛五臟之滯皆為心痛腎心痛者多由陰邪上衝故善瘛如從後觸其心胃心痛者多由停滯故胸腹脹滿脾心痛者多由寒逆中焦故其痛甚肝心痛者多由木火之郁病在血分故色蒼蒼如死狀肺心痛者多由上焦不清病在氣分故動作則病益甚以上刺法見靈樞厥病篇知其在氣則順之在血則行之鬱則開之滯則逐之火多實則或散或清之寒多虛則或溫或補之得其本可隨手而應也真心痛者不可治金匱要略心痛章沈氏注曰五臟胃府心痛並痰蟲食積即為九痛外臺九種心痛之名一蟲二注三氣四悸五食六飲七冷八熱九去來痛心痛有上中下三焦之別上焦痛者在膈上內經所謂胃脘當心而痛時人以此為心痛非也中焦痛者在中脘脾胃間病也下焦痛者在臍下肝腎大小腸病也胸脅痛胸中引脅下空痛者肝虛也引小腹痛者腎虛也引背胛臂廉皆痛者心火盛也引脅肋髀外皆痛者肝木實也又有痰結停飲血瘀氣滯者此皆實症也惟作勞之人胸痛引背食少倦怠遇勞頻發此為脾肺虛宜培元氣若怯弱咳嗽痛引胸中雲門中府者防肺癰之患腹痛腹痛有三部大腹痛者屬太陰脾當臍痛者屬少陰腎小腹痛者屬厥陰肝及衝任大小腸各有七情之發六氣之害暴傷飲食則胃脘先痛而後入腹暴觸怒氣則兩脅先痛而後入腹血積上焦脾火熏蒸則痛從腹而攻上血積下部胃氣下陷則痛從腹而下墜傷於寒者痛無間斷得熱則緩傷於熱者痛作有時得寒則減因飢而痛者過飢即痛得食則止因食而痛者多食則痛得便乃安吞酸腹痛為痰鬱中焦痞悶腹痛為氣搏中州火痛腸內雷鳴充斥無定痛處覺熱心煩口渴蟲痛肚大青筋飢即咬齧痛必吐水痛定能食氣虛痛者痛必喜按呼吸短淺血虛痛者痛如芒刺牽引不寧腸癰痛者腹重而痛身皮甲錯繞臍生瘡小便如淋疝氣痛者大腹脹小腹急下引睪丸上衝而痛痧症痛者或大吐或大瀉上下絞痛厥冷轉筋陰毒痛者爪甲青面唇黑厥逆嘔吐身冷欲絶積聚痛者有形可按痢疾痛者後重窘迫婦人腹痛多有關於經水胎孕者宜先審之蠱毒閩廣之人有於端午日午時捉虺蛇蜈蚣蝦蟆三物同貯一器任其自相食啖俟一物獨存取其毒於飲食中啖之少則待以歲月食盡五臟而後死死則流毒於旁人亦成此病多則數日即死其症心腹絞痛如有蟲咬吐下惡血如豬肝爛肉若不早治百無一生此之謂蠱病一中毒不論年之遠近但取煮熟雞子插金銀簪於內口含雞子一食頃簪卵俱黑者是毒否則非也初中毒方青木香一兩水煎一碗空心吃之可吐如不吐至三服必吐不拘新久中毒方雄黃硃砂各五錢研細藜蘆一錢吃此藥不可吃酒凡人參沙參丹參元參細辛赤白芍吃藜蘆前後俱忌吃巴豆去殼細皮及油用霜三分共為末蜜丸梧子大每服五分空心薑湯下後當瀉去惡物如煩悶吃生鴨血或煮鴨湯飲之即愈積聚亦名癥瘕積者五臟所生其始發有常處其痛不離其部上下有所終始左右有所窮處聚者六府所成其始發無根本上下無所留止其痛無常處肝積名肥氣在左脅下如覆杯肺積名息奔在石脅下如覆杯久則喘咳心積名伏梁起臍上大如臂上至心下久則令人煩心脾積名痞氣在胃脘腹大如盤久則飲食不能充肌膚腎積名奔豚衝脈為病發於少腹上至心下若豚狀上下無時久則喘逆骨痿少氣夫癥者堅也積在腹內或腸胃之間推之不動名曰癥瘕者假也其結聚浮假而痛推移乃動名曰瘕痃癖者在腹內近臍左右各有一條筋脈急痛名曰痃僻在兩肋之間有時而痛名曰癖若在小腹而牽引腰脅為疝瘕黃疸黃病多屬太陰濕土脾不能勝濕復挾火熱則鬱而生黃古有五疸之名曰黃汗曰黃疸曰谷疸曰酒疸曰女勞疸一名色疸黃汗身體腫發熱汗出而渴汗沾衣色黃如柏汁因汗出澡浴熱留皮膚此屬表症黃疸身面眼目指甲皆黃善飢溺黃因濕熱蒸郁邪留胃中病屬裡症谷疸不能食食已頭眩腹脹心煩因大飢過飽病屬中焦酒疸心胸懊憹欲吐不食目黃鼻燥面發赤斑足脛滿溺赤因大醉當風毒留清道病屬上焦脈浮洪者先吐之沉弦者先下之其水穀之精氣為濕熱所瘀而不行變成黑疸面黑目青膚粗燥其脈微弱者不治色疸額黑頭汗手足心熱曰反惡寒小便自利大便黑此由房勞傷腎所致病屬下焦若多渴者難治夏月濕熱相蒸多有發黃之候熱多其色明亮濕多其色黯晦腫脹云樞水脹篇曰膚脹鼓脹可刺耶岐伯曰先瀉其脹之血絡後調其經再刺去其血絡也河間論五水灸法云夫有風水皮水石水黃汗推各臟以論之風合歸肝皮合歸肺黃汗歸脾石合歸腎風水脈浮必惡風皮水脈亦浮按下沒指石水脈沉腹滿不喘黃汗脈沉遲發熱而多涎久而不愈必致癰膿水腫脈浮帶數即是虛寒潛止其間久必沉伏沉伏則陽虛陰實為水必矣要知水脈必沉是也論曰脈出者死與病不相應也唇黑則傷肝缺盆盈平則傷心臍出則傷脾足心平則傷腎背平則傷肺皆不可治風水灸肝井大敦赤水灸心滎少府黃汗灸脾俞太白皮水灸肺經經渠石水灸腎合陰谷歌曰十般鼓脹要先知切忌臍高凸四圍腹上青筋休用藥陰囊無縫不堪醫背平如板終難治掌上無紋有限時五穀不消十日死肚光如鼓效應遲痰多氣短皆無藥十個當知九個危氣腫從來不可醫肚光如鼓甚蹺蹊按之如石彈之響泄氣方能見效奇疝氣肝所生病為狐疝詳見下足陽明之筋病㿉疝腹筋急㿉音頽即子和所謂血疝黃脈之至也大而虛脾受肝邪積氣在腹中有厥氣名曰厥疝女子同法巢氏曰厥逆心痛飲食不下名厥疝厥陰所謂㿗疝婦人少腹腫也㿗同㿉陰病也脾傳之腎病名疝瘕少腹冤熱而痛出白即筋疝厥陰之陰盛脈道不通為㿗癃疝李士材曰內有膿血小便不通任脈為病男子內結七疝女子帶下瘕聚督脈生病從少腹上衝心而痛不得前後為沖疝寒疝囊冷結硬如石陰莖不舉控睪丸痛此坐臥濕地寒月涉水冒雨或勞碌熱極坐臥磚石而得宜溫經散寒水疝腎囊腫痛陰汗時出或腫如水晶或癢而搔出黃水或小腹按之作水聲此醉酒行房或過勞汗出寒濕乘虛襲入下部而得宜利水除濕有漏針去水者人多不得其法筋疝陰莖腫脹或潰或痛或裡急筋縮或莖中痛痛極則癢或挺縱不收或白物隨溲而下此房勞及邪術所致宜清火解毒血疝狀如黃瓜在小腹兩旁橫骨之端俗云便癰此醉飽勞碌使內氣血流入脬囊結成癰膿宜和血消瘀氣疝上連腎區下及陰囊或因怒哭則氣鬱而脹脹罷則氣散宜散氣疏肝小兒有此俗名偏氣惟灸築實穴可消狐疝狀如仰瓦臥則入小腹行立則出小腹入囊而脹痛與狐之晝出穴而溺夜入穴而不溺相類此脾氣下陷宜升陽降陰㿗疝陰囊腫硬如升如斗不痛不癢此地氣卑濕所生宜導濕利水一云㿗疝最大而堅沖氣犯心即能殺人凡治㿗疝非斷房事厚味不效女子陰戶突出亦皆疝類但不名疝而名瘕乃熱則不禁固也宜以苦堅之七疝為病若非勞役過度即是遠行涉水熱血得寒而凝滯於小腸膀胱之分或濕乘虛而流入於足厥陰之經宜驅逐本經之濕熱稍安即加培養更慎酒色厚味為佳淋病淋症所感不一或因房勞或因忿怒或因醇酒厚味房勞者陰虛火動也忿怒者氣動生火也醇酒厚味者釀成濕熱也積久為滯濁流下焦所以小便淋瀝欲去不去不去又來而痛不可忍者初則熱淋血淋宜散熱利小便久則煎熬水液如濁如膏如砂如石也宜開抑行氣破血滋陰凡小腸有氣小便脹小腸有血小便澀小腸有熱小便痛禁用補氣之劑膀胱為津液之府氣化則出寒邪客於胞中則氣不化而成淋必先寒栗而後溲便澀數竅中腫痛蓋冷氣入胞與正氣相爭寒氣勝則戰寒而作淋宜散寒扶正淋病大率心腎氣鬱清濁相干熱蓄膀胱所致冷氣滯於膀胱而作淋者甚少虛淋者腎虛精敗也童子精未盛而御女老人陰已痿而思色則精不出而內敗莖中澀痛成淋者惟金匱腎氣湯可救若精已竭而復耗之則大小便牽引而痛癰疸癰疸症有五善七惡不可不辨凡飲食知味動息自寧一善也便利調勻或微乾澀二善也膿潰腫消水鮮不臭三善也神彩精明語聲清亮肌肉好惡分明四善也體氣和平五善也七惡者煩躁時嗽腹痛渴甚眼角向鼻瀉痢溺如淋一惡也氣息綿綿脈病相反膿血既泄腫焮尤甚膿色臭敗痛不可近二惡也目視不正黑睛緊小三惡也短氣嗜臥面青唇黑未潰肉黑而陷四惡也肩背四肢不便已潰青黑筋腐骨黑五惡也食不下服藥嘔氣噎痰塞身冷自汗六惡也聲嘶色敗唇鼻青赤面目四肢浮腫七惡也癰淺而大也熱勝血則為癰膿也疽深而惡也瘍有頭小瘡也疹浮小癮疹也熱勝於陰為瘡瘍濕滯於血為癮疹疔瘡疔火證也形小根深發無定處如火焰疔多生唇口及手掌指節間初生一點紅黃小疱痛兼麻癢此心經毒火也紫焰疔多生筋骨間初生紫疱次日破流血水此肝經毒火也黃鼓疔多生顴腮眠胞黃疱麻癢此脾經毒火也白刃疔多生鼻孔兩手白疱頂硬根突癢痛易腐易陷重則腮損此肺經毒火也黑黶疔多生耳竅牙縫胸腹腰間黑斑紫疱頑硬如釘痛徹骨髓重則手足紫軟陷孔深此腎經毒火也又有紅絲疔發於手掌及骨節間初起小瘡漸發紅絲上攻手膊急用針於紅絲盡處砭斷出血尋至初起瘡上挑破用蟾酥條又有暗疔腋下先堅腫無頭次腫陰囊睪丸焮熱疼痛又有內疔先發寒熱腹痛數日間忽然腫起一塊暗疔內疔不用挑法用蟾酥丸三丸蔥白三寸裹藥黃酒送下蓋臥出汗少時無汗系毒熱滯結仍用汗下法毒熱隨解又有羊毛疔身發寒熱前心後心有紅點如疹形先將紫黑斑點用衣針挑出如羊毛狀前後共挑數處即時汗出而愈有因竹木刺戳傷或瓷鐵鋒擦碎潰而痛甚時流穢水肉色紫黯身發寒熱此本陰虛所致治以酸甘斂陰補虛或鹹苦制火泄熱宜參考潰瘍門治法若誤作疔治蔓延不效反為大害流注附骨疽真氣不足邪留於肌肉致氣血凝聚為患名曰流注初發漫腫無頭皮色不變俱宜用蔥尉法見卷五皮肉不熱者可用雷火針發在肉厚處易愈發在骨節及空處難療益氣養營湯治懷抱抑鬱氣血損傷四肢頸項等處患腫不問軟硬赤白或痛或不痛未成者自消已成者自潰人參黃耆鹽水炒當歸川芎熟地芍藥炒貝母茯苓香附陳皮各一錢白朮二錢柴胡六分甘草桔梗各五分薑口乾加五味子麥冬往來寒熱加地骨皮肌肉遲生加白蘞官桂木香流氣飲治流注肢節疼痛或因暴怒胸膈不利或濕痰所致者一名方脈流氣飲當歸川芎白芍炒茯苓黃耆甘草紫蘇烏藥青皮半夏制桔梗防風枳實炒陳皮各一錢木香大腹皮檳榔枳殼各五分薑三片棗二枚水煎服小便祕加澤瀉下部加牛膝瘡科流氣飲治流注及一切恚怒氣結腫硬或風寒濕毒搏於經絡致成腫塊或漫腫木悶無頭即前方去青皮枳實半夏腹皮薑棗加人參官桂厚朴白芷流注初發加羌活獨活痛加乳香沒藥保安萬靈丹治風濕流注陰疽鶴膝風癱病遍身走痛視人老壯病勢緩急量用用蔥汁調敷患處亦效茅山蒼朮八兩麻黃羌活荊芥防風細辛川烏草烏湯泡去皮石斛川芎當歸全蠍酒洗甘草何首烏天麻各一兩雄黃六錢為細末煉蜜為丸硃砂為衣用蔥白九根煎湯下三錢蓋被出汗癰未成即消已成即高腫潰膿如無表裡相兼症不必發散用溫酒下散瘀葛根湯治閃跌瘀血凝滯葛根川芎半夏制桔梗防風羌活升麻各八分細辛香附甘草紅花蘇葉白芷各六分蔥三根薑三片水煎服通經導滯湯治産後有瘀血流注關節當歸熟地赤芍川芎枳殼炒紫蘇香附陳皮丹皮紅花牛膝各一錢獨活甘草各五分水煎入酒一鍾服托裡透膿湯人參白朮穿山甲炒白芷各一錢黃耆三錢當歸二錢升麻甘草節青皮各五分炒皂角刺一錢五分水煎病在上部先飲煮酒一鍾後服藥病在下部先服藥後飲酒病在中部藥內兌酒半鍾服大防風湯治足三陰虧損寒邪內侵患鶴膝附骨疽流注遍身痛或腫而不痛不問已潰未潰宜用此湯人參白朮防風羌活熟地杜仲各二錢附子制黃耆牛膝白芍各一錢川芎一錢半甘草炙官桂各五分一方有當歸薑無官桂以上方對症擇用一服至三四五服量病輕重前症若因脾氣虛濕滯於肉理但腫而肌色不變宜六君子加芎歸耆芍肉桂等若傷寒汗後餘邪發腫者宜人參敗毒散小柴胡湯之類凡流注症輕者服藥即消症重者必潰將潰時宜服托裡透膿湯若潰而不斂者宜人參養營湯之類補氣血為主骨疽乃流注之敗症也如用涼藥則內傷其脾外冰其血肌肉不生氣血不旺而逾滯宜健脾補腎脾生血腎主骨腎實則骨有生氣而疽不附骨矣厲風脾主肌肉肺主皮毛胃與大腸二經為脾肺之腑內受濕熱氣濁血虛外感酷烈暴悍之氣初起白屑雲頭紫黑疙瘩麻木不仁久至四肢拳攣肌肉腐敗熱毒盛故面上起油光風熱生蟲傳歷臟腑蟲食肝眉落食脾鼻崩食肺聲啞食心足底穿一云腳底先痛或穿者毒在腎食腎耳鳴啾啾或耳弦生瘡或遍身如針刺皮癢如蟲行又看其疙瘩與瘡上體先見或多者氣受病下體先見或多者血受病上下皆然氣血兩病古人謂大風疾三因五死三因者一曰風毒二曰濕毒三曰傳染五死者一曰皮死麻木不仁二曰脈死血潰成膿三曰肉死割切不痛四曰筋死手足縱緩五曰骨死鼻梁崩壞與夫眉落眼昏唇翻聲啞甚可畏也所以然者由邪正交攻氣血沸騰而濕痰死血充滿於經絡之中故生蟲生瘡痛癢麻木也宜清濕熱祛風邪以苦參湯地黃酒並主之苦參湯苦參一錢半生地二錢黃柏五分當歸秦艽赤芍丹參牛蒡子白蒺藜丹皮銀花川貝母各一錢甘菊花三錢水煎服地黃酒生地二兩黃柏苦參丹參萆薢菊花金銀花丹皮赤芍當歸杞子蔓荊子赤茯苓各一兩秦艽獨活靈仙各五錢桑枝一兩五錢烏梢蛇去頭尾一條上煮好酒退火七日用凡治厲風之法以清榮衛為主其汗宜頻發血宜頻刺皆清營衛之捷法也其烏梢蛇能搜骨隨之毒不可早食早食則引毒入髓反致不救仙傳治癘風丹胡麻仁牛蒡子蔓荊子枸杞子苦參各五錢栝蔞根白蒺黎皂角刺各三錢以上皆炒研為末每藥末一兩五錢拌輕粉二錢黃精末一兩每日午時及臨臥時各服一錢用防風五錢前湯下至五六日後牙縫出臭涎身疼如醉候出臭糞為度不可過劑紫白癜風由血虛不能充潤經絡毒邪傷氣分也桑枝十斤茺蔚草穗三斤煎膏溫酒服外用雄黃硫黃黃丹南星枯礬密陀僧等分研末薑醮擦之擦後漸黑再擦則愈或用白茄子切破一頭醮之擦之解邪狗毒方邪狗之形尾反垂舌伸色黑若其觸人即不咬破亦有毒矣急用斑貓七個去頭翅足酒洗以糯米一撮水淘趁潮同斑貓於銅杓內炒以米黃為度去米研碎酒下又方辰砂少許雄黃各研細末加原麝香一分酒調下一煎滑石三錢並甘草木通燈心湯送下老少虛弱者分作兩服當時一服明日一服服後其人當吐瀉倘吐不止者煮緑豆湯食之即解要忌一切葷腥油膩及雞鴨蛋百日內要忌房事如不忌男女俱傷自後小紅赤豆茄子狗肉終身禁食茄子並不可近小兒內外疳症凡小兒疳在內目腫腹脹瀉痢青白體瘦羸弱疳在外鼻下赤爛頻揉鼻耳或肢體生瘡鼻瘡用蘭香散諸瘡用白粉散肝疳一名筋疳白膜遮睛或瀉血面瘦心疳面黃頰赤身體壯熱脾疳一名肥疳體黃瘦削皮膚乾澀瘡疥腹大嗜土腎疳一名骨疳肢體瘦削皮膚瘡疥喜臥濕地肺疳一名氣疳喘嗽氣促口鼻生瘡若患潮熱當先補肝後瀉心若誤下之皆能成疳其初病者為熱疳久病者為冷疳冷熱相兼者津液短少者皆因大病虧損脾胃內亡津液所致當固脾胃為主早為施治則不變敗症也小兒疳眼無論肥瘦肥疳大便如豆腐渣瘦疳大便如栗硬燥但見白珠先帶黃兼白色睡起後微紅生眵怕亮不睜音淨不悅視也上下眼胞頻頻眨動黑珠上有膜圈堆起白暈暈內一黑一白便是疳眼乃食積發熱既久致傷肝經竟治其疳目病自愈用雞肝藥忌食油麵灸膊等物若疳眼聲啞者將危矣蘭香散治鼻疳赤爛蘭香葉即省頭草二錢燒灰銅青輕粉各五分為末敷之白粉散治諸疳瘡海螵蛸三分白芨二分粉一分為末先用漿水洗拭敷之雞肝藥治疳積疳眼蘆甘石六錢童便煆七次硃砂五錢水飛不見火雄黃二錢滑石六錢水飛石決明一兩五錢煆海螵蛸四錢煆去殼赤石脂三錢煆冰片三分石為末用雞肝不落水竹刀切上開下連每雞肝一具入藥五分陳酒米泔各半鍾飯上蒸熟食之開瞽復明一云小兒每歲服藥一分又方用雞肝一具不落水酒洗同黃蠟一錢頓熟去蠟吃雞胸龜背雞胸由咳嗽肺脹故漸胸膈突起一曰肝火乘於肺膈也用寬氣化痰丸杏仁百合天門冬桑白皮木通石膏葶藶子各五錢大黃三分為末蜜丸黍米大龜背由腎虛風入骨髓精血不能流通所致用松蕊丹松花防風枳殼獨活各一兩麻黃前胡大黃桂心各五錢為末蜜丸黍米大每服二十丸粥飲下外以龜尿點脊中縫即愈以龜安在荷葉上用鏡照之其尿自出或以豬發戳鼻內其尿立出闢小兒驚風論治喻嘉言曰小兒初生以及童幼肌肉筋骨臟腑血脈俱未充長則陰不足陽實有餘不比七尺之軀陰陽交盛也惟陰不足陽有餘故身內易於生熱熱盛則生痰生風生驚亦所時有熱痰風驚四字難呼節去二字曰驚風如遇怪異形聲驟然跌僕皆生驚怖其候面青糞青多煩多哭神識昏迷撞鐘放叉全然不聞後人不解遂以其頭搖手徑也而曰抽掣以其卒口噤腳攣急目邪心亂也而曰搐搦以其脊強背反也而曰角弓反張不知小兒之腠理未蜜易於感冒風寒風寒中人必先入太陽經太陽之脈起於目內眥上額交巔入腦還出別下項夾脊抵腰中是以病則筋脈牽強因筋脈牽強生出抽掣等不通各名而用金石藥鎮墜外邪深入臟腑難痊間有體堅症輕而愈者遂以為奇方可傳誤矣又方書有云小兒八歲以前無傷寒以助驚風之説不思小兒不耐傷寒初傳太陽經早已身強多汗筋脈牽動人事昏沉勢已極於本經藥又亂投不能待其傳經解散耳豈可言小兒無傷寒也況小兒易於外感易於發熱傷寒為更多世所稱為驚風者即是也小兒傷寒要在三日內即愈為貴若待其經盡而解必不能耐矣又剛痙無汗柔痙有汗小兒剛痙少柔痙多人見其汗出不止神昏不醒遂名之曰慢驚風而用參耆朮附藥閉其腠理熱邪不得外越亦為大害所以凡治小兒之熱但當攻其出表不當固其入里仲景原有桂枝法若舍而不用從事東垣內傷為治又誤矣傷寒論曰太陽病項背強𠘧𠘧汗出惡風者桂枝加葛根湯吳又可曰小兒時疫入所難窺擔誤者多又其神氣怯弱筋骨柔脆一染時疫延挨失治即便二目上吊驚搐發痙十指鉤曲甚則角弓反張故多誤認為慢驚風也以上可見小兒傷寒當解肌而從輕劑時疫用藥與大人倣佛若誤治必變痙也小兒熱病痘疹謬治辨徐靈胎曰小兒之疾熱與痰二端而已蓋純陽之體日抱懷中衣服加暖又襁褓之類皆用火烘內外俱熱熱則生風風火相煽乳食不歇則必生痰痰得火煉則堅如膠漆而乳仍不斷則新舊之痰日積必至脹悶啼哭又強之食乳以止其啼從此胸高氣塞目瞪手搐即指為驚風其實非驚乃飽脹欲死耳此時告其父母令減衣停乳則必大慍謂虛羸若此反令其凍餒無不唾罵醫者亦不明此理非用剛燥之藥即用參耆滋補至痰結氣凝之後則無可救療余見極多教之適其寒溫停其乳食以清米飲養其胃氣稍用消痰順氣之藥調之能聽從者十愈八九其有不明此理反目為狂言者百無一生至於痘科尤屬怪誕痘為小兒之所必不免非惡疾也當天氣溫和之時死者絶少若大寒大暑其元氣虛而稠密者間有不治其始欲透發其後欲漿滿皆頓精血為之乃未發以前即用大黃石膏數兩以遏其生髮之機而敗其元氣又方中多用蚯蚓蠐螬之類增其毒而倒其胃此等惡物即令醫者自服之亦必胃絶腸裂而死況孩提乎凡用此等藥者必預決此兒死於何日十不失一其父母翻盛稱其眼力不爽孰知其即死於彼所用之藥也或有元氣充實幸而不死者遂以為非此等大藥不能挽回而人人傳布奉為神方矣更可異者強壯之年醫者黃芩麥芽俱不敢用以為克伐孩提之子則石膏大黃成兩成斤毫不顧慮忍心害理至此而極無奈呼天搶地以告人而人不信也又有造為螳螂子之説者割開頤內取出血痰此法起於明末海濱妖婦騙財之法惟蘇松二處盛行割死者甚衆蓋小兒有痰火者吃乳數日必有一二日頤腫厭食名曰妒乳用薄荷朴硝為末塗口內一二次即愈即不治亦愈至所割出之痰塊或大或小人因信之不知頤內空虛之處人人有此割去復生並非病也不然何以普天下之小兒從未有患螳螂子而死者獨蘇松有此病耶此亦一害故並及之
