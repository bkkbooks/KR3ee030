出而如川又總諸藏之所居隔高低之非類求脈氣之往來果何如而相濟以心主之為君朝諸經之維繫是故怒動於心肝從而熾欲念方萌腎經精沸構難釋之苦思枯脾中之生意肺脈澀而氣沉為悲憂於心內惟脈絡有以相通故氣得從心而至雖諸藏之歸心實上系之聯肺肺氣何生根從脾胃賴水穀於敖倉化精微而為氣氣旺則精盈精盈則氣盛此是化源根坎里藏真命雖內景之緣由尚根苗之當究既云兩腎之前又曰膀胱之後出大腸之上左居小腸之下右其中果何所藏蓄坎離之交妒為生氣之海為元陽之竇闢精血於子宮司人生之夭壽稱命門者是也號天根者非謬使能知地下有雷聲方悟得春光彌宇宙標幽賦針經指南拯救之法妙用者針察歲時於天道定形氣於豫心春夏瘦而刺淺秋冬肥而刺深春氣在毛夏氣在皮秋氣在分肉冬氣在骨髓故春夏及瘦人皆刺淺秋冬及肥人皆刺深若有針入而氣逆者失其淺深之宜也不窮經絡陰陽多逢刺禁既論臟腑虛實須向經尋原夫起自中焦水初下漏太陰為始至厥陰而方終穴出雲門抵期門而最後人之氣脈周流每日寅時從中焦肺經起交至肝經期門穴而終正經十二別絡走三百餘支各經有橫絡孫絡散走三百餘支脈正側仰伏氣血有六百餘候手足三陽手走頭而頭走足手足三陰足走腹而胸走手要識迎隨須明逆順況夫陰陽氣血多少為最厥陰太陽少氣多血太陰少陰少血多氣而又氣多血少者少陽之分氣盛血多者陽明之位先詳多少之宜次察應至之氣輕滑慢而未來沉澀緊而已至言入針之後值輕浮滑虛慢遲乃真氣未來沉重澀滯緊實是正氣以來既至也量寒熱而留疾留住也疾速也未至也據虛實而候氣氣之至也如魚吞鉤餌之沉浮氣未至也如間處幽堂之深邃氣速至而速效氣遲至而不治觀夫九針之法毫針最微七星上應衆穴支持本形金也有蠲邪扶正之道其體象金短長水也有決凝開滯之機其流通象水定刺象木或斜或正其徑直象木口藏比火進陽補羸其氣溫象火循機捫塞以象土其填補象土實應五行而可知然是三寸六分包含妙理雖細擬於毫髮同貫多岐可平五臟之寒溫能調六腑之虛實拘攣閉塞追八邪而去矣手足拘攣氣血不通之症先追散八風之邪寒熱痹痛開四關而已之寒痹熱痹痛風之類針兩肘兩膝之穴凡刺者使本神朝而後入既刺也使本神定而氣隨神不朝而勿刺神已定而可施定腳處取氣血為主意下手處認水木是根基言用針必先認五行子母相生天地人三才也湧泉同璇璣百會百會應天璇璣應人湧泉應地上中下三部也大包與天樞地機上部大包中部天樞下部地機陽蹺陽維並督帶此四脈屬陽主肩背腰腿在表之病陰蹺陰維任衝脈此四脈屬陰去心腹脅肋在裡之疑疑疾也二陵陰陽陵泉二蹺照海申脈二交足太陰經三陰交足少陽經陽交似續而交五大續接續五大五體也兩間二間三間兩商少商商陽兩井天井肩井相依而別兩支大抵取穴之法必有分寸先審自意次觀肉分或伸屈而得之或平直而安定在陽部筋骨之側陷下為真在陰分郤膕之間動脈相應取五穴用一穴而必端取三經用一經而可正頭部與肩部詳分督脈與任脈易定明標與本論刺深刺淺之經住痛移疼取相交相貫之徑如手太陰列缺交於陽明之絡足陽明豐隆別走太陰之類豈不聞臟腑病而求章門氣海腧募之微經絡滯而求原別交會之道各經之原及陽別陰交八會諸穴更窮四根三結依標本而刺無不痊四根諸經根於四肢即井穴也三結即太陰結於大包少陰結於廉泉厥陰結於玉堂也但用八法五門分主客而針無不效詳見前八脈始終連八會本是紀綱十二經絡十二原是為樞要詳見後一日取六十六穴之法方見幽微陽干注府三十六穴陰乾注藏三十穴一時取十二經脈之原始知要妙十二經之原歌云甲出丘墟乙太衝丙居宛骨陽池同丁出神門太陵過戊當胃脈衝陽通己出太白庚合谷辛原本注太淵空壬歸京骨是原穴癸出太溪跟骨中原夫補瀉之法非呼吸而在手指義見寶命全形離合真邪等論速效之功要支正而識本經如心病取小腸經穴之類交經繆刺左有病而右畔取寫絡遠針頭有病而腳上針巨刺與繆刺各異微針與妙針難傳觀部分而知經絡之虛實視沉浮而辨臟腑之寒溫且夫先令針耀而慮針損次藏口內而欲針溫目無外視手如握虎心無內慕如待貴人左手重而多按欲令氣散右手輕而徐入不痛之因空心恐怯直力側而多暈背目沉掐坐臥平而弗昏推於十干十變知孔穴之開闔詳見前論其五行五臟察日時之旺衰得五行生者旺受五行克者衰如心之病得甲乙之日時者生旺遇壬癸之日時者克衰余仿此伏如橫弩應若發機言血氣未應針則伏如橫弩血氣既應針則退如發機陰交陽別而定血暈任脈陰交脾經三陰交膀胱經飛揚皆主血病陰蹺陽維而下胎衣腎經照海三焦經外關痹厥偏枯迎隨俾經絡接續漏崩帶下溫補使氣血依歸靜以久留停針待之必準者取照海治喉中之閉塞端的處用大鐘治心內之呆癡大抵疼痛實瀉癢麻虛補體重節痛而俞居心下痞滿而井主心脹咽痛刺太衝而必除脾冷胃疼瀉公孫而立愈胸滿刺內關脅痛針飛虎三焦經支溝穴筋攣骨痛補魂門體熱勞嗽瀉魄戶頭風頭痛刺申脈與金門足太陽經眼癢眼疼瀉光明到地五足少陽經瀉陰郤止盜汗治小兒骨蒸刺偏歷利小便醫大人水蠱中風環跳宜刺虛損天樞可取由是午前卯後辰巳二時太陰生而疾溫離左酉南未申二時月朔死而速冷月死生數望前謂之生望後謂之死以一月而比一日午前謂之生無瀉午後謂之死無補循捫彈努留吸母而堅長循捫皆摩也彈弩者著力之意留吸堅長須待熱至也母者虛則補其母也爪下伸提疾呼子而噓短爪下者掐穴令氣血散然後下針也伸即提也施針輕浮之謂疾呼噓短去之速也子者實則瀉其子也動退空歇迎奪右而瀉涼用針搖動而退伸提空歇以候氣行此謂瀉法推內進搓隨濟左而補暖推推轉進針猶搓線之狀慢慢轉針此謂補法慎之大患危疾色脈不順而莫針寒熱風冷飢飽醉勞而切忌望不補而晦不瀉弦不奪而朔不濟如非急症不可犯此日忌精其心而窮其法無灸艾而壞其皮正其理而求其源免投針而失其位避灸處和四肢四十有七禁刺處除六腧二十有二禁針歌有二十五穴昔高皇抱疾未瘥李氏刺巨闕而後蘇太子暴死為厥越人針維會而復醒秦越人過虢虢太子死未半日越人診其脈曰太子之病為尸厥脈亂故形如死也乃使弟子子陽礪針砥石以取外三陽五會即任脈中極穴一名玉泉也蓋手之三陽脈維於玉泉又足三陰任脈之會故曰維會肩井曲池甄權刺臂痛而即射懸鐘環跳華他刺躄足而立行秋夫針腰目而鬼免沉疴王纂針交俞而妖精立出續齊諧記徐秋夫療腰痛鬼縛茅作人為針腰目二處交俞未詳取肝俞與命門使瞽者見秋毫之末刺少陽之交別俾聾夫聽夏蚋之聲交謂手足少陽二脈之交會翳風角孫禾髎穴也別謂手少陽之別外關也嗟夫去聖逾遠此道漸墜或不得意而散其學或幸其能而犯禁忌愚庸智淺難契於元微至道淵深得之者有幾竇漢卿標幽賦舊有楊繼洲注其未詳處竊以已見附之百症賦針灸聚英百症腧穴再三用心囟會連於玉枕頭風療以金針懸顱頷厭之中偏頭痛止強間豐隆之際頭痛難禁原夫面腫虛浮須仗水溝前頂耳聾氣閉全憑聽會翳風面上蟲行有驗迎香可取耳中蟬噪有聲聽會堪攻目眩兮支正飛揚目黃兮陽綱膽腧攀睛攻少澤肝腧之所淚出刺臨泣頭維之處眼中漠漠即尋攢竹三間目視䀮䀮急取養老天柱雀目肥氣睛明行間而細推項強傷寒溫溜期門而主之廉泉中衝舌下腫痛堪取天府合谷鼻中衄血宜追耳門絲竹空治牙疼於頃刻頰車地倉穴正口喎於片時喉痛兮液門魚際可療轉筋兮金門丘墟所醫陽谷俠溪頷腫口噤並治少商曲澤血虛口渴同施通天去鼻內無聞之苦復溜祛舌乾口燥之悲啞門關衝舌緩不語為要緊天鼎間使失音囁嚅之休遲太衝瀉唇喎以速愈承漿住牙疼而即移項強多惡風束骨相連於天柱熱病汗不出大都更接於經渠且如兩臂頑麻少海就旁於三里半身不遂陽陵遠達於曲池建里內關掃盡胸中之苦悶聽宮脾腧祛殘心下之悲悽久知脅肋疼痛氣戶華蓋有靈腹內腸鳴下脘陷谷能平胸脅支滿何療章門不用細尋膈疼蓄飲難禁膻中巨闕宜取痞滿更加噎塞中府意舍所行胸膈停留瘀血腎腧巨髎有徵胸滿項強神藏璇璣已試背連腰痛白環委中曾經脊強兮水道筋縮目眩兮顴髎大迎痓病非顱息不愈臍風須然谷方醒委陽天池腋腫針而立散後溪環跳腿疼刺之即輕夢魘不寧厲兌相諧於隱白發狂奔走上脘同起於神門驚悸怔忡取陽交一作陽溪解溪勿誤反張悲哭仗天衝大橫須精癲疾必身柱本神之令發熱仗少衝曲池之津歲熱時行陶道復求肺腧理一作中膂俞風癇常發神道還須心腧寧濕寒濕熱下髎定厥寒厥熱湧泉清寒栗惡寒二間疏通陰郤善煩心嘔吐幽門開徹玉堂明行間湧泉主消渴之腎竭陰陵水分去水腫之臍盈癆瘵傳尸趨魄戶膏肓之路中邪霍亂尋陰谷三里之程治疸消黃諧後溪勞宮而看倦言嗜臥往通里大鐘而行咳嗽連聲肺腧須迎天突穴小便赤澀兌端獨瀉太陽經心與小腸火盛者刺手少陰俞神門在掌後兌骨端又刺手太陽腕骨陽谷刺長強與承山善主腸風新下血針三陰交與氣海專司白濁久遺精且如肓腧橫骨皆腎經穴瀉五淋之久積陰郤後溪治盜汗之多出脾虛谷以不消脾腧膀胱腧覓胃冷食而難化魂門胃腧堪責鼻痔必取齦交癭氣須求浮白大敦照海患寒疝而善蠲五里臂臑生癧瘡而能治至陰屋翳療癢疾之疼多肩髃陽溪消癮風之熱極婦人經事改常自有地機血海女子少氣漏血不無交信合陽帶下産崩衝門氣衝宜審月潮違限天樞水泉細詳肩並乳癰而極效商丘痔漏而最良脫肛趨百會尾骶之所大成作尾翳誤無子搜陰交石關之鄉石關足少陰經中脘主乎積痢外丘收乎大腸寒瘧兮商陽太溪驗痃癖兮衝門血海強夫醫乃人之司命非智士而莫為針又理之元微須至人之指教先究其病源後攻其穴道隨手見功應針取效玉龍賦針灸聚英夫參博以為約要輯簡而舍繁總玉龍以成賦信金針而討論原夫卒暴中風頂門百會失音難語啞門豐隆頭風鼻淵上星合谷耳聾腮腫聽會翳風攢竹頭維治目疼頭痛乳根俞府療氣嗽痰哮風市陰市驅腿腳之乏力陰陵陽陵除膝腫之難熬二白醫痔妙間使治瘧高大敦去疝氣膏肓補虛勞天井醫瘰癧癮疹神門治癲癇呆癡咳嗽風痰太淵列缺宜刺尫羸喘促璇璣氣海當知期門大敦能治堅痃疝氣勞宮太陵可療心悶瘡痍心悸虛煩刺三里時疫痎瘧尋後溪絶骨三里三陰交腳氣宜此睛明太陽魚尾目症憑茲老者便多命門兼腎腧著艾婦人乳腫少澤於太陽可推身柱蠲嗽能除膂痛至陽卻疸善治神疲長強承山灸痔最妙豐隆肺腧痰嗽稱奇風門主感冒寒邪之嗽天樞理內傷脾泄之危風池絶骨而療乎傴僂人中曲池可治其僕痿期門刺傷寒未解經不再傳鳩尾針癲癇已發慎其妄施陰交水道三里蠱脹宜刺一灸水分商丘解溪丘墟腳痛堪追尺澤理筋急不用腕骨療手腕難移肩脊痛兮五樞兼於背縫在肩端骨直腋縫尖針二寸肘攣疼兮尺澤合於曲池風濕搏於兩肩肩髃可療壅熱盛乎三焦關衝最宜手臂紅腫中渚液門要辨脾虛黃疸腕骨中脘何疑傷寒無汗攻復溜宜瀉傷寒有汗取合谷當隨欲調飽滿之氣逆三里可勝要起六脈之沉匿復溜稱奇照海支溝通大便之祕內庭臨泣理小腹之䐜天突膻中醫喘嗽地倉頰車療口喎迎香攻鼻窒為最肩井除臂痛難擎二間治牙疼中魁理翻胃而即愈百勞止虛汗通里療心驚而即瘥大小骨空治眼爛能止冷淚左右太陽醫目疼善除血翳心腧腎腧治腰腎虛乏之夢遺人中委中除背脊痛閃之難制太溪崑崙申脈最療足腫之迍湧泉關元豐隆為治尸勞之例印堂可治驚搐神庭專理頭風太陵人中頻瀉口氣全除帶脈關元多灸腎敗堪攻腿腳重疼針髖骨膝關膝眼行步艱楚灸三里中封太衝取內關與照海醫腹疼之塊搐迎香於鼻內消眼熱之紅肚痛祕結太陵合外關於支溝腿風濕痛居髎兼環跳於委中上脘中脘治九種之心痛赤帶白帶求中極之異同又若心虛熱壅少衝明於濟奪目昏血溢肝腧辨其實虛慕心傳之妙法究用針之疾徐或值挫閃疼痛此為難擬腧穴輯管見以便讀幸高明無哂諸通元指要賦衛生寶鑑必欲治病莫如用針巧運神機之妙功開聖理之深外取砭針能蠲邪而扶正中含水火善回陽而倒陰原夫絡別支殊經交錯綜或溝池溪谷以歧異或山海丘陵而隙共斯流派以難揆在條綱而有統理繁而昧縱補瀉以何功法捷而明自迎隨而得用且如行步難移太衝最奇人中除脊膂之強痛神門去心性之呆癡風傷項急始求於風府頭暈目眩要覓於風池耳閉須聽會而治也眼痛則合谷以推之胸結身黃取湧泉而即可腦昏目赤瀉攢竹以偏宜兩肘拘攣仗曲池而平掃四肢懈惰憑照海以消除牙齒痛呂細堪治呂細經外穴名又太溪別名頭項強承漿可保太白宣導於氣衝脾家真土能生肺金陰陵開通於水道陰陵泉真水能滋濟萬物腹膨而脹奪內庭兮休遲筋轉而疼瀉承山而在早大抵腳腕痛崑崙可愈股膝疼陰市能醫癇發癲狂兮憑後溪而療理瘧生寒熱兮仗間使以扶持期門刺胸滿血膨而可已勞宮退胃翻心痛亦何疑稽夫大敦治七疝之偏墜王公謂此三里卻五勞之羸瘦華他言之腕骨祛黃然谷瀉腎行問治膝腫目疾尺澤去肘疼筋緊目昏不見二間宜求鼻窒無聞迎香可引肩井除兩臂不任絲竹療頭疼難忍咳嗽寒痰列缺堪治眵䁾冷淚臨泣尤準髖骨將腿痛以祛殘髖骨經外奇穴梁丘穴兩旁楊氏注髖骨二穴在委中上三寸脾樞中誤腎腧把腰疼而瀉盡越人治尸厥於維會隨手而蘇見標幽賦文伯瀉死胎於陰交應針而隕宋時徐文伯視婦人臨産危症乃子死腹中刺足三陰交又刺太衝效聖人察麻與痛分實與虛實則自外而入也虛則自內而出諸故濟母而裨其不足奪子而平其有餘觀二十七之經絡一一明辨據四百四十病症件件皆除故得使夭枉都無躋斯民於壽域幾微已判彰往古之元書又聞心胸病求掌後之太陵肩背痛責肘前之三里冷痹腎敗取足陽明之土三里連臍腹痛瀉足少陰之水陰谷脊間心後者針中渚而立痊脅下肋邊者刺陽陵而即止頭項痛擬後溪以安然腰腳疼在委中而已矣席弘賦針灸大全凡欲行針須審穴要明補瀉迎隨訣胸背左右不相同呼吸陰陽男女別氣刺兩乳求太淵未應之時瀉列缺列缺頭疼及偏正重瀉太淵無不應耳聾氣否聽會針迎香穴瀉功如神誰知天突治喉風虛喘須尋三里中手連肩脊痛難忍合谷針時及太衝曲池兩手不如意合谷下針宜仔細心疼手顫少海間若要除根覓陰市但患傷寒兩耳聾耳門聽會疾如風五般肘痛尋尺澤冷淵針後卻收功手足上下針三里食癖氣塊憑此取鳩尾能治五般癇若下湧泉人不死胃中有積刺璇璣三里功多人不知陰陵泉治心胸滿針到承山飲食思大抒若連長強尋小腸氣痛即行針委中專治腰間痛腳膝腫時尋至陰氣滯腰疼不能立橫骨大都堪救急氣海專能治五淋更針三里隨呼吸睛明治眼未效時合谷光明安可缺人中治癲功最高水腫水分氣海消冷嗽先宜補合谷卻須針瀉三陰交牙疼腰痛並咽痹二間陽溪疾怎逃更有三間腎俞妙善除肩背浮風勞若針肩井須三里不刺之時氣未調最是陽陵泉一穴膝間疼痛用針燒腳疼膝腫針三里懸鐘二陵三陰交更向太衝須引氣指頭麻木自輕飄轉筋承山崑崙刺魚際目眩立便消肚疼須是公孫妙內關相應必然瘳冷風冷痹疾難愈環跳腰腧足太陽經八窖針與燒傷寒二日尋風府嘔吐還須上脘療婦人心痛豐隆穴大成作心俞癥瘕痃癖三里高小便不禁關元好大便祕澀大敦燒髖骨腿疼三里瀉復溜氣滯便離腰若逢七疝小腹痛照海陰交曲泉針仍不應時求氣海關元同瀉效如神小腸氣結痛連臍速瀉陰交莫再遲良久湧泉針取氣此中玄妙少人知小兒脫肛患多時先灸百會次尾骶大成作鳩尾誤久患傷寒肩背痛但針中渚得其宜肩上痛連臍不休手中三里便須求下針麻重即須瀉得氣之時不用留咽喉最急先百會太衝照海及陰交噎不住時氣海灸定瀉三里一時消逼針瀉氣須令吸若補隨呼氣自調雜病穴法歌醫學入門雜病隨宜選雜穴仍兼原合與八法經絡交會別論詳臟腑俞募當謹始根結標本理元微四關三部識其處傷寒一日刺風府陰陽分經次第取傷寒一日太陽經取風府在表刺三陽經穴在裡刺三陰經穴過經未汗刺期門三里惟陰症宜灸關元穴汗吐下法非有他合谷內關陰交杵汗法刺合谷行九九數搓數十次得汗行瀉法汗止身溫出針如汗不止針陰市復溜合谷吐法刺內關補之提氣上行又推戰一次病人多呼幾次即吐如吐不止補足三里下法刺三陰交行六陰數畢口鼻閉氣吞鼓腹中將瀉插一下即瀉如泄不止刺合谷行九陽數一切風寒暑濕邪頭疼發熱外關起頭面耳目口鼻病曲池合谷為之主偏正頭疼左右針列缺太淵不用補頭風目眩項捩音列強申脈金